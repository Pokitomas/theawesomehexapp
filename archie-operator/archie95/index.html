<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#008080">
<title>Archie 95 — Admitted Model</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{--face:#c0c0c0;--light:#fff;--mid:#808080;--dark:#404040;--blue:#000080;--blue2:#1084d0;--teal:#008080;--danger:#7d1800;--ok:#075f13}
*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden}body{font:12px Tahoma,"MS Sans Serif",system-ui,sans-serif;background:var(--teal);color:#000;user-select:none}
button,input,textarea{font:inherit}.raised{background:var(--face);border:2px solid;border-color:var(--light) var(--dark) var(--dark) var(--light);box-shadow:inset 1px 1px #dfdfdf,inset -1px -1px var(--mid)}.sunken{background:#fff;border:2px solid;border-color:var(--dark) var(--light) var(--light) var(--dark)}
button{cursor:pointer;padding:4px 12px}button:active{border-color:var(--dark) var(--light) var(--light) var(--dark)}button:disabled{color:#777;cursor:default}.desktop{position:fixed;inset:0 0 30px;overflow:hidden}.icons{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:10px}.icon{width:78px;border:1px solid transparent;background:none;color:#fff;text-shadow:1px 1px #000;text-align:center;padding:4px}.icon:focus,.icon:hover{background:#00008066;border:1px dotted #fff}.glyph{width:34px;height:30px;margin:0 auto 4px;display:grid;place-items:center;color:var(--blue);font-weight:bold;font-size:16px;background:var(--face);border:2px solid;border-color:var(--light) var(--dark) var(--dark) var(--light)}
.window{position:absolute;left:105px;top:24px;width:min(720px,calc(100vw - 112px));height:min(610px,calc(100vh - 62px));display:flex;flex-direction:column;background:var(--face);border:2px solid;border-color:var(--light) var(--dark) var(--dark) var(--light);box-shadow:2px 2px #0006}.titlebar{height:22px;display:flex;align-items:center;gap:6px;padding:2px 3px;background:linear-gradient(90deg,var(--blue),var(--blue2));color:#fff;font-weight:bold}.titlebar span{flex:1}.titlebar button{width:18px;height:16px;padding:0;font-weight:bold}.body{flex:1;overflow:auto;padding:9px;display:flex;flex-direction:column;gap:8px}.status{height:22px;padding:3px 7px;display:flex;justify-content:space-between;border-top:1px solid var(--mid);box-shadow:0 -1px var(--light);font-size:11px}.status .ok{color:var(--ok);font-weight:bold}.status .bad{color:var(--danger);font-weight:bold}
fieldset{margin:0;border:1px solid var(--mid);box-shadow:1px 1px var(--light) inset;padding:8px;display:flex;flex-direction:column;gap:6px}legend{padding:0 4px}textarea,input[type=text]{width:100%;padding:5px 6px;user-select:text}textarea{resize:vertical;min-height:74px}.row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}.grow{flex:1}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:5px}.judge{padding:5px 7px;background:#fff;border:1px solid var(--mid)}.judge small{display:block;color:#555}.judge b{display:block;color:var(--blue);font-size:13px;word-break:break-word}.judge.warn b{color:var(--danger)}.ops{display:flex;gap:4px;flex-wrap:wrap;align-items:center;font:11px Consolas,monospace}.op{padding:2px 7px;color:var(--blue);background:#e9f0ff;border:2px solid;border-color:var(--dark) var(--light) var(--light) var(--dark)}.op.stop{color:var(--danger);background:#fff}.notice{padding:6px;background:#fff;border:1px solid var(--mid)}.notice.bad{color:var(--danger);font-weight:bold}.notice.ok{color:var(--ok)}table{width:100%;border-collapse:collapse;background:#fff}th,td{border:1px solid var(--mid);padding:4px 6px;text-align:left;vertical-align:top}th{background:var(--face)}code,pre{font:10px Consolas,monospace;user-select:text}.meter{height:12px;background:#fff;border:2px solid;border-color:var(--dark) var(--light) var(--light) var(--dark)}.meter i{display:block;height:100%;background:var(--blue);width:0}.hidden{display:none!important}
.taskbar{position:fixed;left:0;right:0;bottom:0;height:30px;padding:2px 4px;display:flex;gap:4px;align-items:center;background:var(--face);border-top:2px solid var(--light);z-index:20}.start{font-weight:bold;height:24px}.task{height:24px;min-width:160px;max-width:240px;text-align:left;font-weight:bold}.clock{margin-left:auto;height:24px;padding:4px 10px}.startmenu{position:fixed;left:3px;bottom:31px;width:245px;display:none;background:var(--face);border:2px solid;border-color:var(--light) var(--dark) var(--dark) var(--light);z-index:30}.startmenu.open{display:flex}.brand{width:28px;padding:7px 3px;background:linear-gradient(var(--blue2),var(--blue));color:#fff;writing-mode:vertical-rl;transform:rotate(180deg);font-weight:bold;letter-spacing:2px}.menuitems{flex:1;padding:3px}.menuitems button{width:100%;border:0;background:none;text-align:left;padding:8px}.menuitems button:hover{background:var(--blue);color:#fff}.boot{position:fixed;inset:0;display:grid;place-items:center;background:var(--teal);z-index:100}.bootbox{width:min(440px,calc(100vw - 24px));padding:12px}.boot h1{font-size:18px;margin:0 0 10px;color:var(--blue)}.boot p{margin:6px 0}.boot .meter{margin-top:8px}
@media(max-width:680px){.icons{display:none}.window{left:3px;top:3px;width:calc(100vw - 6px);height:calc(100vh - 36px)}.task{min-width:0}.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="boot" id="boot"><div class="bootbox raised"><h1>Archie 95</h1><p id="bootmsg">Loading admitted register model…</p><div class="meter"><i id="bootbar"></i></div><p><small>Exact model and controller digests are verified before use.</small></p></div></div>
<div class="desktop"><div class="icons" id="icons"></div><section class="window" id="window"><header class="titlebar"><b>▣</b><span id="title">Ask Archie</span><button class="raised" id="minbtn">_</button></header><main class="body" id="body"></main><footer class="status"><span id="statusLeft">MODEL: LOADING</span><span id="statusRight">offline-capable</span></footer></section></div>
<div class="startmenu" id="startmenu"><div class="brand">ARCHIE&nbsp;95</div><div class="menuitems" id="menuitems"></div></div>
<footer class="taskbar"><button class="start raised" id="startbtn">▦ Start</button><button class="task raised" id="taskbtn">▣ Ask Archie</button><span class="clock raised" id="clock">--:--</span></footer>
<script type="module">
const EXPECTED_PACKAGE='archie95-admitted-model-package/v1';
const PROTOCOLS={summary:['OBSERVE','DRAFT','STOP'],checklist:['OBSERVE','DECOMPOSE','DRAFT','STOP'],message:['OBSERVE','DRAFT','STOP'],decision:['OBSERVE','COMPARE','DRAFT','STOP'],study:['RETRIEVE','DECOMPOSE','ORDER','SCHEDULE','STOP'],event:['OBSERVE','DECOMPOSE','ORDER','SCHEDULE','STOP'],errands:['OBSERVE','ORDER','SCHEDULE','STOP'],objective:['OBSERVE','DRAFT','VERIFY','STOP'],next_action:['OBSERVE','DECOMPOSE','STOP'],plan:['RETRIEVE','DECOMPOSE','ORDER','DRAFT','STOP'],compound:['OBSERVE','DECOMPOSE','ORDER','SCHEDULE','STOP'],clarify:['ASK','STOP']};
const PROGRAMS=[['operator','Ask Archie','A'],['history','History','≡'],['receipts','Receipts','§'],['evidence','Model Evidence','ℹ']];
const $=id=>document.getElementById(id);const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const save=(k,v)=>localStorage.setItem('archie95-v4-'+k,JSON.stringify(v));const load=(k,d)=>{try{return JSON.parse(localStorage.getItem('archie95-v4-'+k))??d}catch{return d}};
let controller=null,model=null,pkg=null,current='operator',attachment=null,minimized=false;
async function hashHex(bytes){const buf=bytes instanceof ArrayBuffer?bytes:bytes.buffer.slice(bytes.byteOffset,bytes.byteOffset+bytes.byteLength);const hash=await crypto.subtle.digest('SHA-256',buf);return [...new Uint8Array(hash)].map(x=>x.toString(16).padStart(2,'0')).join('')}
function decodeBase64(text){const raw=atob(text.replace(/\s/g,''));const bytes=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);return bytes}
async function fetchText(url){const r=await fetch(url);if(!r.ok)throw new Error(`${url}: HTTP ${r.status}`);return r.text()}
function progress(msg,pct){$('bootmsg').textContent=msg;$('bootbar').style.width=pct+'%'}
async function bootModel(){
  progress('Reading package manifest…',8);pkg=await (await fetch('model-package.json',{cache:'no-cache'})).json();if(pkg.schema!==EXPECTED_PACKAGE)throw new Error('Unsupported model package');
  progress('Loading admitted controller…',18);const source=await fetchText(pkg.controller_path);const controllerBytes=new TextEncoder().encode(source);if(await hashHex(controllerBytes)!==pkg.controller_sha256)throw new Error('Controller digest mismatch');const moduleUrl=URL.createObjectURL(new Blob([source],{type:'text/javascript'}));const runtime=await import(moduleUrl);URL.revokeObjectURL(moduleUrl);
  progress('Loading compressed model parts…',30);let joined='';for(let i=0;i<pkg.model_parts.length;i++){joined+=await fetchText(pkg.model_parts[i]);progress(`Loading model part ${i+1}/${pkg.model_parts.length}…`,30+Math.round(35*(i+1)/pkg.model_parts.length))}
  const gz=decodeBase64(joined);if(await hashHex(gz)!==pkg.model_gzip_sha256)throw new Error('Compressed model digest mismatch');if(!globalThis.DecompressionStream)throw new Error('This browser lacks gzip stream support');
  progress('Decompressing 1.44 MB model…',70);const raw=await new Response(new Blob([gz]).stream().pipeThrough(new DecompressionStream('gzip'))).arrayBuffer();if(await hashHex(raw)!==pkg.model_json_sha256)throw new Error('Model digest mismatch');
  progress('Instantiating quantized route expert…',88);model=JSON.parse(new TextDecoder().decode(raw));controller=runtime.createRegisterStudentController(model);
  const smoke=controller.predict('Create a three-line recap and a sendable client update from it.',{});if(smoke.route!=='compound')throw new Error('Runtime smoke check failed');
  progress('Admitted model ready.',100);setTimeout(()=>{$('boot').remove();render();},120);$('statusLeft').innerHTML='<span class="ok">MODEL: ADMITTED V4</span>';
}
function operatorView(){return `<fieldset><legend>Request</legend><textarea id="request" placeholder="Type the messy version…"></textarea><div class="row"><button class="raised" id="attach">Attach…</button><input class="hidden" type="file" id="file"><span id="fileLabel">No attachment</span><span class="grow"></span><button class="raised" id="run" style="font-weight:bold">Run model</button></div></fieldset><fieldset><legend>Context channels</legend><div class="row"><label class="grow">Memory<input class="sunken" type="text" id="memory" placeholder="Saved rule or preference"></label><label class="grow">Thread<input class="sunken" type="text" id="thread" placeholder="Relevant earlier turn"></label></div></fieldset><div id="result"><div class="notice ok">The admitted V4 route model is ready. Nothing executes; it returns a bounded route and judgments.</div></div>`}
function historyView(){const rows=load('history',[]);return rows.length?`<table><tr><th>time</th><th>request</th><th>route</th><th>judgments</th></tr>${rows.map(x=>`<tr><td>${esc(x.at)}</td><td>${esc(x.request).slice(0,90)}</td><td><b>${esc(x.route)}</b><br>${Math.round(x.confidence*100)}%</td><td>${esc(x.authority)}/${esc(x.context)}<br>${esc(x.outcomes.join(' → '))}</td></tr>`).join('')}</table><div class="row"><span class="grow"></span><button class="raised" id="clearHistory">Clear</button></div>`:'<div class="notice">No decisions yet.</div>'}
function receiptsView(){const rows=load('history',[]);return `<fieldset><legend>Receipt bundle</legend><p>Exports the exact model identity, admission evidence, context judgments, and local decision history.</p><div class="row"><button class="raised" id="export">Export JSON…</button><span>${rows.length} decision${rows.length===1?'':'s'}</span></div></fieldset><pre class="sunken" style="padding:8px;white-space:pre-wrap;max-height:360px;overflow:auto">${esc(JSON.stringify({package:pkg,decisions:rows.slice(0,4)},null,2))}</pre>`}
function evidenceView(){const a=pkg.admission;return `<fieldset><legend>Admitted production model</legend><table><tr><th>model</th><td>${esc(pkg.model_id)}</td></tr><tr><th>architecture</th><td>quantized linear register expert + fail-closed V4 controller</td></tr><tr><th>parameters</th><td>${pkg.parameters.toLocaleString()}</td></tr><tr><th>package size</th><td>${pkg.model_bytes.toLocaleString()} bytes (${pkg.compressed_bytes.toLocaleString()} compressed)</td></tr><tr><th>hidden runtime</th><td><b>${esc(a.hidden_runtime)}</b></td></tr><tr><th>legacy retention</th><td><b>${esc(a.legacy)}</b></td></tr><tr><th>Python/JavaScript parity</th><td><b>${esc(a.parity)}</b></td></tr><tr><th>mean latency</th><td>${a.mean_latency_ms.toFixed(3)} ms</td></tr><tr><th>model digest</th><td><code>${esc(pkg.model_json_sha256)}</code></td></tr><tr><th>controller digest</th><td><code>${esc(pkg.controller_sha256)}</code></td></tr><tr><th>admission artifact</th><td>${a.admission_artifact}</td></tr><tr><th>report digest</th><td><code>${esc(a.report_digest)}</code></td></tr></table></fieldset><div class="notice">Scope: local register routing, authority, context sufficiency, abstention, negation, correction, and ordered composition. It does not execute actions.</div>`}
function view(){return current==='operator'?operatorView():current==='history'?historyView():current==='receipts'?receiptsView():evidenceView()}
function render(){const p=PROGRAMS.find(x=>x[0]===current);$('title').textContent=p[1];$('taskbtn').textContent=`${p[2]} ${p[1]}`;$('body').innerHTML=view();wire();}
function wire(){if(current==='operator'){$('attach').onclick=()=>$('file').click();$('file').onchange=async e=>{const f=e.target.files[0];if(!f)return;const text=await f.text().catch(()=>'');attachment={name:f.name,size:f.size,text:text.slice(0,1200)};$('fileLabel').textContent=`${f.name} (${f.size} bytes)`};$('run').onclick=run;$('request').addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))run()})}if(current==='history'&&$('clearHistory'))$('clearHistory').onclick=()=>{save('history',[]);render()};if(current==='receipts')$('export').onclick=exportReceipts}
function normalizedDistribution(p){const values=[{route:p.route,p:p.confidence},...(p.alternatives||[]).map(x=>({route:x.route,p:x.confidence}))];const seen=new Set();return values.filter(x=>x.route&&!seen.has(x.route)&&seen.add(x.route)).slice(0,4)}
function run(){const request=$('request').value.trim();if(!request||!controller)return;const ctx={attachments:attachment?`${attachment.name}\n${attachment.text}`:'',memory:$('memory').value.trim(),thread:$('thread').value.trim()};const p=controller.predict(request,ctx);const deny=p.authority==='deny';const missing=p.context==='missing';const proto=PROTOCOLS[p.route]||['OBSERVE','STOP'];const dist=normalizedDistribution(p);$('result').innerHTML=`<fieldset><legend>Model decision</legend><div class="grid"><div class="judge"><small>route</small><b>${esc(p.route)}</b></div><div class="judge${deny?' warn':''}"><small>authority</small><b>${esc(p.authority)}</b></div><div class="judge${missing?' warn':''}"><small>context</small><b>${esc(p.context)}</b></div><div class="judge"><small>reference</small><b>${esc(p.reference||'none')}</b></div><div class="judge"><small>outcomes</small><b>${esc((p.outcomes||[]).join(' → ')||'—')}</b></div><div class="judge"><small>confidence</small><b>${Math.round(p.confidence*100)}%</b></div></div><div class="ops">${proto.map((x,i)=>`${i?'→ ':''}<span class="op${x==='STOP'?' stop':''}">${x}</span>`).join('')}</div>${deny?'<div class="notice bad">Fails closed: outside authority. Nothing will run.</div>':''}${missing?'<div class="notice bad">Referenced support is missing or unusable.</div>':''}<table><tr><th>candidate</th><th>confidence</th></tr>${dist.map(x=>`<tr><td>${esc(x.route)}</td><td>${Math.round(x.p*1000)/10}%</td></tr>`).join('')}</table><small>decision source: ${esc(p.decision_source||'learned-register-route')}</small></fieldset>`;const history=load('history',[]);history.unshift({at:new Date().toISOString(),request,context:{attachment:attachment?.name||null,memory:Boolean(ctx.memory),thread:Boolean(ctx.thread)},route:p.route,authority:p.authority,context_state:p.context,reference:p.reference||'none',outcomes:p.outcomes||[],confidence:p.confidence,decision_source:p.decision_source,model_sha256:pkg.model_json_sha256,controller_sha256:pkg.controller_sha256});save('history',history.slice(0,100))}
function exportReceipts(){const blob=new Blob([JSON.stringify({schema:'archie95-receipts/v1',exported_at:new Date().toISOString(),package:pkg,decisions:load('history',[])},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='archie95-receipts.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
for(const [id,title,glyph] of PROGRAMS){const b=document.createElement('button');b.className='icon';b.innerHTML=`<span class="glyph">${glyph}</span>${title}`;b.onclick=()=>{current=id;minimized=false;$('window').classList.remove('hidden');render()};$('icons').appendChild(b);const m=document.createElement('button');m.textContent=`${glyph} ${title}`;m.onclick=()=>{current=id;$('startmenu').classList.remove('open');minimized=false;$('window').classList.remove('hidden');render()};$('menuitems').appendChild(m)}
$('startbtn').onclick=()=>$('startmenu').classList.toggle('open');$('minbtn').onclick=()=>{minimized=true;$('window').classList.add('hidden')};$('taskbtn').onclick=()=>{minimized=!minimized;$('window').classList.toggle('hidden',minimized)};setInterval(()=>{$('clock').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})},1000);window.addEventListener('online',()=>{$('statusRight').textContent='online'});window.addEventListener('offline',()=>{$('statusRight').textContent='offline'});$('statusRight').textContent=navigator.onLine?'online':'offline';
if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
bootModel().catch(error=>{progress('Model failed closed.',100);$('bootmsg').innerHTML=`<b style="color:var(--danger)">MODEL NOT LOADED:</b> ${esc(error.message)}`;$('statusLeft').innerHTML='<span class="bad">MODEL: FAILED CLOSED</span>'});
</script>
</body>
</html>
