name: Temporary complete repository scrape

on:
  pull_request:
    paths:
      - '.github/workflows/temporary-repo-scrape.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Export every tracked file
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/repo-scrape"
          python3 - <<'PY'
          import base64, hashlib, json, os, pathlib, subprocess
          root = pathlib.Path('.').resolve()
          output = pathlib.Path(os.environ['RUNNER_TEMP']) / 'repo-scrape'
          paths = subprocess.check_output(['git', 'ls-files', '-z']).split(b'\0')
          rows = []
          tree = []
          for raw in paths:
              if not raw:
                  continue
              rel = raw.decode('utf-8', 'surrogateescape')
              path = root / rel
              data = path.read_bytes()
              try:
                  text = data.decode('utf-8')
                  encoding = 'utf-8'
                  content = text
              except UnicodeDecodeError:
                  encoding = 'base64'
                  content = base64.b64encode(data).decode('ascii')
              row = {
                  'path': rel,
                  'bytes': len(data),
                  'sha256': hashlib.sha256(data).hexdigest(),
                  'encoding': encoding,
                  'content': content,
              }
              rows.append(row)
              tree.append(f"{rel}\t{len(data)}\t{row['sha256']}\t{encoding}")
          (output / 'repository.json').write_text(json.dumps({
              'schema': 'archie-complete-repository-scrape/v1',
              'head': subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip(),
              'file_count': len(rows),
              'total_bytes': sum(r['bytes'] for r in rows),
              'files': rows,
          }, ensure_ascii=False), encoding='utf-8')
          (output / 'tree.tsv').write_text('\n'.join(tree) + '\n', encoding='utf-8')
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: complete-repository-scrape-${{ github.event.pull_request.head.sha || github.sha }}
          path: ${{ runner.temp }}/repo-scrape
          compression-level: 9
          retention-days: 1
          if-no-files-found: error
