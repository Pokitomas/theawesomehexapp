name: Falsify Archie architecture against equal-budget baselines
# promotion: not-admitted

on:
  pull_request:
    paths:
      - 'foundry/archie-distill/falsify_archie_hybrid.py'
      - 'foundry/archie-distill/test_falsify_archie_hybrid.py'
      - '.github/workflows/archie-architecture-falsification.yml'
      - 'audit/authority-manifest.workflow-projection.mjs'
  push:
    branches:
      - 'agent/archie-falsification-tournament'
    paths:
      - 'foundry/archie-distill/falsify_archie_hybrid.py'
      - 'foundry/archie-distill/test_falsify_archie_hybrid.py'
      - '.github/workflows/archie-architecture-falsification.yml'
      - 'audit/authority-manifest.workflow-projection.mjs'
  workflow_dispatch:
    inputs:
      parameter_budget:
        required: false
        default: '4000000'
        type: string
      max_steps:
        required: false
        default: '1000'
        type: string
      max_corpus_tokens:
        required: false
        default: '20000000'
        type: string
      seed:
        required: false
        default: '1337'
        type: string

permissions:
  contents: read

concurrency:
  group: archie-falsification-${{ github.ref }}
  cancel-in-progress: false

jobs:
  contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install locked CPU dependencies
        run: |
          python -m pip install --disable-pip-version-check numpy
          python -m pip install --disable-pip-version-check torch --index-url https://download.pytorch.org/whl/cpu
      - name: Compile and execute equal-budget miniature tournament
        run: |
          set -euo pipefail
          python -m py_compile \
            foundry/archie-distill/falsify_archie_hybrid.py \
            foundry/archie-distill/test_falsify_archie_hybrid.py
          PYTHONPATH=foundry/archie-distill python foundry/archie-distill/test_falsify_archie_hybrid.py

  corpus:
    needs: contract
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      MAX_CORPUS_TOKENS: ${{ inputs.max_corpus_tokens || '20000000' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install corpus dependencies
        run: python -m pip install --disable-pip-version-check numpy datasets
      - name: Compile one shared byte-identical corpus
        run: |
          set -euo pipefail
          python foundry/archie-distill/train_archie_hybrid.py \
            --build-corpus \
            --source . \
            --hf-source 'HuggingFaceFW/fineweb-edu|sample-10BT|train|text|50000' \
            --max-corpus-tokens "$MAX_CORPUS_TOKENS" \
            --corpus tournament/corpus.u16 \
            --state-dir tournament/build-only \
            --preset micro \
            --device cpu \
            --seq-len 16 \
            --batch-size 1 \
            --eval-batch-size 1 \
            --grad-accum 1 \
            --max-steps 0 \
            --eval-batches 1 \
            --generate-tokens 1 \
            --deadline-minutes 0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-falsification-corpus-${{ github.sha }}
          path: |
            tournament/corpus.u16
            tournament/corpus.u16.json
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  train:
    needs: corpus
    strategy:
      fail-fast: false
      matrix:
        architecture: [hybrid, transformer, ssm]
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    env:
      PARAMETER_BUDGET: ${{ inputs.parameter_budget || '4000000' }}
      MAX_STEPS: ${{ inputs.max_steps || '1000' }}
      SEED: ${{ inputs.seed || '1337' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install training dependencies
        run: |
          python -m pip install --disable-pip-version-check numpy
          python -m pip install --disable-pip-version-check torch --index-url https://download.pytorch.org/whl/cpu
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: archie-falsification-corpus-${{ github.sha }}
          path: tournament
      - name: Train one blinded architecture arm
        run: |
          set -euo pipefail
          PYTHONPATH=foundry/archie-distill python foundry/archie-distill/falsify_archie_hybrid.py train \
            --architecture '${{ matrix.architecture }}' \
            --corpus tournament/corpus.u16 \
            --output 'tournament/${{ matrix.architecture }}' \
            --parameter-budget "$PARAMETER_BUDGET" \
            --parameter-tolerance 0.03 \
            --layers 8 \
            --seq-len 256 \
            --batch-size 2 \
            --eval-batch-size 2 \
            --grad-accum 4 \
            --max-steps "$MAX_STEPS" \
            --learning-rate 0.0003 \
            --weight-decay 0.1 \
            --eval-every 50 \
            --eval-batches 8 \
            --seed "$SEED" \
            --device cpu \
            --deadline-minutes 320 \
            --deadline-buffer-seconds 300
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: archie-falsification-${{ matrix.architecture }}-${{ github.run_id }}
          path: tournament/${{ matrix.architecture }}
          if-no-files-found: error
          retention-days: 30

  aggregate:
    needs: train
    if: always() && needs.train.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755 # v6.2.0
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: archie-falsification-*-${{ github.run_id }}
          path: tournament/results
          merge-multiple: false
      - name: Emit architecture-neutral verdict
        run: |
          set -euo pipefail
          mapfile -t receipts < <(find tournament/results -name receipt.json -print | sort)
          test "${#receipts[@]}" -eq 3
          args=()
          for receipt in "${receipts[@]}"; do args+=(--receipt "$receipt"); done
          PYTHONPATH=foundry/archie-distill python foundry/archie-distill/falsify_archie_hybrid.py aggregate \
            "${args[@]}" \
            --practical-margin 0.02 \
            --output tournament/falsification-report.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-falsification-verdict-${{ github.run_id }}
          path: tournament/falsification-report.json
          if-no-files-found: error
          retention-days: 30
