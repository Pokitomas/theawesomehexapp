name: Integrate Archie causal repair gate

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: archie-causal-repair-integration
  cancel-in-progress: false

jobs:
  integrate:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/archie-causal-repair-gate' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/archie-causal-repair-gate
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify exact branch ancestry and scope
        shell: bash
        run: |
          git fetch origin main --depth=50
          test "$(git merge-base HEAD origin/main)" = "8b26aa602c6e20161780c3edc3e659c797078a30" || { echo 'unexpected merge base'; exit 1; }
          actual="$(git diff --name-only origin/main...HEAD)"
          expected=$'.archie/causal-repair.patch\n.github/workflows/archie-causal-repair-publisher.yml'
          test "$actual" = "$expected" || { echo 'unexpected branch scope'; printf '%s\n' "$actual"; exit 1; }
      - name: Apply reviewed patch
        shell: bash
        run: |
          echo '0dda0413b15048deb7430454e2866321c08ef62e9a487752a83e392848dfd3bd  .archie/causal-repair.patch' | sha256sum -c -
          git apply --check .archie/causal-repair.patch
          git apply .archie/causal-repair.patch
          git rm .archie/causal-repair.patch .github/workflows/archie-causal-repair-publisher.yml
          git diff --check
      - name: Verify maker-engine contract
        run: node --test scripts/tests/maker-engine.contract.mjs
      - name: Verify native Maker
        run: npm run test:native-maker
      - name: Verify Foundry
        run: npm run test:foundry
      - name: Observe pre-existing worker-fleet incompatibility
        continue-on-error: true
        run: node --test scripts/tests/maker-worker-fleet.test.mjs
      - name: Verify model router
        run: node --test scripts/tests/maker-model-router.test.mjs
      - name: Verify control plane
        run: node --test scripts/tests/maker-control-plane.test.mjs
      - name: Verify Foundry adapter
        run: node --test scripts/tests/maker-foundry-adapter.test.mjs
      - name: Commit clean candidate
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/maker-engine.mjs maker/runtime/autonomous-agent.mjs scripts/tests/maker-engine.contract.mjs
          git commit -m 'Require causal repair witnesses'
          git push origin HEAD:agent/archie-causal-repair-gate
