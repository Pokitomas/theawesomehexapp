name: Verify Archie native iPhone runtime

on:
  pull_request:
    paths:
      - 'ios/ArchiePhone/**'
      - '.github/workflows/archie-ios-runtime.yml'
  push:
    branches: [main]
    paths:
      - 'ios/ArchiePhone/**'
      - '.github/workflows/archie-ios-runtime.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  xcode-build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install project generator
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: ios/ArchiePhone
        run: xcodegen generate
      - name: Select available iPhone simulator
        id: simulator
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, subprocess
          data = json.loads(subprocess.check_output(['xcrun', 'simctl', 'list', 'devices', 'available', '-j']))
          devices = [d for rows in data['devices'].values() for d in rows if d.get('isAvailable') and 'iPhone' in d.get('name', '')]
          if not devices:
              raise SystemExit('No available iPhone simulator')
          print(f"id={devices[0]['udid']}")
          PY
      - name: Build and test native runtime
        working-directory: ios/ArchiePhone
        run: |
          set -o pipefail
          xcodebuild test \
            -project ArchiePhone.xcodeproj \
            -scheme ArchiePhone \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -derivedDataPath DerivedData \
            -resultBundlePath ArchiePhoneTests.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee xcodebuild.log
      - name: Surface concise native failures
        if: failure()
        working-directory: ios/ArchiePhone
        run: |
          grep -nE '(^| )error:|Testing failed|BUILD FAILED|TEST FAILED|The following build commands failed' xcodebuild.log | tail -n 240 || true
      - name: Preserve native build evidence and simulator app
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-native-iphone-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            ios/ArchiePhone/xcodebuild.log
            ios/ArchiePhone/ArchiePhoneTests.xcresult
            ios/ArchiePhone/ArchiePhone.xcodeproj/project.pbxproj
            ios/ArchiePhone/DerivedData/Build/Products/Debug-iphonesimulator/ArchiePhone.app
          if-no-files-found: warn
          retention-days: 14
