name: Dispatch Archie Pages release

on:
  issue_comment:
    types: [created]
  create:
  pull_request_target:
    types: [opened, reopened, synchronize]
  workflow_run:
    workflows: [Build and deploy Archie one-task workflow]
    types: [completed]

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    if: >-
      (github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      github.event.comment.body == '/deploy-archie' &&
      github.event.comment.author_association == 'OWNER') ||
      (github.event_name == 'create' &&
      github.ref_type == 'branch' &&
      startsWith(github.ref, 'archie-release-')) ||
      (github.event_name == 'pull_request_target' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'archie-release-pr-') &&
      github.event.pull_request.author_association == 'OWNER') ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      startsWith(github.event.workflow_run.head_branch, 'archie-release-pr-'))
    runs-on: ubuntu-24.04
    steps:
      - name: Dispatch admitted Archie Pages workflow
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pages.yml',
              ref: 'main'
            });
            core.info(`Dispatched pages.yml on main from trusted ${context.eventName} release trigger.`);
