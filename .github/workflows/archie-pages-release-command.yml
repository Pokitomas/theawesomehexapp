name: Dispatch Archie Pages release

on:
  issue_comment:
    types: [created]
  create:
  pull_request_target:
    types: [opened, reopened, synchronize]
  workflow_run:
    workflows: [Build and deploy Archie one-task workflow]
    types: [completed]

permissions:
  actions: write
  contents: read

jobs:
  release-witness:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      startsWith(github.event.workflow_run.head_branch, 'archie-release-pr-')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
    steps:
      - name: Record trusted release entry
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const sourceRun = context.payload.workflow_run;
            const issueNumber = sourceRun.pull_requests?.[0]?.number || 653;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                'Trusted Archie release entered default-branch execution.',
                '',
                `CALLER_RUN_ID=${context.runId}`,
                `SOURCE_RUN_ID=${sourceRun.id}`,
                `SOURCE_HEAD_BRANCH=${sourceRun.head_branch}`,
                `SOURCE_HEAD_SHA=${sourceRun.head_sha}`,
                `TRUSTED_CALLER_SHA=${context.sha}`,
                'RELEASE_PHASE=started'
              ].join('\n')
            });

  release-outcome:
    needs: release-after-verified-pr
    if: >-
      always() &&
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      startsWith(github.event.workflow_run.head_branch, 'archie-release-pr-')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
    env:
      RELEASE_RESULT: ${{ needs.release-after-verified-pr.result }}
    steps:
      - name: Record trusted release outcome
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const sourceRun = context.payload.workflow_run;
            const issueNumber = sourceRun.pull_requests?.[0]?.number || 653;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                'Trusted Archie release finished.',
                '',
                `CALLER_RUN_ID=${context.runId}`,
                `SOURCE_RUN_ID=${sourceRun.id}`,
                `TRUSTED_CALLER_SHA=${context.sha}`,
                `RELEASE_RESULT=${process.env.RELEASE_RESULT || 'unknown'}`,
                'RELEASE_PHASE=finished'
              ].join('\n')
            });

  dispatch:
    if: >-
      (github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      github.event.comment.body == '/deploy-archie' &&
      github.event.comment.author_association == 'OWNER') ||
      (github.event_name == 'create' &&
      github.ref_type == 'branch' &&
      startsWith(github.ref, 'archie-release-')) ||
      (github.event_name == 'pull_request_target' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'archie-release-pr-') &&
      github.event.pull_request.author_association == 'OWNER')
    runs-on: ubuntu-24.04
    steps:
      - name: Dispatch admitted Archie Pages workflow
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pages.yml',
              ref: 'main'
            });
            core.info(`Dispatched pages.yml on main from trusted ${context.eventName} release trigger.`);

  release-after-verified-pr:
    needs: release-witness
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      startsWith(github.event.workflow_run.head_branch, 'archie-release-pr-')
    permissions:
      contents: read
      pages: write
      id-token: write
      issues: write
    uses: ./.github/workflows/pages.yml
    with:
      deploy: true
