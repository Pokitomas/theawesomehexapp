name: Verify coordination tick reducer

on:
  pull_request:
    paths:
      - scripts/coordination-tick-core.mjs
      - scripts/coordination-tick.mjs
      - scripts/tests/coordination-tick.test.mjs
      - scripts/tests/coordination-tick-hardening.test.mjs
      - .github/workflows/coordination-ticks.yml
      - .github/workflows/coordination-tick-ci.yml
  push:
    branches: [main]
    paths:
      - scripts/coordination-tick-core.mjs
      - scripts/coordination-tick.mjs
      - scripts/tests/coordination-tick.test.mjs
      - scripts/tests/coordination-tick-hardening.test.mjs
      - .github/workflows/coordination-ticks.yml
      - .github/workflows/coordination-tick-ci.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Verify event-counted coordination reducer
        run: |
          node --check scripts/coordination-tick-core.mjs
          node --check scripts/coordination-tick.mjs
          node --test scripts/tests/coordination-tick.test.mjs scripts/tests/coordination-tick-hardening.test.mjs
