name: Archie masked-authored neural experiment

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: archie-neural-masked-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  train:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 330
    steps:
      - name: Check out exact candidate head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755 # v6.2.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install numerical dependencies
        run: python -m pip install --upgrade numpy scipy scikit-learn joblib

      - name: Materialize split-preserving authored corpus
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import crypto from 'node:crypto';
          import { buildCorpus } from './foundry/archie-protocol/protocol-corpus.mjs';
          const corpus = buildCorpus();
          const rows = [...corpus.train, ...corpus.development, ...corpus.hard]
            .map(row => ({ prompt: row.prompt, route: row.intent, source: `protocol-corpus:${row.split}` }));
          const payload = JSON.stringify(rows, null, 2) + '\n';
          fs.mkdirSync('.tmp', { recursive: true });
          fs.writeFileSync('.tmp/committed-route-corpus.json', payload);
          const splitCounts = Object.fromEntries(['train', 'development', 'hard-development'].map(split => [
            split,
            rows.filter(row => row.source === `protocol-corpus:${split}`).length,
          ]));
          const manifest = {
            schema: 'archie-split-authored-corpus/v1',
            source: 'foundry/archie-protocol/protocol-corpus.mjs',
            rows: rows.length,
            split_counts: splitCounts,
            sha256: crypto.createHash('sha256').update(payload).digest('hex'),
            supervision: 'route labels only; non-route labels are unobserved and must be masked',
          };
          fs.writeFileSync('.tmp/masked-corpus.manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          console.log(JSON.stringify(manifest, null, 2));
          NODE

      - name: Verify masked trainer contracts
        working-directory: foundry/archie-protocol/neural
        run: |
          set -euo pipefail
          python -m py_compile masked_mixed_train.py
          python np_transformer.py --gradcheck
          python test_np_transformer.py
          grep -Fq 'placeholder auxiliary labels masked' masked_mixed_train.py
          grep -Fq 'authored_selection' masked_mixed_train.py

      - name: Train masked authored candidate H
        run: |
          set -euo pipefail
          python foundry/archie-protocol/neural/masked_mixed_train.py \
            --seed 424243 \
            --d 128 \
            --layers 2 \
            --heads 4 \
            --tmax 84 \
            --epochs 8 \
            --batch 64 \
            --lr 0.0022 \
            --drop 0.10 \
            --scale 3 \
            --authored-rows .tmp/committed-route-corpus.json \
            --authored-repeat 40 \
            --authored-loss-weight 0.55 \
            --frozen-pack foundry/archie-protocol/factorized/blind-challenge-pack.frozen.json \
            --out foundry/archie-protocol/neural/runs \
            --tag npt-authored-masked-d128

      - name: Verify receipt and write comparison
        shell: bash
        run: |
          set -euo pipefail
          cp .tmp/masked-corpus.manifest.json foundry/archie-protocol/neural/runs/masked-corpus.manifest.json
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          runs = Path('foundry/archie-protocol/neural/runs')
          h_path = runs / 'npt-authored-masked-d128-seed424243-receipt.json'
          h = json.loads(h_path.read_text())
          b = json.loads((runs / 'npt-sw-d128-seed424243-receipt.json').read_text())
          c = json.loads((runs / 'npt-realdom-d128-seed424243-receipt.json').read_text())
          manifest = json.loads((runs / 'masked-corpus.manifest.json').read_text())
          weights_path = runs / h['model']['weights_file']
          actual_weights = hashlib.sha256(weights_path.read_bytes()).hexdigest()
          if actual_weights != h['model']['weights_sha256']:
              raise SystemExit('masked candidate weight digest mismatch')
          if h['promotion'] != 'not-admitted':
              raise SystemExit('masked candidate attempted promotion')
          contract = h['supervision_contract']
          if 'masked' not in contract['authored_train']:
              raise SystemExit('authored auxiliary supervision was not masked')
          if h['data']['authored_selection_rows'] != manifest['split_counts']['development'] + manifest['split_counts']['hard-development']:
              raise SystemExit('authored selection split mismatch')

          def compact(label, receipt):
              result = receipt['results']['blind_429']
              return {
                  'run': label,
                  'tag': receipt['tag'],
                  'blind_full': result['full_accuracy'],
                  'blind_route': result['route_accuracy'],
                  'confidence_correct': result['mean_confidence_correct'],
                  'confidence_incorrect': result['mean_confidence_incorrect'],
              }

          summary = {
              'schema': 'archie-masked-authored-comparison/v1',
              'runs': [compact('B', b), compact('C', c), compact('H', h)],
              'selected_epoch': h['config']['selected_epoch'],
              'selected_development': h['selected_development'],
              'corpus_manifest': manifest,
              'weights_sha256': actual_weights,
              'receipt_digest': h['receipt_digest'],
              'promotion': 'not-admitted',
              'claim_boundary': h['claim_boundary'],
          }
          payload = json.dumps(summary, indent=2) + '\n'
          (runs / 'masked-authored-comparison.json').write_text(payload)
          print(payload)
          PY

      - name: Upload digest-bound masked experiment
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-neural-masked-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            foundry/archie-protocol/neural/runs/npt-authored-masked-d128-seed424243.npz
            foundry/archie-protocol/neural/runs/npt-authored-masked-d128-seed424243-receipt.json
            foundry/archie-protocol/neural/runs/masked-corpus.manifest.json
            foundry/archie-protocol/neural/runs/masked-authored-comparison.json
          if-no-files-found: error
          retention-days: 14
