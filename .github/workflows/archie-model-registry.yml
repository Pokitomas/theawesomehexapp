name: Validate Archie model registry

on:
  pull_request:
    paths:
      - MODEL_REGISTRY.json
      - scripts/verify-model-registry.mjs
      - .github/workflows/archie-model-registry.yml
  push:
    branches:
      - main
    paths:
      - MODEL_REGISTRY.json
      - scripts/verify-model-registry.mjs
      - .github/workflows/archie-model-registry.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Validate distinct artifact identities and claim boundaries
        run: node scripts/verify-model-registry.mjs MODEL_REGISTRY.json
