name: Repair Archie effective threshold

on:
  push:
    branches:
      - agent/fix-archie-effective-threshold

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Apply exact planner repair and regression coverage
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          planner_path = Path('scripts/maker-archie-planner.mjs')
          planner = planner_path.read_text()
          old_calibrate = """function calibrate(score, model, margin = 0) {
            const threshold = Number(model.threshold || DEFAULT_THRESHOLD);
            const slope = Number(model.calibration?.slope || 7.5);
            const centered = (score - threshold) * slope + margin * 2;
          """
          new_calibrate = """function calibrate(score, threshold, slope = 7.5, margin = 0) {
            const effectiveThreshold = Number(threshold ?? DEFAULT_THRESHOLD);
            const effectiveSlope = Number(slope ?? 7.5);
            const centered = (score - effectiveThreshold) * effectiveSlope + margin * 2;
          """
          if planner.count(old_calibrate) != 1:
              raise SystemExit('expected exactly one calibrate implementation to replace')
          planner = planner.replace(old_calibrate, new_calibrate)

          old_call = "const calibrated = Number(calibrate(confidence, model, margin).toFixed(6));"
          new_call = "const calibrated = Number(calibrate(confidence, config.threshold, model.calibration?.slope, margin).toFixed(6));"
          if planner.count(old_call) != 1:
              raise SystemExit('expected exactly one calibrate call to replace')
          planner = planner.replace(old_call, new_call)
          planner_path.write_text(planner)

          test_path = Path('scripts/tests/maker-archie-planner.test.mjs')
          tests = test_path.read_text()
          marker = "test('generalizes paraphrases without memorizing exact wording', () => {"
          if tests.count(marker) != 1:
              raise SystemExit('expected planner test insertion marker exactly once')
          addition = """function expectedCalibratedConfidence({ confidence, threshold, slope, margin }) {
            const centered = (confidence - threshold) * slope + margin * 2;
            return Number(Math.max(0, Math.min(1, 1 / (1 + Math.exp(-centered)))).toFixed(6));
          }

          test('calibrates against a trained zero threshold', () => {
            const model = train(baseExamples(), { threshold: 0 });
            const plan = planWithArchieCPUPlanner(model, {
              instruction: 'Recover a git branch after a merge conflict and verify the repaired repository tests.'
            });
            assert.equal(model.threshold, 0);
            assert.equal(plan.calibrated_confidence, expectedCalibratedConfidence({
              confidence: plan.confidence,
              threshold: 0,
              slope: model.calibration.slope,
              margin: plan.margin
            }));
          });

          test('calibrates against an inference-time threshold override', () => {
            const model = train();
            const threshold = 0.9;
            const plan = planWithArchieCPUPlanner(model, {
              instruction: 'Repair the conflicted repo head and run checks after the branch repair.'
            }, { threshold });
            const expected = expectedCalibratedConfidence({
              confidence: plan.confidence,
              threshold,
              slope: model.calibration.slope,
              margin: plan.margin
            });
            const modelThresholdResult = expectedCalibratedConfidence({
              confidence: plan.confidence,
              threshold: model.threshold,
              slope: model.calibration.slope,
              margin: plan.margin
            });
            assert.equal(plan.calibrated_confidence, expected);
            assert.notEqual(plan.calibrated_confidence, modelThresholdResult);
          });

          """
          tests = tests.replace(marker, addition + marker)
          test_path.write_text(tests)
          PY

      - name: Validate focused and complete Archie gates
        shell: bash
        run: |
          node --test scripts/tests/maker-archie-planner.test.mjs
          npm run test:archie
          git diff --check

      - name: Commit verified repair
        shell: bash
        run: |
          rm .github/workflows/repair-archie-effective-threshold.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/maker-archie-planner.mjs scripts/tests/maker-archie-planner.test.mjs .github/workflows/repair-archie-effective-threshold.yml
          git commit -m "fix(archie): calibrate against effective threshold"
          git push origin HEAD:${GITHUB_REF_NAME}
