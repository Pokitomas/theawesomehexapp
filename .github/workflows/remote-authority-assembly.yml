name: Verify Remote authority assembly

on:
  pull_request:
    paths:
      - 'netlify/functions/remote*.mjs'
      - 'netlify/functions/weave-lasso-service.mjs'
      - 'scripts/weave-*.mjs'
      - 'scripts/tests/remote*.test.mjs'
      - 'scripts/tests/weave*.test.mjs'
      - '.github/workflows/pages.yml'
      - '.github/workflows/weave-lasso.yml'
      - '.github/workflows/workflow-permissions.yml'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - 'netlify/functions/remote*.mjs'
      - 'netlify/functions/weave-lasso-service.mjs'
      - 'scripts/weave-*.mjs'
      - 'scripts/tests/remote*.test.mjs'
      - 'scripts/tests/weave*.test.mjs'
      - '.github/workflows/pages.yml'
      - '.github/workflows/weave-lasso.yml'
      - '.github/workflows/workflow-permissions.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked runtime dependencies
        run: npm ci --ignore-scripts
      - run: npm run test:remote
      - run: npm run test:weave
      - run: node --test scripts/tests/workflow-permissions.test.mjs
