name: Coordination event ticks

on:
  issues:
    types: [opened, reopened, edited, closed, labeled, unlabeled, assigned, unassigned]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened, synchronize, edited, ready_for_review, converted_to_draft, closed, labeled, unlabeled]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  create:
  delete:
  workflow_run:
    workflows:
      - Lasso incoming co-agents
      - Verify weave protocol
      - Verify Remote authority assembly
      - Verify social authority assembly
      - Verify social authority schema
      - Verify workflow authority
      - Authority manifest drift
      - Verify coordination tick reducer
      - Build and deploy manual root-kernel feed
      - Validate manual overlay shards
      - Kernel parity check
      - Prove manual gate on phone
      - Prove relational social authority
      - Prove authoritative social spine on phone
      - Prove profile-first starter on phone
      - Prove Ark survival ledger on phone
      - Prove universal media lab on phone
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read
  actions: read

concurrency:
  group: coordination-tick-${{ github.repository }}
  cancel-in-progress: false

jobs:
  reduce:
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted default-branch reducer
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Verify reducer before mutation
        run: |
          node --check scripts/coordination-tick-core.mjs
          node --check scripts/coordination-tick.mjs
          node --test scripts/tests/coordination-tick.test.mjs scripts/tests/coordination-tick-hardening.test.mjs

      - name: Apply one atomic repository-event tick
        env:
          GITHUB_TOKEN: ${{ github.token }}
          COORDINATION_ISSUE: '131'
          COORDINATION_QUIET_TICKS: '3'
          COORDINATION_STALE_TICKS: '8'
        run: node scripts/coordination-tick.mjs
