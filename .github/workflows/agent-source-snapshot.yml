name: Apply instrument genesis repair

on:
  pull_request:
    branches:
      - 'agent/archie-endogenous-hypothesis-engine-20260723'
  push:
    branches:
      - 'agent/archie-instrument-genesis-v2-20260723'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/archie-instrument-genesis-v2-20260723
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Reconstruct repair payload
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import hashlib
          import tarfile
          from pathlib import Path

          parts = sorted(Path('.github/repair-payload').glob('part-[0-9][0-9]'))
          assert len(parts) == 8, [str(path) for path in parts]
          encoded = ''.join(path.read_text(encoding='utf-8').strip() for path in parts)
          print({'parts': [(path.name, path.stat().st_size) for path in parts], 'encoded_bytes': len(encoded)})
          payload = base64.b64decode(encoded, validate=True)
          digest = hashlib.sha256(payload).hexdigest()
          print({'decoded_bytes': len(payload), 'sha256': digest})
          assert digest == '0d431ca084fa59dac5ce3a42ca59a966686913ae478b6848bdd89b5358b501c9'
          archive = Path('/tmp/instrument-genesis-repair.tar.gz')
          archive.write_bytes(payload)
          with tarfile.open(archive, 'r:gz') as handle:
              names = handle.getnames()
              print({'members': names})
              handle.extractall('.')
          PY
      - name: Validate repair
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install numpy
          python -m py_compile \
            foundry/archie-distill/archie_instrument_genesis.py \
            foundry/archie-distill/test_archie_instrument_genesis.py
          cd foundry/archie-distill
          python -m unittest -v test_archie_instrument_genesis
      - name: Commit repaired engine
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/repair-payload
          rm -f .github/workflows/agent-source-snapshot.yml
          git config user.name 'archie-research-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A \
            foundry/archie-distill/archie_instrument_genesis.py \
            foundry/archie-distill/test_archie_instrument_genesis.py \
            .github/workflows/archie-instrument-genesis.yml \
            .github/repair-payload \
            .github/workflows/agent-source-snapshot.yml
          git commit -m 'fix(research): make instrument causal court executable'
          git push origin HEAD:agent/archie-instrument-genesis-v2-20260723
