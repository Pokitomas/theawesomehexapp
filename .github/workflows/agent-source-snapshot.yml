name: Apply instrument genesis repair

on:
  pull_request:
    branches:
      - 'agent/archie-endogenous-hypothesis-engine-20260723'
  push:
    branches:
      - 'agent/archie-instrument-genesis-v2-20260723'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/archie-instrument-genesis-v2-20260723
          fetch-depth: 1
          show-progress: false
      - name: Reconstruct repair payload
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64, hashlib, tarfile
          from pathlib import Path
          names = ['part-00','part-01','part-02-00','part-02-01','part-02-02','part-02-03','part-02-04','part-02-05','part-03','part-04','part-05','part-06','part-07']
          root=Path('.github/repair-payload')
          encoded=''.join((root/name).read_text().strip() for name in names)
          payload=base64.b64decode(encoded,validate=True)
          print({'encoded_bytes':len(encoded),'decoded_bytes':len(payload),'sha256':hashlib.sha256(payload).hexdigest()},flush=True)
          archive=Path('/tmp/instrument-genesis-repair.tar.gz'); archive.write_bytes(payload)
          with tarfile.open(archive,'r:gz') as handle:
              print({'members':handle.getnames()},flush=True)
              handle.extractall('.')
          for path in [Path('foundry/archie-distill/archie_instrument_genesis.py'), Path('foundry/archie-distill/test_archie_instrument_genesis.py')]:
              raw=path.read_bytes(); cleaned=raw.replace(b'\x00',b'')
              lines=cleaned.decode('utf-8').splitlines()
              lines=[line for line in lines if line.strip() != 'parameter_actions)']
              if path.name == 'archie_instrument_genesis.py' and len(lines) >= 1401 and lines[1400].strip() == ')':
                  del lines[1400]
              print({'path':str(path),'nul_bytes_removed':len(raw)-len(cleaned)},flush=True)
              path.write_text('\n'.join(lines)+'\n',encoding='utf-8')
          PY
      - name: Validate repair
        id: validate
        shell: bash
        run: |
          set +e
          {
            python3 -m pip install numpy
            python3 -m py_compile foundry/archie-distill/archie_instrument_genesis.py foundry/archie-distill/test_archie_instrument_genesis.py
            cd foundry/archie-distill
            python3 -m unittest -v test_archie_instrument_genesis
          } > /tmp/instrument-repair-validation.txt 2>&1
          status=$?
          cat /tmp/instrument-repair-validation.txt
          exit "$status"
      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrument-repair-validation
          path: /tmp/instrument-repair-validation.txt
          if-no-files-found: error
      - name: Commit repaired engine
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/repair-payload
          rm -f .github/workflows/agent-source-snapshot.yml
          git config user.name 'archie-research-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A foundry/archie-distill/archie_instrument_genesis.py foundry/archie-distill/test_archie_instrument_genesis.py .github/workflows/archie-instrument-genesis.yml .github/repair-payload .github/workflows/agent-source-snapshot.yml
          git commit -m 'fix(research): make instrument causal court executable'
          git push origin HEAD:agent/archie-instrument-genesis-v2-20260723
