name: Validate Pages forum reply patch

on:
  pull_request:
    paths:
      - .github/workflows/validate-pages-forum-replies.yml
      - .github/tmp/repair-pages-forum-replies.py

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - name: Apply focused patch and always publish evidence
        shell: bash
        run: |
          set +e
          mkdir -p audit
          log=audit/pages-forum-reply-focused-validation.log
          : > "$log"
          python .github/tmp/repair-pages-forum-replies.py >> "$log" 2>&1
          patch_status=$?
          node --check scripts/web-source-records.mjs >> "$log" 2>&1
          records_status=$?
          node --check scripts/build-web-source-snapshot.mjs >> "$log" 2>&1
          builder_status=$?
          node --test scripts/tests/web-source-snapshot.test.mjs scripts/tests/web-source-providers.test.mjs >> "$log" 2>&1
          test_status=$?
          printf '\npatch_status=%s\nrecords_status=%s\nbuilder_status=%s\ntest_status=%s\n' "$patch_status" "$records_status" "$builder_status" "$test_status" >> "$log"

          rm -f .github/tmp/repair-pages-forum-replies.py
          rm -f .github/workflows/validate-pages-forum-replies.yml
          rm -f .github/workflows/validate-pages-projection-schema.yml
          rm -f audit/pages-projection-schema-validation.log
          rm -f audit/pages-projection-schema-live-failure.log
          rm -f audit/pages-profile-aligned-projection-failure.log

          failed=0
          for status in "$patch_status" "$records_status" "$builder_status" "$test_status"; do
            if [ "$status" -ne 0 ]; then failed=1; fi
          done
          if [ "$failed" -eq 0 ]; then rm -f "$log"; fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if [ "$failed" -eq 0 ]; then
            git commit -m "fix(pages): preserve bounded public forum replies"
          else
            git commit -m "test: preserve focused forum reply validation failure"
          fi
          git push origin HEAD:${TARGET_BRANCH}
          exit "$failed"
