name: Archie Continuum capsule

on:
  pull_request:
    branches:
      - agent/archie-generalized-program-v1-20260721
    paths:
      - .github/workflows/archie-continuum-capsule.yml
      - compute/continuum/**
      - audit/authority-manifest.current.mjs
  push:
    branches:
      - agent/archie-generalized-program-v1-20260721
    paths:
      - .github/workflows/archie-continuum-capsule.yml
      - compute/continuum/**
      - audit/authority-manifest.current.mjs
  workflow_dispatch:
    inputs:
      job_id:
        description: Bounded job identifier
        required: true
        type: string
      task:
        description: Locally allowlisted task name
        required: true
        default: terminal-efficiency-v3
        type: string
      task_args:
        description: JSON object; local daemon validates every field
        required: true
        default: '{"source_run_id":29834460894,"source_artifact":"archie-causal-mechanism-maximal-29834460894","scale":"base","seed":30260721,"rung1":192,"rung2":640,"rung3":1536,"batch_size":64,"eval_batch_size":32,"threads":4,"device":"cuda"}'
        type: string
      nodes:
        description: JSON list of designated local nodes
        required: true
        default: '["alienware-1"]'
        type: string
      shards:
        description: Deterministic rendezvous shard count
        required: true
        default: 1
        type: number

permissions:
  contents: read

concurrency:
  group: archie-continuum-capsule-${{ github.ref }}
  cancel-in-progress: false

jobs:
  contracts:
    if: github.event_name != 'workflow_dispatch'
    name: Verify local-compute and SUCCESS contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Compile and test Continuum
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile \
            compute/continuum/common.py \
            compute/continuum/capsule.py \
            compute/continuum/handoff.py \
            compute/continuum/github_io.py \
            compute/continuum/execution.py \
            compute/continuum/cli.py \
            compute/continuum/continuum.py \
            compute/continuum/terminal_cuda.py \
            compute/continuum/provider_ack.py
          python3 -m unittest compute.continuum.test_continuum -v

  capsule:
    if: github.event_name == 'workflow_dispatch'
    name: Sign exact-head local-compute capsule
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      ARCHIE_CONTINUUM_HMAC_KEY: ${{ secrets.ARCHIE_CONTINUUM_HMAC_KEY }}
    steps:
      - name: Require repository owner dispatch
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          test "$ACTOR" = "$OWNER"

      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Verify capsule contracts
        shell: bash
        run: |
          set -euo pipefail
          test -n "$ARCHIE_CONTINUUM_HMAC_KEY"
          python3 -m unittest compute.continuum.test_continuum -v

      - name: Sign exact checked-out source capsule
        shell: bash
        env:
          JOB_ID: ${{ inputs.job_id }}
          TASK: ${{ inputs.task }}
          TASK_ARGS: ${{ inputs.task_args }}
          NODES: ${{ inputs.nodes }}
          SHARDS: ${{ inputs.shards }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          mkdir -p capsule
          python3 compute/continuum/continuum.py capsule-create \
            --repo "$GITHUB_REPOSITORY" \
            --source-sha "$GITHUB_SHA" \
            --job-id "$JOB_ID" \
            --task "$TASK" \
            --task-args "$TASK_ARGS" \
            --nodes "$NODES" \
            --shards "$SHARDS" \
            --output capsule/capsule.json \
            | tee capsule/creation-receipt.json
          sha256sum capsule/capsule.json capsule/creation-receipt.json > capsule/SHA256SUMS

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: archie-continuum-capsule-${{ github.run_id }}
          path: capsule
          if-no-files-found: error
          retention-days: 7
