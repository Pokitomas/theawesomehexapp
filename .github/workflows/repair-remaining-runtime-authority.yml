name: Repair remaining runtime authority mapping

on:
  push:
    branches:
      - agent/finish-remaining-runtime-modules
    paths:
      - .github/workflows/repair-remaining-runtime-authority.yml

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Map read-only chamber authority and clean diagnostics
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('audit/authority-manifest.workflow-projection.mjs')
          source = path.read_text()
          old_surface = "      'workflow-permission:.github/workflows/coordination-tick-ci.yml:contents:read'\n"
          new_surface = "      'workflow-permission:.github/workflows/coordination-tick-ci.yml:contents:read',\n      'workflow-permission:.github/workflows/archie-linux-distilling-chamber.yml:contents:read'\n"
          if source.count(old_surface) != 1:
              raise SystemExit(f'authority surface insertion drift: {source.count(old_surface)} matches')
          source = source.replace(old_surface, new_surface, 1)

          old_impl = "['.github/workflows/weave.yml', 'contents: read']]"
          new_impl = "['.github/workflows/weave.yml', 'contents: read'], ['.github/workflows/archie-linux-distilling-chamber.yml', 'contents: read', 'persist-credentials: false']]"
          if source.count(old_impl) != 1:
              raise SystemExit(f'authority implementation insertion drift: {source.count(old_impl)} matches')
          source = source.replace(old_impl, new_impl, 1)
          path.write_text(source)
          PY
          rm -f audit/remaining-runtime-validation-failure.txt
          rm .github/workflows/repair-remaining-runtime-authority.yml
          git diff --check

      - name: Install locked dependencies
        run: npm ci

      - name: Revalidate repaired exact tree
        shell: bash
        run: |
          set -euo pipefail
          node --test scripts/tests/maker-delivery-loop.test.mjs scripts/tests/maker-evaluation.test.mjs scripts/tests/archie-distilling-chamber.test.mjs
          npm run test:authority
          npm run test:native-maker
          npm run test:maker
          npm run verify:repository
          git diff --check

      - name: Publish repaired validated head
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(authority): map read-only distillation workflow"
          git push origin HEAD:${GITHUB_REF_NAME}
