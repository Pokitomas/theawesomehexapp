name: Archie radical object ledger v4

on:
  push:
    branches:
      - agent/archie-generalized-program-v1-20260721
    paths:
      - .github/workflows/archie-terminal-efficiency-v3.yml
      - foundry/archie-protocol/latent_world_benchmark/research/**
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: archie-radical-object-ledger-v4-${{ github.ref }}
  cancel-in-progress: true

jobs:
  train:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[run-radical-v4]'))
    name: Train radical ledger against matched comparator
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      GH_TOKEN: ${{ github.token }}
      SOURCE_RUN_ID: "29834460894"
      SOURCE_ARTIFACT: archie-causal-mechanism-maximal-29834460894
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
      OPENBLAS_NUM_THREADS: "4"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CPU training runtime
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check "numpy<3"
          python3 -m pip install --disable-pip-version-check torch --index-url https://download.pytorch.org/whl/cpu

      - name: Materialize and compile sealed sources
        shell: bash
        run: |
          set -euo pipefail
          python3 foundry/archie-protocol/latent_world_benchmark/materialize.py
          python3 foundry/archie-protocol/latent_world_benchmark/campaign_v2/materialize.py
          cd foundry/archie-protocol/latent_world_benchmark
          python3 -m py_compile \
            latent_world_benchmark.py \
            full_budget_campaign.py \
            research/efficient_terminal_training.py \
            research/radical_object_ledger.py
          python3 test_full_budget_campaign.py

      - name: Download verified maximal campaign artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p source-artifacts
          gh run download "$SOURCE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "$SOURCE_ARTIFACT" \
            --dir source-artifacts
          evidence="$(find source-artifacts -type f -name evidence-bundle.json -print -quit)"
          test -n "$evidence"
          campaign_root="$(dirname "$evidence")"
          echo "CAMPAIGN_ROOT=$GITHUB_WORKSPACE/$campaign_root" >> "$GITHUB_ENV"
          echo "Campaign root: $campaign_root"

      - name: Independently verify source artifact
        working-directory: foundry/archie-protocol/latent_world_benchmark
        shell: bash
        run: |
          set -euo pipefail
          python3 full_budget_campaign.py verify --output "$CAMPAIGN_ROOT"

      - name: Train radical and comparator brackets
        working-directory: foundry/archie-protocol/latent_world_benchmark
        shell: bash
        run: |
          set -euo pipefail
          rm -rf artifacts/radical-object-ledger-v4
          python3 research/radical_object_ledger.py \
            --campaign-root "$CAMPAIGN_ROOT" \
            --output artifacts/radical-object-ledger-v4 \
            --scale base \
            --rung1 96 \
            --rung2 1024 \
            --batch-size 64 \
            --eval-batch-size 32 \
            --threads 4 \
            | tee artifacts/radical-object-ledger-command.json

      - name: Publish verdict and digests
        working-directory: foundry/archie-protocol/latent_world_benchmark
        shell: bash
        run: |
          set -euo pipefail
          root=artifacts/radical-object-ledger-v4
          find "$root" -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > "$root/SHA256SUMS"
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/radical-object-ledger-v4/radical-object-ledger-report.json").read_text())
          print("# Archie radical object ledger v4")
          print()
          print(f"- Verdict: **{report['verdict']}**")
          print(f"- Sealed full-exact gain: `{report['radical_sealed_full_exact_gain']:+.6f}`")
          print(f"- Sealed score gain: `{report['radical_sealed_score_gain']:+.6f}`")
          print(f"- Equal continuation budget: `{report['rungs'][-1]}` steps per finalist seed")
          for finalist in report["finalists"]:
              print(f"- {finalist['label']}: `{finalist['arm']['name']}`; sealed full exact `{finalist['mean_sealed_full_exact']:.6f}`; sealed score `{finalist['mean_sealed_score']:.6f}`")
          print()
          print("Typed primitive routing is exposed by this benchmark. Any win is capability-class evidence, not general-intelligence admission.")
          PY

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: archie-radical-object-ledger-v4-${{ github.run_id }}
          path: |
            foundry/archie-protocol/latent_world_benchmark/artifacts/radical-object-ledger-v4
            foundry/archie-protocol/latent_world_benchmark/artifacts/radical-object-ledger-command.json
            foundry/archie-protocol/latent_world_benchmark/research/radical_object_ledger.py
            foundry/archie-protocol/latent_world_benchmark/research/efficient_terminal_training.py
          if-no-files-found: error
          retention-days: 90
