name: Evaluate exact D E and mass-matched H2

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: archie-run-d-reproduction-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  train:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Check out exact candidate head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755 # v6.2.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install numerical dependencies
        run: python -m pip install --upgrade numpy scipy scikit-learn joblib

      - name: Verify exact corpus and implementation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p foundry/archie-protocol/neural/runs/reproduction .tmp/de
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          data = Path('foundry/archie-protocol/neural/data')
          expected = {
              'route-train-v6.json': (925, '38d9df9c6f59d37c669cc3c3385172d2503995f5dc31e665d70941eb62ef8c57'),
              'router-v2-original-heldout.jsonl': (498, '188d67330955a67bdb24a1bb096f2910eaa13a268b48dde77216cdd4f8be40f5'),
              'router-real-v2-heldout.jsonl': (60, '72c0d30af384c42c54e244c6466f1ed710a1f58b157ed26cceb65f9d91068f64'),
              'router-real-v3-final.jsonl': (48, 'cb9131eaa0888d14a8e68f83e0486221b9b3dc5bf5b31a0df1a1f016433594dd'),
          }
          manifest = {'schema':'archie-neural-exact-input-manifest/v5','files':{}}
          for name, (expected_rows, expected_sha) in expected.items():
              path = data / name
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              rows = len(json.loads(path.read_text())) if path.suffix == '.json' else sum(bool(line.strip()) for line in path.read_text().splitlines())
              if digest != expected_sha or rows != expected_rows:
                  raise SystemExit(f'{name} identity mismatch rows={rows} sha={digest}')
              manifest['files'][name] = {'rows':rows,'sha256':digest}
          out = Path('foundry/archie-protocol/neural/runs/reproduction/input-manifest.json')
          out.write_text(json.dumps(manifest, indent=2) + '\n')
          PY
          cd foundry/archie-protocol/neural
          python -m py_compile evaluate_checkpoint_legacy.py masked_mixed_train.py
          python np_transformer.py --gradcheck
          python test_np_transformer.py

      - name: Download true D and protected E evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: archie-neural-true-isolation-6e15f0d143d5f2b0dcb2d72454bc8b8a6aa8a594
          path: .tmp/de
          github-token: ${{ github.token }}
          run-id: 29790064778

      - name: Verify and retain D E evidence
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, shutil
          from pathlib import Path
          source = Path('.tmp/de')
          out = Path('foundry/archie-protocol/neural/runs/reproduction')
          d = json.loads(next(source.rglob('npt-realdom-noft-true-d128-seed424243-receipt.json')).read_text())
          e = json.loads(next(source.rglob('npt-realdom-headsafe-true-d128-seed424243-receipt.json')).read_text())
          c = json.loads(Path('foundry/archie-protocol/neural/runs/npt-realdom-d128-seed424243-receipt.json').read_text())
          if d['data']['train_digest'] != c['data']['train_digest'] or d['data']['vocab_tokens'] != c['data']['vocab_tokens']:
              raise SystemExit('D is not the exact no-finetune form of C')
          if not e['protection']['bit_exact']:
              raise SystemExit('E changed protected parameters')
          for name in ['npt-realdom-noft-true-d128-seed424243-receipt.json','npt-realdom-headsafe-true-d128-seed424243-receipt.json','true-isolation-summary.json','TRUE_ISOLATION.md']:
              shutil.copy2(next(source.rglob(name)), out / name)
          identity = {
              'schema':'archie-run-d-identity/v5',
              'artifact_run_id':29790064778,
              'artifact_digest':'sha256:0dd521bed9d1322fd51267db0f1ca0e3867a770c7f6aa84d2e98b2ae31ad254e',
              'train_digest_matches_c':True,
              'vocabulary_matches_c':True,
              'd_weights_sha256':d['model']['weights_sha256'],
              'e_selected_epoch':e['config']['selected_epoch'],
              'e_protected_bit_exact':e['protection']['bit_exact'],
              'e_protected_sha256':e['protection']['protected_before_sha256'],
          }
          (out/'run-d-identity.json').write_text(json.dumps(identity, indent=2) + '\n')
          PY

      - name: Train mass-matched H2
        run: |
          set -euo pipefail
          python foundry/archie-protocol/neural/masked_mixed_train.py \
            --authored-rows foundry/archie-protocol/neural/data/route-train-v6.json \
            --frozen-pack foundry/archie-protocol/factorized/blind-challenge-pack.frozen.json \
            --out foundry/archie-protocol/neural/runs/reproduction \
            --tag npt-audit-masked-r8-d128 \
            --seed 424243 --d 128 --layers 2 --heads 4 --tmax 84 \
            --epochs 8 --batch 64 --lr 0.0022 --drop 0.10 --scale 3 \
            --authored-repeat 8 --authored-loss-weight 0.55

      - name: Evaluate H2 on exact legacy suites
        run: |
          set -euo pipefail
          OUT=foundry/archie-protocol/neural/runs/reproduction
          python foundry/archie-protocol/neural/evaluate_checkpoint_legacy.py \
            --receipt "$OUT/npt-audit-masked-r8-d128-seed424243-receipt.json" \
            --weights "$OUT/npt-audit-masked-r8-d128-seed424243.npz" \
            --legacy-dir foundry/archie-protocol/neural/data \
            --out "$OUT/legacy-H2.json"

      - name: Write terminal transformer comparison
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          root = Path('foundry/archie-protocol/neural/runs')
          out = root / 'reproduction'
          receipts = {
              'B':json.loads((root/'npt-sw-d128-seed424243-receipt.json').read_text()),
              'C':json.loads((root/'npt-realdom-d128-seed424243-receipt.json').read_text()),
              'D':json.loads((out/'npt-realdom-noft-true-d128-seed424243-receipt.json').read_text()),
              'E':json.loads((out/'npt-realdom-headsafe-true-d128-seed424243-receipt.json').read_text()),
              'H2':json.loads((out/'npt-audit-masked-r8-d128-seed424243-receipt.json').read_text()),
          }
          receipts['H2']['claim_boundary'] = 'H2 uses all 925 unique audit rows at 8x repetition, approximately mass-matched to H’s 193 rows at 40x. Audit rows supervise route only; auxiliary labels are masked. Frozen suites are evaluation-only.'
          receipts['H2']['receipt_digest'] = hashlib.sha256(json.dumps(receipts['H2'],sort_keys=True,separators=(',',':')).encode()).hexdigest()
          (out/'npt-audit-masked-r8-d128-seed424243-receipt.json').write_text(json.dumps(receipts['H2'],indent=2)+'\n')
          rows=[]
          for label, receipt in receipts.items():
              blind=receipt['results']['blind_429']
              if label=='H2':
                  legacy=json.loads((out/'legacy-H2.json').read_text())['results']
              else:
                  legacy={name:receipt['results'][name] for name in ['router-v2-original-heldout','router-real-v2-heldout','router-real-v3-final']}
              rows.append({'run':label,'tag':receipt['tag'],'blind_full':blind['full_accuracy'],'blind_route':blind['route_accuracy'],'legacy':{name:value['route_accuracy'] for name,value in legacy.items()},'weights_sha256':receipt['model']['weights_sha256']})
          best_blind=max(rows,key=lambda row:row['blind_full'])
          best_498=max(rows,key=lambda row:row['legacy']['router-v2-original-heldout'])
          summary={'schema':'archie-neural-terminal-comparison/v5','identity':json.loads((out/'run-d-identity.json').read_text()),'runs':rows,'best_blind_run':best_blind['run'],'best_blind_full':best_blind['blind_full'],'best_498_run':best_498['run'],'best_498_accuracy':best_498['legacy']['router-v2-original-heldout'],'promotion':'not-admitted','production_changed':False}
          summary['receipt_digest']=hashlib.sha256(json.dumps(summary,sort_keys=True,separators=(',',':')).encode()).hexdigest()
          (out/'terminal-comparison.json').write_text(json.dumps(summary,indent=2)+'\n')
          def pct(value): return f'{100*value:.1f}%'
          mechanisms={'B':'subword baseline','C':'real-dominant + destructive finetune','D':'exact real-dominant, no finetune','E':'D + protected head adaptation','H2':'925 unique audit rows, route-only masked, mass-matched'}
          lines=['# Terminal transformer comparison','', '| run | mechanism | blind full | blind route | 498 | 60 | 48 |','|---|---|---:|---:|---:|---:|---:|']
          for row in rows:
              legacy=row['legacy']; lines.append(f"| {row['run']} `{row['tag']}` | {mechanisms[row['run']]} | {pct(row['blind_full'])} | {pct(row['blind_route'])} | {pct(legacy['router-v2-original-heldout'])} | {pct(legacy['router-real-v2-heldout'])} | {pct(legacy['router-real-v3-final'])} |")
          lines += ['', '## Decision','',f"- Best blind full: run {best_blind['run']} at {pct(best_blind['blind_full'])}.",f"- Best 498-suite retention: run {best_498['run']} at {pct(best_498['legacy']['router-v2-original-heldout'])}.",'- Promotion: `not-admitted`; production remains unchanged.','']
          (out/'TERMINAL_COMPARISON.md').write_text('\n'.join(lines))
          print('\n'.join(lines))
          PY

      - name: Upload terminal neural evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-neural-terminal-${{ github.event.pull_request.head.sha || github.sha }}
          path: foundry/archie-protocol/neural/runs/reproduction
          if-no-files-found: error
          retention-days: 30
