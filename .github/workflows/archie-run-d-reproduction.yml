name: Reproduce Archie D E and audit-masked H2

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: archie-run-d-reproduction-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  reproduce:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 330
    steps:
      - name: Check out exact candidate head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755 # v6.2.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install numerical dependencies
        run: python -m pip install --upgrade numpy scipy scikit-learn joblib

      - name: Verify exact committed evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p foundry/archie-protocol/neural/runs/reproduction
          python - <<'PY'
          import hashlib, json
          from pathlib import Path

          root = Path('foundry/archie-protocol/neural')
          data = root / 'data'
          expected = {
              'route-train-v6.json': (925, '38d9df9c6f59d37c669cc3c3385172d2503995f5dc31e665d70941eb62ef8c57'),
              'router-v2-original-heldout.jsonl': (498, '188d67330955a67bdb24a1bb096f2910eaa13a268b48dde77216cdd4f8be40f5'),
              'router-real-v2-heldout.jsonl': (60, '72c0d30af384c42c54e244c6466f1ed710a1f58b157ed26cceb65f9d91068f64'),
              'router-real-v3-final.jsonl': (48, 'cb9131eaa0888d14a8e68f83e0486221b9b3dc5bf5b31a0df1a1f016433594dd'),
          }
          manifest = {
              'schema': 'archie-run-d-input-manifest/v2',
              'source_archive': 'Archie-Audit.zip',
              'source_archive_sha256': 'a190c28ceeb6292ae6857a6e885ec32810cf16737ad950826bfc70531d48bc15',
              'files': {},
          }
          for name, (rows_expected, digest_expected) in expected.items():
              path = data / name
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              if digest != digest_expected:
                  raise SystemExit(f'{name} digest mismatch: {digest}')
              if path.suffix == '.json':
                  rows = len(json.loads(path.read_text()))
              else:
                  rows = sum(1 for line in path.read_text().splitlines() if line.strip())
              if rows != rows_expected:
                  raise SystemExit(f'{name} row mismatch: {rows}')
              manifest['files'][name] = {'rows': rows, 'sha256': digest}
          frozen = root.parent / 'factorized' / 'blind-challenge-pack.frozen.json'
          manifest['files']['blind-challenge-pack.frozen.json'] = {
              'sha256': hashlib.sha256(frozen.read_bytes()).hexdigest(),
              'examples': len(json.loads(frozen.read_text())),
          }
          out = root / 'runs' / 'reproduction' / 'input-manifest.json'
          out.write_text(json.dumps(manifest, indent=2) + '\n')
          print(json.dumps(manifest, indent=2))
          PY

      - name: Verify implementation contracts
        working-directory: foundry/archie-protocol/neural
        run: |
          set -euo pipefail
          python -m py_compile evaluate_checkpoint_legacy.py protected_finetune.py masked_mixed_train.py
          python np_transformer.py --gradcheck
          python test_np_transformer.py

      - name: Reproduce true run D without fine-tuning
        run: |
          set -euo pipefail
          python foundry/archie-protocol/neural/np_transformer.py \
            --seed 424243 \
            --d 128 \
            --layers 2 \
            --heads 4 \
            --tmax 84 \
            --epochs 8 \
            --batch 64 \
            --lr 0.0022 \
            --drop 0.10 \
            --scale 3 \
            --real-rows foundry/archie-protocol/neural/data/route-train-v6.json \
            --real-repeat 15 \
            --finetune-epochs 0 \
            --legacy-dir foundry/archie-protocol/neural/data \
            --frozen-pack foundry/archie-protocol/factorized/blind-challenge-pack.frozen.json \
            --out foundry/archie-protocol/neural/runs/reproduction \
            --tag npt-run-d-reproduced-d128

      - name: Prove run-D identity before accepting results
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          runs = Path('foundry/archie-protocol/neural/runs')
          c = json.loads((runs / 'npt-realdom-d128-seed424243-receipt.json').read_text())
          d = json.loads((runs / 'reproduction/npt-run-d-reproduced-d128-seed424243-receipt.json').read_text())
          expected = {
              'seed': 424243, 'd': 128, 'layers': 2, 'heads': 4, 'tmax': 84,
              'epochs': 8, 'batch': 64, 'lr': 0.0022, 'dropout': 0.1,
              'scale': 3, 'real_repeat': 15,
          }
          for key, value in expected.items():
              if d['config'].get(key) != value:
                  raise SystemExit(f'run-D config mismatch {key}: {d["config"].get(key)!r} != {value!r}')
          if d['config'].get('finetune_epochs') != 0:
              raise SystemExit('run D unexpectedly fine-tuned')
          if d['data']['real_language_rows'] != 13875 or d['data']['train_rows'] != 19635:
              raise SystemExit('run-D row-count identity failed')
          if d['data']['train_digest'] != c['data']['train_digest']:
              raise SystemExit('run-D generated training-order digest differs from run C')
          if d['data']['vocab_tokens'] != c['data']['vocab_tokens']:
              raise SystemExit('run-D vocabulary differs from run C')
          if d['data']['vocab'] != 3594 or d['model']['parameters'] != c['model']['parameters']:
              raise SystemExit('run-D model identity failed')
          if d['model']['weights_sha256'] == json.loads((runs / 'npt-sw-d128-seed424243-receipt.json').read_text())['model']['weights_sha256']:
              raise SystemExit('run-D checkpoint unexpectedly equals run B')
          identity = {
              'schema': 'archie-run-d-identity/v2',
              'exact_run_c_corpus': True,
              'corpus_sha256': '38d9df9c6f59d37c669cc3c3385172d2503995f5dc31e665d70941eb62ef8c57',
              'rows': 925,
              'train_rows': d['data']['train_rows'],
              'real_language_rows': d['data']['real_language_rows'],
              'train_digest_matches_run_c': True,
              'vocabulary_matches_run_c': True,
              'vocab': d['data']['vocab'],
              'parameters': d['model']['parameters'],
              'weights_sha256': d['model']['weights_sha256'],
              'difference_from_run_c': 'post-hoc fine-tuning disabled',
          }
          (runs / 'reproduction/run-d-identity.json').write_text(json.dumps(identity, indent=2) + '\n')
          print(json.dumps(identity, indent=2))
          PY

      - name: Train protected run E from true D
        run: |
          set -euo pipefail
          OUT=foundry/archie-protocol/neural/runs/reproduction
          python foundry/archie-protocol/neural/protected_finetune.py \
            --source-receipt "$OUT/npt-run-d-reproduced-d128-seed424243-receipt.json" \
            --source-weights "$OUT/npt-run-d-reproduced-d128-seed424243.npz" \
            --real-rows foundry/archie-protocol/neural/data/route-train-v6.json \
            --legacy-dir foundry/archie-protocol/neural/data \
            --frozen-pack foundry/archie-protocol/factorized/blind-challenge-pack.frozen.json \
            --out "$OUT" \
            --tag npt-run-e-protected-d128 \
            --epochs 4 \
            --batch 64 \
            --lr 0.0001 \
            --real-repeat 3 \
            --replay-ratio 1.0 \
            --proximal 0.001 \
            --label-smoothing 0.05

      - name: Train H2 with full audit corpus and masked auxiliary supervision
        run: |
          set -euo pipefail
          python foundry/archie-protocol/neural/masked_mixed_train.py \
            --authored-rows foundry/archie-protocol/neural/data/route-train-v6.json \
            --frozen-pack foundry/archie-protocol/factorized/blind-challenge-pack.frozen.json \
            --out foundry/archie-protocol/neural/runs/reproduction \
            --tag npt-audit-masked-d128 \
            --seed 424243 \
            --d 128 \
            --layers 2 \
            --heads 4 \
            --tmax 84 \
            --epochs 8 \
            --batch 64 \
            --lr 0.0022 \
            --drop 0.10 \
            --scale 3 \
            --authored-repeat 40 \
            --authored-loss-weight 0.55

      - name: Download F G and H evidence
        shell: bash
        run: mkdir -p .tmp/fg .tmp/h

      - name: Download F and G evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: archie-neural-self-contained-9f16d1e880eec188556b6b139b6620315c45bb58
          path: .tmp/fg
          github-token: ${{ github.token }}
          run-id: 29788732914

      - name: Download H evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: archie-neural-masked-69f347c583682510eddcc69559116e9d826e4c4a
          path: .tmp/h
          github-token: ${{ github.token }}
          run-id: 29789405141

      - name: Evaluate every learned candidate on exact legacy suites
        shell: bash
        run: |
          set -euo pipefail
          RUNS=foundry/archie-protocol/neural/runs
          OUT=$RUNS/reproduction
          DATA=foundry/archie-protocol/neural/data
          python foundry/archie-protocol/neural/evaluate_checkpoint_legacy.py --receipt "$RUNS/npt-sw-d128-seed424243-receipt.json" --weights "$RUNS/npt-sw-d128-seed424243.npz" --legacy-dir "$DATA" --out "$OUT/legacy-B.json"
          python foundry/archie-protocol/neural/evaluate_checkpoint_legacy.py --receipt "$RUNS/npt-realdom-d128-seed424243-receipt.json" --weights "$RUNS/npt-realdom-d128-seed424243.npz" --legacy-dir "$DATA" --out "$OUT/legacy-C.json"
          python foundry/archie-protocol/neural/evaluate_checkpoint_legacy.py --receipt "$OUT/npt-run-d-reproduced-d128-seed424243-receipt.json" --weights "$OUT/npt-run-d-reproduced-d128-seed424243.npz" --legacy-dir "$DATA" --out "$OUT/legacy-D.json"
          python foundry/archie-protocol/neural/evaluate_checkpoint_legacy.py --receipt "$OUT/npt-run-e-protected-d128-seed424243-receipt.json" --weights "$OUT/npt-run-e-protected-d128-seed424243.npz" --legacy-dir "$DATA" --out "$OUT/legacy-E.json"
          F_RECEIPT=$(find .tmp/fg -name 'npt-committed-authored-d128-seed424243-receipt.json' -print -quit)
          F_WEIGHTS=$(find .tmp/fg -name 'npt-committed-authored-d128-seed424243.npz' -print -quit)
          G_RECEIPT=$(find .tmp/fg -name 'npt-committed-headsafe-d128-seed424243-receipt.json' -print -quit)
          G_WEIGHTS=$(find .tmp/fg -name 'npt-committed-headsafe-d128-seed424243.npz' -print -quit)
          H_RECEIPT=$(find .tmp/h -name 'npt-authored-masked-d128-seed424243-receipt.json' -print -quit)
          H_WEIGHTS=$(find .tmp/h -name 'npt-authored-masked-d128-seed424243.npz' -print -quit)
          test -n "$F_RECEIPT" && test -n "$F_WEIGHTS" && test -n "$G_RECEIPT" && test -n "$G_WEIGHTS" && test -n "$H_RECEIPT" && test -n "$H_WEIGHTS"
          python foundry/archie-protocol/neural/evaluate_checkpoint_legacy.py --receipt "$F_RECEIPT" --weights "$F_WEIGHTS" --legacy-dir "$DATA" --out "$OUT/legacy-F.json"
          python foundry/archie-protocol/neural/evaluate_checkpoint_legacy.py --receipt "$G_RECEIPT" --weights "$G_WEIGHTS" --legacy-dir "$DATA" --out "$OUT/legacy-G.json"
          python foundry/archie-protocol/neural/evaluate_checkpoint_legacy.py --receipt "$H_RECEIPT" --weights "$H_WEIGHTS" --legacy-dir "$DATA" --out "$OUT/legacy-H.json"
          python foundry/archie-protocol/neural/evaluate_checkpoint_legacy.py --receipt "$OUT/npt-audit-masked-d128-seed424243-receipt.json" --weights "$OUT/npt-audit-masked-d128-seed424243.npz" --legacy-dir "$DATA" --out "$OUT/legacy-H2.json"

      - name: Write terminal comparison and non-promotion decision
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib, json
          from pathlib import Path

          root = Path('foundry/archie-protocol/neural/runs')
          out = root / 'reproduction'
          receipts = {
              'B': json.loads((root / 'npt-sw-d128-seed424243-receipt.json').read_text()),
              'C': json.loads((root / 'npt-realdom-d128-seed424243-receipt.json').read_text()),
              'D': json.loads((out / 'npt-run-d-reproduced-d128-seed424243-receipt.json').read_text()),
              'E': json.loads((out / 'npt-run-e-protected-d128-seed424243-receipt.json').read_text()),
              'H2': json.loads((out / 'npt-audit-masked-d128-seed424243-receipt.json').read_text()),
          }
          for directory, label, name in [
              (Path('.tmp/fg'), 'F', 'npt-committed-authored-d128-seed424243-receipt.json'),
              (Path('.tmp/fg'), 'G', 'npt-committed-headsafe-d128-seed424243-receipt.json'),
              (Path('.tmp/h'), 'H', 'npt-authored-masked-d128-seed424243-receipt.json'),
          ]:
              receipts[label] = json.loads(next(directory.rglob(name)).read_text())
          identity = json.loads((out / 'run-d-identity.json').read_text())
          rows = []
          for label in ('B', 'C', 'D', 'E', 'F', 'G', 'H', 'H2'):
              receipt = receipts[label]
              blind = receipt['results']['blind_429']
              legacy = json.loads((out / f'legacy-{label}.json').read_text())
              rows.append({
                  'run': label,
                  'tag': receipt['tag'],
                  'blind_full': blind['full_accuracy'],
                  'blind_route': blind['route_accuracy'],
                  'legacy_exact': legacy['exact_legacy_retention'],
                  'legacy': {name: result['route_accuracy'] for name, result in legacy['results'].items()},
                  'weights_sha256': legacy['checkpoint_weights_sha256'],
              })
          best_blind = max(rows, key=lambda row: row['blind_full'])
          best_498 = max(rows, key=lambda row: row['legacy']['router-v2-original-heldout'])
          e = receipts['E']
          summary = {
              'schema': 'archie-neural-terminal-comparison/v2',
              'identity': identity,
              'runs': rows,
              'best_blind_run': best_blind['run'],
              'best_blind_full': best_blind['blind_full'],
              'best_498_run': best_498['run'],
              'best_498_accuracy': best_498['legacy']['router-v2-original-heldout'],
              'protected_e': {
                  'selected_epoch': e['config']['selected_epoch'],
                  'bit_exact': e['protection']['bit_exact'],
                  'protected_sha256': e['protection']['protected_before_sha256'],
              },
              'promotion': 'not-admitted',
              'production_changed': False,
              'reason': 'No learned candidate reproduces the admitted projection’s protected routing and full multi-head capability. Production remains fail-closed and unchanged.',
          }
          summary['receipt_digest'] = hashlib.sha256(json.dumps(summary, sort_keys=True, separators=(',', ':')).encode()).hexdigest()
          (out / 'terminal-comparison.json').write_text(json.dumps(summary, indent=2) + '\n')

          def pct(value): return f'{100*value:.1f}%'
          lines = [
              '# Terminal learned-router comparison', '',
              '| run | mechanism | blind full | blind route | 498 | 60 | 48 |',
              '|---|---|---:|---:|---:|---:|---:|',
          ]
          mechanisms = {
              'B': 'subword transformer baseline',
              'C': 'real-dominant + destructive shared-trunk fine-tune',
              'D': 'exact real-dominant main phase, no fine-tune',
              'E': 'D + protected route-head-only adaptation',
              'F': 'committed 193-row authored-dominant mix',
              'G': 'F + protected route-head-only adaptation',
              'H': '193-row masked authored supervision',
              'H2': '925-row audit corpus with masked authored supervision',
          }
          for row in rows:
              legacy = row['legacy']
              lines.append(f"| {row['run']} `{row['tag']}` | {mechanisms[row['run']]} | {pct(row['blind_full'])} | {pct(row['blind_route'])} | {pct(legacy['router-v2-original-heldout'])} | {pct(legacy['router-real-v2-heldout'])} | {pct(legacy['router-real-v3-final'])} |")
          lines += ['', '## Decision', '',
              f"- Best blind full: run {best_blind['run']} at {pct(best_blind['blind_full'])}.",
              f"- Best 498-suite route retention: run {best_498['run']} at {pct(best_498['legacy']['router-v2-original-heldout'])}.",
              f"- Protected E selected epoch {summary['protected_e']['selected_epoch']} and kept shared/auxiliary arrays bit-exact: `{summary['protected_e']['bit_exact']}`.",
              '- Promotion: `not-admitted`; production remains unchanged.', '',
          ]
          (out / 'TERMINAL_COMPARISON.md').write_text('\n'.join(lines))
          print('\n'.join(lines))
          PY

      - name: Upload exact reproduction evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-neural-terminal-${{ github.event.pull_request.head.sha || github.sha }}
          path: foundry/archie-protocol/neural/runs/reproduction
          if-no-files-found: error
          retention-days: 30
