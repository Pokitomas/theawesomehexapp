name: Repair Archie derivational edge cases

on:
  push:
    branches:
      - agent/archie-derivational-cognition

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Apply grounded routing repairs
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              if text.count(old) != 1:
                  raise SystemExit(f'{label}: expected one match, found {text.count(old)}')
              return text.replace(old, new, 1)

          derivation_path = Path('scripts/maker-archie-derivation.mjs')
          derivation = derivation_path.read_text()
          create_line = "  const create = /\\b(?:create|write|generate|produce|contract|schema)\\b/i.test(instruction);\n"
          safe_block = create_line + """  const safeObservationOnly = hasGit
    && /\\b(?:do not|don't|never|without)\\b[^.!?]{0,160}\\b(?:deploy|merge|release|publish|ship)\\b/i.test(instruction)
    && /\\b(?:only|just)\\s+(?:inspect|read|check|review|show|report|get)\\b/i.test(instruction);
  if (safeObservationOnly) return { families: ['observe'], domains: ['git'], supplied, control: 'safe-observation-only' };
"""
          derivation = replace_once(derivation, create_line, safe_block, 'safe observation insertion')
          derivation = replace_once(
              derivation,
              "  return buildResult(model, task, 'local', 'proof-carrying-relational-derivation', request.families, adapters, confidence);",
              "  const reason = request.control === 'safe-observation-only' ? 'safe-observation-control' : 'proof-carrying-relational-derivation';\n  return buildResult(model, task, 'local', reason, request.families, adapters, confidence);",
              'safe observation result'
          )
          derivation_path.write_text(derivation)

          cognition_path = Path('scripts/maker-archie-cognition.mjs')
          cognition = cognition_path.read_text()
          consensus_line = "    const consensusLocal = sparse.state === 'local' && planner.state === 'local'\n"
          veto_block = """    const ungroundedRelationalVeto = derivation.state === 'teacher'
      && derivation.reason === 'no-abstract-operator-path';
    const safeControlDerivation = derivation.state === 'local'
      && derivation.reason === 'safe-observation-control';
""" + consensus_line
          cognition = replace_once(cognition, consensus_line, veto_block, 'relational veto insertion')
          cognition = replace_once(
              cognition,
              "    const consensusLocal = sparse.state === 'local' && planner.state === 'local'\n      && (agreement.exact",
              "    const consensusLocal = sparse.state === 'local' && planner.state === 'local'\n      && !ungroundedRelationalVeto\n      && (agreement.exact",
              'consensus veto'
          )
          cognition = replace_once(
              cognition,
              "    const plannerOverride = planner.state === 'local' && sparse.state !== 'local'\n      && planner.calibrated_confidence",
              "    const plannerOverride = planner.state === 'local' && sparse.state !== 'local'\n      && !ungroundedRelationalVeto\n      && planner.calibrated_confidence",
              'planner veto'
          )
          cognition = replace_once(
              cognition,
              "    const compositionOverride = sparse.state === 'local' && planner.state === 'local'\n      && agreement.left_subset_of_right",
              "    const compositionOverride = sparse.state === 'local' && planner.state === 'local'\n      && !ungroundedRelationalVeto\n      && agreement.left_subset_of_right",
              'composition veto'
          )
          cognition = replace_once(
              cognition,
              "    const instructionControlOverride = sparse.state === 'local' && planner.state === 'local'\n      && agreement.right_subset_of_left",
              "    const instructionControlOverride = sparse.state === 'local' && planner.state === 'local'\n      && !ungroundedRelationalVeto\n      && agreement.right_subset_of_left",
              'instruction-control veto'
          )
          cognition = replace_once(
              cognition,
              "    if (consensusLocal || plannerOverride || compositionOverride || instructionControlOverride || derivationConsensus || derivationOverride) {\n      const useDerivation = !consensusLocal && !instructionControlOverride && (derivationConsensus || derivationOverride);",
              "    if (safeControlDerivation || consensusLocal || plannerOverride || compositionOverride || instructionControlOverride || derivationConsensus || derivationOverride) {\n      const useDerivation = safeControlDerivation || (!consensusLocal && !instructionControlOverride && (derivationConsensus || derivationOverride));",
              'route selection'
          )
          cognition = replace_once(
              cognition,
              "        selected_route: consensusLocal ? 'sparse-planner-consensus'\n          : instructionControlOverride ? 'instruction-controlled-subplan'",
              "        selected_route: safeControlDerivation ? 'safe-observation-control'\n          : consensusLocal ? 'sparse-planner-consensus'\n            : instructionControlOverride ? 'instruction-controlled-subplan'",
              'route label'
          )
          cognition_path.write_text(cognition)

          cognition_test_path = Path('scripts/tests/maker-archie-cognition.test.mjs')
          cognition_tests = cognition_test_path.read_text()
          cognition_marker = "test('uses a teacher once, persists the lesson, retrains both routes, and handles the paraphrased recurrence locally', async t => {"
          cognition_addition = """test('honors safe observation controls and refuses ungrounded lexical near-neighbor transfer', async t => {
  const { runtime, teacherCalls } = await fixture(t);
  const safe = await runtime.decide({
    instruction: 'Do not deploy or merge anything. Only inspect the repository status.'
  }, { allow_teacher: false });
  assert.equal(safe.state, 'local', JSON.stringify(safe, null, 2));
  assert.equal(safe.selected_route, 'safe-observation-control');
  assert.deepEqual(safe.plan.steps.map(step => `${step.tool}:${step.action}`), ['git:status']);

  const bicycle = await runtime.decide({
    instruction: 'Repair a conflicted bicycle chain and test the brakes afterward.'
  }, { allow_teacher: false });
  assert.equal(bicycle.state, 'teacher', JSON.stringify(bicycle, null, 2));
  assert.equal(bicycle.derivation.reason, 'no-abstract-operator-path');
  assert.equal(bicycle.plan, null);
  assert.equal(teacherCalls(), 0);
});

"""
          if cognition_addition not in cognition_tests:
              cognition_tests = replace_once(cognition_tests, cognition_marker, cognition_addition + cognition_marker, 'cognition regression insertion')
          cognition_test_path.write_text(cognition_tests)

          derivation_test_path = Path('scripts/tests/maker-archie-derivation.test.mjs')
          derivation_tests = derivation_test_path.read_text()
          derivation_marker = "test('rejects learned unsafe derivatives and escalates ungrounded novelty', () => {"
          derivation_addition = """test('derives a safe observation-only control without mutation or publication steps', () => {
  const model = trainArchieDerivationModel(training, { trained_at: '2026-07-16T08:00:00.000Z' });
  const result = deriveArchiePlan(model, {
    instruction: 'Do not deploy or merge anything. Only inspect the repository status.'
  });
  assert.equal(result.state, 'local', JSON.stringify(result, null, 2));
  assert.equal(result.reason, 'safe-observation-control');
  assert.deepEqual(result.plan.steps.map(step => `${step.tool}:${step.action}`), ['git:status']);
});

"""
          if derivation_addition not in derivation_tests:
              derivation_tests = replace_once(derivation_tests, derivation_marker, derivation_addition + derivation_marker, 'derivation regression insertion')
          derivation_test_path.write_text(derivation_tests)
          PY

      - name: Publish repair and remove temporary authority surface
        shell: bash
        run: |
          rm .github/workflows/repair-archie-derivational-edge-cases.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/maker-archie-derivation.mjs scripts/maker-archie-cognition.mjs scripts/tests/maker-archie-derivation.test.mjs scripts/tests/maker-archie-cognition.test.mjs .github/workflows/repair-archie-derivational-edge-cases.yml
          git commit -m "fix(archie): ground derivational edge cases"
          git push origin HEAD:${GITHUB_REF_NAME}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: npm

      - name: Validate repaired branch
        shell: bash
        run: |
          npm ci --ignore-scripts
          node --test scripts/tests/maker-archie-derivation.test.mjs scripts/tests/maker-archie-cognition.test.mjs
          npm run test:archie
          npm run test:maker
          npm run test:foundry
          npm run test:weave
          npm run benchmark:archie:derive
          npm run benchmark:archie | tee archie-benchmark.log
          grep -q '21/21' archie-benchmark.log
          git diff --check
