name: Prove Ark survival ledger on phone

on:
  pull_request:
    branches: [main]
    paths:
      - 'audit/archive-survival.json'
      - 'scripts/tests/archive-revival-contract.test.mjs'
      - 'scripts/tests/archive-mirror-failure.test.mjs'
      - 'studio/manual/product/survival-ledger.js'
      - 'studio/manual/product/vault-ui.js'
      - 'studio/manual/tests/survival-*'
      - '.github/workflows/survival-ledger-phone.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  survival-ledger:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Verify archive recovery claims and interrupted mirror behavior
        run: node --test scripts/tests/archive-revival-contract.test.mjs scripts/tests/archive-mirror-failure.test.mjs
      - name: Assemble the manual product
        run: |
          set -euo pipefail
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz
          cat general-overlay.part.* | base64 -d > general-overlay.tar.xz
          tar -xJf general-overlay.tar.xz
          python general/patch.py
          cat profile-overlay.part.* | base64 -d > profile-overlay.tar.xz
          tar -xJf profile-overlay.tar.xz
          python profile/patch.py
          cat manual-overlay.b64.part.* > manual-overlay.b64
          base64 -d manual-overlay.b64 > manual-overlay.tar.xz
          tar -xJf manual-overlay.tar.xz
          python manual/patch.py
          cat manual-kernel-overlay.b64.part.* > manual-kernel-overlay.b64
          base64 -d manual-kernel-overlay.b64 > manual-kernel-overlay.tar.xz
          tar -xJf manual-kernel-overlay.tar.xz
          python studio/manual/prepare-kernel.py
          python manual-kernel/patch.py
          python studio/manual/apply.py
          python studio/manual/verify.py
          node studio/manual/tests/survival-contract.mjs
          mkdir -p dist/manual
          cp -a manual-app/. dist/manual/
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked browser tooling
        run: |
          git checkout -- package.json package-lock.json
          npm ci --ignore-scripts --include=dev
          node -e "import('playwright-core')"
      - name: Prove mirror backup delete restore audit and vault chrome
        run: |
          set -euo pipefail
          python -m http.server 4173 --directory dist >/tmp/survival-http.log 2>&1 &
          server=$!
          trap 'kill $server || true' EXIT
          sleep 2
          node studio/manual/tests/survival-ledger-clickthrough.mjs http://127.0.0.1:4173/manual/ 2>&1 | tee survival-ledger-check.log
      - name: Upload Ark survival proof
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ark-survival-ledger-phone
          path: |
            audit/archive-survival.json
            manual-survival-ledger.png
            survival-ledger-check.log
            /tmp/survival-http.log
          if-no-files-found: warn
          retention-days: 5
