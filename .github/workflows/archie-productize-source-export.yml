name: Archie productization source export

on:
  push:
    branches:
      - agent/archie-productize-v1-20260721
    paths:
      - .github/workflows/archie-productize-source-export.yml
  pull_request:
    branches:
      - agent/archie-generalized-program-v1-20260721
    paths:
      - .github/workflows/archie-productize-source-export.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    name: Materialize exact model sources
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Materialize sealed sources
        shell: bash
        run: |
          set -euo pipefail
          python3 foundry/archie-protocol/latent_world_benchmark/materialize.py
          python3 foundry/archie-protocol/latent_world_benchmark/campaign_v2/materialize.py
          cd foundry/archie-protocol/latent_world_benchmark
          python3 -m py_compile latent_world_benchmark.py full_budget_campaign.py test_benchmark.py test_full_budget_campaign.py
          tar -czf "$GITHUB_WORKSPACE/archie-productization-sources.tgz" \
            latent_world_benchmark.py \
            full_budget_campaign.py \
            full_budget_profile.json \
            test_benchmark.py \
            test_full_budget_campaign.py \
            README.md \
            FULL_BUDGET_CAMPAIGN.md
          sha256sum "$GITHUB_WORKSPACE/archie-productization-sources.tgz" > "$GITHUB_WORKSPACE/archie-productization-sources.tgz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: archie-productization-sources-${{ github.run_id }}
          path: |
            archie-productization-sources.tgz
            archie-productization-sources.tgz.sha256
          if-no-files-found: error
          retention-days: 14
