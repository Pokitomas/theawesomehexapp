name: Kernel parity check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/archie-rslora-dispatch-trigger'

permissions:
  actions: write
  contents: write
  issues: write

jobs:
  parity:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Assemble canonical root and manual layers
        run: |
          set -euo pipefail
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz

          cat general-overlay.part.* | base64 -d > general-overlay.tar.xz
          tar -xJf general-overlay.tar.xz
          python general/patch.py

          cat profile-overlay.part.* | base64 -d > profile-overlay.tar.xz
          tar -xJf profile-overlay.tar.xz
          python profile/patch.py

          cat manual-overlay.b64.part.* > manual-overlay.b64
          base64 -d manual-overlay.b64 > manual-overlay.tar.xz
          tar -xJf manual-overlay.tar.xz
          python manual/patch.py

          cat manual-kernel-overlay.b64.part.* > manual-kernel-overlay.b64
          base64 -d manual-kernel-overlay.b64 > manual-kernel-overlay.tar.xz
          tar -xJf manual-kernel-overlay.tar.xz
          python studio/manual/prepare-kernel.py
          python manual-kernel/patch.py

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Run kernel parity check
        run: node studio/manual/tests/kernel-parity.mjs src/app.js manual-app/kernel.js

  bootstrap-rslora:
    if: github.event_name == 'push' && github.actor == github.repository_owner
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      REQUEST_ID: pok-721-canonical-elastic-20260721
      ORIGINAL_MAIN: 04001f6bf13277b27ac55f6d4d60ab1952da56a5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0
      - name: Install bounded authority bridge
        id: bridge
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/archie-information-budgeted-rslora.yml')
          text = path.read_text(encoding='utf-8')
          old = "          if (String(process.env.GITHUB_ACTOR || '').toLowerCase() !== String(process.env.GITHUB_REPOSITORY_OWNER || '').toLowerCase()) missing.push('repository-owner actor');"
          new = """          const actor = String(process.env.GITHUB_ACTOR || '').toLowerCase();
          const owner = String(process.env.GITHUB_REPOSITORY_OWNER || '').toLowerCase();
          const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, 'utf8'));
          const boundedBotDispatch = actor === 'github-actions[bot]' && String(event.inputs?.request_id || '') === 'pok-721-canonical-elastic-20260721';
          if (actor !== owner && !boundedBotDispatch) missing.push('repository-owner actor or bounded one-shot dispatch');"""
          if old not in text:
              raise SystemExit('Canonical owner-authority line moved; refusing broad patch.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/archie-information-budgeted-rslora.yml
          git commit -m 'Authorize one bounded RSLoRA dispatch'
          git push origin HEAD:main
          printf 'sha=%s\n' "$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Dispatch canonical 2x4 campaign
        run: |
          set -euo pipefail
          jq -n --arg ref '${{ steps.bridge.outputs.sha }}' --arg request_id "$REQUEST_ID" '{ref:$ref,inputs:{request_id:$request_id,round:"0",shards:"2",rungs:"4",max_fused_rank:"64"}}' | gh api --method POST "repos/${GITHUB_REPOSITORY}/actions/workflows/archie-information-budgeted-rslora.yml/dispatches" --input -
      - name: Capture run and restore repository
        run: |
          set -euo pipefail
          sleep 12
          runs="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/archie-information-budgeted-rslora.yml/runs?event=workflow_dispatch&per_page=20")"
          run_id="$(jq -r --arg sha '${{ steps.bridge.outputs.sha }}' '.workflow_runs[] | select(.head_sha == $sha) | .id' <<<"$runs" | head -n1)"
          run_url="$(jq -r --arg sha '${{ steps.bridge.outputs.sha }}' '.workflow_runs[] | select(.head_sha == $sha) | .html_url' <<<"$runs" | head -n1)"
          status="$(jq -r --arg sha '${{ steps.bridge.outputs.sha }}' '.workflow_runs[] | select(.head_sha == $sha) | .status' <<<"$runs" | head -n1)"
          test -n "$run_id"
          git revert --no-edit '${{ steps.bridge.outputs.sha }}'
          git checkout "$ORIGINAL_MAIN" -- .github/workflows/kernel-parity-check.yml
          git rm -f .github/archie-rslora-dispatch-trigger
          git rm -f .github/workflows/bootstrap-archie-rslora-once.yml
          git add .github/workflows/kernel-parity-check.yml
          git commit -m 'Remove bounded RSLoRA dispatch bridge'
          git push origin HEAD:main
          printf 'Canonical elastic RSLoRA execution dispatched.\n\nrequest_id: %s\nsource_sha: %s\nspecialists: 2\nrungs: 4\nfused_rank: 64\nrun: %s\nstatus: %s\n\nRun: %s\n\nThe one-request authority bridge and temporary trigger were removed immediately after dispatch. This remains not-admitted pending real CUDA evidence and independent reproduction.\n' "$REQUEST_ID" '${{ steps.bridge.outputs.sha }}' "$run_id" "$status" "$run_url" > /tmp/comment.md
          gh issue comment 721 --repo "$GITHUB_REPOSITORY" --body-file /tmp/comment.md
