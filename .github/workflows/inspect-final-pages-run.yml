name: Inspect final Pages run

on:
  push:
    branches:
      - agent/inspect-final-pages-run
    paths:
      - .github/workflows/inspect-final-pages-run.yml

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.ref_name }}
      - name: Record exact run state
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_COMMIT: a99bd83c31bf4f88c7acb3b65d13246a061bd60c
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit
          node <<'NODE' > audit/final-pages-run-status.json
          const expected = process.env.EXPECTED_COMMIT;
          const response = await fetch('https://api.github.com/repos/Pokitomas/theawesomehexapp/actions/workflows/pages.yml/runs?event=push&branch=main&per_page=30', {
            headers: {
              accept: 'application/vnd.github+json',
              authorization: `Bearer ${process.env.GH_TOKEN}`,
              'x-github-api-version': '2022-11-28',
              'user-agent': 'sideways-pages-status-inspector'
            }
          });
          if (!response.ok) throw new Error(`GitHub API ${response.status}: ${await response.text()}`);
          const payload = await response.json();
          const run = (payload.workflow_runs || []).find(item => item.head_sha === expected) || null;
          console.log(JSON.stringify({ checked_at: new Date().toISOString(), expected_commit: expected, run: run && { id: run.id, status: run.status, conclusion: run.conclusion, html_url: run.html_url, run_number: run.run_number, created_at: run.created_at, updated_at: run.updated_at } }, null, 2));
          NODE
          rm .github/workflows/inspect-final-pages-run.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add audit/final-pages-run-status.json .github/workflows/inspect-final-pages-run.yml
          git commit -m "audit: record final Pages run state"
          git push origin HEAD:${GITHUB_REF_NAME}
