name: Final Pages projection admission

on:
  pull_request:
    paths:
      - .github/workflows/final-admit-pages-projection.yml

permissions:
  contents: write

jobs:
  admit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
      SIDEWAYS_PUBLIC_SOURCES: ${{ vars.SIDEWAYS_PUBLIC_SOURCES }}
      POST_COUNT: 1000000
      CHUNK_SIZE: 1024
      CONTENT_CHUNK_SIZE: 128
      CORPUS_SEED: 20260712
      CORPUS_FILE: corpus/general-media.jsonl.gz
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Bind validation to permanent tree
        run: |
          set -euo pipefail
          rm .github/workflows/final-admit-pages-projection.yml
          rm -rf corpus dist node_modules general profile
          rm -f source.tar.xz general-overlay.tar.xz profile-overlay.tar.xz repository-verification.json
          test "$(git diff --name-only)" = ".github/workflows/final-admit-pages-projection.yml"

      - name: Install locked dependencies
        run: |
          python -m pip install --disable-pip-version-check pillow
          npm ci --ignore-scripts --include=dev

      - name: Verify syntax and focused regressions
        run: |
          node --check scripts/web-source-records.mjs
          node --check scripts/build-web-source-snapshot.mjs
          node --check scripts/root-product-phone.mjs
          node --test scripts/tests/web-source-snapshot.test.mjs scripts/tests/web-source-providers.test.mjs

      - name: Verify ingestion authority and repository
        run: |
          npm run test:ingestion
          npm run test:authority
          npm run verify:repository

      - name: Extract exact product layers
        run: |
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz
          cat general-overlay.part.* | base64 -d > general-overlay.tar.xz
          tar -xJf general-overlay.tar.xz
          python general/patch.py
          cat profile-overlay.part.* | base64 -d > profile-overlay.tar.xz
          tar -xJf profile-overlay.tar.xz
          python profile/patch.py

      - name: Build live public snapshot
        run: node scripts/build-web-source-snapshot.mjs --output corpus/general.jsonl.gz

      - name: Verify live diversity provenance and real source floor
        run: node scripts/verify-web-source-snapshot.mjs corpus/general.jsonl.gz corpus/general.jsonl.gz.meta.json

      - name: Admit real media and bounded genuine forum replies
        run: python general/media.py --input corpus/general.jsonl.gz --output corpus/general-media.jsonl.gz --media-dir corpus/media --max-media 180 --discover-forum 80

      - name: Build one-million candidate projection
        run: node scripts/build.mjs

      - name: Verify profile root phone offline and accessibility proof
        run: python verify-profile-build.py

      - name: Remove terminal validator from branch
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git reset
          git add -u .github/workflows/final-admit-pages-projection.yml
          test "$(git diff --cached --name-only)" = ".github/workflows/final-admit-pages-projection.yml"
          git commit -m "chore: remove terminal Pages validator"
          git push origin HEAD:${TARGET_BRANCH}
