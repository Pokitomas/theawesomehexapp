name: Build Archie derivational PR candidate

on:
  push:
    branches:
      - agent/archie-derivational-cognition-pr
    paths:
      - .github/workflows/archie-derivational-pr-candidate.yml

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'
          cache: npm
      - name: Assemble exact candidate tree
        id: assemble
        run: |
          set -euo pipefail
          git config user.name 'archie-finalizer[bot]'
          git config user.email 'archie-finalizer[bot]@users.noreply.github.com'
          git fetch origin agent/archie-derivational-cognition
          source_sha=$(git rev-parse FETCH_HEAD)
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          git checkout "$source_sha" -- \
            ARCHIE_EQUIVALENCE.md \
            maker/contracts/archie-benchmark.schema.json \
            maker/contracts/archie-derivation.schema.json \
            maker/evaluations/archie-equivalence-suite.json \
            package.json \
            scripts/maker-archie-benchmark.mjs \
            scripts/maker-archie-cognition.mjs \
            scripts/maker-archie-corpus.mjs \
            scripts/maker-archie-derivation-benchmark.mjs \
            scripts/maker-archie-derivation.mjs \
            scripts/tests/maker-archie-benchmark.test.mjs \
            scripts/tests/maker-archie-cognition.test.mjs \
            scripts/tests/maker-archie-corpus.test.mjs \
            scripts/tests/maker-archie-derivation-benchmark.test.mjs \
            scripts/tests/maker-archie-derivation.test.mjs
          python <<'PY'
          from pathlib import Path

          planner = Path('scripts/maker-archie-planner.mjs')
          text = planner.read_text()
          old = '''function greedyDiversity(candidates, maxSteps) {
            const chosen = [];
            const seen = new Set();
            for (const candidate of candidates) {
              for (const step of candidate.primitive.steps) {
                const key = `${step.tool}:${step.action}`;
                if (seen.has(key)) continue;
                chosen.push({ ...step, rationale: `${candidate.primitive.primitive_id}:${Number(candidate.score.toFixed(4))}` });
                seen.add(key);
                if (chosen.length >= maxSteps) return chosen;
              }
            }
            return chosen;
          }
          '''
          new = '''function executionPhase(step = {}) {
            const text = `${clean(step.tool, 80)} ${clean(step.action, 120)}`.toLowerCase().replace(/[_.:/-]+/g, ' ');
            if (/\\b(?:status|inspect|read|search|load|fetch|list|parse|scan|measure|observe|review|assess)\\b/.test(text)) return 0;
            if (/\\b(?:repair|recover|retry|resume|rollback|restore|revert|fix|reconcile|resolve|conflict)\\b/.test(text)) return 1;
            if (/\\b(?:test|tests|testing)\\b/.test(text)) return 4;
            if (/\\b(?:validate|verify|audit|check|confirm|prove)\\b/.test(text)) return 3;
            return 2;
          }

          function greedyDiversity(candidates, maxSteps) {
            const chosen = [];
            const seen = new Set();
            outer: for (const candidate of candidates) {
              for (const step of candidate.primitive.steps) {
                const key = `${step.tool}:${step.action}`;
                if (seen.has(key)) continue;
                chosen.push({
                  ...step,
                  rationale: `${candidate.primitive.primitive_id}:${Number(candidate.score.toFixed(4))}`,
                  composition_order: chosen.length,
                  execution_phase: executionPhase(step)
                });
                seen.add(key);
                if (chosen.length >= maxSteps) break outer;
              }
            }
            return chosen
              .sort((left, right) => left.execution_phase - right.execution_phase || left.composition_order - right.composition_order)
              .map(({ composition_order, execution_phase, ...step }) => step);
          }
          '''
          if old not in text:
              raise SystemExit('planner ordering insertion point drifted')
          planner.write_text(text.replace(old, new))

          tests = Path('scripts/tests/maker-archie-planner.test.mjs')
          test_text = tests.read_text()
          insertion = '''\n\ntest('orders composed skill phases deterministically and runs terminal repository tests last', () => {
            const model = train();
            const plan = planWithArchieCPUPlanner(model, {
              instruction: 'Create and validate the JSON contract only after repairing the conflicted branch; execute repository tests last.'
            });
            assert.equal(plan.state, 'local', JSON.stringify(plan, null, 2));
            assert.deepEqual(plan.plan.steps.map(step => `${step.tool}:${step.action}`), [
              'git:status',
              'git:repair_conflict',
              'filesystem:write_contract',
              'json:validate_schema',
              'node:test'
            ]);
          });\n'''
          anchor = "\ntest('rejects genuinely unseen work through teacher escalation instead of hallucinating a plan'"
          if anchor not in test_text:
              raise SystemExit('planner test insertion point drifted')
          tests.write_text(test_text.replace(anchor, insertion + anchor))
          PY
          printf 'node_modules/\n' > .gitignore
          git rm .github/workflows/archie-derivational-pr-candidate.yml
      - name: Run exact gate matrix
        id: gates
        run: |
          set +e
          mkdir -p /tmp/archie-pr-logs
          : > /tmp/archie-pr-status.tsv
          run_gate() {
            name="$1"
            shift
            "$@" > "/tmp/archie-pr-logs/${name}.log" 2>&1
            code=$?
            cat "/tmp/archie-pr-logs/${name}.log"
            printf '%s\t%s\n' "$name" "$code" >> /tmp/archie-pr-status.tsv
          }
          run_gate npm-ci npm ci
          run_gate test-archie npm run test:archie
          run_gate test-maker npm run test:maker
          run_gate benchmark-archie-derive npm run benchmark:archie:derive
          run_gate test-foundry npm run test:foundry
          run_gate test-weave npm run test:weave
          run_gate verify-repository npm run verify:repository
          if awk -F '\t' '$2 != 0 { failed=1 } END { exit failed ? 0 : 1 }' /tmp/archie-pr-status.tsv; then
            echo 'passed=false' >> "$GITHUB_OUTPUT"
          else
            echo 'passed=true' >> "$GITHUB_OUTPUT"
          fi
      - name: Publish exact candidate
        if: steps.gates.outputs.passed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.assemble.outputs.source_sha }}
        run: |
          set -euo pipefail
          git add -- \
            .gitignore \
            ARCHIE_EQUIVALENCE.md \
            maker/contracts/archie-benchmark.schema.json \
            maker/contracts/archie-derivation.schema.json \
            maker/evaluations/archie-equivalence-suite.json \
            package.json \
            scripts/maker-archie-benchmark.mjs \
            scripts/maker-archie-cognition.mjs \
            scripts/maker-archie-corpus.mjs \
            scripts/maker-archie-derivation-benchmark.mjs \
            scripts/maker-archie-derivation.mjs \
            scripts/maker-archie-planner.mjs \
            scripts/tests/maker-archie-benchmark.test.mjs \
            scripts/tests/maker-archie-cognition.test.mjs \
            scripts/tests/maker-archie-corpus.test.mjs \
            scripts/tests/maker-archie-derivation-benchmark.test.mjs \
            scripts/tests/maker-archie-derivation.test.mjs \
            scripts/tests/maker-archie-planner.test.mjs
          git commit -m 'feat: add Archie derivational cognition and evaluation'
          git push origin "HEAD:${GITHUB_REF_NAME}"
          head_sha=$(git rev-parse HEAD)
          {
            echo '## Archie derivational PR candidate validated'
            echo
            echo "- source SHA: \`$SOURCE_SHA\`"
            echo "- candidate head: \`$head_sha\`"
            echo
            while IFS=$'\t' read -r name code; do
              if [ "$code" = '0' ]; then state='PASS'; else state='FAIL'; fi
              echo "- $state \`$name\` (exit $code)"
            done < /tmp/archie-pr-status.tsv
            echo
            echo '- Exact staged scope: 18 implementation/test files plus `.gitignore`; no generated dependencies or temporary workflow.'
            echo '- No PR, merge, or deployment was performed by the validation workflow.'
          } > /tmp/archie-pr-comment.md
          gh issue comment 387 --body-file /tmp/archie-pr-comment.md
      - name: Report failure
        if: steps.gates.outputs.passed != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.assemble.outputs.source_sha }}
        run: |
          {
            echo '## Archie derivational PR candidate failed validation'
            echo
            echo "Source SHA: \`$SOURCE_SHA\`"
            echo
            while IFS=$'\t' read -r name code; do
              if [ "$code" = '0' ]; then state='PASS'; else state='FAIL'; fi
              echo "- $state \`$name\` (exit $code)"
              if [ "$code" != '0' ]; then
                echo
                echo "<details><summary>$name log tail</summary>"
                echo
                echo '```text'
                tail -n 120 "/tmp/archie-pr-logs/${name}.log"
                echo '```'
                echo '</details>'
              fi
            done < /tmp/archie-pr-status.tsv
            echo
            echo 'No candidate commit, PR, merge, or deployment was published.'
          } > /tmp/archie-pr-comment.md
          gh issue comment 387 --body-file /tmp/archie-pr-comment.md
          exit 1
