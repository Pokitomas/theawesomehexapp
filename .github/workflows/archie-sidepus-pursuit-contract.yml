name: Archie Sidepus pursuit contract

on:
  pull_request:
    paths:
      - 'foundry/archie-distill/archie_sidepus_organism.py'
      - 'foundry/archie-distill/sidepus_experience_compiler.py'
      - 'foundry/archie-distill/sidepus_ephemeral_cache.py'
      - 'foundry/archie-distill/sidepus_microphysics.py'
      - 'foundry/archie-distill/sidepus_developmental_corpus.py'
      - 'foundry/archie-distill/sidepus_inventory_union.py'
      - 'foundry/archie-distill/sidepus_remote_experience.py'
      - 'foundry/archie-distill/sidepus_developmental_graph.py'
      - 'foundry/archie-distill/sidepus_pursuit_plan.py'
      - 'foundry/archie-distill/sidepus_pursuit_controller.py'
      - 'foundry/archie-distill/sidepus_pursuit_stream.py'
      - 'foundry/archie-distill/sidepus_pursuit_objectives.py'
      - 'foundry/archie-distill/sidepus_pursuit_forward.py'
      - 'foundry/archie-distill/sidepus_pursuit_step.py'
      - 'foundry/archie-distill/sidepus_pursuit_cli.py'
      - 'foundry/archie-distill/train_archie_sidepus_pursuit.py'
      - 'foundry/archie-distill/run_archie_sidepus_pursuit.sh'
      - 'foundry/archie-distill/run_archie_sidepus_ready.sh'
      - 'foundry/archie-distill/test_sidepus_pursuit.py'
      - 'foundry/archie-distill/test_sidepus_foreign_state.py'
      - 'foundry/archie-distill/test_sidepus_deliberation_value.py'
      - 'foundry/archie-distill/test_sidepus_causality.py'
      - 'foundry/archie-distill/test_sidepus_contract_identity.py'
      - 'foundry/archie-distill/test_sidepus_developmental_graph.py'
      - 'foundry/archie-distill/test_sidepus_remote_experience.py'
      - 'foundry/archie-distill/test_sidepus_developmental_corpus.py'
      - '.github/workflows/archie-sidepus-pursuit-contract.yml'
  push:
    branches:
      - 'agent/sidepus-experience-compiler-feral-20260723'
      - 'agent/sidepus-deliberation-successor-20260723'
      - 'agent/sidepus-causal-deliberation-court-20260723'

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip numpy
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Compile pursuit substrate
        run: |
          python -m py_compile \
            foundry/archie-distill/archie_sidepus_organism.py \
            foundry/archie-distill/sidepus_experience_compiler.py \
            foundry/archie-distill/sidepus_ephemeral_cache.py \
            foundry/archie-distill/sidepus_microphysics.py \
            foundry/archie-distill/sidepus_developmental_corpus.py \
            foundry/archie-distill/sidepus_inventory_union.py \
            foundry/archie-distill/sidepus_remote_experience.py \
            foundry/archie-distill/sidepus_developmental_graph.py \
            foundry/archie-distill/sidepus_pursuit_plan.py \
            foundry/archie-distill/sidepus_pursuit_controller.py \
            foundry/archie-distill/sidepus_pursuit_stream.py \
            foundry/archie-distill/sidepus_pursuit_objectives.py \
            foundry/archie-distill/sidepus_pursuit_forward.py \
            foundry/archie-distill/sidepus_pursuit_step.py \
            foundry/archie-distill/sidepus_pursuit_cli.py \
            foundry/archie-distill/train_archie_sidepus_pursuit.py \
            foundry/archie-distill/test_sidepus_pursuit.py \
            foundry/archie-distill/test_sidepus_foreign_state.py \
            foundry/archie-distill/test_sidepus_deliberation_value.py \
            foundry/archie-distill/test_sidepus_causality.py \
            foundry/archie-distill/test_sidepus_contract_identity.py \
            foundry/archie-distill/test_sidepus_developmental_graph.py \
            foundry/archie-distill/test_sidepus_remote_experience.py \
            foundry/archie-distill/test_sidepus_developmental_corpus.py
          bash -n foundry/archie-distill/run_archie_sidepus_pursuit.sh
          bash -n foundry/archie-distill/run_archie_sidepus_ready.sh
      - name: Import pursuit contracts
        working-directory: foundry/archie-distill
        run: python -c 'import test_sidepus_pursuit, test_sidepus_foreign_state, test_sidepus_deliberation_value, test_sidepus_causality, test_sidepus_contract_identity, test_sidepus_developmental_graph, test_sidepus_remote_experience, test_sidepus_developmental_corpus'
      - name: Causal-prefix court
        working-directory: foundry/archie-distill
        run: python -m unittest -v test_sidepus_causality.SidepusCausalityCourt
      - name: Pursuit contract identity
        working-directory: foundry/archie-distill
        run: python -m unittest -v test_sidepus_contract_identity.PursuitContractIdentityTest
      - name: Metadata uncertainty contract
        working-directory: foundry/archie-distill
        run: |
          set +e
          python -m unittest -v test_sidepus_pursuit.ExperienceCompilerTest.test_uncertain_metadata_is_separate > /tmp/metadata-contract.log 2>&1
          code=$?
          cat /tmp/metadata-contract.log
          exit "$code"
      - name: Upload metadata diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pursuit-metadata-contract-log
          path: /tmp/metadata-contract.log
          if-no-files-found: ignore
      - name: Inventory preservation contract
        working-directory: foundry/archie-distill
        run: python -m unittest -v test_sidepus_pursuit.ExperienceCompilerTest.test_compile_inventory_preserves_record
      - name: Hidden-channel nonleakage contract
        working-directory: foundry/archie-distill
        run: python -m unittest -v test_sidepus_pursuit.ExperienceCompilerTest.test_compiler_and_hidden_truth_are_not_model_visible
      - name: Raw sensory byte contract
        working-directory: foundry/archie-distill
        run: python -m unittest -v test_sidepus_pursuit.ExperienceCompilerTest.test_raw_sensory_bytes_survive_without_text_conversion
      - name: Ephemeral cache contracts
        working-directory: foundry/archie-distill
        run: python -m unittest -v test_sidepus_pursuit.CacheTest
      - name: Microphysics and union contracts
        working-directory: foundry/archie-distill
        run: python -m unittest -v test_sidepus_pursuit.MicrophysicsTest
      - name: Developmental corpus contracts
        working-directory: foundry/archie-distill
        run: python -m unittest -v test_sidepus_developmental_corpus.DevelopmentalCorpusTest
      - name: Remote experience contracts
        working-directory: foundry/archie-distill
        run: python -m unittest -v test_sidepus_remote_experience.RemoteExperienceTest
      - name: Developmental graph contracts
        working-directory: foundry/archie-distill
        run: python -m unittest -v test_sidepus_developmental_graph.DevelopmentalGraphTest
      - name: Pursuit controller and plan contracts
        working-directory: foundry/archie-distill
        run: python -m unittest -v test_sidepus_pursuit.PursuitTest
      - name: Foreign episode-state contracts
        working-directory: foundry/archie-distill
        run: python -m unittest -v test_sidepus_foreign_state.ForeignStateBankTest
      - name: Value-of-computation contracts
        working-directory: foundry/archie-distill
        run: python -m unittest -v test_sidepus_deliberation_value.DeliberationValueTest
