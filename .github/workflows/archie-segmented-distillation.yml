name: Run Archie recursive segmented tokenized distillation

on:
  pull_request:
    paths:
      - 'foundry/archie-distill/segment_causal_pairs.py'
      - 'foundry/archie-distill/verify_segment_adapter.py'
      - 'foundry/archie-distill/fuse_segment_adapters.py'
      - 'foundry/archie-distill/evaluate_fused_adapter.py'
      - 'foundry/archie-distill/materialize_fused_adapter.py'
      - 'foundry/archie-distill/decide_recursive_round.py'
      - 'foundry/archie-distill/test_segmented_tokenized_distillation.py'
      - '.github/workflows/archie-segmented-distillation.yml'
      - 'docs/archie-segmented-tokenized-distillation.md'
  workflow_dispatch:
    inputs:
      request_id:
        description: Audit label for this bounded distillation round
        required: true
        type: string
      round:
        description: Zero-based recursive round
        required: true
        default: '0'
        type: string
      shards:
        description: Number of token-balanced CUDA specialists
        required: true
        default: '4'
        type: string
      max_fused_rank:
        description: Maximum fused LoRA rank; use 64 for four rank-16 shards
        required: true
        default: '64'
        type: string
      quant_failures_path:
        description: Optional local quantization-failure receipt on the segment runner
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: archie-segmented-distillation-${{ github.repository }}
  cancel-in-progress: false

jobs:
  contract:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755 # v6.2.0
        with:
          python-version: '3.12'
      - name: Verify dependency-light segmented distillation contracts
        run: |
          set -euo pipefail
          python -m py_compile \
            foundry/archie-distill/segment_causal_pairs.py \
            foundry/archie-distill/verify_segment_adapter.py \
            foundry/archie-distill/fuse_segment_adapters.py \
            foundry/archie-distill/evaluate_fused_adapter.py \
            foundry/archie-distill/materialize_fused_adapter.py \
            foundry/archie-distill/decide_recursive_round.py \
            foundry/archie-distill/test_segmented_tokenized_distillation.py
          python foundry/archie-distill/test_segmented_tokenized_distillation.py
          grep -Fq 'No LoRA adapter tensor changed' foundry/archie-distill/verify_segment_adapter.py
          grep -Fq 'exact-rank-concatenation' foundry/archie-distill/fuse_segment_adapters.py
          grep -Fq 'evaluator_failure_required' foundry/archie-distill/decide_recursive_round.py
          grep -Fq 'strict non-regressive held-out improvement' foundry/archie-distill/evaluate_fused_adapter.py

  authorize:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      allowed: ${{ steps.plan.outputs.allowed }}
      missing: ${{ steps.plan.outputs.missing }}
      matrix: ${{ steps.plan.outputs.matrix }}
      round: ${{ steps.plan.outputs.round }}
      shards: ${{ steps.plan.outputs.shards }}
      max_fused_rank: ${{ steps.plan.outputs.max_fused_rank }}
      evaluation_label: ${{ steps.plan.outputs.evaluation_label }}
    steps:
      - id: plan
        name: Authorize owner request and build the heterogeneous CUDA matrix
        env:
          REQUEST_ID: ${{ inputs.request_id }}
          ROUND_INPUT: ${{ inputs.round }}
          SHARDS_INPUT: ${{ inputs.shards }}
          MAX_FUSED_RANK_INPUT: ${{ inputs.max_fused_rank }}
          ARCHIE_SEGMENTED_DISTILL_READY: ${{ vars.ARCHIE_SEGMENTED_DISTILL_READY }}
          ARCHIE_SEGMENT_RUNNER_LABEL: ${{ vars.ARCHIE_SEGMENT_RUNNER_LABEL }}
          ARCHIE_CUDA_RUNNER_LABELS: ${{ vars.ARCHIE_CUDA_RUNNER_LABELS }}
          ARCHIE_FUSION_RUNNER_LABEL: ${{ vars.ARCHIE_FUSION_RUNNER_LABEL }}
          ARCHIE_TRAINING_PYTHON: ${{ vars.ARCHIE_TRAINING_PYTHON }}
          ARCHIE_TRAINING_CONFIG_PATH: ${{ vars.ARCHIE_TRAINING_CONFIG_PATH }}
          ARCHIE_TRAJECTORY_BATCH_PATH: ${{ vars.ARCHIE_TRAJECTORY_BATCH_PATH }}
          ARCHIE_STUDENT_MODEL_DIR: ${{ vars.ARCHIE_STUDENT_MODEL_DIR }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const required = [
            'ARCHIE_SEGMENT_RUNNER_LABEL',
            'ARCHIE_CUDA_RUNNER_LABELS',
            'ARCHIE_FUSION_RUNNER_LABEL',
            'ARCHIE_TRAINING_PYTHON',
            'ARCHIE_TRAINING_CONFIG_PATH',
            'ARCHIE_TRAJECTORY_BATCH_PATH',
            'ARCHIE_STUDENT_MODEL_DIR'
          ];
          const missing = required.filter(name => !String(process.env[name] || '').trim());
          if (process.env.ARCHIE_SEGMENTED_DISTILL_READY !== '1') missing.push('ARCHIE_SEGMENTED_DISTILL_READY=1');
          if (String(process.env.GITHUB_ACTOR || '').toLowerCase() !== String(process.env.GITHUB_REPOSITORY_OWNER || '').toLowerCase()) {
            missing.push('repository-owner actor');
          }
          const requestId = String(process.env.REQUEST_ID || '').trim();
          if (!requestId) missing.push('request_id');
          const round = Number(process.env.ROUND_INPUT);
          const shards = Number(process.env.SHARDS_INPUT);
          const maxFusedRank = Number(process.env.MAX_FUSED_RANK_INPUT);
          if (!Number.isInteger(round) || round < 0) missing.push('round>=0');
          if (!Number.isInteger(shards) || shards < 1 || shards > 16) missing.push('1<=shards<=16');
          if (!Number.isInteger(maxFusedRank) || maxFusedRank < 1 || maxFusedRank > 512) missing.push('1<=max_fused_rank<=512');
          let labels = [];
          try {
            labels = JSON.parse(String(process.env.ARCHIE_CUDA_RUNNER_LABELS || '[]'));
          } catch {
            missing.push('ARCHIE_CUDA_RUNNER_LABELS valid JSON');
          }
          if (!Array.isArray(labels) || !labels.length || labels.some(label => typeof label !== 'string' || !label.trim())) {
            missing.push('ARCHIE_CUDA_RUNNER_LABELS nonempty string array');
            labels = [];
          }
          const include = Number.isInteger(shards) && shards > 0 && labels.length
            ? Array.from({ length: shards }, (_, shard) => ({ shard, runner_label: labels[shard % labels.length] }))
            : [];
          const allowed = missing.length === 0;
          const matrix = JSON.stringify({ include });
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `allowed=${allowed}\nmissing=${missing.join(', ')}\nmatrix=${matrix}\nround=${round}\nshards=${shards}\nmax_fused_rank=${maxFusedRank}\nevaluation_label=${labels[0] || ''}\n`);
          NODE

  blocker:
    needs: authorize
    if: github.event_name == 'workflow_dispatch' && needs.authorize.outputs.allowed != 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Refuse an unconfigured federation
        env:
          MISSING: ${{ needs.authorize.outputs.missing }}
        run: |
          printf '%s\n' "Archie segmented distillation refused to queue: ${MISSING}" >&2
          exit 1

  segment:
    needs: authorize
    if: needs.authorize.outputs.allowed == 'true'
    runs-on: [self-hosted, linux, x64, "${{ vars.ARCHIE_SEGMENT_RUNNER_LABEL }}"]
    timeout-minutes: 120
    outputs:
      artifact_name: ${{ steps.paths.outputs.artifact_name }}
    env:
      ARCHIE_TRAINING_PYTHON: ${{ vars.ARCHIE_TRAINING_PYTHON }}
      ARCHIE_TRAJECTORY_BATCH_PATH: ${{ vars.ARCHIE_TRAJECTORY_BATCH_PATH }}
      ARCHIE_STUDENT_MODEL_DIR: ${{ vars.ARCHIE_STUDENT_MODEL_DIR }}
      ROUND_NUMBER: ${{ needs.authorize.outputs.round }}
      SHARD_COUNT: ${{ needs.authorize.outputs.shards }}
      QUANT_FAILURES_PATH: ${{ inputs.quant_failures_path }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
      - id: paths
        name: Compile exact pairs and tokenizer-balanced shards on the data worker
        run: |
          set -euo pipefail
          test -x "$ARCHIE_TRAINING_PYTHON"
          test -f "$ARCHIE_TRAJECTORY_BATCH_PATH"
          test -d "$ARCHIE_STUDENT_MODEL_DIR"
          root="$(mktemp -d "${RUNNER_TEMP}/archie-segmented.XXXXXXXX")"
          pairs="$root/pairs"
          segments="$root/segments"
          "$ARCHIE_TRAINING_PYTHON" foundry/archie-distill/compile_causal_pairs.py \
            --batch "$ARCHIE_TRAJECTORY_BATCH_PATH" \
            --output "$pairs" \
            --seed 3407 \
            --holdout-rate 0.2
          quant_args=()
          if [[ -n "${QUANT_FAILURES_PATH:-}" ]]; then
            test -f "$QUANT_FAILURES_PATH"
            quant_args=(--quant-failures "$QUANT_FAILURES_PATH")
          fi
          "$ARCHIE_TRAINING_PYTHON" foundry/archie-distill/segment_causal_pairs.py \
            --train "$pairs/causal-preference.train.jsonl" \
            --development "$pairs/causal-preference.development.jsonl" \
            --pair-receipt "$pairs/causal-preference-receipt.json" \
            --tokenizer-dir "$ARCHIE_STUDENT_MODEL_DIR" \
            --output "$segments" \
            --shards "$SHARD_COUNT" \
            --seed 3407 \
            --round "$ROUND_NUMBER" \
            --request-id "${{ inputs.request_id }}" \
            --code-revision "$GITHUB_SHA" \
            "${quant_args[@]}"
          artifact_name="archie-segmented-input-${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          printf 'root=%s\nartifact_name=%s\n' "$root" "$artifact_name" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.paths.outputs.artifact_name }}
          path: ${{ steps.paths.outputs.root }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  train:
    needs: [authorize, segment]
    if: needs.authorize.outputs.allowed == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.authorize.outputs.matrix) }}
    runs-on: [self-hosted, linux, x64, "${{ matrix.runner_label }}"]
    timeout-minutes: 720
    env:
      ARCHIE_TRAINING_PYTHON: ${{ vars.ARCHIE_TRAINING_PYTHON }}
      ARCHIE_TRAINING_CONFIG_PATH: ${{ vars.ARCHIE_TRAINING_CONFIG_PATH }}
      ARCHIE_STUDENT_MODEL_DIR: ${{ vars.ARCHIE_STUDENT_MODEL_DIR }}
      ARCHIE_PROFILE_PATH: maker/evaluations/archie-causal-divergence-qwen3-quality.json
      SHARD_INDEX: ${{ matrix.shard }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
      - name: Install locked repository dependencies
        run: npm ci --ignore-scripts
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.segment.outputs.artifact_name }}
          path: ${{ runner.temp }}/archie-segmented-input
      - id: train_paths
        name: Execute one real CUDA specialist and prove changed tensors
        run: |
          set -euo pipefail
          test -x "$ARCHIE_TRAINING_PYTHON"
          test -f "$ARCHIE_TRAINING_CONFIG_PATH"
          test -d "$ARCHIE_STUDENT_MODEL_DIR"
          printf -v shard '%03d' "$SHARD_INDEX"
          shard_dir="${RUNNER_TEMP}/archie-segmented-input/segments/shard-${shard}"
          test -f "$shard_dir/shard-receipt.json"
          root="$(mktemp -d "${RUNNER_TEMP}/archie-segment-train-${shard}.XXXXXXXX")"
          workspace="$root/workspace"
          output="$root/output"
          verification="$root/verification"
          npm run archie:student:compile -- --config "$ARCHIE_TRAINING_CONFIG_PATH" --output "$workspace"
          "$ARCHIE_TRAINING_PYTHON" foundry/archie-distill/train_causal_divergence.py \
            --profile "$ARCHIE_PROFILE_PATH" \
            --workspace "$workspace" \
            --preference-data "$shard_dir/causal-preference.train.jsonl" \
            --preference-eval-data "$shard_dir/causal-preference.development.jsonl" \
            --preference-receipt "$shard_dir/causal-preference-receipt.json" \
            --model-dir "$ARCHIE_STUDENT_MODEL_DIR" \
            --output "$output" \
            --max-seq-length 1536 \
            --gradient-accumulation-steps 8 \
            --batch-size 1 \
            --beta 0.1 \
            --causal-margin 0.2 \
            --sft-weight 0.35
          "$ARCHIE_TRAINING_PYTHON" foundry/archie-distill/verify_segment_adapter.py \
            --profile "$ARCHIE_PROFILE_PATH" \
            --model-dir "$ARCHIE_STUDENT_MODEL_DIR" \
            --adapter-dir "$output/adapter" \
            --evaluation-data "$shard_dir/causal-preference.development.jsonl" \
            --training-receipt "$output/training-receipt.json" \
            --shard-receipt "$shard_dir/shard-receipt.json" \
            --output "$verification" \
            --max-seq-length 1536
          bundle="$root/bundle/shard-${shard}"
          mkdir -p "$bundle"
          cp -a "$output/adapter" "$bundle/adapter"
          cp "$output/training-receipt.json" "$bundle/training-receipt.json"
          cp "$verification/segment-verification-receipt.json" "$bundle/segment-verification-receipt.json"
          cp "$shard_dir/shard-receipt.json" "$bundle/shard-receipt.json"
          printf 'bundle=%s\nartifact_name=archie-segment-adapter-%s-%s-%s\n' "$root/bundle" "$shard" "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.train_paths.outputs.artifact_name }}
          path: ${{ steps.train_paths.outputs.bundle }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  fuse:
    needs: [authorize, train]
    if: needs.authorize.outputs.allowed == 'true'
    runs-on: [self-hosted, linux, x64, "${{ vars.ARCHIE_FUSION_RUNNER_LABEL }}"]
    timeout-minutes: 240
    outputs:
      artifact_name: ${{ steps.fuse_paths.outputs.artifact_name }}
    env:
      ARCHIE_TRAINING_PYTHON: ${{ vars.ARCHIE_TRAINING_PYTHON }}
      MAX_FUSED_RANK: ${{ needs.authorize.outputs.max_fused_rank }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: archie-segment-adapter-*-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/archie-segment-adapters
          merge-multiple: false
      - id: fuse_paths
        name: Fuse verified LoRA deltas without averaging factors
        run: |
          set -euo pipefail
          test -x "$ARCHIE_TRAINING_PYTHON"
          root="$(mktemp -d "${RUNNER_TEMP}/archie-fusion.XXXXXXXX")"
          request="$root/fusion-request.json"
          output="$root/output"
          INPUT_ROOT="${RUNNER_TEMP}/archie-segment-adapters" REQUEST_PATH="$request" "$ARCHIE_TRAINING_PYTHON" - <<'PY'
          import json, os, pathlib
          root = pathlib.Path(os.environ['INPUT_ROOT']).resolve()
          request = pathlib.Path(os.environ['REQUEST_PATH']).resolve()
          adapters = []
          for receipt in sorted(root.rglob('segment-verification-receipt.json')):
              adapter = receipt.parent / 'adapter'
              if not adapter.is_dir():
                  raise SystemExit(f'Missing adapter beside {receipt}')
              adapters.append({
                  'adapter_dir': os.path.relpath(adapter, request.parent),
                  'verification_receipt': os.path.relpath(receipt, request.parent),
              })
          if not adapters:
              raise SystemExit('No segment adapter artifacts were downloaded.')
          value = {
              'schema': 'archie-segment-adapter-fusion-request/v1',
              'seed': 3407,
              'adapters': adapters,
              'claim_boundary': 'This request only authorizes deterministic delta-space fusion of verified non-promoted adapters.'
          }
          request.write_text(json.dumps(value, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
          "$ARCHIE_TRAINING_PYTHON" foundry/archie-distill/fuse_segment_adapters.py \
            --request "$request" \
            --output "$output" \
            --max-rank "$MAX_FUSED_RANK"
          artifact_name="archie-segmented-fused-${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          printf 'root=%s\nartifact_name=%s\n' "$root" "$artifact_name" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.fuse_paths.outputs.artifact_name }}
          path: ${{ steps.fuse_paths.outputs.root }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  evaluate_fused:
    needs: [authorize, segment, fuse]
    if: needs.authorize.outputs.allowed == 'true'
    runs-on: [self-hosted, linux, x64, "${{ needs.authorize.outputs.evaluation_label }}"]
    timeout-minutes: 240
    outputs:
      artifact_name: ${{ steps.evaluate_paths.outputs.artifact_name }}
    env:
      ARCHIE_TRAINING_PYTHON: ${{ vars.ARCHIE_TRAINING_PYTHON }}
      ARCHIE_STUDENT_MODEL_DIR: ${{ vars.ARCHIE_STUDENT_MODEL_DIR }}
      ARCHIE_PROFILE_PATH: maker/evaluations/archie-causal-divergence-qwen3-quality.json
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.segment.outputs.artifact_name }}
          path: ${{ runner.temp }}/archie-segmented-input
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.fuse.outputs.artifact_name }}
          path: ${{ runner.temp }}/archie-fused-input
      - id: evaluate_paths
        name: Prove the fused adapter beats its exact frozen base before quantization
        run: |
          set -euo pipefail
          test -x "$ARCHIE_TRAINING_PYTHON"
          test -d "$ARCHIE_STUDENT_MODEL_DIR"
          fused_input="${RUNNER_TEMP}/archie-fused-input/output"
          segments="${RUNNER_TEMP}/archie-segmented-input/segments"
          test -f "$fused_input/fusion-receipt.json"
          test -f "$segments/segmentation-receipt.json"
          test -f "$segments/shard-000/causal-preference.development.jsonl"
          root="$(mktemp -d "${RUNNER_TEMP}/archie-fused-evaluation.XXXXXXXX")"
          cp -a "$fused_input" "$root/output"
          "$ARCHIE_TRAINING_PYTHON" foundry/archie-distill/evaluate_fused_adapter.py \
            --profile "$ARCHIE_PROFILE_PATH" \
            --model-dir "$ARCHIE_STUDENT_MODEL_DIR" \
            --adapter-dir "$root/output/adapter" \
            --fusion-receipt "$root/output/fusion-receipt.json" \
            --segmentation-receipt "$segments/segmentation-receipt.json" \
            --evaluation-data "$segments/shard-000/causal-preference.development.jsonl" \
            --output "$root/evaluation" \
            --max-seq-length 1536
          cp "$segments/segmentation-receipt.json" "$root/segmentation-receipt.json"
          cp "$segments/shard-000/causal-preference.development.jsonl" "$root/held-out.jsonl"
          artifact_name="archie-segmented-evaluated-${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          printf 'root=%s\nartifact_name=%s\n' "$root" "$artifact_name" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.evaluate_paths.outputs.artifact_name }}
          path: ${{ steps.evaluate_paths.outputs.root }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  quantize:
    needs: [authorize, evaluate_fused]
    if: needs.authorize.outputs.allowed == 'true' && vars.ARCHIE_QUANT_RUNNER_READY == '1'
    runs-on: [self-hosted, linux, x64, "${{ vars.ARCHIE_QUANT_RUNNER_LABEL }}"]
    timeout-minutes: 480
    env:
      ARCHIE_TRAINING_PYTHON: ${{ vars.ARCHIE_TRAINING_PYTHON }}
      ARCHIE_STUDENT_MODEL_DIR: ${{ vars.ARCHIE_STUDENT_MODEL_DIR }}
      ARCHIE_LLAMA_CONVERTER: ${{ vars.ARCHIE_LLAMA_CONVERTER }}
      ARCHIE_LLAMA_QUANTIZER: ${{ vars.ARCHIE_LLAMA_QUANTIZER }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
      - name: Install locked repository dependencies
        run: npm ci --ignore-scripts
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.evaluate_fused.outputs.artifact_name }}
          path: ${{ runner.temp }}/archie-fused-input
      - id: quant_paths
        name: Materialize and quantize the fused candidate
        run: |
          set -euo pipefail
          test -x "$ARCHIE_TRAINING_PYTHON"
          test -d "$ARCHIE_STUDENT_MODEL_DIR"
          test -f "$ARCHIE_LLAMA_CONVERTER"
          test -x "$ARCHIE_LLAMA_QUANTIZER"
          fused_root="${RUNNER_TEMP}/archie-fused-input/output"
          evaluation_receipt="${RUNNER_TEMP}/archie-fused-input/evaluation/fused-adapter-evaluation-receipt.json"
          test -f "$fused_root/fusion-receipt.json"
          test -f "$evaluation_receipt"
          EVALUATION_RECEIPT="$evaluation_receipt" "$ARCHIE_TRAINING_PYTHON" - <<'PY'
          import hashlib, json, os, pathlib
          path = pathlib.Path(os.environ['EVALUATION_RECEIPT'])
          value = json.loads(path.read_text(encoding='utf-8'))
          body = dict(value); claimed = body.pop('receipt_digest', None)
          observed = hashlib.sha256(json.dumps(body, sort_keys=True, separators=(',', ':')).encode()).hexdigest()
          if value.get('schema') != 'archie-fused-adapter-evaluation-receipt/v1' or claimed != observed:
              raise SystemExit('Fused evaluation receipt integrity failed.')
          if value.get('evaluation_passed') is not True or value.get('quantization_eligible') is not True:
              raise SystemExit('Fused candidate did not clear the pre-quantization held-out gate.')
          if value.get('promotion') != 'not-admitted':
              raise SystemExit('Fused evaluation attempted to bypass admission.')
          PY
          root="$(mktemp -d "${RUNNER_TEMP}/archie-quantized.XXXXXXXX")"
          merged="$root/merged"
          quantized="$root/quantized"
          "$ARCHIE_TRAINING_PYTHON" foundry/archie-distill/materialize_fused_adapter.py \
            --model-dir "$ARCHIE_STUDENT_MODEL_DIR" \
            --adapter-dir "$fused_root/adapter" \
            --fusion-receipt "$fused_root/fusion-receipt.json" \
            --output "$merged" \
            --device cpu
          revision="$("$ARCHIE_TRAINING_PYTHON" - "$fused_root/fusion-receipt.json" <<'PY'
          import json, sys
          print(json.load(open(sys.argv[1], encoding='utf-8'))['base_checkpoint_directory_digest'])
          PY
          )"
          node scripts/archie-student-quantize.mjs run \
            --model-dir "$merged" \
            --model-id archie-segmented-fused \
            --model-revision-sha256 "$revision" \
            --converter "$ARCHIE_LLAMA_CONVERTER" \
            --quantizer "$ARCHIE_LLAMA_QUANTIZER" \
            --python "$ARCHIE_TRAINING_PYTHON" \
            --output-dir "$quantized" \
            --quantization Q4_K_M \
            --quantization Q5_K_M \
            --quantization Q6_K
          REQUEST="$root/quantization-evaluation-required.json" QUANT_RECEIPT="$quantized/quantization-receipt.json" FUSION_RECEIPT="$fused_root/fusion-receipt.json" FUSED_EVALUATION_RECEIPT="$evaluation_receipt" "$ARCHIE_TRAINING_PYTHON" - <<'PY'
          import hashlib, json, os, pathlib
          quant = pathlib.Path(os.environ['QUANT_RECEIPT'])
          fusion = pathlib.Path(os.environ['FUSION_RECEIPT'])
          fused_evaluation = pathlib.Path(os.environ['FUSED_EVALUATION_RECEIPT'])
          body = {
              'schema': 'archie-segmented-quantization-evaluation-request/v1',
              'method': 'recursive-segmented-tokenized-distillation/v1',
              'fusion_receipt_sha256': hashlib.sha256(fusion.read_bytes()).hexdigest(),
              'fused_evaluation_receipt_sha256': hashlib.sha256(fused_evaluation.read_bytes()).hexdigest(),
              'quantization_receipt_sha256': hashlib.sha256(quant.read_bytes()).hexdigest(),
              'required_outputs': ['base-versus-fused-held-out', 'Q4_K_M-quality-retention', 'Q5_K_M-quality-retention', 'Q6_K-quality-retention', 'case-level-evaluator-digests'],
              'promotion': 'not-admitted',
              'claim_boundary': 'Quantized artifacts exist, but recursive retraining and admission remain blocked until case-level evaluation is supplied.'
          }
          body['receipt_digest'] = hashlib.sha256(json.dumps(body, sort_keys=True, separators=(',', ':')).encode()).hexdigest()
          pathlib.Path(os.environ['REQUEST']).write_text(json.dumps(body, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
          artifact_name="archie-segmented-quantized-${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          printf 'root=%s\nartifact_name=%s\n' "$root" "$artifact_name" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.quant_paths.outputs.artifact_name }}
          path: ${{ steps.quant_paths.outputs.root }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
