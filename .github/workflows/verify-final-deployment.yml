name: Verify final deployed main

on:
  push:
    branches:
      - agent/verify-final-deployment
    paths:
      - .github/workflows/verify-final-deployment.yml

permissions:
  contents: write
  actions: read
  issues: write

concurrency:
  group: verify-final-deployment-a99bd83c
  cancel-in-progress: false

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - name: Verify Pages run, live sentinel, and deployment receipt
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_COMMIT: a99bd83c31bf4f88c7acb3b65d13246a061bd60c
          EXPECTED_REPOSITORY: Pokitomas/theawesomehexapp
          VERIFY_BRANCH: agent/verify-final-deployment
          VERIFY_WORKFLOW_PATH: .github/workflows/verify-final-deployment.yml
          SENTINEL_URL: https://pokitomas.github.io/theawesomehexapp/.well-known/sideways-deployment.json
        shell: bash
        run: |
          node <<'NODE'
          const token = process.env.GH_TOKEN;
          const repository = process.env.EXPECTED_REPOSITORY;
          const expected = process.env.EXPECTED_COMMIT;
          const [owner, repo] = repository.split('/');
          const apiRoot = `https://api.github.com/repos/${owner}/${repo}`;
          const headers = {
            accept: 'application/vnd.github+json',
            authorization: `Bearer ${token}`,
            'x-github-api-version': '2022-11-28',
            'user-agent': 'sideways-final-deployment-verifier'
          };

          const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
          async function request(url, options = {}) {
            const response = await fetch(url, { ...options, headers: { ...headers, ...(options.headers || {}) } });
            const text = await response.text();
            let body = null;
            try { body = text ? JSON.parse(text) : null; } catch { body = text; }
            if (!response.ok) throw new Error(`${options.method || 'GET'} ${url} -> ${response.status}: ${typeof body === 'string' ? body : JSON.stringify(body)}`);
            return body;
          }

          async function deleteVerifierWorkflow() {
            const path = process.env.VERIFY_WORKFLOW_PATH.split('/').map(encodeURIComponent).join('/');
            const branch = encodeURIComponent(process.env.VERIFY_BRANCH);
            const current = await request(`${apiRoot}/contents/${path}?ref=${branch}`);
            await request(`${apiRoot}/contents/${path}`, {
              method: 'DELETE',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({
                message: 'chore: remove final deployment verifier',
                sha: current.sha,
                branch: process.env.VERIFY_BRANCH
              })
            });
          }

          async function commentIssue(number, body) {
            return request(`${apiRoot}/issues/${number}/comments`, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ body })
            });
          }

          await deleteVerifierWorkflow();

          let pagesRun = null;
          for (let attempt = 1; attempt <= 160; attempt += 1) {
            const runs = await request(`${apiRoot}/actions/workflows/pages.yml/runs?event=push&branch=main&per_page=30`);
            pagesRun = (runs.workflow_runs || []).find(run => run.head_sha === expected) || null;
            if (pagesRun?.status === 'completed') break;
            if (attempt % 8 === 0) console.log(`waiting for Pages run: attempt=${attempt} run=${pagesRun?.id || 'not-found'} status=${pagesRun?.status || 'unknown'}`);
            await sleep(15_000);
          }

          if (!pagesRun) {
            await commentIssue(378, `## Final deployment verification blocked\n\nNo push-triggered Pages run was found for exact main SHA \`${expected}\` within the bounded verifier window. The issue remains open; no served-state claim was made.`);
            throw new Error(`No Pages run found for ${expected}`);
          }

          if (pagesRun.status !== 'completed' || pagesRun.conclusion !== 'success') {
            await commentIssue(378, `## Final deployment verification failed\n\nPages run \`${pagesRun.id}\` for exact main SHA \`${expected}\` ended with status \`${pagesRun.status}\` and conclusion \`${pagesRun.conclusion || 'none'}\`.\n\nRun: ${pagesRun.html_url}\n\nThe issue remains open; no served-state claim was made.`);
            throw new Error(`Pages run ${pagesRun.id} concluded ${pagesRun.conclusion}`);
          }

          const sentinelResponse = await fetch(`${process.env.SENTINEL_URL}?commit=${encodeURIComponent(expected)}&verified=${Date.now()}`, {
            headers: { 'cache-control': 'no-cache', 'user-agent': 'sideways-final-deployment-verifier' }
          });
          if (!sentinelResponse.ok) throw new Error(`sentinel HTTP ${sentinelResponse.status}`);
          const sentinel = await sentinelResponse.json();
          if (sentinel.commit !== expected || sentinel.repository !== repository) {
            await commentIssue(378, `## Final deployment sentinel mismatch\n\nPages run \`${pagesRun.id}\` succeeded, but the independently fetched sentinel did not bind the expected deployment.\n\nExpected commit: \`${expected}\`\nObserved commit: \`${sentinel.commit || '<missing>'}\`\nExpected repository: \`${repository}\`\nObserved repository: \`${sentinel.repository || '<missing>'}\`\n\nThe issue remains open.`);
            throw new Error(`sentinel mismatch: ${JSON.stringify(sentinel)}`);
          }

          let receipt = null;
          for (let attempt = 1; attempt <= 12; attempt += 1) {
            const issues = await request(`${apiRoot}/issues?state=open&per_page=100&sort=updated&direction=desc`);
            receipt = issues.find(issue => !issue.pull_request
              && issue.title === 'Sideways consumer app deployed'
              && String(issue.body || '').includes(`COMMIT=${expected}`)
              && String(issue.body || '').includes('LIVE_COMMIT_VERIFIED=true')) || null;
            if (receipt) break;
            await sleep(5_000);
          }
          if (!receipt) throw new Error(`verified deployment receipt issue not found for ${expected}`);

          const finalComment = [
            '## Final production deployment verified',
            '',
            `Exact admitted main SHA: \`${expected}\``,
            `Pages workflow run: \`${pagesRun.id}\` (${pagesRun.html_url})`,
            `Live sentinel: ${process.env.SENTINEL_URL}`,
            `Sentinel repository: \`${sentinel.repository}\``,
            `Deployment receipt: #${receipt.number}`,
            '',
            'Independent verification confirmed that the served sentinel, successful push-triggered Pages run, and open deployment receipt all bind the same exact main SHA. Repository implementation blockers and open pull requests are zero. The enactor exit condition is satisfied.'
          ].join('\n');
          await commentIssue(378, finalComment);
          await request(`${apiRoot}/issues/378`, {
            method: 'PATCH',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ state: 'closed', state_reason: 'completed' })
          });
          console.log(JSON.stringify({ pages_run: pagesRun.id, sentinel, receipt_issue: receipt.number }));
          NODE
