name: Extract exact plugin hostile repair

on:
  pull_request:
    paths:
      - '.archie-payload/plugin-repair/**'
      - '.github/workflows/plugin-repair-extract.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extract-and-prove:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
      - name: Reconstruct digest-pinned bundle
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t parts < <(find .archie-payload/plugin-repair -maxdepth 1 -type f -name 'part-*' | sort)
          test "${#parts[@]}" -eq 6
          cat "${parts[@]}" | tr -d '\n\r ' | base64 --decode > plugin-repair.tar.gz
          echo '339a23f78ac993ec83bb244afa6c5b8e1c0a546f5a52dc414c82fc25d0f2796a  plugin-repair.tar.gz' | sha256sum --check --strict
      - name: Enforce exact three-path archive
        shell: bash
        run: |
          set -euo pipefail
          tar -tzf plugin-repair.tar.gz | sed 's#^\./##' | sort > archive-paths.txt
          cat > expected-paths.txt <<'PATHS'
          maker/contracts/plugin-manifest.schema.json
          scripts/maker-plugin-registry.mjs
          scripts/tests/maker-plugin-registry.test.mjs
          PATHS
          sort -o expected-paths.txt expected-paths.txt
          diff -u expected-paths.txt archive-paths.txt
          mkdir extracted
          tar -xzf plugin-repair.tar.gz -C extracted
      - name: Capture hostile plugin proof
        shell: bash
        run: |
          set -uo pipefail
          status=0
          : > plugin-repair-test.log
          node --check extracted/scripts/maker-plugin-registry.mjs >> plugin-repair-test.log 2>&1 || status=$?
          node --check extracted/scripts/tests/maker-plugin-registry.test.mjs >> plugin-repair-test.log 2>&1 || status=$?
          node -e "JSON.parse(require('fs').readFileSync('extracted/maker/contracts/plugin-manifest.schema.json','utf8'))" >> plugin-repair-test.log 2>&1 || status=$?
          node --test extracted/scripts/tests/maker-plugin-registry.test.mjs >> plugin-repair-test.log 2>&1 || status=$?
          grep -Eq '# tests 32|tests 32' plugin-repair-test.log || status=1
          grep -Eq '# pass 32|pass 32' plugin-repair-test.log || status=1
          printf '%s\n' "$status" > plugin-repair-status.txt
          cat plugin-repair-test.log
      - name: Write extraction receipt
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          sha256sum plugin-repair.tar.gz extracted/scripts/maker-plugin-registry.mjs extracted/scripts/tests/maker-plugin-registry.test.mjs extracted/maker/contracts/plugin-manifest.schema.json > plugin-repair-sha256.txt
          printf 'source_head=%s\nsource_pr=%s\nbundle_sha256=%s\nmutation_authority=none\nproof_status=%s\n' "$GITHUB_SHA" '${{ github.event.pull_request.number || 0 }}' '339a23f78ac993ec83bb244afa6c5b8e1c0a546f5a52dc414c82fc25d0f2796a' "$(cat plugin-repair-status.txt 2>/dev/null || printf unavailable)" > plugin-repair-receipt.txt
      - name: Upload extracted repair evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: extracted-plugin-hostile-repair
          path: |
            extracted/scripts/maker-plugin-registry.mjs
            extracted/scripts/tests/maker-plugin-registry.test.mjs
            extracted/maker/contracts/plugin-manifest.schema.json
            plugin-repair-sha256.txt
            plugin-repair-test.log
            plugin-repair-status.txt
            plugin-repair-receipt.txt
          if-no-files-found: error
          retention-days: 14
      - name: Enforce hostile proof result
        shell: bash
        run: test "$(cat plugin-repair-status.txt)" = 0
