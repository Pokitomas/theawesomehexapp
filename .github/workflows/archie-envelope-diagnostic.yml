name: Diagnose Archie artifact envelope

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/archie-artifact-envelope.mjs'
      - 'scripts/archie.mjs'
      - 'scripts/tests/maker-archie-envelope.test.mjs'
      - '.github/workflows/archie-envelope-diagnostic.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-envelope-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Run focused envelope tests with complete output
        shell: bash
        run: |
          set -o pipefail
          node --test --test-reporter=spec scripts/tests/maker-archie-envelope.test.mjs 2>&1 | tee archie-envelope-test.log
