name: Apply orchestrator retry and evidence repair

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor == 'Pokitomas'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Apply exact proven patch
        run: |
          printf '%s' '' | base64 -d > /tmp/orchestrator.patch
          git apply --check /tmp/orchestrator.patch
          git apply /tmp/orchestrator.patch
      - name: Prove focused orchestrator contract
        run: |
          node --check scripts/maker-orchestrator.mjs
          node --test scripts/tests/maker-orchestrator.test.mjs
      - name: Commit only the proven source repair
        run: |
          rm .github/workflows/lead-fix-orchestrator.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/maker-orchestrator.mjs .github/workflows/lead-fix-orchestrator.yml
          git commit -m 'Repair orchestrator retries budgets and final-head evidence'
          git push origin HEAD:${{ github.head_ref }}
