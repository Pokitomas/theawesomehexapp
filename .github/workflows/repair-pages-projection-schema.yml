name: Repair Pages projection schema

on:
  pull_request:
    paths:
      - .github/workflows/repair-pages-projection-schema.yml
      - .github/tmp/repair-pages-projection-schema.py

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Apply, test, and preserve exact candidate
        env:
          SIDEWAYS_PUBLIC_SOURCES: ${{ vars.SIDEWAYS_PUBLIC_SOURCES }}
          POST_COUNT: 1000000
          CHUNK_SIZE: 1024
          CONTENT_CHUNK_SIZE: 128
          CORPUS_SEED: 20260712
          CORPUS_FILE: corpus/general-media.jsonl.gz
        shell: bash
        run: |
          set +e
          python .github/tmp/repair-pages-projection-schema.py
          patch_status=$?
          rm -f .github/tmp/repair-pages-projection-schema.py
          rm -f .github/workflows/repair-pages-projection-schema.yml
          mkdir -p audit /tmp/sideways-corpus
          log=audit/pages-projection-schema-validation.log
          : > "$log"
          failed=$patch_status

          run_gate() {
            name="$1"
            shift
            echo "## ${name}" >> "$log"
            "$@" >> "$log" 2>&1
            status=$?
            echo "status=${status}" >> "$log"
            echo >> "$log"
            if [ "$status" -ne 0 ]; then failed=1; fi
          }

          run_gate npm-ci npm ci
          run_gate syntax node --check scripts/web-source-records.mjs
          run_gate focused-tests node --test scripts/tests/web-source-snapshot.test.mjs scripts/tests/web-source-providers.test.mjs

          if [ "$failed" -eq 0 ]; then
            run_gate extract-base bash -lc "cat source.xz.part.* | base64 -d > source.tar.xz && tar -xJf source.tar.xz && cat general-overlay.part.* | base64 -d > general-overlay.tar.xz && tar -xJf general-overlay.tar.xz && python general/patch.py"
            mkdir -p corpus
            run_gate live-snapshot timeout 900s node scripts/build-web-source-snapshot.mjs --output corpus/general.jsonl.gz
            run_gate snapshot-verifier node scripts/verify-web-source-snapshot.mjs corpus/general.jsonl.gz corpus/general.jsonl.gz.meta.json
            if timeout 600s python general/media.py --input corpus/general.jsonl.gz --output corpus/general-media.jsonl.gz --media-dir corpus/media --max-media 180 --discover-forum 80 >> "$log" 2>&1; then
              echo 'display media ready' >> "$log"
            else
              echo 'media retrieval unavailable; using text-first bounded snapshot' >> "$log"
              cp corpus/general.jsonl.gz corpus/general-media.jsonl.gz
            fi
            run_gate million-projection timeout 1200s node scripts/build.mjs
            run_gate profile-verifier python verify-profile-build.py
            run_gate ingestion npm run test:ingestion
            run_gate authority npm run test:authority
            run_gate repository npm run verify:repository
            run_gate diff-check git diff --check
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm -f repository-verification.json
          if [ "$failed" -ne 0 ]; then
            tail -n 700 "$log" > "$log.tmp"
            mv "$log.tmp" "$log"
            git add -A
            git commit -m "test: preserve projection schema validation failure"
            git push origin HEAD:${TARGET_BRANCH}
            exit 1
          fi

          rm -f "$log"
          git add -A
          git commit -m "fix(pages): bridge snapshot records into projection schema"
          git push origin HEAD:${TARGET_BRANCH}
