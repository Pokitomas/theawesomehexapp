name: Sidepus archive contract

on:
  pull_request:
    paths:
      - "foundry/sidepus/**"
      - ".github/workflows/sidepus-archive-contract.yml"
      - "docs/SIDEPUS-WEB-ARCHIVE.md"
      - "docs/SIDEPUS-DEVELOPMENTAL-CORPUS.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: foundry/sidepus/requirements-parity.txt
      - name: Install archive dependencies
        run: python -m pip install -r foundry/sidepus/requirements-parity.txt
      - name: Compile Sidepus
        run: python -m compileall -q foundry/sidepus
      - name: Validate developmental program
        run: >-
          python -m foundry.sidepus.developmental_cli validate-program
          --program foundry/sidepus/plans/developmental-program-v1.json
      - name: Run archive, governance, extraction, and developmental contracts
        run: >-
          python -m unittest -v
          foundry.sidepus.test_sidepus_archive
          foundry.sidepus.test_sidepus_governance
          foundry.sidepus.test_sidepus_extraction
          foundry.sidepus.test_sidepus_development
      - name: Inspect local parity capabilities
        run: python -m foundry.sidepus.governed_cli doctor
