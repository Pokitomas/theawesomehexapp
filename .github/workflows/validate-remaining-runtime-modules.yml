name: Validate remaining runtime modules

on:
  push:
    branches:
      - agent/finish-remaining-runtime-modules
    paths:
      - .github/workflows/validate-remaining-runtime-modules.yml

permissions:
  contents: write

concurrency:
  group: validate-remaining-runtime-modules
  cancel-in-progress: true

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Execute exact gates and preserve bounded evidence
        shell: bash
        run: |
          set +e
          rm .github/workflows/validate-remaining-runtime-modules.yml
          report=/tmp/remaining-runtime-validation.txt
          : > "$report"
          failed=0

          run_gate() {
            name="$1"
            shift
            log="/tmp/${name}.log"
            echo "## ${name}" >> "$report"
            "$@" >"$log" 2>&1
            status=$?
            echo "status=${status}" >> "$report"
            tail -n 160 "$log" >> "$report"
            echo >> "$report"
            if [ "$status" -ne 0 ]; then failed=1; fi
          }

          run_gate npm-ci npm ci
          run_gate syntax-delivery node --check scripts/maker-delivery-loop.mjs
          run_gate syntax-evaluation node --check scripts/maker-evaluation.mjs
          run_gate syntax-chamber node --check scripts/archie-distilling-chamber.mjs
          run_gate syntax-cli node --check scripts/archie-distilling-cli.mjs
          run_gate focused-tests node --test scripts/tests/maker-delivery-loop.test.mjs scripts/tests/maker-evaluation.test.mjs scripts/tests/archie-distilling-chamber.test.mjs
          run_gate json-contracts node -e "for (const p of ['maker/contracts/delivery-loop.schema.json','maker/contracts/evaluation-receipt.schema.json','maker/evaluations/capability-suite.json','maker/contracts/archie-distilling-chamber.schema.json','maker/evaluations/archie-recursion-curriculum.json']) JSON.parse(require('fs').readFileSync(p,'utf8'))"
          run_gate chamber-cli bash -lc "printf '%s\\n' '{\"id\":\"smoke\",\"input\":{\"value\":1}}' | node scripts/archie-distilling-cli.mjs run - > /tmp/chamber-smoke.json && node -e \"const x=JSON.parse(require('fs').readFileSync('/tmp/chamber-smoke.json','utf8')); if(x.status.episodes!==1||!x.events.events.length) process.exit(1)\""
          run_gate native-maker npm run test:native-maker
          run_gate maker npm run test:maker
          run_gate foundry npm run test:foundry
          run_gate weave npm run test:weave
          run_gate recursive-weave npm run test:recursive-weave
          run_gate remote npm run test:remote
          run_gate ingestion npm run test:ingestion
          run_gate social npm run test:social
          run_gate authority npm run test:authority
          run_gate quality npm run verify:quality
          run_gate operations npm run verify:operations
          run_gate release npm run verify:release
          run_gate frankenstate npm run verify:frankenstate
          run_gate repository npm run verify:repository
          run_gate diff-check git diff --check

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          if [ "$failed" -ne 0 ]; then
            mkdir -p audit
            cp "$report" audit/remaining-runtime-validation-failure.txt
            git add .github/workflows/validate-remaining-runtime-modules.yml audit/remaining-runtime-validation-failure.txt
            git commit -m "test: preserve remaining runtime validation failure"
            git push origin HEAD:${GITHUB_REF_NAME}
            exit 1
          fi

          git add .github/workflows/validate-remaining-runtime-modules.yml
          git commit -m "test: validate remaining runtime modules"
          git push origin HEAD:${GITHUB_REF_NAME}
