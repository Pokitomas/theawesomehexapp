name: Apply Archie reliability rerank

on:
  push:
    branches:
      - agent/archie-reliability-rerank-api
    paths:
      - '.github/archie-reliability-rerank.patch.gz.b64'
      - '.github/workflows/archie-reliability-rerank-once.yml'

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/archie-reliability-rerank-api
          fetch-depth: 0
      - name: Apply exact patch, verify, and publish
        shell: bash
        run: |
          set -euo pipefail
          encoded='.github/archie-reliability-rerank.patch.gz.b64'
          if [[ ! -f "$encoded" ]]; then
            echo 'Patch already applied.'
            exit 0
          fi
          base64 --decode "$encoded" | gunzip > /tmp/archie-reliability-rerank.patch
          git apply --check /tmp/archie-reliability-rerank.patch
          git apply /tmp/archie-reliability-rerank.patch
          node --check scripts/maker-archie-brain.mjs
          node --check scripts/maker-archie-native.mjs
          node --test scripts/tests/maker-archie-calibration.test.mjs
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/maker-archie-brain.mjs scripts/maker-archie-native.mjs scripts/tests/maker-archie-calibration.test.mjs
          git rm "$encoded"
          git commit -m 'Rerank Archie specialists by observed reliability'
          git push origin HEAD:agent/archie-reliability-rerank-api
