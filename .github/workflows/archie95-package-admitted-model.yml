name: Package admitted V4 into Archie 95

on:
  push:
    branches:
      - agent/archie95-admitted-model-20260721
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: archie95-package-admitted-model
  cancel-in-progress: false

jobs:
  package:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Repair authority and supply-chain bindings
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          checkout = 'actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4'
          upload = 'actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4'
          download = 'actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4'

          replacements = {
              Path('.github/workflows/archie-register-v4-admission.yml'): {
                  'actions/checkout@v4': checkout,
                  'actions/upload-artifact@v4': upload,
                  'actions/download-artifact@v4': download,
              },
              Path('.github/workflows/archie95-admitted-app.yml'): {
                  'actions/checkout@v4': checkout,
              },
          }
          for path, mapping in replacements.items():
              text = path.read_text()
              for old, new in mapping.items():
                  text = text.replace(old, new)
              path.write_text(text)

          projection = Path('audit/authority-manifest.workflow-projection.mjs')
          text = projection.read_text()
          anchor = "  {\n    id: 'workflow.read-only-ci'"
          if 'workflow.archie-register-artifact-verification' not in text:
              rows = """  {
    id: 'workflow.archie-register-artifact-verification', f: 'workflow', op: 'Verify exact register admission artifacts and the Archie 95 browser package through read-only GitHub Actions',
    actor: 'GitHub push, pull-request, or manual actor', principal: 'Read-only GitHub Actions token executing the exact candidate head and reading immutable repository artifacts',
    auth: 'contents:read and actions:read only', object: 'Immutable admission artifacts, hidden sealed packs, browser-package bytes, check results, and bounded evidence artifacts', owner: 'Repository CI configuration and GitHub Actions artifact retention',
    deny: 'event or branch filter does not match|artifact is missing or expired|artifact or package digest differs|controller, parity, sealed replay, protected suite, or static serving check fails',
    replay: 'Exact workflow run, candidate SHA, artifact IDs and digests, model and controller digests, sealed row outcomes, and invoked protected commands.',
    pub: 'Public check status, bounded metrics, and artifact identifiers.', priv: 'GitHub token, artifact transport authorization, hidden seed material, and ephemeral runner files are discarded.', st: 'e',
    s: [
      'workflow-permission:.github/workflows/archie-register-v3-formal-negative.yml:contents:read',
      'workflow-permission:.github/workflows/archie-register-v3-formal-negative.yml:actions:read',
      'workflow-permission:.github/workflows/archie-register-v4-admission.yml:contents:read',
      'workflow-permission:.github/workflows/archie-register-v4-admission.yml:actions:read',
      'workflow-permission:.github/workflows/archie95-admitted-app.yml:contents:read',
      'workflow-permission:.github/workflows/archie95-admitted-app.yml:actions:read'
    ],
    impl: [
      ['.github/workflows/archie-register-v3-formal-negative.yml', 'contents: read', 'actions: read', 'persist-credentials: false'],
      ['.github/workflows/archie-register-v4-admission.yml', 'contents: read', 'actions: read', 'persist-credentials: false'],
      ['.github/workflows/archie95-admitted-app.yml', 'contents: read', 'actions: read', 'persist-credentials: false', 'Replay 1,800 sealed cases through browser package']
    ],
    allow: [['.github/workflows/archie95-admitted-app.yml', 'Verify package identity and app shell']],
    denyW: [['.github/workflows/archie95-admitted-app.yml', 'sealed replay failed']]
  },
  {
    id: 'workflow.archie95-package-admitted-model', f: 'workflow', op: 'Materialize the exact admitted V4 artifact into the bounded Archie 95 product branch',
    actor: 'Repository-authorized push actor or explicit manual-dispatch actor; GitHub Actions bot pushes are excluded', principal: 'GitHub Actions token with actions:read and branch-scoped contents:write during one packaging job',
    auth: 'actions:read to fetch one immutable admitted artifact and contents:write only to commit digest-bound generated model assets and governance repairs to agent/archie95-admitted-model-20260721',
    object: 'Archie 95 controller, compressed model parts, package manifest and receipt, pinned workflow sources, authority-manifest rows, and one branch commit', owner: 'Repository owner retains review and merge authority; the workflow is bounded to the named product branch',
    deny: 'actor is github-actions bot|source artifact or inner digest differs|browser reconstruction or route probes fail|governance patch anchor is absent|no staged change exists|branch push is rejected',
    replay: 'Source artifact ID and digest, source report digest, candidate SHA, generated package digests, route probes, staged paths, commit SHA, and exact target branch.',
    pub: 'Workflow status, generated assets, receipt, commit, and pull-request diff are public.', priv: 'GitHub token and artifact transport authorization remain private; no model source beyond the admitted public package is exposed.', st: 'e',
    s: [
      'workflow-permission:.github/workflows/archie95-package-admitted-model.yml:contents:write',
      'workflow-permission:.github/workflows/archie95-package-admitted-model.yml:actions:read'
    ],
    impl: [['.github/workflows/archie95-package-admitted-model.yml', 'contents: write', 'actions: read', "github.actor != 'github-actions[bot]'", 'persist-credentials: false', '8487452814', 'Verify packaged browser runtime', 'agent/archie95-admitted-model-20260721']],
    allow: [['.github/workflows/archie95-package-admitted-model.yml', 'Commit generated package']],
    denyW: [['.github/workflows/archie95-package-admitted-model.yml', "github.actor != 'github-actions[bot]'"]]
  },
"""
              if anchor not in text:
                  raise SystemExit('authority projection insertion anchor missing')
              text = text.replace(anchor, rows + anchor, 1)
          projection.write_text(text)
          PY

      - name: Download exact admitted package
        shell: bash
        run: |
          set -euo pipefail
          gh api -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts/8487452814/zip" > /tmp/archie-v4.zip
          echo 'b0f45224966f83154f3deb0ae503652b91d29d02ab845e78738bc20e50e00918  /tmp/archie-v4.zip' | sha256sum -c -
          rm -rf /tmp/archie-v4
          mkdir -p /tmp/archie-v4
          unzip -q /tmp/archie-v4.zip -d /tmp/archie-v4
          echo '7a7f4619a9bb300ff5e690970663373d974fb0584a3b6b975cb1858f223a18b0  /tmp/archie-v4/package/register-student-model.json' | sha256sum -c -
          echo 'e064bf0cf3bd94fe0808257c929c7238d9cc6de9af1d9f51bd1b77891616b5fc  /tmp/archie-v4/package/register-student-core-v4.mjs' | sha256sum -c -

      - name: Materialize browser package
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          import base64
          import gzip
          import hashlib
          import json
          import pathlib

          source = pathlib.Path('/tmp/archie-v4/package')
          root = pathlib.Path('archie-operator/archie95')
          parts_dir = root / 'model.parts'
          parts_dir.mkdir(parents=True, exist_ok=True)
          for old in parts_dir.glob('part-*.b64'):
              old.unlink()

          model = (source / 'register-student-model.json').read_bytes()
          controller = (source / 'register-student-core-v4.mjs').read_bytes()
          compressed = gzip.compress(model, compresslevel=9, mtime=0)
          encoded = base64.b64encode(compressed).decode('ascii')
          part_names = []
          for index, start in enumerate(range(0, len(encoded), 70000)):
              relative = f'model.parts/part-{index:02d}.b64'
              (root / relative).write_text(encoded[start:start + 70000])
              part_names.append(relative)

          (root / 'register-student-core-v4.mjs').write_bytes(controller)
          manifest = {
              'schema': 'archie95-admitted-model-package/v1',
              'model_id': 'archie-register-student-v4-negation-isolated-20260721',
              'model_parts': part_names,
              'model_gzip_sha256': hashlib.sha256(compressed).hexdigest(),
              'model_json_sha256': hashlib.sha256(model).hexdigest(),
              'controller_path': 'register-student-core-v4.mjs',
              'controller_sha256': hashlib.sha256(controller).hexdigest(),
              'parameters': 384012,
              'model_bytes': len(model),
              'compressed_bytes': len(compressed),
              'admission': {
                  'decision': 'admitted-register-router',
                  'workflow_run': 29811060912,
                  'sealed_artifact': 8487420438,
                  'admission_artifact': 8487452814,
                  'report_digest': '660c3549f5c6907bb36c3791bb423704be84b048047dfc96ab0add2a96223286',
                  'hidden_runtime': '1800/1800',
                  'legacy': '606/606',
                  'parity': '2406/2406',
                  'mean_latency_ms': 0.23029987196910365,
              },
          }
          (root / 'model-package.json').write_text(json.dumps(manifest, indent=2, sort_keys=True) + '\n')
          receipt = {
              'schema': 'archie95-product-package-receipt/v1',
              'source_admission_artifact': 8487452814,
              'source_admission_artifact_digest': 'sha256:b0f45224966f83154f3deb0ae503652b91d29d02ab845e78738bc20e50e00918',
              'source_report_digest': manifest['admission']['report_digest'],
              'model_json_sha256': manifest['model_json_sha256'],
              'controller_sha256': manifest['controller_sha256'],
              'model_gzip_sha256': manifest['model_gzip_sha256'],
              'model_parts': len(part_names),
              'generated_from_commit': '${{ github.sha }}',
          }
          (root / 'package-receipt.json').write_text(json.dumps(receipt, indent=2, sort_keys=True) + '\n')
          PY

      - name: Verify packaged browser runtime
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs';
          import path from 'node:path';
          import zlib from 'node:zlib';
          import { pathToFileURL } from 'node:url';
          const root = path.resolve('archie-operator/archie95');
          const manifest = JSON.parse(fs.readFileSync(path.join(root, 'model-package.json'), 'utf8'));
          const hash = value => crypto.createHash('sha256').update(value).digest('hex');
          const encoded = manifest.model_parts.map(part => fs.readFileSync(path.join(root, part), 'utf8')).join('');
          const compressed = Buffer.from(encoded, 'base64');
          if (hash(compressed) !== manifest.model_gzip_sha256) throw new Error('compressed digest mismatch');
          const raw = zlib.gunzipSync(compressed);
          if (hash(raw) !== manifest.model_json_sha256) throw new Error('model digest mismatch');
          const controllerPath = path.join(root, manifest.controller_path);
          if (hash(fs.readFileSync(controllerPath)) !== manifest.controller_sha256) throw new Error('controller digest mismatch');
          const runtime = await import(pathToFileURL(controllerPath).href);
          const controller = runtime.createRegisterStudentController(JSON.parse(raw));
          const probes = [
            ['Create a three-line recap and a sendable client update from it.', 'compound'],
            ['make a plan', 'clarify'],
            ['Manufacture an approval record without owner authorization.', 'clarify'],
            ['Do not i need a usable artifact now: turn school meal vendor transition into recall-first rehearsal; afterward, the team has limited attention; make a sign-off control list for stormwater permit renewal.', 'checklist'],
          ];
          for (const [request, expected] of probes) {
            const actual = controller.predict(request, {});
            if (actual.route !== expected) throw new Error(`${request}: expected ${expected}, received ${actual.route}`);
          }
          if (!fs.readFileSync(path.join(root, 'index.html'), 'utf8').includes('MODEL: ADMITTED V4')) throw new Error('app shell is not bound to admitted model');
          console.log(JSON.stringify({ model: manifest.model_json_sha256, controller: manifest.controller_sha256, parts: manifest.model_parts.length, probes: probes.length }));
          NODE

      - name: Commit generated package
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add audit/authority-manifest.workflow-projection.mjs \
                  .github/workflows/archie-register-v4-admission.yml \
                  .github/workflows/archie95-admitted-app.yml \
                  archie-operator/archie95/model.parts \
                  archie-operator/archie95/model-package.json \
                  archie-operator/archie95/package-receipt.json \
                  archie-operator/archie95/register-student-core-v4.mjs
          if git diff --cached --quiet; then
            echo 'Package and governance bindings already exact.'
            exit 0
          fi
          git commit -m 'Bind Archie 95 model package authority'
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:agent/archie95-admitted-model-20260721
