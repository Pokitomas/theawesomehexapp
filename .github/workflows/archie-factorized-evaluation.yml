name: Evaluate factorized Archie terminal candidate

on:
  push:
    branches: [claude/archie-sprawl-training-5pe3i8]
    paths:
      - '.github/workflows/archie-factorized-evaluation.yml'
      - 'foundry/archie-protocol/factorized/**'
      - 'foundry/archie-protocol/neural/data/**'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: archie-factorized-terminal-${{ github.ref }}
  cancel-in-progress: false

jobs:
  evaluate:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Check out exact candidate head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755 # v6.2.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install numerical dependencies
        run: python -m pip install --upgrade numpy scipy scikit-learn joblib

      - name: Verify exact inputs and implementation
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          expected = {
              'foundry/archie-protocol/neural/data/route-train-v6.json': (925, '38d9df9c6f59d37c669cc3c3385172d2503995f5dc31e665d70941eb62ef8c57'),
              'foundry/archie-protocol/factorized/blind-challenge-pack.frozen.json': (429, '3d053ee28c346e712a4e422a73cc8154f492db13947a129581084857a0ad101f'),
              'foundry/archie-protocol/neural/data/router-v2-original-heldout.jsonl': (498, '188d67330955a67bdb24a1bb096f2910eaa13a268b48dde77216cdd4f8be40f5'),
              'foundry/archie-protocol/neural/data/router-real-v2-heldout.jsonl': (60, '72c0d30af384c42c54e244c6466f1ed710a1f58b157ed26cceb65f9d91068f64'),
              'foundry/archie-protocol/neural/data/router-real-v3-final.jsonl': (48, 'cb9131eaa0888d14a8e68f83e0486221b9b3dc5bf5b31a0df1a1f016433594dd'),
          }
          manifest = {'schema': 'archie-factorized-terminal-inputs/v1', 'files': {}}
          for raw, (rows_expected, sha_expected) in expected.items():
              path = Path(raw)
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              if path.suffix == '.jsonl':
                  rows = sum(bool(line.strip()) for line in path.read_text().splitlines())
              else:
                  rows = len(json.loads(path.read_text()))
              if rows != rows_expected or digest != sha_expected:
                  raise SystemExit(f'input identity mismatch: {raw} rows={rows} sha256={digest}')
              manifest['files'][raw] = {'rows': rows, 'sha256': digest}
          out = Path('foundry/archie-protocol/factorized/runs/terminal')
          out.mkdir(parents=True, exist_ok=True)
          (out / 'input-manifest.json').write_text(json.dumps(manifest, indent=2) + '\n')
          PY
          python -m py_compile \
            foundry/archie-protocol/factorized/factorized_controller.py \
            foundry/archie-protocol/factorized/audit_factorized_train.py \
            foundry/archie-protocol/factorized/audit_factorized_compound.py

      - name: Train audit-backed factorized controller
        run: |
          set -euo pipefail
          python foundry/archie-protocol/factorized/audit_factorized_train.py \
            --audit-corpus foundry/archie-protocol/neural/data/route-train-v6.json \
            --frozen-challenge foundry/archie-protocol/factorized/blind-challenge-pack.frozen.json \
            --legacy-dir foundry/archie-protocol/neural/data \
            --out foundry/archie-protocol/factorized/runs/terminal \
            --seed 91017

      - name: Train audit expert and learned compound controller
        run: |
          set -euo pipefail
          python foundry/archie-protocol/factorized/audit_factorized_compound.py \
            --audit-corpus foundry/archie-protocol/neural/data/route-train-v6.json \
            --frozen-challenge foundry/archie-protocol/factorized/blind-challenge-pack.frozen.json \
            --legacy-dir foundry/archie-protocol/neural/data \
            --out foundry/archie-protocol/factorized/runs/terminal \
            --seed 92031

      - name: Write terminal comparison and fail-closed decision
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          out = Path('foundry/archie-protocol/factorized/runs/terminal')
          route = json.loads((out / 'factorized-audit-comparison.json').read_text())
          compound = json.loads((out / 'factorized-audit-compound-comparison.json').read_text())
          summary = {
              'schema': 'archie-factorized-terminal-comparison/v1',
              'source_head': '${{ github.sha }}',
              'h2_evidence': {
                  'workflow_run_id': 29791875543,
                  'artifact_id': 8480797657,
                  'artifact_digest': 'sha256:d79ef41a6dbea07949f823987d868d21bc74492007e6a9b648c95174d6e8f1bd',
                  'blind_full': 0.529138,
                  'legacy': {'498': 0.614458, '60': 0.316667, '48': 0.229167},
              },
              'route_factorized': route,
              'compound_factorized': compound,
              'promotion': 'not-admitted',
              'production_changed': False,
              'claim_boundary': 'The frozen 429 pack is iterative research evidence. No candidate may be promoted without a new untouched full-runtime admission pack and complete authority, context, abstention, packaging, parity, and resource receipts.',
          }
          summary['summary_digest'] = hashlib.sha256(json.dumps(summary, sort_keys=True, separators=(',', ':')).encode()).hexdigest()
          (out / 'terminal-factorized.json').write_text(json.dumps(summary, indent=2) + '\n')
          lines = [
              '# Terminal factorized evaluation', '',
              f"- Route-factorized blind full: {100 * route['selected_blind_full']:.1f}% (baseline {100 * route['baseline_blind_full']:.1f}%).",
              f"- Compound-factorized blind full: {100 * compound['selected_blind_full']:.1f}% (baseline {100 * compound['baseline_blind_full']:.1f}%).",
              f"- H2 transformer blind full: {100 * summary['h2_evidence']['blind_full']:.1f}%.",
              '- Promotion: `not-admitted`; production remains unchanged.', '',
              '## Exact legacy controller-route retention', '',
              '| candidate | 498 | 60 | 48 |', '|---|---:|---:|---:|',
          ]
          def legacy_row(name, values):
              return f"| {name} | {100 * values['router-v2-original-heldout']:.1f}% | {100 * values['router-real-v2-heldout']:.1f}% | {100 * values['router-real-v3-final']:.1f}% |"
          lines.append(legacy_row('route-factorized', route['selected_legacy_controller_route']))
          lines.append(legacy_row('compound-factorized', compound['selected_legacy_controller_route']))
          h2 = summary['h2_evidence']['legacy']
          lines.append(f"| H2 transformer | {100*h2['498']:.1f}% | {100*h2['60']:.1f}% | {100*h2['48']:.1f}% |")
          lines += ['', '## Decision', '', summary['claim_boundary'], '']
          (out / 'TERMINAL_FACTORIZED.md').write_text('\n'.join(lines))
          print('\n'.join(lines))
          PY

      - name: Upload terminal factorized evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-factorized-terminal-${{ github.sha }}
          path: foundry/archie-protocol/factorized/runs/terminal
          if-no-files-found: error
          retention-days: 30
