name: Materialize Sidepus direct substrate

on:
  pull_request:
    branches:
      - agent/archie-world-state-core-20260722
    paths:
      - '.sidepus-bootstrap/**'
      - '.github/workflows/sidepus-bootstrap-materialize.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/sidepus-direct-stream-20260723
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Reassemble and verify payload
        shell: bash
        run: |
          set -euo pipefail
          cat .sidepus-bootstrap/chunk_* | base64 --decode > /tmp/sidepus-direct.tar.gz
          echo 'd9e0c3ad98b73a637af534e9be87bf5c0b10c05fc29b829338fd78714f933881  /tmp/sidepus-direct.tar.gz' | sha256sum --check
          tar -tzf /tmp/sidepus-direct.tar.gz
          tar -xzf /tmp/sidepus-direct.tar.gz -C .
          chmod +x foundry/archie-distill/run_archie_sidepus_organism.sh
      - name: Install CPU test dependency
        run: python -m pip install --upgrade pip torch --index-url https://download.pytorch.org/whl/cpu
      - name: Validate materialized implementation
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            foundry/archie-distill/sidepus_training_stream.py \
            foundry/archie-distill/archie_sidepus_organism.py \
            foundry/archie-distill/train_archie_sidepus_organism.py \
            foundry/archie-distill/evaluate_archie_sidepus_organism.py
          bash -n foundry/archie-distill/run_archie_sidepus_organism.sh
          cd foundry/archie-distill
          python test_sidepus_training_stream.py
          python test_archie_sidepus_organism.py
      - name: Commit reviewable source files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            foundry/archie-distill/sidepus_training_stream.py \
            foundry/archie-distill/train_archie_sidepus_organism.py \
            foundry/archie-distill/evaluate_archie_sidepus_organism.py \
            foundry/archie-distill/run_archie_sidepus_organism.sh
          git commit -m 'Add direct Sidepus organism training substrate'
          git push origin HEAD:agent/sidepus-direct-stream-20260723
