name: Prove founder room

on:
  pull_request:
    paths:
      - 'founder/**'
      - 'scripts/tests/founder-room*.mjs'
      - '.github/workflows/founder-room.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  founder-room:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked browser tooling
        run: npm ci --ignore-scripts
      - name: Verify founder decision model
        run: node scripts/tests/founder-room.test.mjs
      - name: Verify browser assets
        run: |
          node --check founder/founder.js
          node --check scripts/tests/founder-room-phone.mjs
          test -s founder/index.html
          test -s founder/founder.css
          grep -q 'Social identity with memory' founder/index.html
          grep -q 'Private remixable life feed' founder/index.html
          grep -q 'Scene-first social world' founder/index.html
      - name: Prove founder journey at 390x844
        run: |
          python -m http.server 4174 >/tmp/founder-http.log 2>&1 &
          server=$!
          trap 'kill $server || true' EXIT
          sleep 2
          node scripts/tests/founder-room-phone.mjs
      - name: Upload founder room preview
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sideways-founder-room
          path: |
            founder
            founder-room-phone.png
            founder-room-proof.json
          if-no-files-found: error
          retention-days: 5
