name: Prove human power surfaces

on:
  pull_request:
    paths:
      - 'founder/**'
      - 'foundry/**'
      - 'examples/site/**'
      - 'product/product-portfolio.json'
      - 'PRODUCT_PORTFOLIO.md'
      - 'ARCHIE_MAKER_VISION.md'
      - 'README.md'
      - 'scripts/product-portfolio.mjs'
      - 'scripts/tests/founder-room*.mjs'
      - 'scripts/tests/foundry-human.test.mjs'
      - 'scripts/tests/product-portfolio.test.mjs'
      - '.github/workflows/founder-room.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  human-power:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked browser tooling
        run: npm ci --ignore-scripts
      - name: Verify Founder contract
        run: npm run test:founder
      - name: Verify Foundry human surface
        run: npm run test:foundry:human
      - name: Verify Foundry core
        run: node --test foundry/tests/core.test.mjs
      - name: Verify Foundry calibration
        run: node --test foundry/tests/calibration.test.mjs
      - name: Verify Foundry cost calibration
        run: node --test foundry/tests/cost-calibration.test.mjs
      - name: Verify Foundry runtime
        run: |
          set +e
          node --test foundry/tests/runtime.test.mjs > foundry-runtime.log 2>&1
          status=$?
          set -e
          cat foundry-runtime.log
          exit "$status"
      - name: Verify Foundry Generation Zero
        run: node --test foundry/tests/generation-zero.test.mjs
      - name: Verify product portfolio
        run: npm run test:portfolio
      - name: Verify Archie human-power vision
        run: node --test scripts/tests/maker-archie-vision.test.mjs
      - name: Verify browser assets
        run: |
          node --check founder/founder.js
          node --check foundry/foundry.js
          node --check examples/site/site.js
          node --check scripts/tests/founder-room-phone.mjs
          test -s founder/index.html
          test -s founder/founder.css
          test -s foundry/index.html
          test -s foundry/foundry.css
          test -s examples/site/index.html
          grep -q 'Make something true' founder/index.html
          grep -q 'You are the lab now' foundry/index.html
          grep -q 'Tiny Public Things' examples/site/index.html
          ! grep -qi 'Sideways' founder/index.html
          ! grep -qi 'Sideways' foundry/index.html
      - name: Prove Founder journey at 390x844
        run: |
          python -m http.server 4174 >/tmp/founder-http.log 2>&1 &
          server=$!
          trap 'kill $server || true' EXIT
          sleep 2
          node scripts/tests/founder-room-phone.mjs
      - name: Upload human power preview
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: human-power-surfaces
          path: |
            founder
            foundry/index.html
            foundry/foundry.css
            foundry/foundry.js
            examples/site
            product/product-portfolio.json
            foundry-runtime.log
            founder-room-phone.png
            founder-room-proof.json
          if-no-files-found: error
          retention-days: 5
