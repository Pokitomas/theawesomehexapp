name: Verify Archie compatibility migration

on:
  pull_request:
    paths:
      - 'scripts/archie-legacy-import.mjs'
      - 'scripts/archie-source-host-inventory.mjs'
      - 'scripts/archie-workspace-core.mjs'
      - 'scripts/archie-workspace-file-provider.mjs'
      - 'scripts/archie-workspace-portable.mjs'
      - 'scripts/tests/archie-compatibility-migration.test.mjs'
      - 'ARCHIE_SOURCE_HOST_MIGRATION.md'
      - '.github/workflows/archie-compatibility-migration.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compatibility-migration:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install exact dependency tree
        run: npm ci --ignore-scripts
      - name: Verify compatibility import and authority inventory
        id: compatibility
        shell: bash
        run: |
          set +e
          node --test scripts/tests/archie-compatibility-migration.test.mjs > compatibility-migration-test.log 2>&1
          status=$?
          cat compatibility-migration-test.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload compatibility migration test log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: compatibility-migration-${{ matrix.os }}-node-${{ matrix.node }}
          path: compatibility-migration-test.log
          if-no-files-found: error
          retention-days: 14
      - name: Enforce compatibility migration result
        if: steps.compatibility.outputs.status != '0'
        shell: bash
        run: exit 1
      - name: Prove the importer and inventory CLIs are packaged source files
        shell: bash
        run: |
          node scripts/archie-legacy-import.mjs --help | grep -F 'archie-legacy-import'
          node scripts/archie-source-host-inventory.mjs --help | grep -F 'archie-source-host-inventory'
