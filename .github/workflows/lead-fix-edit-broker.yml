name: Apply edit-broker transaction repair

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor == 'Pokitomas'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Apply exact proven patch
        run: |
          printf '%s' '' | base64 -d > /tmp/edit-broker.patch
          git apply --check /tmp/edit-broker.patch
          git apply /tmp/edit-broker.patch
      - name: Prove edit transaction contract
        run: |
          node --check maker/runtime/edit-broker.mjs
          node --test scripts/tests/maker-edit-broker.test.mjs
      - name: Commit only proven source and fixture corrections
        run: |
          rm .github/workflows/lead-fix-edit-broker.yml
          rm -f .lead-edit-trigger
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add maker/runtime/edit-broker.mjs scripts/tests/maker-edit-broker.test.mjs .github/workflows/lead-fix-edit-broker.yml .lead-edit-trigger
          git commit -m 'Repair edit transaction staging and divergence safety'
          git push origin HEAD:${{ github.head_ref }}
