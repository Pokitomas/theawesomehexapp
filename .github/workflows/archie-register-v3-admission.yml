name: Archie register v3 admission research

on:
  pull_request:
  push:
    branches: [claude/archie-sprawl-training-5pe3i8]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: archie-register-v3-${{ github.ref }}
  cancel-in-progress: false

jobs:
  seal-v3-pack:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Decode exact pre-frozen pack generator
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/register-student-v3 artifacts/sealed-register-pack-v3
          cat foundry/archie-protocol/register_student/bundles/v2-toolchain.tar.gz.b64.part* | base64 -d > /tmp/v2-toolchain.tar.gz
          echo '641820a60427a8f5b816463f95527494c9c16b81397012107f3c1ef3c831782b  /tmp/v2-toolchain.tar.gz' | sha256sum -c -
          tar -xzf /tmp/v2-toolchain.tar.gz -C /tmp/register-student-v3
          python3 -m py_compile /tmp/register-student-v3/sealed_pack_v2.py
      - name: Generate fresh row-untouched pack with unlogged entropy
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import secrets
          import subprocess
          seed = secrets.randbits(63)
          subprocess.run([
              'python3', '/tmp/register-student-v3/sealed_pack_v2.py',
              '--out', 'artifacts/sealed-register-pack-v3/sealed-pack-v3.json',
              '--seed', str(seed),
          ], check=True)
          PY
          sha256sum artifacts/sealed-register-pack-v3/* > artifacts/sealed-register-pack-v3/SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sealed-register-pack-v3-${{ github.sha }}
          path: artifacts/sealed-register-pack-v3
          if-no-files-found: error
          retention-days: 14

  package-v3-candidate:
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Download immutable learned v2 weights and opened v2 development evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/register-candidate-v3 /tmp/v2-candidate /tmp/v2-development
          curl --fail --location --retry 3 -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/Pokitomas/theawesomehexapp/actions/artifacts/8485232165/zip' -o /tmp/v2-candidate.zip
          curl --fail --location --retry 3 -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/Pokitomas/theawesomehexapp/actions/artifacts/8485326629/zip' -o /tmp/v2-development.zip
          echo '6250efeb12395d3b12f895cbff08a2116300fea75051c23a567e1aedf8fccc41  /tmp/v2-candidate.zip' | sha256sum -c -
          echo 'ed3dd0f28a60c7cf74a94931a6546b482de03938ce4ea228d42735b4b8cea71d  /tmp/v2-development.zip' | sha256sum -c -
          unzip -q /tmp/v2-candidate.zip -d /tmp/v2-candidate
          unzip -q /tmp/v2-development.zip -d /tmp/v2-development
          cp /tmp/v2-candidate/* artifacts/register-candidate-v3/
          cp /tmp/v2-development/judge-input.json artifacts/register-candidate-v3/development-input.json
      - name: Apply frozen generic compositional repair
        shell: bash
        run: |
          set -euo pipefail
          python3 foundry/archie-protocol/register_student/v3/patch_register_v3.py \
            artifacts/register-candidate-v3/register-student-core.mjs \
            /tmp/register-student-core-v3.mjs
          mv /tmp/register-student-core-v3.mjs artifacts/register-candidate-v3/register-student-core.mjs
          echo '7a7f4619a9bb300ff5e690970663373d974fb0584a3b6b975cb1858f223a18b0  artifacts/register-candidate-v3/register-student-model.json' | sha256sum -c -
          echo '828980422423c40a6a858e0f64217db03cc326a5530d24dac5fbff5b8aeeccd4  artifacts/register-candidate-v3/register-student-model.mjs' | sha256sum -c -
          echo '98c81fd2a83b70686155027d830372ca35852918d81b27b75e411ef423fd1e71  artifacts/register-candidate-v3/register-student-core.mjs' | sha256sum -c -
          node --check artifacts/register-candidate-v3/register-student-core.mjs
      - name: Select v3 only on opened development evidence
        shell: bash
        run: |
          set -euo pipefail
          node foundry/archie-protocol/register_student/v3/evaluate_register_v3.mjs \
            artifacts/register-candidate-v3 \
            artifacts/register-candidate-v3/development-input.json \
            artifacts/register-candidate-v3/development-evaluation.json
      - name: Bind v3 package lineage
        shell: bash
        env:
          CANDIDATE_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          root = Path('artifacts/register-candidate-v3')
          sha = lambda p: hashlib.sha256((root / p).read_bytes()).hexdigest()
          manifest = {
              'schema': 'archie-register-v3-candidate-manifest/v1',
              'candidate_id': 'archie-register-student-v3-compositional-20260721',
              'candidate_head_sha': os.environ['CANDIDATE_HEAD_SHA'],
              'learned_weight_source': {
                  'actions_run': 29804688331,
                  'artifact_id': 8485232165,
                  'artifact_digest': 'sha256:6250efeb12395d3b12f895cbff08a2116300fea75051c23a567e1aedf8fccc41',
                  'model_json_sha256': sha('register-student-model.json'),
                  'model_module_sha256': sha('register-student-model.mjs'),
                  'training_receipt_sha256': sha('training-receipt.json'),
              },
              'controller': {
                  'source_sha256': '4d0c382fd384b51dd53ce4b04c5b252e8814c45b0012de802b411c4a98b9ec3d',
                  'v3_sha256': sha('register-student-core.mjs'),
                  'weights_changed': False,
                  'repair_scope': ['correction-boundary', 'ordered-clause-boundary'],
              },
              'development_evidence': {
                  'opened_v2_artifact_id': 8485326629,
                  'opened_v2_artifact_digest': 'sha256:ed3dd0f28a60c7cf74a94931a6546b482de03938ce4ea228d42735b4b8cea71d',
                  'evaluation_sha256': sha('development-evaluation.json'),
              },
              'fresh_v3_pack_received': False,
              'promotion': 'pending-fresh-judge',
          }
          (root / 'candidate-v3-manifest.json').write_text(json.dumps(manifest, indent=2) + '\n')
          PY
          sha256sum artifacts/register-candidate-v3/* > artifacts/register-candidate-v3/SHA256SUMS.v3
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: register-candidate-v3-${{ github.sha }}
          path: artifacts/register-candidate-v3
          if-no-files-found: error
          retention-days: 14

  judge-v3-candidate:
    needs: [seal-v3-pack, package-v3-candidate]
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sealed-register-pack-v3-${{ github.sha }}
          path: artifacts/sealed-register-pack-v3
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: register-candidate-v3-${{ github.sha }}
          path: artifacts/register-candidate-v3
      - name: Decode exact pre-frozen judge
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/register-student-v3 artifacts/register-admission-v3
          cat foundry/archie-protocol/register_student/bundles/v2-toolchain.tar.gz.b64.part* | base64 -d > /tmp/v2-toolchain.tar.gz
          echo '641820a60427a8f5b816463f95527494c9c16b81397012107f3c1ef3c831782b  /tmp/v2-toolchain.tar.gz' | sha256sum -c -
          tar -xzf /tmp/v2-toolchain.tar.gz -C /tmp/register-student-v3
          cp /tmp/register-student-v3/train_full_budget.py /tmp/register-student-v3/train_full_budget_v2.py
          cp artifacts/register-candidate-v3/register-student-core.mjs foundry/archie-protocol/register_student/register-student-core.mjs
          python3 -m py_compile /tmp/register-student-v3/train_full_budget.py /tmp/register-student-v3/train_full_budget_v2.py /tmp/register-student-v3/judge_candidate.py
          node --check foundry/archie-protocol/register_student/register-student-core.mjs
      - name: Install judge stack
        run: python3 -m pip install --disable-pip-version-check --no-input numpy scipy scikit-learn
      - name: Open fresh v3 pack only after package is fixed
        shell: bash
        run: |
          set +e
          python3 /tmp/register-student-v3/judge_candidate.py \
            --repo . \
            --candidate artifacts/register-candidate-v3 \
            --pack artifacts/sealed-register-pack-v3/sealed-pack-v3.json \
            --pack-manifest artifacts/sealed-register-pack-v3/sealed-pack-v3.json.manifest.json \
            --legacy-dir foundry/archie-protocol/neural/data \
            --resource-seconds 60 \
            --out artifacts/register-admission-v3 \
            2>&1 | tee artifacts/register-admission-v3/judge.log
          echo "${PIPESTATUS[0]}" > artifacts/register-admission-v3/JUDGE_EXIT_CODE
          set -e
      - name: Execute protected product suites only after repository judge admission
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f artifacts/register-admission-v3/promotion.json ]; then
            printf '{"executed":false,"passed":false,"reason":"judge-receipt-missing"}\n' > artifacts/register-admission-v3/protected-tests.json
            exit 0
          fi
          ADMITTED="$(node -e "const p=require('./artifacts/register-admission-v3/promotion.json'); process.stdout.write(String(p.admitted))")"
          if [ "$ADMITTED" != true ]; then
            printf '{"executed":false,"passed":false,"reason":"repository-judge-blocked"}\n' > artifacts/register-admission-v3/protected-tests.json
            exit 0
          fi
          cp artifacts/register-admission-v3/register-student-core.mjs archie-operator/register-student-core.mjs
          cp artifacts/register-admission-v3/register-student-model.mjs archie-operator/register-student-model.mjs
          cp artifacts/register-admission-v3/register-router.mjs archie-operator/register-router.mjs
          npm ci --ignore-scripts
          set +e
          npm run test:archie:baseline > artifacts/register-admission-v3/protected-baseline.log 2>&1; BASELINE=$?
          npm run test:archie:completion > artifacts/register-admission-v3/protected-completion.log 2>&1; COMPLETION=$?
          npm run test:archie:admission > artifacts/register-admission-v3/protected-admission.log 2>&1; ADMISSION=$?
          set -e
          node - "$BASELINE" "$COMPLETION" "$ADMISSION" > artifacts/register-admission-v3/protected-tests.json <<'NODE'
          const [baseline, completion, admission] = process.argv.slice(2).map(Number);
          process.stdout.write(JSON.stringify({executed:true,passed:baseline===0&&completion===0&&admission===0,exit_codes:{baseline,completion,admission}},null,2)+'\n');
          NODE
      - name: Bind judge evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          cp artifacts/register-candidate-v3/candidate-v3-manifest.json artifacts/register-admission-v3/
          sha256sum artifacts/register-admission-v3/* > artifacts/register-admission-v3/SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: register-admission-v3-${{ github.sha }}
          path: artifacts/register-admission-v3
          if-no-files-found: error
          retention-days: 14

  reproduce-v3-runtime:
    needs: [package-v3-candidate]
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: register-candidate-v3-${{ github.sha }}
          path: artifacts/register-candidate-v3
      - name: Reproduce exact JavaScript behavior on macOS
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/register-reproduction-v3
          node foundry/archie-protocol/register_student/v3/evaluate_register_v3.mjs \
            artifacts/register-candidate-v3 \
            artifacts/register-candidate-v3/development-input.json \
            artifacts/register-reproduction-v3/development-evaluation.macos.json
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import { pathToFileURL } from 'node:url';
          const model=(await import(pathToFileURL(process.cwd()+'/artifacts/register-candidate-v3/register-student-model.mjs'))).REGISTER_STUDENT_MODEL;
          const core=await import(pathToFileURL(process.cwd()+'/artifacts/register-candidate-v3/register-student-core.mjs'));
          const controller=core.createRegisterStudentController(model);
          const start=performance.now(); let predictions=0;
          while(performance.now()-start<15000){controller.predict('Build a rollback-aware plan, and afterward draft the stakeholder update.',{});predictions++;}
          const receipt={schema:'archie-register-v3-second-environment/v1',passed:true,os:process.platform,arch:process.arch,node:process.version,duration_ms:performance.now()-start,predictions,rss_bytes:process.memoryUsage().rss};
          fs.writeFileSync('artifacts/register-reproduction-v3/reproduction.json',JSON.stringify(receipt,null,2)+'\n');
          NODE
          sha256sum artifacts/register-reproduction-v3/* > artifacts/register-reproduction-v3/SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: register-reproduction-v3-${{ github.sha }}
          path: artifacts/register-reproduction-v3
          if-no-files-found: error
          retention-days: 14

  terminal-v3-decision:
    needs: [judge-v3-candidate, reproduce-v3-runtime]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: register-admission-v3-${{ github.sha }}
          path: artifacts/register-admission-v3
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: register-reproduction-v3-${{ github.sha }}
          path: artifacts/register-reproduction-v3
      - name: Emit truthful terminal decision
        shell: bash
        env:
          CANDIDATE_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/register-terminal-v3
          node <<'NODE'
          const fs=require('fs');
          const read=(p,fallback)=>fs.existsSync(p)?JSON.parse(fs.readFileSync(p,'utf8')):fallback;
          const promotion=read('artifacts/register-admission-v3/promotion.json',{admitted:false,blockers:['judge-receipt-missing']});
          const protectedTests=read('artifacts/register-admission-v3/protected-tests.json',{executed:false,passed:false,reason:'protected-receipt-missing'});
          const reproduction=read('artifacts/register-reproduction-v3/reproduction.json',{passed:false});
          const independentHidden={passed:false,reason:'pack rows were withheld from candidate selection, but evaluator authorship and execution were not organizationally independent of the training branch'};
          const terminal={
            schema:'archie-register-v3-terminal-decision/v1',
            candidate_head_sha:process.env.CANDIDATE_HEAD_SHA,
            repository_judge_admitted:promotion.admitted===true,
            repository_judge_blockers:promotion.blockers||[],
            protected_tests:protectedTests,
            second_environment:reproduction,
            independent_judge_only_hidden_evaluation:independentHidden,
            final_promotion_eligible:promotion.admitted===true&&protectedTests.passed===true&&reproduction.passed===true&&independentHidden.passed===true,
            promotion:'not-admitted',
            production_changed:false
          };
          fs.writeFileSync('artifacts/register-terminal-v3/terminal-decision.json',JSON.stringify(terminal,null,2)+'\n');
          NODE
          cp artifacts/register-admission-v3/admission-report.json artifacts/register-terminal-v3/ 2>/dev/null || true
          cp artifacts/register-admission-v3/candidate-v3-manifest.json artifacts/register-terminal-v3/ 2>/dev/null || true
          cp artifacts/register-reproduction-v3/reproduction.json artifacts/register-terminal-v3/ 2>/dev/null || true
          sha256sum artifacts/register-terminal-v3/* > artifacts/register-terminal-v3/SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: register-terminal-v3-${{ github.sha }}
          path: artifacts/register-terminal-v3
          if-no-files-found: error
          retention-days: 14
