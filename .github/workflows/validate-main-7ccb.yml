name: Validate exact main 7ccb

on:
  push:
    branches:
      - agent/validate-main-7ccb
    paths:
      - .github/workflows/validate-main-7ccb.yml

permissions:
  contents: write

concurrency:
  group: validate-main-7ccb
  cancel-in-progress: false

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Restore exact main tree before validation
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "7ccb6fac867ba77484a172be7a7973bc847b796e"
          rm .github/workflows/validate-main-7ccb.yml
          git diff --check

      - name: Install locked dependencies
        run: npm ci

      - name: Run complete repository gates
        shell: bash
        run: |
          set -euo pipefail
          npm run test:native-maker
          npm run test:maker
          npm run benchmark:archie:derive
          npm run benchmark:archie
          npm run test:foundry
          npm run test:weave
          npm run test:recursive-weave
          npm run test:remote
          npm run test:ingestion
          npm run test:social
          npm run test:authority
          npm run verify:quality
          npm run verify:ranking
          npm run verify:operations
          npm run verify:release
          npm run verify:frankenstate
          npm run verify:repository
          git diff --check

      - name: Publish byte-identical validation receipt
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(git diff --name-only 7ccb6fac867ba77484a172be7a7973bc847b796e -- . ':!.github/workflows/validate-main-7ccb.yml')"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/validate-main-7ccb.yml
          git commit -m "test: validate exact main 7ccb complete gates"
          git push origin HEAD:${GITHUB_REF_NAME}
