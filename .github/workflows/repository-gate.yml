name: Verify exact repository tree

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-gate-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked runtime dependencies
        run: npm ci --ignore-scripts
      - name: Verify exact repository tree
        shell: bash
        env:
          CANDIDATE_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REPOSITORY_VERIFICATION_RECEIPT: repository-verification.json
        run: |
          set -o pipefail
          npm run verify:repository 2>&1 | tee repository-verification.log
      - name: Generate dependency and action provenance
        if: always()
        env:
          CANDIDATE_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node scripts/generate-supply-chain-inventory.mjs supply-chain-inventory.json
      - name: Upload exact-tree receipt, provenance, lock, workflow sources, and full log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: repository-verification-${{ github.sha }}
          path: |
            repository-verification.json
            repository-verification.log
            supply-chain-inventory.json
            package-lock.json
            .github/workflows
          if-no-files-found: error
          retention-days: 14

  seal-register-admission-pack-v3:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Decode exact pack generator base
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/register-student-v3 artifacts/sealed-register-pack-v3
          cat foundry/archie-protocol/register_student/bundles/v2-toolchain.tar.gz.b64.part* | base64 -d > /tmp/v2-toolchain.tar.gz
          echo '641820a60427a8f5b816463f95527494c9c16b81397012107f3c1ef3c831782b  /tmp/v2-toolchain.tar.gz' | sha256sum -c -
          tar -xzf /tmp/v2-toolchain.tar.gz -C /tmp/register-student-v3
          python3 -m py_compile /tmp/register-student-v3/sealed_pack_v2.py
      - name: Seal row-untouched v3 pack before repaired runtime is committed
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib, importlib.util, json
          from pathlib import Path
          source = Path('/tmp/register-student-v3/sealed_pack_v2.py')
          spec = importlib.util.spec_from_file_location('sealed_pack_base', source)
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          module.TOPICS = [
              'county floodplain map revision', 'regional blood bank courier redesign',
              'historic courthouse elevator outage', 'municipal tree nursery inventory reset',
              'public ferry ticketing migration', 'school district substitute staffing gap',
              'community theater fire inspection', 'rural ambulance radio coverage',
              'library makerspace ventilation repair', 'city snowplow parts allocation',
              'public housing boiler replacement', 'regional animal rescue transport',
              'college financial aid document backlog', 'harbor fuel dock safety review',
              'county foster care records transfer', 'public pool chemical monitoring',
              'storm debris collection routing', 'museum climate control retrofit',
              'neighborhood food hub cold storage', 'municipal election accessibility audit',
              'regional rail platform lighting repair', 'public health laboratory sample intake',
              'community broadband trench permit', 'school roof warranty claim',
              'county wildfire evacuation registry', 'historic cemetery drainage restoration',
              'city sidewalk trip-hazard survey', 'regional vaccine refrigerator replacement',
              'public defender evidence portal migration', 'community center acoustic renovation',
          ]
          seed = 20260722
          rows = module.build(seed)
          for row in rows:
              row['id'] = row['id'].replace('v2-', 'v3-', 1)
          out = Path('artifacts/sealed-register-pack-v3/sealed-pack-v3.json')
          payload = (json.dumps(rows, indent=2, sort_keys=True) + '\n').encode()
          out.write_bytes(payload)
          manifest = {
              'schema': 'archie-register-sealed-admission-pack/v3',
              'rows': len(rows),
              'sha256': hashlib.sha256(payload).hexdigest(),
              'seed_commitment': hashlib.sha256(str(seed).encode()).hexdigest(),
              'generated_before_training': True,
              'access_contract': 'seal-v3 job only; repaired runtime artifact is not committed until this artifact is sealed; judge opens only after candidate artifact is fixed',
              'lexical_relation': 'row-untouched recombination pack with topics disjoint from v1 and v2; structural phrase families retained to verify repaired controller boundaries',
          }
          out.with_suffix(out.suffix + '.manifest.json').write_text(json.dumps(manifest, indent=2, sort_keys=True) + '\n')
          print(json.dumps(manifest, indent=2))
          PY
          sha256sum artifacts/sealed-register-pack-v3/* > artifacts/sealed-register-pack-v3/SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sealed-register-admission-pack-v3-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/sealed-register-pack-v3
          if-no-files-found: error
          retention-days: 14
