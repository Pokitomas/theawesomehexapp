name: Verify exact repository tree

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: repository-gate-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked runtime dependencies
        run: npm ci --ignore-scripts
      - name: Verify exact repository tree
        shell: bash
        env:
          CANDIDATE_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REPOSITORY_VERIFICATION_RECEIPT: repository-verification.json
        run: |
          set -o pipefail
          npm run verify:repository 2>&1 | tee repository-verification.log
      - name: Generate dependency and action provenance
        if: always()
        env:
          CANDIDATE_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node scripts/generate-supply-chain-inventory.mjs supply-chain-inventory.json
      - name: Upload exact-tree receipt, provenance, lock, workflow sources, and full log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: repository-verification-${{ github.sha }}
          path: |
            repository-verification.json
            repository-verification.log
            supply-chain-inventory.json
            package-lock.json
            .github/workflows
          if-no-files-found: error
          retention-days: 14

  judge-register-student-v3:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Download immutable trained weights and pre-committed sealed v3 pack
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/register-candidate-v3 artifacts/sealed-register-pack-v3 artifacts/register-admission-v3
          curl --fail --location --retry 3 -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/Pokitomas/theawesomehexapp/actions/artifacts/8485232165/zip' -o /tmp/candidate.zip
          curl --fail --location --retry 3 -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/Pokitomas/theawesomehexapp/actions/artifacts/8485464028/zip' -o /tmp/sealed-pack-v3.zip
          unzip -q /tmp/candidate.zip -d artifacts/register-candidate-v3
          unzip -q /tmp/sealed-pack-v3.zip -d artifacts/sealed-register-pack-v3
          test -f artifacts/register-candidate-v3/register-student-model.json
          test -f artifacts/register-candidate-v3/register-student-model.mjs
          test -f artifacts/sealed-register-pack-v3/sealed-pack-v3.json
          test -f artifacts/sealed-register-pack-v3/sealed-pack-v3.json.manifest.json
      - name: Reconstruct and bind repaired controller
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/register-student-v3 foundry/archie-protocol/register_student
          cat foundry/archie-protocol/register_student/bundles/register-student-core-v3.mjs.gz.b64.part* | base64 -d | gzip -d > foundry/archie-protocol/register_student/register-student-core.mjs
          echo '16f79047291b47c721d2f8ca89b6d0b198e6726cedf8d4112f5150d00d5cb0d4  foundry/archie-protocol/register_student/register-student-core.mjs' | sha256sum -c -
          node --check foundry/archie-protocol/register_student/register-student-core.mjs
          cat foundry/archie-protocol/register_student/bundles/v2-toolchain.tar.gz.b64.part* | base64 -d > /tmp/v2-toolchain.tar.gz
          echo '641820a60427a8f5b816463f95527494c9c16b81397012107f3c1ef3c831782b  /tmp/v2-toolchain.tar.gz' | sha256sum -c -
          tar -xzf /tmp/v2-toolchain.tar.gz -C /tmp/register-student-v3
          cp /tmp/register-student-v3/train_full_budget.py /tmp/register-student-v3/train_full_budget_v2.py
          python3 -m py_compile /tmp/register-student-v3/train_full_budget.py /tmp/register-student-v3/train_full_budget_v2.py /tmp/register-student-v3/judge_candidate.py
          node <<'NODE'
          const fs=require('fs'); const crypto=require('crypto');
          const sha=p=>crypto.createHash('sha256').update(fs.readFileSync(p)).digest('hex');
          const binding={
            schema:'archie-register-student-runtime-binding/v3',
            trained_weights_artifact_id:8485232165,
            sealed_admission_artifact_id:8485464028,
            model_json_sha256:sha('artifacts/register-candidate-v3/register-student-model.json'),
            model_module_sha256:sha('artifacts/register-candidate-v3/register-student-model.mjs'),
            controller_sha256:sha('foundry/archie-protocol/register_student/register-student-core.mjs'),
            controller_source_commit:process.env.GITHUB_SHA,
            weight_mutation_after_v2_training:false,
            sealed_pack_created_before_controller_commit:true
          };
          fs.writeFileSync('artifacts/register-admission-v3/candidate-runtime-binding.json',JSON.stringify(binding,null,2)+'\n');
          NODE
      - name: Install independent evaluation stack
        run: python3 -m pip install --disable-pip-version-check --no-input numpy scipy scikit-learn
      - name: Open sealed v3 pack and execute independent admission
        shell: bash
        run: |
          set +e
          python3 /tmp/register-student-v3/judge_candidate.py \
            --repo . \
            --candidate artifacts/register-candidate-v3 \
            --pack artifacts/sealed-register-pack-v3/sealed-pack-v3.json \
            --pack-manifest artifacts/sealed-register-pack-v3/sealed-pack-v3.json.manifest.json \
            --legacy-dir foundry/archie-protocol/neural/data \
            --resource-seconds 60 \
            --out artifacts/register-admission-v3 \
            2>&1 | tee artifacts/register-admission-v3/judge.log
          echo "${PIPESTATUS[0]}" > artifacts/register-admission-v3/JUDGE_EXIT_CODE
          set -e
          cp artifacts/register-candidate-v3/register-student-model.json artifacts/register-admission-v3/
      - name: Execute protected Archie suites only for independently admitted candidate
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f artifacts/register-admission-v3/promotion.json ]; then
            printf '{"executed":false,"passed":false,"reason":"judge-receipt-missing"}\n' > artifacts/register-admission-v3/protected-tests.json
            exit 0
          fi
          ADMITTED="$(node -e "const p=require('./artifacts/register-admission-v3/promotion.json'); process.stdout.write(String(p.admitted))")"
          if [ "$ADMITTED" != true ]; then
            printf '{"executed":false,"passed":false,"reason":"independent-admission-blocked"}\n' > artifacts/register-admission-v3/protected-tests.json
            exit 0
          fi
          cp artifacts/register-admission-v3/register-student-core.mjs archie-operator/register-student-core.mjs
          cp artifacts/register-admission-v3/register-student-model.mjs archie-operator/register-student-model.mjs
          cp artifacts/register-admission-v3/register-router.mjs archie-operator/register-router.mjs
          npm ci --ignore-scripts
          set +e
          npm run test:archie:baseline > artifacts/register-admission-v3/protected-baseline.log 2>&1; BASELINE=$?
          npm run test:archie:completion > artifacts/register-admission-v3/protected-completion.log 2>&1; COMPLETION=$?
          npm run test:archie:admission > artifacts/register-admission-v3/protected-admission.log 2>&1; ADMISSION=$?
          set -e
          node - "$BASELINE" "$COMPLETION" "$ADMISSION" > artifacts/register-admission-v3/protected-tests.json <<'NODE'
          const [baseline,completion,admission]=process.argv.slice(2).map(Number);
          process.stdout.write(JSON.stringify({executed:true,passed:baseline===0&&completion===0&&admission===0,exit_codes:{baseline,completion,admission}},null,2)+'\n');
          NODE
      - name: Bind final promotion status
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');
          const read=(p,d)=>fs.existsSync(p)?JSON.parse(fs.readFileSync(p,'utf8')):d;
          const promotion=read('artifacts/register-admission-v3/promotion.json',{admitted:false,blockers:['judge-receipt-missing']});
          const protectedTests=read('artifacts/register-admission-v3/protected-tests.json',{executed:false,passed:false,reason:'protected-receipt-missing'});
          const binding=read('artifacts/register-admission-v3/candidate-runtime-binding.json',{});
          fs.writeFileSync('artifacts/register-admission-v3/final-promotion.json',JSON.stringify({...promotion,runtime_binding:binding,protected_tests:protectedTests,final_promotion_eligible:promotion.admitted===true&&protectedTests.passed===true},null,2)+'\n');
          NODE
          sha256sum artifacts/register-admission-v3/* > artifacts/register-admission-v3/SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: register-student-v3-admission-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/register-admission-v3
          if-no-files-found: error
          retention-days: 14
      - name: Enforce final promotion contract
        run: node -e "const p=require('./artifacts/register-admission-v3/final-promotion.json'); if(!p.final_promotion_eligible){console.error(JSON.stringify(p,null,2)); process.exit(1)}"
