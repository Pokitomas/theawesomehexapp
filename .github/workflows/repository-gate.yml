name: Verify exact repository tree

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: repository-gate-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked runtime dependencies
        run: npm ci --ignore-scripts
      - name: Verify exact repository tree
        shell: bash
        env:
          CANDIDATE_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REPOSITORY_VERIFICATION_RECEIPT: repository-verification.json
        run: |
          set -o pipefail
          npm run verify:repository 2>&1 | tee repository-verification.log
      - name: Generate dependency and action provenance
        if: always()
        env:
          CANDIDATE_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node scripts/generate-supply-chain-inventory.mjs supply-chain-inventory.json
      - name: Upload exact-tree receipt, provenance, lock, workflow sources, and full log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: repository-verification-${{ github.sha }}
          path: |
            repository-verification.json
            repository-verification.log
            supply-chain-inventory.json
            package-lock.json
            .github/workflows
          if-no-files-found: error
          retention-days: 14

  seal-register-admission-pack-v2:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Decode and verify v2 toolchain
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/register-student-v2
          cat foundry/archie-protocol/register_student/bundles/v2-toolchain.tar.gz.b64.part* | base64 -d > /tmp/v2-toolchain.tar.gz
          echo '641820a60427a8f5b816463f95527494c9c16b81397012107f3c1ef3c831782b  /tmp/v2-toolchain.tar.gz' | sha256sum -c -
          tar -xzf /tmp/v2-toolchain.tar.gz -C /tmp/register-student-v2
          python3 -m py_compile /tmp/register-student-v2/sealed_pack_v2.py
      - name: Seal fresh row-untouched full-runtime pack before v2 training
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/sealed-register-pack-v2
          python3 /tmp/register-student-v2/sealed_pack_v2.py \
            --out artifacts/sealed-register-pack-v2/sealed-pack-v2.json \
            --seed 991337
          sha256sum artifacts/sealed-register-pack-v2/* > artifacts/sealed-register-pack-v2/SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sealed-register-admission-pack-v2-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/sealed-register-pack-v2
          if-no-files-found: error
          retention-days: 14

  train-register-student-v2:
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Decode and verify v2 toolchain
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/register-student-v2 artifacts/register-candidate-v2
          cat foundry/archie-protocol/register_student/bundles/v2-toolchain.tar.gz.b64.part* | base64 -d > /tmp/v2-toolchain.tar.gz
          echo '641820a60427a8f5b816463f95527494c9c16b81397012107f3c1ef3c831782b  /tmp/v2-toolchain.tar.gz' | sha256sum -c -
          tar -xzf /tmp/v2-toolchain.tar.gz -C /tmp/register-student-v2
          cp /tmp/register-student-v2/register-student-core.mjs foundry/archie-protocol/register_student/register-student-core.mjs
          python3 -m py_compile /tmp/register-student-v2/train_full_budget.py
          node --check foundry/archie-protocol/register_student/register-student-core.mjs
      - name: Download the opened v1 pack as iterative evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/8484346458/zip" \
            --output /tmp/iterative-v1.zip
          mkdir -p /tmp/iterative-v1
          unzip -q /tmp/iterative-v1.zip -d /tmp/iterative-v1
          find /tmp/iterative-v1 -type f -maxdepth 3 -print
          test -f /tmp/iterative-v1/sealed-pack.json
      - name: Install CPU training stack
        run: python3 -m pip install --disable-pip-version-check --no-input numpy scipy scikit-learn
      - name: Train full-budget quantized register student v2
        shell: bash
        run: |
          set -euo pipefail
          AUDIT="$(find foundry/archie-protocol -type f -name 'route-train-v6.json' | head -n1)"
          CHALLENGE="$(find foundry/archie-protocol -type f -name 'blind-challenge-pack.frozen.json' | head -n1)"
          LEGACY_DIR='foundry/archie-protocol/neural/data'
          test -n "$AUDIT" && test -f "$AUDIT"
          test -n "$CHALLENGE" && test -f "$CHALLENGE"
          test -d "$LEGACY_DIR"
          /usr/bin/time -v python3 /tmp/register-student-v2/train_full_budget.py \
            --audit-corpus "$AUDIT" \
            --old-challenge "$CHALLENGE" \
            --legacy-dir "$LEGACY_DIR" \
            --iterative-pack /tmp/iterative-v1/sealed-pack.json \
            --synthetic 96000 \
            --max-features 32000 \
            --seed 20260721 \
            --out artifacts/register-candidate-v2 \
            2>&1 | tee artifacts/register-candidate-v2/training.log
          cp foundry/archie-protocol/register_student/register-student-core.mjs artifacts/register-candidate-v2/
          sha256sum artifacts/register-candidate-v2/* > artifacts/register-candidate-v2/SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: register-student-candidate-v2-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/register-candidate-v2
          if-no-files-found: error
          retention-days: 14

  judge-register-student-v2:
    needs: [seal-register-admission-pack-v2, train-register-student-v2]
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          name: sealed-register-admission-pack-v2-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/sealed-register-pack-v2
      - uses: actions/download-artifact@v4
        with:
          name: register-student-candidate-v2-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/register-candidate-v2
      - name: Decode and verify independent v2 judge and runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/register-student-v2 artifacts/register-admission-v2
          cat foundry/archie-protocol/register_student/bundles/v2-toolchain.tar.gz.b64.part* | base64 -d > /tmp/v2-toolchain.tar.gz
          echo '641820a60427a8f5b816463f95527494c9c16b81397012107f3c1ef3c831782b  /tmp/v2-toolchain.tar.gz' | sha256sum -c -
          tar -xzf /tmp/v2-toolchain.tar.gz -C /tmp/register-student-v2
          cp /tmp/register-student-v2/register-student-core.mjs foundry/archie-protocol/register_student/register-student-core.mjs
          python3 -m py_compile /tmp/register-student-v2/train_full_budget.py /tmp/register-student-v2/judge_candidate.py
          node --check foundry/archie-protocol/register_student/register-student-core.mjs
      - name: Install independent evaluation stack
        run: python3 -m pip install --disable-pip-version-check --no-input numpy scipy scikit-learn
      - name: Open fresh sealed pack only after candidate is fixed and judge admission
        shell: bash
        run: |
          set -euo pipefail
          python3 /tmp/register-student-v2/judge_candidate.py \
            --repo . \
            --candidate artifacts/register-candidate-v2 \
            --pack artifacts/sealed-register-pack-v2/sealed-pack-v2.json \
            --pack-manifest artifacts/sealed-register-pack-v2/sealed-pack-v2.json.manifest.json \
            --legacy-dir foundry/archie-protocol/neural/data \
            --resource-seconds 60 \
            --out artifacts/register-admission-v2 \
            2>&1 | tee artifacts/register-admission-v2/judge.log
      - name: Execute protected Archie suites against admitted v2 candidate in a temporary tree
        shell: bash
        run: |
          set -euo pipefail
          ADMITTED="$(node -e "const p=require('./artifacts/register-admission-v2/promotion.json'); process.stdout.write(String(p.admitted))")"
          if [ "$ADMITTED" != true ]; then
            printf '{"executed":false,"reason":"independent-admission-blocked"}\n' > artifacts/register-admission-v2/protected-tests.json
            exit 0
          fi
          cp artifacts/register-admission-v2/register-student-core.mjs archie-operator/register-student-core.mjs
          cp artifacts/register-admission-v2/register-student-model.mjs archie-operator/register-student-model.mjs
          cp artifacts/register-admission-v2/register-router.mjs archie-operator/register-router.mjs
          npm ci --ignore-scripts
          set +e
          npm run test:archie:baseline > artifacts/register-admission-v2/protected-baseline.log 2>&1
          BASELINE=$?
          npm run test:archie:completion > artifacts/register-admission-v2/protected-completion.log 2>&1
          COMPLETION=$?
          npm run test:archie:admission > artifacts/register-admission-v2/protected-admission.log 2>&1
          ADMISSION=$?
          set -e
          node - "$BASELINE" "$COMPLETION" "$ADMISSION" > artifacts/register-admission-v2/protected-tests.json <<'NODE'
          const [baseline, completion, admission] = process.argv.slice(2).map(Number);
          process.stdout.write(JSON.stringify({
            executed: true,
            passed: baseline === 0 && completion === 0 && admission === 0,
            exit_codes: { baseline, completion, admission }
          }, null, 2) + '\n');
          NODE
          test "$BASELINE" -eq 0
          test "$COMPLETION" -eq 0
          test "$ADMISSION" -eq 0
      - name: Bind final v2 promotion status
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const promotion = JSON.parse(fs.readFileSync('artifacts/register-admission-v2/promotion.json', 'utf8'));
          const protectedPath = 'artifacts/register-admission-v2/protected-tests.json';
          const protectedTests = fs.existsSync(protectedPath) ? JSON.parse(fs.readFileSync(protectedPath, 'utf8')) : { executed: false, passed: false };
          const final = {
            ...promotion,
            protected_tests: protectedTests,
            final_promotion_eligible: promotion.admitted === true && protectedTests.passed === true
          };
          fs.writeFileSync('artifacts/register-admission-v2/final-promotion.json', JSON.stringify(final, null, 2) + '\n');
          NODE
          sha256sum artifacts/register-admission-v2/* > artifacts/register-admission-v2/SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: register-student-admission-v2-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/register-admission-v2
          if-no-files-found: error
          retention-days: 14
