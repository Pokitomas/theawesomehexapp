name: Train Archie cognitive checkpoint

on:
  push:
    branches:
      - agent/archie-kimi-calibrated-distill-20260720
    paths:
      - 'foundry/archie-cognitive-app/**'
      - '.github/workflows/train-archie-cognitive.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: archie-cognitive-${{ github.ref }}
  cancel-in-progress: true

jobs:
  train-package-verify:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: foundry/archie-cognitive-app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install CPU training dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy torch --index-url https://download.pytorch.org/whl/cpu
      - name: Train the local controller
        run: |
          rm -rf artifacts/workflow-build
          python train_cognitive_router.py --output artifacts/workflow-build --epochs 2 --seed 3407
      - name: Package and restore checkpoint
        run: |
          rm -f artifacts/cognitive-router-v1/part-*.b64
          python package_checkpoint.py \
            --model artifacts/workflow-build/cognitive-router.pt \
            --out artifacts/cognitive-router-v1 \
            --part-bytes 90000
          cp artifacts/workflow-build/training-receipt.json artifacts/cognitive-router-v1/training-receipt.json
          python restore_checkpoint.py \
            --artifact-dir artifacts/cognitive-router-v1 \
            --out artifacts/cognitive-router.pt
      - name: Verify runtime contract
        run: |
          python -m compileall -q .
          python -m unittest test_cognitive_router_app.py test_runtime_contract.py
      - name: Bind release receipt to workflow artifact
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('artifacts/cognitive-router-v1')
          manifest = json.loads((root / 'manifest.json').read_text())
          training = json.loads((root / 'training-receipt.json').read_text())
          receipt_path = root / 'release-receipt.json'
          receipt = json.loads(receipt_path.read_text())
          receipt['model_sha256'] = manifest['sha256']
          receipt['architecture']['checkpoint_bytes'] = manifest['bytes']
          receipt['training'] = training
          receipt['workflow'] = {
              'run_id': '${{ github.run_id }}',
              'run_attempt': '${{ github.run_attempt }}',
              'commit': '${{ github.sha }}',
              'runner': 'ubuntu-latest',
          }
          receipt_path.write_text(json.dumps(receipt, indent=2, sort_keys=True) + '\n')
          PY
      - name: Upload checkpoint artifact
        uses: actions/upload-artifact@v4
        with:
          name: archie-cognitive-router-v1
          path: |
            foundry/archie-cognitive-app/artifacts/cognitive-router.pt
            foundry/archie-cognitive-app/artifacts/cognitive-router-v1/
          if-no-files-found: error
      - name: Commit verified checkpoint parts
        run: |
          rm -rf artifacts/workflow-build artifacts/cognitive-router.pt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add artifacts/cognitive-router-v1
          if git diff --cached --quiet; then
            echo 'Checkpoint artifact already matches the branch.'
            exit 0
          fi
          git commit -m 'Package Linux-trained cognitive checkpoint [skip ci]'
          git push origin HEAD:${{ github.ref_name }}
