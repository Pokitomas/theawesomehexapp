name: Bootstrap Archie RSLoRA once

# Second default-branch revision activates this already-registered workflow.
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/bootstrap-archie-rslora-once.yml

permissions:
  actions: write
  contents: write
  issues: write

jobs:
  bootstrap:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      REQUEST_ID: pok-721-canonical-elastic-20260721
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0
      - name: Install one-request authority bridge
        id: bridge
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/archie-information-budgeted-rslora.yml')
          text = path.read_text(encoding='utf-8')
          old = "          if (String(process.env.GITHUB_ACTOR || '').toLowerCase() !== String(process.env.GITHUB_REPOSITORY_OWNER || '').toLowerCase()) missing.push('repository-owner actor');"
          new = """          const actor = String(process.env.GITHUB_ACTOR || '').toLowerCase();
          const owner = String(process.env.GITHUB_REPOSITORY_OWNER || '').toLowerCase();
          const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, 'utf8'));
          const boundedBotDispatch = actor === 'github-actions[bot]' && String(event.inputs?.request_id || '') === 'pok-721-canonical-elastic-20260721';
          if (actor !== owner && !boundedBotDispatch) missing.push('repository-owner actor or bounded one-shot dispatch');"""
          if old not in text:
              raise SystemExit('Canonical owner-authority line moved; refusing broad patch.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/archie-information-budgeted-rslora.yml
          git commit -m 'Authorize one bounded RSLoRA dispatch'
          git push origin HEAD:main
          printf 'sha=%s\n' "$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Dispatch canonical campaign
        run: |
          set -euo pipefail
          jq -n \
            --arg ref '${{ steps.bridge.outputs.sha }}' \
            --arg request_id "$REQUEST_ID" \
            '{ref:$ref,inputs:{request_id:$request_id,round:"0",shards:"2",rungs:"4",max_fused_rank:"64"}}' \
            | gh api --method POST "repos/${GITHUB_REPOSITORY}/actions/workflows/archie-information-budgeted-rslora.yml/dispatches" --input -
      - name: Capture run and remove bridge
        run: |
          set -euo pipefail
          sleep 12
          runs="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/archie-information-budgeted-rslora.yml/runs?event=workflow_dispatch&per_page=10")"
          run_id="$(jq -r --arg sha '${{ steps.bridge.outputs.sha }}' '.workflow_runs[] | select(.head_sha == $sha) | .id' <<<"$runs" | head -n1)"
          run_url="$(jq -r --arg sha '${{ steps.bridge.outputs.sha }}' '.workflow_runs[] | select(.head_sha == $sha) | .html_url' <<<"$runs" | head -n1)"
          status="$(jq -r --arg sha '${{ steps.bridge.outputs.sha }}' '.workflow_runs[] | select(.head_sha == $sha) | .status' <<<"$runs" | head -n1)"
          test -n "$run_id"
          git revert --no-edit '${{ steps.bridge.outputs.sha }}'
          git rm .github/workflows/bootstrap-archie-rslora-once.yml
          git commit -m 'Remove one-shot RSLoRA bootstrap'
          git push origin HEAD:main
          printf 'Canonical elastic RSLoRA execution dispatched.\n\nrequest_id: %s\nsource_sha: %s\nspecialists: 2\nrungs: 4\nfused_rank: 64\nrun: %s\nstatus: %s\n\nRun: %s\n\nThe one-request authority bridge was reverted immediately after dispatch. This remains not-admitted pending real CUDA evidence and independent reproduction.\n' "$REQUEST_ID" '${{ steps.bridge.outputs.sha }}' "$run_id" "$status" "$run_url" > /tmp/comment.md
          gh issue comment 721 --repo "$GITHUB_REPOSITORY" --body-file /tmp/comment.md
