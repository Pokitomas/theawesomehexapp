name: Export current manual source

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract all product layers
        run: |
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz
          cat general-overlay.part.* | base64 -d > general-overlay.tar.xz
          tar -xJf general-overlay.tar.xz
          python general/patch.py
          cat profile-overlay.part.* | base64 -d > profile-overlay.tar.xz
          tar -xJf profile-overlay.tar.xz
          python profile/patch.py
          cat manual-overlay.b64.part.* > manual-overlay.b64
          base64 -d manual-overlay.b64 > manual-overlay.tar.xz
          tar -xJf manual-overlay.tar.xz
          python manual/patch.py
      - name: Pack editable source
        run: |
          tar \
            --exclude='./.git' \
            --exclude='./*.part.*' \
            --exclude='./*.tar.xz' \
            --exclude='./manual-overlay.b64' \
            --exclude='./corpus' \
            --exclude='./dist' \
            -czf /tmp/current-root-manual-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: current-root-manual-source
          path: /tmp/current-root-manual-source.tar.gz
          retention-days: 1
