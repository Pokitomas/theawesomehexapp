name: Probe final live manual app

on:
  pull_request:
    paths:
      - '.github/workflows/probe-final-live.yml'

permissions:
  contents: read
  actions: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Wait for final main release and live assets
        env:
          GH_TOKEN: ${{ github.token }}
          FINAL_SHA: 961970a610813d40c0902eed4dc7a1f5281464b3
        run: |
          set -euo pipefail
          api() {
            curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              "$1"
          }
          push_id=''
          for attempt in $(seq 1 100); do
            runs=$(api "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$FINAL_SHA&per_page=20")
            push_id=$(echo "$runs" | jq -r '[.workflow_runs[] | select(.event=="push" and .name=="Build and deploy manual root-kernel feed")][0].id // empty')
            status=$(echo "$runs" | jq -r '[.workflow_runs[] | select(.event=="push" and .name=="Build and deploy manual root-kernel feed")][0].status // "missing"')
            conclusion=$(echo "$runs" | jq -r '[.workflow_runs[] | select(.event=="push" and .name=="Build and deploy manual root-kernel feed")][0].conclusion // ""')
            echo "release attempt=$attempt run=$push_id status=$status conclusion=$conclusion"
            if [ "$status" = completed ]; then
              if [ "$conclusion" != success ]; then
                jobs=$(api "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/$push_id/jobs?per_page=100")
                echo "$jobs" | jq '.jobs[] | {id,name,status,conclusion,steps:[.steps[]|{name,status,conclusion}]}'
                exit 1
              fi
              break
            fi
            sleep 15
          done
          [ -n "$push_id" ] || { echo 'main release run never appeared' >&2; exit 1; }

          base='https://pokitomas.github.io/theawesomehexapp/manual'
          for attempt in $(seq 1 40); do
            html=$(curl -fsSL --max-time 20 "$base/" || true)
            phone=$(curl -fsSL --max-time 20 "$base/import-phone.js" || true)
            studio=$(curl -fsSL --max-time 20 "$base/studio.css" || true)
            importer=$(curl -fsSL --max-time 20 "$base/import-studio.js" || true)
            if grep -q 'data-import-phone' <<<"$html" \
              && grep -q 'PICK MORE FILES' <<<"$phone" \
              && grep -q 'studio-product' <<<"$studio" \
              && grep -q 'PUT IN A REAL EXPORT' <<<"$importer"; then
              echo 'FINAL_LIVE=yes'
              echo 'MANUAL_URL=https://pokitomas.github.io/theawesomehexapp/manual/'
              echo 'DEBUG_URL=https://pokitomas.github.io/theawesomehexapp/manual/?debug=1&test=1&autorun=1'
              echo 'PHONE_PICKER=PICK MORE FILES'
              exit 0
            fi
            echo "Pages propagation attempt=$attempt"
            sleep 10
          done
          echo 'main release succeeded but final Pages assets did not propagate' >&2
          exit 1
