name: Probe final live manual app

on:
  pull_request:
    paths:
      - '.github/workflows/probe-final-live.yml'

permissions:
  contents: read
  actions: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Extract second full-build phone failure
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_JOB: '86771789611'
        run: |
          set -euo pipefail
          curl -fsSL -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/jobs/$BUILD_JOB/logs" \
            -o /tmp/build.log
          grep -n -E -A24 -B18 'Check manual gate and importer|locator\.waitFor|TimeoutError|##\[error\]|expected|missing|PICK MORE|FILES \+|addView|pageerror' /tmp/build.log | tail -220 || true
          echo '--- FINAL 120 LINES ---'
          tail -120 /tmp/build.log
