name: Archie full-budget promotion research

on:
  push:
    branches:
      - claude/archie-sprawl-training-5pe3i8
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Inventory router and admission evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/discovery
          {
            echo "HEAD=$(git rev-parse HEAD)"
            echo "NODE=$(node --version)"
            echo "PYTHON=$(python --version 2>&1)"
            echo
            echo "== candidate files =="
            find . -type f \
              \( -iname '*router*' -o -iname '*postfreeze*' -o -iname '*admission*' -o -iname '*factorized*' -o -iname '*register*' -o -iname '*evaluation*' \) \
              -not -path './.git/*' | sort
            echo
            echo "== postfreeze references =="
            grep -RIn --exclude-dir=.git --exclude='*.npz' --exclude='*.joblib' --exclude='*.json.b64' \
              -E 'postfreeze|310-case|310 case|294/310|register-aware|promotion:not-admitted|promotion.*not-admitted' . || true
            echo
            echo "== workflow files =="
            find .github/workflows -maxdepth 1 -type f -print | sort
            echo
            echo "== package admission commands =="
            node -e "const p=require('./package.json'); for(const [k,v] of Object.entries(p.scripts||{})) if(/archie.*(admission|evaluate|baseline|completion|architecture|intelligence)/i.test(k+' '+v)) console.log(k+'='+v)"
          } > artifacts/discovery/research-discovery.txt
          git ls-tree -r --name-only HEAD > artifacts/discovery/tree.txt
          sha256sum artifacts/discovery/* > artifacts/discovery/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: archie-promotion-discovery
          path: artifacts/discovery
          if-no-files-found: error
          retention-days: 7
