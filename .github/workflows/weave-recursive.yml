name: Verify recursive weave cognition

on:
  pull_request:
    paths:
      - scripts/weave-cognition.mjs
      - scripts/weave-memory.mjs
      - scripts/weave-deliberation.mjs
      - scripts/weave-dispatch.mjs
      - scripts/weave-synthesis.mjs
      - scripts/weave-recursive-runtime.mjs
      - scripts/weave-recursive-bridge.mjs
      - scripts/weave-recursive-bridge-runner.mjs
      - netlify/functions/weave-cognition-public.mjs
      - netlify/functions/weave-collective.mjs
      - scripts/tests/weave-recursive-baseline.test.mjs
      - scripts/tests/weave-public-projection.test.mjs
      - scripts/tests/weave-recursive-bridge.test.mjs
      - scripts/tests/weave-recursive-bridge-recovery.test.mjs
      - scripts/tests/recursive-weave-sprawl-contract.test.mjs
      - .github/workflows/weave-recursive.yml
      - netlify.toml
      - package.json
      - package-lock.json
      - WEAVE_PROTOCOL.md
  push:
    branches: [main]
    paths:
      - scripts/weave-cognition.mjs
      - scripts/weave-memory.mjs
      - scripts/weave-deliberation.mjs
      - scripts/weave-dispatch.mjs
      - scripts/weave-synthesis.mjs
      - scripts/weave-recursive-runtime.mjs
      - scripts/weave-recursive-bridge.mjs
      - scripts/weave-recursive-bridge-runner.mjs
      - netlify/functions/weave-cognition-public.mjs
      - netlify/functions/weave-collective.mjs
      - scripts/tests/weave-recursive-baseline.test.mjs
      - scripts/tests/weave-public-projection.test.mjs
      - scripts/tests/weave-recursive-bridge.test.mjs
      - scripts/tests/weave-recursive-bridge-recovery.test.mjs
      - scripts/tests/recursive-weave-sprawl-contract.test.mjs
      - .github/workflows/weave-recursive.yml
      - netlify.toml
      - package.json
      - package-lock.json
      - WEAVE_PROTOCOL.md
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: recursive-weave-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked runtime dependencies
        run: npm ci --ignore-scripts
      - name: Check recursive weave modules
        run: |
          node --check scripts/weave-cognition.mjs
          node --check scripts/weave-memory.mjs
          node --check scripts/weave-deliberation.mjs
          node --check scripts/weave-dispatch.mjs
          node --check scripts/weave-synthesis.mjs
          node --check scripts/weave-recursive-runtime.mjs
          node --check scripts/weave-recursive-bridge.mjs
          node --check scripts/weave-recursive-bridge-runner.mjs
          node --check netlify/functions/weave-cognition-public.mjs
          node --check netlify/functions/weave-collective.mjs
      - name: Verify belief graph preservation
        run: node --test --test-name-pattern='belief graph preserves' scripts/tests/weave-recursive-baseline.test.mjs
      - name: Verify hidden reasoning and dangling rejection
        run: node --test --test-name-pattern='hidden reasoning' scripts/tests/weave-recursive-baseline.test.mjs
      - name: Verify one-way resolution causality
        run: node --test --test-name-pattern='resolution backlinks are' scripts/tests/weave-recursive-baseline.test.mjs
      - name: Verify inconsistent resolution rejection
        run: node --test --test-name-pattern='inconsistent resolution' scripts/tests/weave-recursive-baseline.test.mjs
      - name: Verify immutable supersession projection
        run: node --test --test-name-pattern='supersession changes' scripts/tests/weave-recursive-baseline.test.mjs
      - name: Verify deliberation planning
        run: node --test --test-name-pattern='planner' scripts/tests/weave-recursive-baseline.test.mjs
      - name: Verify bounded memory
        run: node --test --test-name-pattern='memory' scripts/tests/weave-recursive-baseline.test.mjs
      - name: Verify advisory dispatch
        run: node --test --test-name-pattern='dispatch packets' scripts/tests/weave-recursive-baseline.test.mjs
      - name: Verify contradiction-erasure critic
        run: node --test --test-name-pattern='critic blocks' scripts/tests/weave-recursive-baseline.test.mjs
      - name: Verify non-accept critique recursion
        run: node --test --test-name-pattern='non-accept critique' scripts/tests/weave-recursive-baseline.test.mjs
      - name: Verify recursive runtime and replay
        run: node --test --test-name-pattern='recursive runtime|orphaned assignment|terminal receipt|invalid initial' scripts/tests/weave-recursive-baseline.test.mjs
      - name: Verify explicit public projection
        run: node --test --test-name-pattern='public projection is explicit' scripts/tests/weave-public-projection.test.mjs
      - name: Verify public dependency closure
        run: node --test --test-name-pattern='public closure drops' scripts/tests/weave-public-projection.test.mjs
      - name: Verify read-only collective endpoint
        run: node --test --test-name-pattern='collective endpoint reads' scripts/tests/weave-public-projection.test.mjs
      - name: Verify typed bridge envelopes
        run: node --test --test-name-pattern='trusted output parser' scripts/tests/weave-recursive-bridge.test.mjs
      - name: Verify shared bridge convergence
        run: node --test --test-name-pattern='one seed fans out' scripts/tests/weave-recursive-bridge.test.mjs
      - name: Verify untrusted seed rejection
        run: node --test --test-name-pattern='unauthorized seed' scripts/tests/weave-recursive-bridge.test.mjs
      - name: Verify private bridge fail-closed behavior
        run: node --test --test-name-pattern='private assignments' scripts/tests/weave-recursive-bridge.test.mjs
      - name: Verify bridge recovery
        run: node --test scripts/tests/weave-recursive-bridge-recovery.test.mjs
      - name: Verify finite sprawl graph
        run: node --test scripts/tests/recursive-weave-sprawl-contract.test.mjs
