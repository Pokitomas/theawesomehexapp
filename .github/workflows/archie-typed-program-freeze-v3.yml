name: Archie typed-program freeze v3

on:
  pull_request:
    branches:
      - agent/archie-register-v4-admission-20260720
  push:
    branches:
      - agent/archie-typed-program-student-v2-20260721
    paths:
      - foundry/archie-protocol/typed_program/blind_v3.part00
      - foundry/archie-protocol/typed_program/materialize_blind_v3.py
      - .github/workflows/archie-typed-program-freeze-v3.yml

permissions:
  contents: read

jobs:
  freeze:
    name: Freeze pre-repair typed-program blind v3
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Restore digest-bound blind generator
        run: python3 foundry/archie-protocol/typed_program/materialize_blind_v3.py

      - name: Generate entropy-seeded holdout
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/typed-program-blind-v3
          seed="$(python3 - <<'PY'
          import secrets
          print(secrets.randbits(63))
          PY
          )"
          python3 foundry/archie-protocol/typed_program/typed_program_blind_pack_v3.py \
            --out artifacts/typed-program-blind-v3/blind-pack-v3.json \
            --manifest artifacts/typed-program-blind-v3/blind-pack-v3.manifest.json \
            --seed "$seed" \
            --frozen-at-commit "$GITHUB_SHA"
          jq -e '.schema == "archie-typed-program-blind-pack/v3" and .rows == 2780 and .frozen_before_candidate_repair == true' \
            artifacts/typed-program-blind-v3/blind-pack-v3.manifest.json >/dev/null
          find artifacts/typed-program-blind-v3 -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > artifacts/typed-program-blind-v3/SHA256SUMS

      - name: Upload unopened frozen holdout
        uses: actions/upload-artifact@v4
        with:
          name: archie-typed-program-blind-v3-${{ github.run_id }}
          path: artifacts/typed-program-blind-v3
          if-no-files-found: error
          retention-days: 30
