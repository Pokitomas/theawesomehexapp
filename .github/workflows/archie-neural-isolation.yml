name: Self-contained Archie neural register experiment

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: archie-neural-self-contained-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  train:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Check out exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 1

      - name: Stop after evidence is committed
        id: already
        shell: bash
        run: |
          if [[ -f foundry/archie-protocol/neural/runs/npt-committed-authored-d128-seed424243-receipt.json && \
                -f foundry/archie-protocol/neural/runs/npt-committed-headsafe-d128-seed424243-receipt.json ]]; then
            echo "done=true" >> "$GITHUB_OUTPUT"
          else
            echo "done=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.already.outputs.done != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install numerical dependencies
        if: steps.already.outputs.done != 'true'
        run: python -m pip install --upgrade numpy scipy scikit-learn joblib

      - name: Build deterministic committed-data corpus
        if: steps.already.outputs.done != 'true'
        shell: bash
        run: |
          mkdir -p .tmp/empty-legacy
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import crypto from 'node:crypto';
          import { buildCorpus } from './foundry/archie-protocol/protocol-corpus.mjs';
          const corpus = buildCorpus();
          const rows = [...corpus.train, ...corpus.development, ...corpus.hard]
            .map(row => ({ prompt: row.prompt, route: row.intent, source: `protocol-corpus:${row.split}` }));
          const payload = JSON.stringify(rows, null, 2) + '\n';
          fs.mkdirSync('.tmp', { recursive: true });
          fs.writeFileSync('.tmp/committed-route-corpus.json', payload);
          const counts = Object.fromEntries([...new Set(rows.map(r => r.route))].sort()
            .map(route => [route, rows.filter(r => r.route === route).length]));
          const manifest = {
            schema: 'archie-committed-route-corpus/v1',
            source: 'foundry/archie-protocol/protocol-corpus.mjs',
            rows: rows.length,
            route_counts: counts,
            sha256: crypto.createHash('sha256').update(payload).digest('hex'),
            claim_boundary: 'Repository-authored prompts only. This is not run C\'s missing 925-row governed corpus.'
          };
          fs.writeFileSync('.tmp/committed-route-corpus.manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          console.log(JSON.stringify(manifest, null, 2));
          NODE

      - name: Verify trainer and protected-adaptation implementation
        if: steps.already.outputs.done != 'true'
        working-directory: foundry/archie-protocol/neural
        run: |
          python np_transformer.py --gradcheck
          python test_np_transformer.py
          python -m py_compile protected_finetune.py

      - name: Train committed authored-dominant checkpoint
        if: steps.already.outputs.done != 'true'
        run: |
          python foundry/archie-protocol/neural/np_transformer.py \
            --seed 424243 \
            --d 128 \
            --layers 2 \
            --heads 4 \
            --tmax 84 \
            --epochs 8 \
            --batch 64 \
            --lr 0.0022 \
            --drop 0.10 \
            --scale 3 \
            --real-rows .tmp/committed-route-corpus.json \
            --real-repeat 40 \
            --finetune-epochs 0 \
            --frozen-pack foundry/archie-protocol/factorized/blind-challenge-pack.frozen.json \
            --out foundry/archie-protocol/neural/runs \
            --tag npt-committed-authored-d128

      - name: Adapt only route head with replay and proximal protection
        if: steps.already.outputs.done != 'true'
        run: |
          python foundry/archie-protocol/neural/protected_finetune.py \
            --source-receipt foundry/archie-protocol/neural/runs/npt-committed-authored-d128-seed424243-receipt.json \
            --source-weights foundry/archie-protocol/neural/runs/npt-committed-authored-d128-seed424243.npz \
            --real-rows .tmp/committed-route-corpus.json \
            --legacy-dir .tmp/empty-legacy \
            --frozen-pack foundry/archie-protocol/factorized/blind-challenge-pack.frozen.json \
            --out foundry/archie-protocol/neural/runs \
            --tag npt-committed-headsafe-d128 \
            --epochs 4 \
            --batch 64 \
            --lr 0.0001 \
            --real-repeat 4 \
            --replay-ratio 1.0 \
            --proximal 0.001 \
            --label-smoothing 0.05

      - name: Write evidence and promotion decision
        if: steps.already.outputs.done != 'true'
        shell: bash
        run: |
          cp .tmp/committed-route-corpus.manifest.json foundry/archie-protocol/neural/runs/committed-route-corpus.manifest.json
          node foundry/archie-protocol/neural/compare-runs.mjs
          python - <<'PY'
          import json
          from pathlib import Path

          here = Path('foundry/archie-protocol/neural')
          runs = here / 'runs'
          names = {
              'B': 'npt-sw-d128-seed424243-receipt.json',
              'C': 'npt-realdom-d128-seed424243-receipt.json',
              'F': 'npt-committed-authored-d128-seed424243-receipt.json',
              'G': 'npt-committed-headsafe-d128-seed424243-receipt.json',
          }
          receipts = {key: json.loads((runs / name).read_text()) for key, name in names.items()}
          manifest = json.loads((runs / 'committed-route-corpus.manifest.json').read_text())

          def blind(key, field):
              return receipts[key]['results']['blind_429'][field]
          def pct(value):
              return f'{100 * value:.1f}%'

          rows = []
          for key in ('B', 'C', 'F', 'G'):
              receipt = receipts[key]
              rows.append({
                  'run': key,
                  'tag': receipt['tag'],
                  'blind_full': blind(key, 'full_accuracy'),
                  'blind_route': blind(key, 'route_accuracy'),
                  'conf_ok': blind(key, 'mean_confidence_correct'),
                  'conf_bad': blind(key, 'mean_confidence_incorrect'),
              })

          protection = receipts['G']['protection']
          selected_epoch = receipts['G']['config']['selected_epoch']
          best_key = max(('B', 'F', 'G'), key=lambda key: blind(key, 'full_accuracy'))
          promotion = 'not-admitted'
          summary = {
              'schema': 'archie-neural-self-contained-followup/v1',
              'exact_run_c_isolation': 'blocked-missing-source-assets',
              'missing_assets': [
                  {'name': 'run-C governed corpus', 'expected_rows': 925, 'retained': False},
                  {'name': 'router-v2-original-heldout.jsonl', 'retained': False},
                  {'name': 'router-real-v2-heldout.jsonl', 'retained': False},
                  {'name': 'router-real-v3-final.jsonl', 'retained': False},
                  {'name': 'Archie-Audit.zip', 'sha256': 'a190c28ceeb6292ae6857a6e885ec32810cf16737ad950826bfc70531d48bc15', 'retained': False},
              ],
              'committed_corpus': manifest,
              'runs': rows,
              'best_blind_run': best_key,
              'protected_bit_exact': protection['bit_exact'],
              'protected_digest': protection['protected_before_sha256'],
              'selected_epoch': selected_epoch,
              'promotion': promotion,
              'claim_boundary': 'Runs F/G are a new committed-data experiment, not a reconstruction of run C. Legacy admission suites were unavailable, so neither candidate can be promoted regardless of blind-pack performance.'
          }
          (runs / 'self-contained-followup-summary.json').write_text(json.dumps(summary, indent=2) + '\n')

          mechanisms = {
              'B': 'prior strongest transformer',
              'C': 'missing-corpus mix + damaging shared-trunk fine-tune',
              'F': 'repository-authored dominant mix; no post-hoc fine-tune',
              'G': 'F + route-head-only protected adaptation and replay',
          }
          lines = [
              '# Neural register-transfer follow-up',
              '',
              '## Exact isolation result',
              '',
              'The preregistered run-D reconstruction cannot be executed honestly: run C’s exact 925-row governed corpus, the three legacy JSONL suites, and the audit archive bytes were not retained. The run-C receipt stores only a truncated normalized training digest and vocabulary, which is insufficient to reconstruct its pre-fine-tune state. No substitute corpus is labeled as causal isolation.',
              '',
              '## New self-contained learned experiment',
              '',
              f"A deterministic {manifest['rows']}-row corpus was generated from committed `protocol-corpus.mjs` prompts and digest-bound as `{manifest['sha256']}`. It was weighted to dominate the mixed training distribution without a post-hoc shared-trunk fine-tune. Run G then adapted only the route head with replay and proximal anchoring.",
              '',
              '| run | mechanism | blind full | blind route | confidence correct / incorrect |',
              '|---|---|---:|---:|---|',
          ]
          for row in rows:
              lines.append(f"| {row['run']} `{row['tag']}` | {mechanisms[row['run']]} | {pct(row['blind_full'])} | {pct(row['blind_route'])} | {row['conf_ok']} / {row['conf_bad']} |")
          lines += [
              '',
              '## Findings',
              '',
              f"- Best blind-pack full accuracy among comparable learned runs B/F/G: **run {best_key} at {pct(blind(best_key, 'full_accuracy'))}**.",
              f"- Protected adaptation selected generated-dev epoch {selected_epoch}; every shared-trunk and auxiliary-head byte remained identical: `{protection['bit_exact']}` (`{protection['protected_before_sha256']}`).",
              f"- Run G changed blind full accuracy by {(blind('G', 'full_accuracy') - blind('F', 'full_accuracy')) * 100:+.1f} percentage points relative to F.",
              '- The missing legacy suites make admission impossible. Production remains unchanged and promotion remains `not-admitted`.',
              '',
              '## Reproducibility repair',
              '',
              'Future experimental receipts must retain or repository-address every training corpus and admission suite by content digest. A row count, vocabulary, or partial digest is not a reconstructible training input.',
              '',
          ]
          report = '\n'.join(lines)
          (here / 'NEURAL_ISOLATION.md').write_text(report)

          mastery = here / 'NEURAL_MASTERY.md'
          current = mastery.read_text()
          marker = '## Follow-up: source retention and protected adaptation'
          if marker not in current:
              current += f"\n\n{marker}\n\nSee `NEURAL_ISOLATION.md`. Exact run-C isolation is blocked because its external corpus and legacy suites were not retained. A separate committed-data run and digest-proven route-head-only adaptation were completed; promotion remains `{promotion}`.\n"
              mastery.write_text(current)
          print(report)
          PY

      - name: Commit permanent evidence and remove temporary workflow
        if: steps.already.outputs.done != 'true'
        shell: bash
        env:
          BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git config user.name "archie-neural-lab"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/archie-neural-isolation.yml
          git add foundry/archie-protocol/neural/runs \
                  foundry/archie-protocol/neural/NEURAL_ISOLATION.md \
                  foundry/archie-protocol/neural/NEURAL_MASTERY.md
          git commit -m "Complete self-contained neural follow-up [skip ci]"
          git push origin "HEAD:${BRANCH}"
