name: Prove manual gate on phone

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phone:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Build only the manual product
        run: |
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz
          cat general-overlay.part.* | base64 -d > general-overlay.tar.xz
          tar -xJf general-overlay.tar.xz
          python general/patch.py
          cat profile-overlay.part.* | base64 -d > profile-overlay.tar.xz
          tar -xJf profile-overlay.tar.xz
          python profile/patch.py
          cat manual-overlay.b64.part.* > manual-overlay.b64
          base64 -d manual-overlay.b64 > manual-overlay.tar.xz
          tar -xJf manual-overlay.tar.xz
          python manual/patch.py
          cat manual-kernel-overlay.b64.part.* > manual-kernel-overlay.b64
          base64 -d manual-kernel-overlay.b64 > manual-kernel-overlay.tar.xz
          tar -xJf manual-kernel-overlay.tar.xz
          python manual-kernel/patch.py
          cp manual-phone-check.mjs manual-kernel/phone-check.mjs
          python studio/manual/apply.py
          python studio/manual/verify.py
          mkdir -p dist/manual
          cp -a manual-app/. dist/manual/
      - name: Package exact built source for diagnosis
        run: |
          tar -czf /tmp/manual-kernel-built.tar.gz manual-app manual-kernel studio/manual dist/manual
      - name: Upload exact built source
        uses: actions/upload-artifact@v4
        with:
          name: manual-kernel-built
          path: /tmp/manual-kernel-built.tar.gz
          retention-days: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install browser driver
        run: |
          npm install --no-save playwright-core@1.55.0
          command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser
      - name: Prove exact kernel in twenty records
        run: node manual-kernel/verify-kernel.mjs
      - name: Prove gate, real taps, import, and quiescence at 390 by 844
        run: |
          python -m http.server 4173 --directory dist >/tmp/manual-http.log 2>&1 &
          server=$!
          trap 'kill $server || true' EXIT
          sleep 2
          set +e
          node manual-kernel/phone-check.mjs >phone-check.log 2>&1
          phone_status=$?
          node studio/manual/tests/onboarding-clickthrough.mjs http://127.0.0.1:4173/manual/ >touch-check.log 2>&1
          touch_status=$?
          set -e
          cat phone-check.log
          cat touch-check.log
          if [ "$phone_status" -ne 0 ] || [ "$touch_status" -ne 0 ]; then
            exit 1
          fi
      - name: Upload phone proof and diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-phone-gate-fast
          path: |
            manual-phone-gate.png
            manual-onboarding-phone.png
            manual-onboarding-touch.png
            phone-check.log
            touch-check.log
            /tmp/manual-http.log
          if-no-files-found: warn
          retention-days: 5
