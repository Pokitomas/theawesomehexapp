name: Prove manual gate on phone

on:
  push:
    branches: [main, agent/fun-posting-system]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  phone:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Build only the manual product
        run: |
          set -euo pipefail
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz
          cat general-overlay.part.* | base64 -d > general-overlay.tar.xz
          tar -xJf general-overlay.tar.xz
          python general/patch.py
          cat profile-overlay.part.* | base64 -d > profile-overlay.tar.xz
          tar -xJf profile-overlay.tar.xz
          python profile/patch.py
          cat manual-overlay.b64.part.* > manual-overlay.b64
          base64 -d manual-overlay.b64 > manual-overlay.tar.xz
          tar -xJf manual-overlay.tar.xz
          python manual/patch.py
          cat manual-kernel-overlay.b64.part.* > manual-kernel-overlay.b64
          base64 -d manual-kernel-overlay.b64 > manual-kernel-overlay.tar.xz
          tar -xJf manual-kernel-overlay.tar.xz
          python studio/manual/prepare-kernel.py
          python manual-kernel/patch.py
          cp manual-phone-check.mjs manual-kernel/phone-check.mjs
          python studio/manual/apply.py
          set +e
          python studio/manual/verify.py >/tmp/os-verify.log 2>&1
          verify_status=$?
          set -e
          cat /tmp/os-verify.log
          if [ "$verify_status" -ne 0 ]; then exit "$verify_status"; fi
          mkdir -p dist/manual
          cp -a manual-app/. dist/manual/
      - name: Upload verifier diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: os-verify-log
          path: /tmp/os-verify.log
          if-no-files-found: warn
          retention-days: 3
      - name: Package exact built source for diagnosis
        run: |
          tar -czf /tmp/manual-os-built.tar.gz manual-app manual-kernel studio/manual dist/manual coordination
      - name: Upload exact built source
        uses: actions/upload-artifact@v4
        with:
          name: manual-os-built
          path: /tmp/manual-os-built.tar.gz
          retention-days: 3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install browser driver
        run: |
          npm install --no-save playwright-core@1.55.0
          echo "CHROME_BIN=$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser)" >> "$GITHUB_ENV"
      - name: Prove exact kernel in twenty records
        run: node manual-kernel/verify-kernel.mjs
      - name: Prove workspace transactions and migration
        run: |
          python -m http.server 4174 --directory . >/tmp/workspace-http.log 2>&1 &
          server=$!
          trap 'kill $server || true' EXIT
          sleep 1
          node studio/manual/tests/workspace-model.mjs >workspace-check.log 2>&1
          cat workspace-check.log
      - name: Prove import workspace posting and persistence at 390 by 844
        run: |
          python -m http.server 4173 --directory dist >/tmp/manual-http.log 2>&1 &
          server=$!
          trap 'kill $server || true' EXIT
          sleep 2
          set +e
          node manual-kernel/phone-check.mjs >phone-check.log 2>&1
          phone_status=$?
          node studio/manual/tests/onboarding-clickthrough.mjs http://127.0.0.1:4173/manual/ >touch-check.log 2>&1
          touch_status=$?
          node studio/manual/tests/social-clickthrough.mjs http://127.0.0.1:4173/manual/ >social-check.log 2>&1
          social_status=$?
          set -e
          cat phone-check.log
          cat touch-check.log
          cat social-check.log
          if [ "$phone_status" -ne 0 ] || [ "$touch_status" -ne 0 ] || [ "$social_status" -ne 0 ]; then
            exit 1
          fi
      - name: Upload phone proof and diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-os-proof
          path: |
            manual-phone-gate.png
            manual-onboarding-phone.png
            manual-onboarding-touch.png
            manual-os-phone.png
            manual-os-desktop.png
            phone-check.log
            touch-check.log
            social-check.log
            workspace-check.log
            /tmp/os-verify.log
            /tmp/manual-http.log
            /tmp/workspace-http.log
          if-no-files-found: warn
          retention-days: 5
      - name: Report branch proof
        if: always() && github.ref == 'refs/heads/agent/fun-posting-system'
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 52,
              body: `BRANCH_PROOF run=${context.runId} sha=${context.sha} result=${process.env.JOB_STATUS}`
            });
