name: Map hosted Linux CPU workflow authority

on:
  pull_request:
    types: [synchronize]
    paths:
      - '.github/workflows/agent-patch-linux-cpu-training.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: agent/archie-information-budgeted-rslora
          persist-credentials: true
      - name: Add the read-only hosted CPU surface
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('audit/authority-manifest.workflow-projection.mjs')
          text = path.read_text(encoding='utf-8')
          old = """    s: [
              'workflow-permission:.github/workflows/archie-segmented-distillation.yml:contents:read',
              'workflow-permission:.github/workflows/archie-information-budgeted-rslora.yml:contents:read'
            ],"""
          if old not in text:
              old = """    s: [
              'workflow-permission:.github/workflows/archie-segmented-distillation.yml:contents:read',
              'workflow-permission:.github/workflows/archie-information-budgeted-rslora.yml:contents:read'
            ],""".replace("      'workflow", "  'workflow").replace("    ],", "  ],")
          new = old.replace(
              "'workflow-permission:.github/workflows/archie-information-budgeted-rslora.yml:contents:read'",
              "'workflow-permission:.github/workflows/archie-information-budgeted-rslora.yml:contents:read',\n    'workflow-permission:.github/workflows/archie-hosted-linux-cpu-training.yml:contents:read'"
          )
          if text.count(old) != 1:
              raise SystemExit(f'Expected one Archie distillation authority array, found {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          npm run test:authority
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add audit/authority-manifest.workflow-projection.mjs
          git commit -m 'Map hosted Linux CPU training authority'
          git push origin HEAD:agent/archie-information-budgeted-rslora
