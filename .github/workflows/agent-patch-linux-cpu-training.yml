name: Patch hosted Linux CPU training lane

on:
  pull_request:
    types: [synchronize]
    paths:
      - '.github/workflows/agent-patch-linux-cpu-training.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: agent/archie-information-budgeted-rslora
          persist-credentials: true
      - name: Apply hosted CPU patch and remove temporary authority
        run: |
          set -euo pipefail
          python scripts/apply_archie_linux_cpu_workflow_patch.py
          rm .github/workflows/agent-patch-linux-cpu-training.yml
          python -m py_compile foundry/archie-distill/linux_cpu_rslora_train.py
          python - <<'PY'
          import json, pathlib
          rows = [json.loads(line) for line in pathlib.Path('foundry/archie-distill/linux_cpu_training_corpus.jsonl').read_text().splitlines() if line.strip()]
          assert len(rows) == 20
          assert sum(row['split'] == 'train' for row in rows) == 16
          assert sum(row['split'] == 'development' for row in rows) == 4
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/archie-information-budgeted-rslora.yml .github/workflows/agent-patch-linux-cpu-training.yml
          git commit -m 'Run bounded RSLoRA training on hosted Linux CPUs'
          git push origin HEAD:agent/archie-information-budgeted-rslora
