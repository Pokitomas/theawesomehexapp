name: Patch hosted Linux CPU training lane

on:
  pull_request:
    types: [synchronize]
    paths:
      - '.github/workflows/agent-patch-linux-cpu-training.yml'

permissions:
  contents: read

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: agent/archie-information-budgeted-rslora
          persist-credentials: false
      - name: Render hosted CPU workflow patch
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_archie_linux_cpu_workflow_patch.py')
          text = path.read_text(encoding='utf-8')
          start = text.index('old_compile =')
          end = text.index("job = r'''", start)
          path.write_text(text[:start] + text[end:], encoding='utf-8')
          PY
          python scripts/apply_archie_linux_cpu_workflow_patch.py
          python -m py_compile foundry/archie-distill/linux_cpu_rslora_train.py
          python - <<'PY'
          import json, pathlib
          rows = [json.loads(line) for line in pathlib.Path('foundry/archie-distill/linux_cpu_training_corpus.jsonl').read_text().splitlines() if line.strip()]
          assert len(rows) == 20
          assert sum(row['split'] == 'train' for row in rows) == 16
          assert sum(row['split'] == 'development' for row in rows) == 4
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-hosted-cpu-workflow-patch
          path: .github/workflows/archie-information-budgeted-rslora.yml
          if-no-files-found: error
          retention-days: 1
