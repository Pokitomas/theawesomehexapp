name: Harden cognition Maker receipt gate

on:
  pull_request:
    branches:
      - main
    types: [synchronize]
    paths:
      - .recovery/harden-cognition-maker-receipt.patch
      - .github/workflows/harden-cognition-maker-receipt.yml

permissions:
  contents: write

concurrency:
  group: harden-cognition-maker-receipt-pr
  cancel-in-progress: false

jobs:
  apply-test-clean:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Quietly clone exact branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --quiet --depth 1 --branch revive/dead-instance-completion-20260717 \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo

      - name: Repair transport hunk metadata and apply exact receipt hardening
        shell: bash
        working-directory: repo
        run: |
          set -euo pipefail
          git config user.name 'Archie Recovery Bot'
          git config user.email 'archie-recovery@users.noreply.github.com'
          python - <<'PY'
          from pathlib import Path
          path = Path('.recovery/harden-cognition-maker-receipt.patch')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '@@ -259,9 +259,14 ': '@@ -259,9 +259,13 ',
              '@@ -459,16 +459,43 ': '@@ -459,21 +459,46 ',
              '@@ -97,7 +108,7 ': '@@ -97,6 +108,6 ',
              '@@ -122,7 +133,7 ': '@@ -122,6 +133,6 ',
              '@@ -131,10 +142,31 ': '@@ -131,9 +142,27 ',
              '@@ -154,9 +186,7 ': '@@ -154,9 +183,7 ',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'missing expected patch header: {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          for number, line in enumerate(text.splitlines(), 1):
              if line.startswith('@@'):
                  print(f'{number}: {line}')
          PY
          git apply --check --verbose .recovery/harden-cognition-maker-receipt.patch
          git apply --index .recovery/harden-cognition-maker-receipt.patch

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: repo/package-lock.json

      - name: Install exact dependencies
        working-directory: repo
        run: npm ci

      - name: Run focused cognition regressions
        working-directory: repo
        run: node --test scripts/tests/maker-archie-cognition.test.mjs

      - name: Run complete Archie and Maker matrix
        shell: bash
        working-directory: repo
        run: |
          set -euo pipefail
          npm run test:archie
          npm run test:maker
          npm run test:archie:learning
          npm run test:archie:persistent
          npm run test:archie:portable
          npm run test:archie:evaluation

      - name: Remove temporary hardening machinery and push tested tree
        shell: bash
        working-directory: repo
        run: |
          set -euo pipefail
          git rm .recovery/harden-cognition-maker-receipt.patch
          git rm .github/workflows/harden-cognition-maker-receipt.yml
          git commit -m '[skip hardening] Bind cognition learning to exact verified Maker receipts'
          git push origin HEAD:revive/dead-instance-completion-20260717
