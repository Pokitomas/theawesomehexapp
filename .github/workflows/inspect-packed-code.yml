name: Verify packed manual saturation kernel

on:
  pull_request:
    paths:
      - '.github/workflows/inspect-packed-code.yml'
      - '.github/workflows/pages.yml'
      - 'source.xz.part.*'
      - 'general-overlay.part.*'
      - 'profile-overlay.part.*'
      - 'manual-overlay.b64.part.*'
      - 'manual-kernel.b64.part.*'
      - 'verify-manual-edition.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unpack-and-prove:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Unpack every product layer
        run: |
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz
          cat general-overlay.part.* | base64 -d > general-overlay.tar.xz
          tar -xJf general-overlay.tar.xz
          python general/patch.py
          cat profile-overlay.part.* | base64 -d > profile-overlay.tar.xz
          tar -xJf profile-overlay.tar.xz
          python profile/patch.py
          cat manual-overlay.b64.part.* > manual-overlay.b64
          test "$(wc -c < manual-overlay.b64)" = "44760"
          echo "0d45c1ed47cdf73667f554e45c60c76f4fabd799fe7b4a0523dfa5adc58651d5  manual-overlay.b64" | sha256sum -c -
          base64 -d manual-overlay.b64 > manual-overlay.tar.xz
          echo "b18d2e3ca6dc53efb8286f3162aae6c8d6320875a8699346886c8621022c00af  manual-overlay.tar.xz" | sha256sum -c -
          tar -xJf manual-overlay.tar.xz
          python manual/patch.py

      - name: Install exact shared root kernel
        run: |
          cat manual-kernel.b64.part.* > manual-kernel.b64
          test "$(wc -c < manual-kernel.b64)" = "22272"
          echo "05db8297d3857a1d9a0036df2cde8642d72f74b1fe21b09c54d7313c20e48985  manual-kernel.b64" | sha256sum -c -
          base64 -d manual-kernel.b64 > manual-kernel.tar.xz
          echo "25a52fcf821c15fc06e659203a019b9a60339cc81b7cf1309b7a5fec510fb136  manual-kernel.tar.xz" | sha256sum -c -
          tar -xJf manual-kernel.tar.xz
          python manual-kernel/patch.py

      - name: Prove exact reuse and 20-record gate motion
        run: python manual-kernel/verify.py

      - name: Package inspectable source
        run: |
          python - <<'PY'
          from pathlib import Path
          import tarfile

          skip = {'.git', 'node_modules', 'corpus', 'data', 'media', '.cache'}
          suffixes = {'.js', '.mjs', '.py', '.html', '.css', '.json', '.md', '.yml', '.yaml'}
          with tarfile.open('packed-code.tar.gz', 'w:gz') as archive:
              for path in Path('.').rglob('*'):
                  if not path.is_file() or path.suffix.lower() not in suffixes:
                      continue
                  if any(part in skip for part in path.parts):
                      continue
                  if path.stat().st_size > 2_000_000:
                      continue
                  archive.add(path, arcname=path.as_posix())
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: packed-code
          path: packed-code.tar.gz
          if-no-files-found: error
          retention-days: 3
