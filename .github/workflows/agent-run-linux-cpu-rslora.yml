name: Execute Archie CPU RSLoRA now

on:
  pull_request:
    types: [synchronize]
    paths:
      - '.github/workflows/agent-run-linux-cpu-rslora.yml'

permissions:
  contents: read

jobs:
  train_deep:
    runs-on: ubuntu-24.04
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755
        with:
          python-version: '3.12'
      - name: Install CPU training packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.7.1
          python -m pip install transformers==4.53.2 peft==0.16.0 accelerate==1.8.1 safetensors==0.5.3
      - name: Execute deeper RSLoRA training
        continue-on-error: true
        run: |
          mkdir -p /tmp/archie-cpu-deep
          export HF_HOME=/tmp/huggingface
          export HF_HUB_DISABLE_TELEMETRY=1
          export TOKENIZERS_PARALLELISM=false
          export PYTHONUNBUFFERED=1
          set -o pipefail
          python foundry/archie-distill/linux_cpu_rslora_train.py \
            --lane deep-0.6b \
            --model Qwen/Qwen3-0.6B \
            --revision main \
            --dtype float32 \
            --corpus foundry/archie-distill/linux_cpu_training_corpus.jsonl \
            --output /tmp/archie-cpu-deep \
            --max-steps 32 \
            --train-limit 16 \
            --eval-limit 4 \
            --rank 16 \
            --alpha 32 \
            --learning-rate 0.00015 \
            --max-seq-length 128 \
            --prompt-replay-tokens 56 \
            --prompt-head-tokens 12 \
            --shared-prefix-replay-tokens 24 \
            --max-divergence-tokens 88 \
            --time-budget-minutes 270 \
            --threads 2 \
            --gradient-checkpointing 2>&1 | tee /tmp/archie-cpu-deep/run.log
      - name: Print returned receipt
        if: always()
        run: |
          find /tmp/archie-cpu-deep -maxdepth 3 -type f -print || true
          cat /tmp/archie-cpu-deep/training-receipt.json || true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: archie-cpu-deep-${{ github.run_id }}
          path: /tmp/archie-cpu-deep
          if-no-files-found: warn
          compression-level: 0
          retention-days: 30
