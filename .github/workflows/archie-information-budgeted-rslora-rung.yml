name: Run one Archie RSLoRA rung

on:
  workflow_call:
    inputs:
      runner_label:
        required: true
        type: string
      provider:
        required: true
        type: string
      training_python:
        required: true
        type: string
      training_config:
        required: true
        type: string
      student_model_dir:
        required: true
        type: string
      segment_artifact_name:
        required: true
        type: string
      predecessor_artifact_name:
        required: false
        default: ''
        type: string
      request_id:
        required: true
        type: string
      code_revision:
        required: true
        type: string
      shard:
        required: true
        type: number
      shard_name:
        required: true
        type: string
      rung:
        required: true
        type: number
      rung_count:
        required: true
        type: number

permissions:
  contents: read
  actions: read

jobs:
  train:
    runs-on: [self-hosted, linux, x64, "${{ inputs.runner_label }}"]
    timeout-minutes: 360
    env:
      PY: ${{ inputs.training_python }}
      CONFIG: ${{ inputs.training_config }}
      MODEL: ${{ inputs.student_model_dir }}
      PROFILE: maker/evaluations/archie-information-budgeted-rslora.json
      ARCHIE_COMPUTE_PROVIDER: ${{ inputs.provider }}
      ARCHIE_RUNNER_LABELS: self-hosted,linux,x64,${{ inputs.runner_label }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ inputs.code_revision }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ inputs.segment_artifact_name }}
          path: ${{ runner.temp }}/archie-ib-input
      - if: inputs.rung > 0
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ inputs.predecessor_artifact_name }}
          path: ${{ runner.temp }}/archie-elastic-previous
      - id: rung
        env:
          SEGMENTS: ${{ runner.temp }}/archie-ib-input/segments
          RESUME_ROOT: ${{ inputs.rung > 0 && format('{0}/archie-elastic-previous', runner.temp) || '' }}
          REQUEST_ID: ${{ inputs.request_id }}
          CODE_REVISION: ${{ inputs.code_revision }}
          SHARD_INDEX: ${{ inputs.shard }}
          RUNG: ${{ inputs.rung }}
          RUNG_COUNT: ${{ inputs.rung_count }}
        run: bash foundry/archie-distill/run_elastic_rslora_rung.sh
      - name: Preserve immutable rung evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.rung.outputs.evidence_artifact_name }}
          path: ${{ steps.rung.outputs.artifact_path }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
      - name: Publish resumable rung handoff
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.rung.outputs.artifact_name }}
          path: ${{ steps.rung.outputs.artifact_path }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
          overwrite: true
