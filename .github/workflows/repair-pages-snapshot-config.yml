name: Repair Pages snapshot configuration

on:
  push:
    branches:
      - agent/fix-pages-snapshot-config
    paths:
      - .github/workflows/repair-pages-snapshot-config.yml
  pull_request:
    paths:
      - .github/workflows/repair-pages-snapshot-config.yml
      - .github/tmp/repair-pages-snapshot-config.py

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - name: Apply exact repair
        run: |
          python .github/tmp/repair-pages-snapshot-config.py
          rm .github/tmp/repair-pages-snapshot-config.py
          rm .github/workflows/repair-pages-snapshot-config.yml
          git diff --check
      - run: npm ci
      - name: Reproduce actual configured snapshot and verify it
        env:
          SIDEWAYS_PUBLIC_SOURCES: ${{ vars.SIDEWAYS_PUBLIC_SOURCES }}
        run: |
          node --check scripts/build-web-source-snapshot.mjs
          node --test scripts/tests/web-source-snapshot.test.mjs scripts/tests/web-source-providers.test.mjs
          mkdir -p /tmp/sideways-corpus
          timeout 900s node scripts/build-web-source-snapshot.mjs --output /tmp/sideways-corpus/general.jsonl.gz
          node scripts/verify-web-source-snapshot.mjs /tmp/sideways-corpus/general.jsonl.gz /tmp/sideways-corpus/general.jsonl.gz.meta.json
      - name: Run repository gates
        run: |
          npm run test:ingestion
          npm run test:authority
          npm run verify:repository
          git diff --check
      - name: Commit validated repair
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(pages): isolate invalid public source configuration"
          git push origin HEAD:${TARGET_BRANCH}
