name: Diagnose root phone proof

on:
  pull_request:
    paths:
      - .github/workflows/diagnose-root-phone.yml

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
      SIDEWAYS_PUBLIC_SOURCES: ${{ vars.SIDEWAYS_PUBLIC_SOURCES }}
      POST_COUNT: 1000000
      CHUNK_SIZE: 1024
      CONTENT_CHUNK_SIZE: 128
      CORPUS_SEED: 20260712
      CORPUS_FILE: corpus/general-media.jsonl.gz
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Build exact product tree
        run: |
          rm .github/workflows/diagnose-root-phone.yml
          python -m pip install --disable-pip-version-check pillow
          npm ci --ignore-scripts --include=dev
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz
          cat general-overlay.part.* | base64 -d > general-overlay.tar.xz
          tar -xJf general-overlay.tar.xz
          python general/patch.py
          cat profile-overlay.part.* | base64 -d > profile-overlay.tar.xz
          tar -xJf profile-overlay.tar.xz
          python profile/patch.py
          node scripts/build-web-source-snapshot.mjs --output corpus/general.jsonl.gz
          node scripts/verify-web-source-snapshot.mjs corpus/general.jsonl.gz corpus/general.jsonl.gz.meta.json
          python general/media.py --input corpus/general.jsonl.gz --output corpus/general-media.jsonl.gz --media-dir corpus/media --max-media 180 --discover-forum 80
          node scripts/build.mjs
      - id: proof
        name: Capture exact profile and root-phone failure
        shell: bash
        run: |
          set +e
          python verify-profile-build.py >root-phone-proof.log 2>&1
          status=$?
          set -e
          cat root-phone-proof.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
      - name: Upload exact root-phone diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: root-phone-diagnostic
          path: |
            root-phone-proof.log
            root-product-phone.png
            root-product-desktop.png
          if-no-files-found: warn
          retention-days: 5
      - name: Remove diagnostic workflow from branch
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git reset
          git add -u .github/workflows/diagnose-root-phone.yml
          test "$(git diff --cached --name-only)" = ".github/workflows/diagnose-root-phone.yml"
          git commit -m "chore: remove root phone diagnostic"
          git push origin HEAD:${TARGET_BRANCH}
      - name: Preserve diagnostic failure status
        if: steps.proof.outputs.status != '0'
        run: exit 1
