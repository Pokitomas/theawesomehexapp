name: Verify Archie Windows install

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/archie.mjs'
      - 'scripts/archie-first-run.mjs'
      - 'scripts/archie-runtime-core.mjs'
      - 'scripts/archie-distill-core.mjs'
      - 'scripts/archie-distill.mjs'
      - 'scripts/run-python.mjs'
      - 'scripts/archied.mjs'
      - 'scripts/archied-hosted.mjs'
      - 'scripts/archie-hosted-*.mjs'
      - 'scripts/archie-hybrid-*.mjs'
      - 'scripts/archie-compat-*.mjs'
      - 'scripts/archie-standalone-*.mjs'
      - 'scripts/archie-workspace-core.mjs'
      - 'scripts/archie-workspace-file-provider.mjs'
      - 'scripts/archie-workspace-portable.mjs'
      - 'scripts/archie-workspace-service.mjs'
      - 'scripts/archie-workspace.mjs'
      - 'scripts/tests/archie-distill-pipeline.test.mjs'
      - 'scripts/tests/archie-workspace-substrate.test.mjs'
      - 'scripts/tests/archie-standalone-journey.test.mjs'
      - 'scripts/tests/archied-service.test.mjs'
      - 'scripts/tests/archied-hosted*.test.mjs'
      - 'scripts/tests/archie-hybrid-runner.test.mjs'
      - 'scripts/tests/archie-compat-import.test.mjs'
      - 'scripts/tests/maker-archie-install.test.mjs'
      - 'foundry/archie-distill/**'
      - 'maker/evaluations/archie-distill-qwen3-quality.json'
      - 'maker/contracts/archie-*.schema.json'
      - 'compose.hosted.yaml'
      - '.env.archied.example'
      - 'ARCHIE_WORKSPACES.md'
      - 'ARCHIE_STANDALONE_MIGRATION.md'
      - 'ARCHIE_HOSTED.md'
      - 'ARCHIE_COMPATIBILITY.md'
      - '.github/workflows/archie-windows-install.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clean-install:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
      - name: Install exact dependency tree
        run: npm.cmd ci --ignore-scripts
      - name: Verify install and first-launch contracts
        run: npm.cmd run test:archie:install
      - name: Verify distillation contracts
        shell: pwsh
        run: |
          $output = & npm.cmd run test:archie:distill 2>&1
          $code = $LASTEXITCODE
          $output | Tee-Object -FilePath archie-distillation-windows.log
          if ($code -ne 0) { exit $code }
      - name: Verify native, hosted, hybrid, and compatibility workspace contracts
        shell: pwsh
        run: |
          $output = & npm.cmd run test:archie:workspace 2>&1
          $code = $LASTEXITCODE
          $output | Tee-Object -FilePath archie-workspace-windows.log
          if ($code -ne 0) { exit $code }
      - name: Pack, globally install, and launch like a user
        shell: pwsh
        run: |
          $package = npm.cmd pack --json | ConvertFrom-Json
          if ($package.Count -ne 1) { throw 'Expected exactly one Archie package.' }
          $archive = Join-Path $PWD $package[0].filename
          $installRoot = Join-Path $env:RUNNER_TEMP 'archie-global'
          $archieHome = Join-Path $env:RUNNER_TEMP 'archie-home'
          $workspaceRoot = Join-Path $env:RUNNER_TEMP 'archie-workspaces'
          npm.cmd install --global --prefix $installRoot $archive
          $archie = Join-Path $installRoot 'archie.cmd'
          if (!(Test-Path -LiteralPath $archie)) { throw "Archie command missing: $archie" }
          $state = (& $archie setup --json --home $archieHome | ConvertFrom-Json)
          if ($state.schema -ne 'archie-first-run/v1') { throw 'Wrong first-run schema.' }
          if (!$state.runtime_ready) { throw 'Installed runtime did not become ready.' }
          if ($state.execution_ready) { throw 'Empty clean install claimed a runnable model.' }
          if ($state.installed_artifacts.Count -ne 0) { throw 'Clean install inherited model state.' }
          $screen = & $archie --no-color --home $archieHome
          if (($screen -join "`n") -notmatch 'LOCAL WORLD') { throw 'First-launch screen is missing.' }
          $demo = (& $archie workspace demo --root $workspaceRoot | ConvertFrom-Json)
          if ($demo.schema -ne 'archie-workspace-demo-result/v1') { throw 'Native workspace demo did not complete.' }
          if (!$demo.head_digest -or !$demo.rollback_id) { throw 'Native workspace demo lacks evidence or rollback.' }
          $public = (& $archie workspace inspect $demo.workspace_id --root $workspaceRoot | ConvertFrom-Json)
          if ($public.workspace.visibility -ne 'public') { throw 'Anonymous public workspace inspection failed.' }
          & $archie list --home $archieHome
      - name: Preserve Windows diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: archie-windows-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            archie-distillation-windows.log
            archie-workspace-windows.log
          if-no-files-found: warn
          retention-days: 14
