name: Extract build 3d232 failure

on:
  push:
    branches:
      - agent/inspect-pages-3d232
    paths:
      - .github/workflows/extract-build-3d232-failure.yml
  pull_request:
    paths:
      - .github/workflows/extract-build-3d232-failure.yml

permissions:
  contents: write
  actions: read

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    env:
      TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.TARGET_BRANCH }}
      - name: Preserve failed projection excerpt
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_RUN_ID: '29489505538'
          FAILED_JOB_ID: '87591946356'
        shell: bash
        run: |
          set -euo pipefail
          gh run view "$FAILED_RUN_ID" --repo Pokitomas/theawesomehexapp --job "$FAILED_JOB_ID" --log > /tmp/pages-build.log
          node <<'NODE'
          const fs = require('node:fs');
          const lines = fs.readFileSync('/tmp/pages-build.log', 'utf8').split(/\r?\n/);
          const marker = lines.findIndex(line => line.includes('Materialize the existing root candidate projection'));
          const start = marker >= 0 ? marker : Math.max(0, lines.length - 320);
          const selected = lines.slice(start, Math.min(lines.length, start + 300));
          fs.mkdirSync('audit', { recursive: true });
          fs.writeFileSync('audit/pages-3d232-projection-failure.log', `${selected.join('\n')}\n`);
          NODE
          rm .github/workflows/extract-build-3d232-failure.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add audit/pages-3d232-projection-failure.log .github/workflows/extract-build-3d232-failure.yml
          git commit -m "audit: preserve Pages projection failure"
          git push origin HEAD:${TARGET_BRANCH}
