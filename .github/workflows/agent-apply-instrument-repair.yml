name: Apply instrument genesis repair

on:
  push:
    branches:
      - 'agent/archie-instrument-genesis-v2-20260723'

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/archie-instrument-genesis-v2-20260723
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply validated repair
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('foundry/archie-distill/archie_instrument_genesis.py')
          s = p.read_text()

          s = s.replace('policy_horizon=2,', 'policy_horizon=2,', 1)
          full_old = '''            rollout_horizon=4,
                      policy_horizon=3,'''.replace('          ', '')
          # Full court must reach beyond the maximum delayed action.
          s = s.replace('            rollout_horizon=4,\n            policy_horizon=3,',
                        '            rollout_horizon=4,\n            policy_horizon=4,', 1)

          old = '''    observation_matrix = rng.normal(0.0, 0.7, size=(cfg.obs_channels, latent))
              phase = rng.uniform(-math.pi, math.pi, size=cfg.obs_channels)'''.replace('      ', '')
          new = '''    sensor_rng = np.random.default_rng(0xA6C41E + cfg.obs_channels * 1009 + latent * 9176)
              observation_matrix = sensor_rng.normal(0.0, 0.7, size=(cfg.obs_channels, latent))
              phase = sensor_rng.uniform(-math.pi, math.pi, size=cfg.obs_channels)'''.replace('      ', '')
          assert old in s
          s = s.replace(old, new, 1)
          assert 'delay=int(rng.integers(1, 4)),' in s
          s = s.replace('delay=int(rng.integers(1, 4)),', 'delay=int(rng.integers(1, 3)),', 1)

          old = '''def seed_programs(cfg: ProfileConfig) -> list[Program]:
              seeds = []
              for channel in range(min(cfg.obs_channels, 4)):
                  seeds.append(make_program([{"op": "obs", "channel": channel, "lag": 0}], 0, history=[{"operator": "minimal_seed"}]))
                  seeds.append(make_program([
                      {"op": "obs", "channel": channel, "lag": 0},
                      {"op": "diff", "args": [0], "lag": min(2, cfg.max_window)},
                  ], 1, history=[{"operator": "minimal_seed"}]))
              seeds.append(make_program([
                  {"op": "obs", "channel": 0, "lag": 0},
                  {"op": "rolling_mean", "args": [0], "window": min(3, cfg.max_window)},
              ], 1, history=[{"operator": "minimal_seed"}]))
              seeds.append(make_program([{"op": "action", "action_index": 0, "lag": 1}], 0, history=[{"operator": "minimal_seed"}]))
              return seeds
          '''.replace('          ', '')
          new = '''def seed_programs(cfg: ProfileConfig) -> list[Program]:
              # Exhaust the raw interface before stochastic search. Omitting most channels and
              # actions made discovery depend on luck and systematically hid delayed controls.
              seeds: list[Program] = []
              for channel in range(cfg.obs_channels):
                  for lag in (0, 1, min(2, cfg.max_window)):
                      seeds.append(make_program([{"op": "obs", "channel": channel, "lag": lag}], 0,
                                                history=[{"operator": "interface_seed"}]))
                  seeds.append(make_program([
                      {"op": "obs", "channel": channel, "lag": 0},
                      {"op": "diff", "args": [0], "lag": min(2, cfg.max_window)},
                  ], 1, history=[{"operator": "interface_seed"}]))
                  seeds.append(make_program([
                      {"op": "obs", "channel": channel, "lag": 0},
                      {"op": "rolling_mean", "args": [0], "window": min(3, cfg.max_window)},
                  ], 1, history=[{"operator": "interface_seed"}]))
              for action_index in range(cfg.actions):
                  for lag in range(1, min(3, cfg.max_window) + 1):
                      seeds.append(make_program([{"op": "action", "action_index": action_index, "lag": lag}], 0,
                                                history=[{"operator": "interface_seed"}]))
              return seeds
          '''.replace('          ', '')
          assert old in s
          s = s.replace(old, new, 1)

          old = '''    base = list(initial or seed_programs(cfg))
              while len(base) < cfg.population_size:
                  base.append(random_program(rng, cfg, program_inputs=program_inputs))
              population = base[: cfg.population_size]
              registry: dict[str, Program] = {program.uid: program for program in population}'''.replace('      ', '')
          new = '''    base = list(initial or seed_programs(cfg))
              complete_seed_registry = {program.uid: program for program in base}
              rng.shuffle(base)
              if len(base) > cfg.population_size:
                  # Stratified deterministic interface coverage plus stochastic programs.
                  base = base[: max(cfg.elite_count, cfg.population_size // 2)]
              while len(base) < cfg.population_size:
                  base.append(random_program(rng, cfg, program_inputs=program_inputs))
              population = base[: cfg.population_size]
              registry: dict[str, Program] = {**complete_seed_registry, **{program.uid: program for program in population}}'''.replace('      ', '')
          assert old in s
          s = s.replace(old, new, 1)

          old = '''    ranked = sorted(evolution.population, key=lambda p: evolution.evaluations[p.uid].utility, reverse=True)
              proposed_bundle, bundle_trace = greedy_bundle(ranked, development_worlds, cfg)'''.replace('      ', '')
          new = '''    ranked = sorted(
                  (p for uid, p in evolution.registry.items() if uid in evolution.evaluations and evolution.evaluations[uid].stable),
                  key=lambda p: evolution.evaluations[p.uid].utility,
                  reverse=True,
              )
              court_limit = cfg.population_size if cfg.name == "smoke" else max(cfg.population_size * 2, cfg.admitted_width * 12)
              court_shortlist = ranked[:court_limit]
              proposed_bundle, bundle_trace = greedy_bundle(court_shortlist, development_worlds, cfg)'''.replace('      ', '')
          assert old in s
          s = s.replace(old, new, 1)

          old = '''        rows[program.uid] = {
                  "passed": all(checks.values()),'''.replace('      ', '')
          new = '''        predictive_roles = sum(int(checks[name]) for name in (
                  "marginal_next_prediction", "marginal_counterfactual", "zero_damage",
                  "shuffle_damage", "constant_damage", "frozen_damage",
              ))
              agency_roles = sum(int(checks[name]) for name in (
                  "marginal_intervention", "intervention_choice_changes",
              ))
              transport_roles = sum(int(checks[name]) for name in (
                  "transport_marginal", "transport_zero_damage", "transport_frozen_damage",
              ))
              role_pass = checks["parentage_complete"] and predictive_roles >= 1 and (agency_roles >= 1 or transport_roles >= 1)
              rows[program.uid] = {
                  "passed": role_pass,
                  "role_counts": {"predictive": predictive_roles, "agency": agency_roles, "transport": transport_roles},'''.replace('      ', '')
          assert old in s
          s = s.replace(old, new, 1)

          p.write_text(s)
          PY
      - name: Validate repair
        working-directory: foundry/archie-distill
        run: |
          python -m py_compile archie_instrument_genesis.py test_archie_instrument_genesis.py
          python -m unittest -v test_archie_instrument_genesis.py
      - name: Commit repair and remove temporary workflows
        run: |
          rm -f .github/workflows/agent-source-snapshot.yml
          rm -f .github/workflows/agent-apply-instrument-repair.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add foundry/archie-distill/archie_instrument_genesis.py .github/workflows
          git commit -m 'fix(research): repair instrument discovery search and causal court'
          git push origin HEAD:agent/archie-instrument-genesis-v2-20260723
