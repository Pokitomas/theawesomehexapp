name: Full repository snapshot

on:
  pull_request:
    paths:
      - '.github/workflows/full-repository-snapshot.yml'

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Build bounded repository inventory
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/repository-snapshot"
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='build' \
            --exclude='coverage' \
            -czf "$RUNNER_TEMP/repository-snapshot/theawesomehexapp.tar.gz" .
          find . -path './.git' -prune -o -type f -print | LC_ALL=C sort > "$RUNNER_TEMP/repository-snapshot/files.txt"
          du -ah . | LC_ALL=C sort -h > "$RUNNER_TEMP/repository-snapshot/sizes.txt"
          sha256sum "$RUNNER_TEMP/repository-snapshot/theawesomehexapp.tar.gz" > "$RUNNER_TEMP/repository-snapshot/sha256.txt"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: full-repository-snapshot-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/repository-snapshot
          compression-level: 0
          retention-days: 1
          if-no-files-found: error
