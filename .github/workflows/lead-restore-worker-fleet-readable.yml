name: Restore reviewable worker-fleet source

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format-and-prove:
    if: github.actor == 'Pokitomas'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Format exact current implementation without semantic edits
        run: |
          npx --yes prettier@3.6.2 --write \
            scripts/maker-worker-fleet.mjs \
            scripts/tests/maker-worker-fleet.test.mjs \
            maker/contracts/worker-fleet.schema.json
      - name: Add source-reviewability regression
        run: |
          cat > scripts/tests/maker-worker-fleet-source.test.mjs <<'EOF'
          import assert from 'node:assert/strict';
          import fs from 'node:fs/promises';
          import test from 'node:test';

          const cases = [
            ['scripts/maker-worker-fleet.mjs', 300],
            ['scripts/tests/maker-worker-fleet.test.mjs', 150],
            ['maker/contracts/worker-fleet.schema.json', 50]
          ];

          test('worker-fleet implementation, tests, and contract remain reviewable source', async () => {
            for (const [path, minimumLines] of cases) {
              const content = await fs.readFile(path, 'utf8');
              assert.ok(content.split(/\r?\n/).length >= minimumLines, `${path} collapsed into a generated/minified artifact`);
              assert.doesNotMatch(content, /sourceMappingURL|^\s*\/\*![^]*generated/i);
            }
            JSON.parse(await fs.readFile('maker/contracts/worker-fleet.schema.json', 'utf8'));
          });
          EOF
      - name: Prove behavior and reviewability
        run: |
          node --check scripts/maker-worker-fleet.mjs
          node --test scripts/tests/maker-worker-fleet.test.mjs scripts/tests/maker-worker-fleet-source.test.mjs
          node --test scripts/tests/maker-runtime-platform.test.mjs
      - name: Commit only formatted canonical source and regression
        run: |
          rm .github/workflows/lead-restore-worker-fleet-readable.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            scripts/maker-worker-fleet.mjs \
            scripts/tests/maker-worker-fleet.test.mjs \
            scripts/tests/maker-worker-fleet-source.test.mjs \
            maker/contracts/worker-fleet.schema.json \
            .github/workflows/lead-restore-worker-fleet-readable.yml
          git commit -m 'Restore reviewable worker fleet source'
          git push origin HEAD:${{ github.head_ref }}
