name: Execute Maker with open model

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Existing owner-authored Maker issue number
        required: true
        type: number

permissions:
  contents: read

concurrency:
  group: maker-native-${{ github.repository }}-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  blocked:
    if: >-
      github.actor == github.repository_owner &&
      (github.event_name == 'workflow_dispatch' || startsWith(github.event.issue.title, '[maker:')) &&
      vars.SIDEWAYS_MODEL_MODE != 'hosted' &&
      vars.SIDEWAYS_MODEL_MODE != 'self-hosted'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Post exact missing-runtime receipt
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        with:
          script: |
            const number = Number(process.env.ISSUE_NUMBER);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              body: [
                '<!-- sideways-native-worker:v1 -->',
                '## Native worker blocked',
                '',
                '**state:** no model execution mode configured',
                `**run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'Set repository variable `SIDEWAYS_MODEL_MODE` to `hosted` or `self-hosted`.',
                '',
                '- `hosted`: also set `SIDEWAYS_MODEL_BASE_URL`, `SIDEWAYS_MODEL_NAME`, and optionally secret `SIDEWAYS_MODEL_API_KEY`.',
                '- `self-hosted`: register a runner carrying label `sideways-maker`, run an open model server on that machine, and set `SIDEWAYS_MODEL_NAME`. Local default endpoint is `http://127.0.0.1:11434` using the Ollama protocol.',
                '',
                'The lasso may still record this arrival, but no engineering model, workspace, branch, patch, or PR ran.'
              ].join('\n')
            });

  hosted-worker:
    if: >-
      github.actor == github.repository_owner &&
      (github.event_name == 'workflow_dispatch' || startsWith(github.event.issue.title, '[maker:')) &&
      vars.SIDEWAYS_MODEL_MODE == 'hosted'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Check out trusted default-branch worker
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked repository dependencies
        run: npm ci --ignore-scripts
      - name: Verify native worker before write authority
        run: |
          node --check scripts/open-model-adapter.mjs
          node --check scripts/native-dev-agent.mjs
          node --check scripts/native-changed-check.mjs
          node --check scripts/maker-native-worker.mjs
          node --test scripts/tests/native-maker-worker.test.mjs
      - name: Execute configured hosted open-model worker
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SIDEWAYS_ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
          SIDEWAYS_MODEL_PROTOCOL: ${{ vars.SIDEWAYS_MODEL_PROTOCOL || 'openai' }}
          SIDEWAYS_MODEL_BASE_URL: ${{ vars.SIDEWAYS_MODEL_BASE_URL }}
          SIDEWAYS_MODEL_NAME: ${{ vars.SIDEWAYS_MODEL_NAME }}
          SIDEWAYS_MODEL_API_KEY: ${{ secrets.SIDEWAYS_MODEL_API_KEY }}
          SIDEWAYS_MODEL_TIMEOUT_MS: ${{ vars.SIDEWAYS_MODEL_TIMEOUT_MS || '180000' }}
          SIDEWAYS_AGENT_MAX_TURNS: ${{ vars.SIDEWAYS_AGENT_MAX_TURNS || '24' }}
          SIDEWAYS_AGENT_MAX_WRITES: ${{ vars.SIDEWAYS_AGENT_MAX_WRITES || '12' }}
        run: node scripts/maker-native-worker.mjs

  self-hosted-worker:
    if: >-
      github.actor == github.repository_owner &&
      (github.event_name == 'workflow_dispatch' || startsWith(github.event.issue.title, '[maker:')) &&
      vars.SIDEWAYS_MODEL_MODE == 'self-hosted'
    runs-on: [self-hosted, sideways-maker]
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Check out trusted default-branch worker
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked repository dependencies
        run: npm ci --ignore-scripts
      - name: Verify native worker before write authority
        run: |
          node --check scripts/open-model-adapter.mjs
          node --check scripts/native-dev-agent.mjs
          node --check scripts/native-changed-check.mjs
          node --check scripts/maker-native-worker.mjs
          node --test scripts/tests/native-maker-worker.test.mjs
      - name: Execute local open-model worker
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SIDEWAYS_ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
          SIDEWAYS_MODEL_PROTOCOL: ${{ vars.SIDEWAYS_MODEL_PROTOCOL || 'ollama' }}
          SIDEWAYS_MODEL_BASE_URL: ${{ vars.SIDEWAYS_MODEL_BASE_URL || 'http://127.0.0.1:11434' }}
          SIDEWAYS_MODEL_NAME: ${{ vars.SIDEWAYS_MODEL_NAME }}
          SIDEWAYS_MODEL_API_KEY: ${{ secrets.SIDEWAYS_MODEL_API_KEY }}
          SIDEWAYS_MODEL_TIMEOUT_MS: ${{ vars.SIDEWAYS_MODEL_TIMEOUT_MS || '300000' }}
          SIDEWAYS_AGENT_MAX_TURNS: ${{ vars.SIDEWAYS_AGENT_MAX_TURNS || '24' }}
          SIDEWAYS_AGENT_MAX_WRITES: ${{ vars.SIDEWAYS_AGENT_MAX_WRITES || '12' }}
        run: node scripts/maker-native-worker.mjs
