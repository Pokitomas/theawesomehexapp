name: True Archie real-dominant isolation

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: archie-neural-true-isolation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  isolate:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: Check out exact candidate head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755 # v6.2.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install numerical dependencies
        run: python -m pip install --upgrade numpy scipy scikit-learn joblib

      - name: Verify retained inputs and invalidate surrogate checkpoint
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib, json
          from pathlib import Path

          root = Path('foundry/archie-protocol/neural')
          data = root / 'data'
          runs = root / 'runs'
          rows = json.loads((data / 'route-train-v6.json').read_text())
          if len(rows) != 925:
              raise SystemExit(f'expected 925 governed rows, found {len(rows)}')
          suites = {
              'router-v2-original-heldout.jsonl': 498,
              'router-real-v2-heldout.jsonl': 60,
              'router-real-v3-final.jsonl': 48,
          }
          manifest = {'schema': 'archie-true-isolation-inputs/v1', 'files': {}}
          for name, count in suites.items():
              path = data / name
              actual = sum(1 for line in path.read_text().splitlines() if line.strip())
              if actual != count:
                  raise SystemExit(f'{name}: expected {count}, found {actual}')
              manifest['files'][name] = {'rows': actual, 'sha256': hashlib.sha256(path.read_bytes()).hexdigest()}
          corpus = data / 'route-train-v6.json'
          manifest['files']['route-train-v6.json'] = {'rows': len(rows), 'sha256': hashlib.sha256(corpus.read_bytes()).hexdigest()}
          frozen = root.parent / 'factorized' / 'blind-challenge-pack.frozen.json'
          manifest['files']['blind-challenge-pack.frozen.json'] = {'sha256': hashlib.sha256(frozen.read_bytes()).hexdigest()}
          b = runs / 'npt-sw-d128-seed424243.npz'
          surrogate = runs / 'npt-E-frozen-backbone-seed424243-pre-finetune.npz'
          b_sha = hashlib.sha256(b.read_bytes()).hexdigest()
          surrogate_sha = hashlib.sha256(surrogate.read_bytes()).hexdigest()
          if b_sha != surrogate_sha:
              raise SystemExit('surrogate checkpoint is no longer byte-identical to run B; re-audit before proceeding')
          manifest['invalid_surrogate'] = {
              'file': surrogate.name,
              'sha256': surrogate_sha,
              'equals_run_b': True,
              'reason': 'Cannot measure the real-dominant main phase because it is byte-identical to run B.'
          }
          out = Path('.tmp/true-isolation')
          out.mkdir(parents=True, exist_ok=True)
          (out / 'input-manifest.json').write_text(json.dumps(manifest, indent=2) + '\n')
          print(json.dumps(manifest, indent=2))
          PY

      - name: Verify trainer contracts
        working-directory: foundry/archie-protocol/neural
        run: |
          set -euo pipefail
          python np_transformer.py --gradcheck
          python test_np_transformer.py
          python -m py_compile protected_finetune.py

      - name: Train true run D without post-hoc fine-tuning
        shell: bash
        run: |
          set -euo pipefail
          python foundry/archie-protocol/neural/np_transformer.py \
            --seed 424243 \
            --d 128 \
            --layers 2 \
            --heads 4 \
            --tmax 84 \
            --epochs 8 \
            --batch 64 \
            --lr 0.0022 \
            --drop 0.10 \
            --scale 3 \
            --real-rows foundry/archie-protocol/neural/data/route-train-v6.json \
            --real-repeat 15 \
            --finetune-epochs 0 \
            --legacy-dir foundry/archie-protocol/neural/data \
            --frozen-pack foundry/archie-protocol/factorized/blind-challenge-pack.frozen.json \
            --out .tmp/true-isolation \
            --tag npt-realdom-noft-true-d128

      - name: Adapt true run D with frozen trunk as run E
        shell: bash
        run: |
          set -euo pipefail
          python foundry/archie-protocol/neural/protected_finetune.py \
            --source-receipt .tmp/true-isolation/npt-realdom-noft-true-d128-seed424243-receipt.json \
            --source-weights .tmp/true-isolation/npt-realdom-noft-true-d128-seed424243.npz \
            --real-rows foundry/archie-protocol/neural/data/route-train-v6.json \
            --legacy-dir foundry/archie-protocol/neural/data \
            --frozen-pack foundry/archie-protocol/factorized/blind-challenge-pack.frozen.json \
            --out .tmp/true-isolation \
            --tag npt-realdom-headsafe-true-d128 \
            --epochs 4 \
            --batch 64 \
            --lr 0.0001 \
            --real-repeat 3 \
            --replay-ratio 1.0 \
            --proximal 0.001 \
            --label-smoothing 0.05

      - name: Write causal comparison and fail-closed decision
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          repo_runs = Path('foundry/archie-protocol/neural/runs')
          out = Path('.tmp/true-isolation')
          names = {
              'B': repo_runs / 'npt-sw-d128-seed424243-receipt.json',
              'C': repo_runs / 'npt-realdom-d128-seed424243-receipt.json',
              'D': out / 'npt-realdom-noft-true-d128-seed424243-receipt.json',
              'E': out / 'npt-realdom-headsafe-true-d128-seed424243-receipt.json',
          }
          receipts = {key: json.loads(path.read_text()) for key, path in names.items()}
          suites = ['blind_429', 'router-v2-original-heldout', 'router-real-v2-heldout', 'router-real-v3-final']
          def compact(key):
              receipt = receipts[key]
              result = {'run': key, 'tag': receipt['tag'], 'weights_sha256': receipt['model']['weights_sha256']}
              for suite in suites:
                  metrics = receipt['results'][suite]
                  result[suite] = {
                      'examples': metrics['examples'],
                      'full_accuracy': metrics.get('full_accuracy'),
                      'route_accuracy': metrics['route_accuracy'],
                  }
              return result
          rows = [compact(key) for key in ('B','C','D','E')]
          d, e = receipts['D'], receipts['E']
          e_protection = e['protection']
          if not e_protection['bit_exact']:
              raise SystemExit('protected parameter digest changed')
          if e_protection['protected_before_sha256'] != e_protection['protected_after_sha256']:
              raise SystemExit('run E protected digest mismatch')
          if d['model']['weights_sha256'] == receipts['B']['model']['weights_sha256']:
              raise SystemExit('true run D unexpectedly equals run B byte-for-byte')
          projection_gate = {
              'router-v2-original-heldout': 1.0,
              'router-real-v2-heldout': 1.0,
              'router-real-v3-final': 1.0,
          }
          admitted = all(e['results'][suite]['route_accuracy'] >= threshold for suite, threshold in projection_gate.items())
          promotion = 'admitted' if admitted else 'not-admitted'
          if promotion != 'not-admitted':
              raise SystemExit('unexpected admission; independent promotion review required')
          summary = {
              'schema': 'archie-true-realdominant-isolation/v1',
              'inputs': json.loads((out / 'input-manifest.json').read_text()),
              'runs': rows,
              'd_minus_b_blind_full': d['results']['blind_429']['full_accuracy'] - receipts['B']['results']['blind_429']['full_accuracy'],
              'd_minus_c_blind_full': d['results']['blind_429']['full_accuracy'] - receipts['C']['results']['blind_429']['full_accuracy'],
              'e_minus_d_blind_full': e['results']['blind_429']['full_accuracy'] - d['results']['blind_429']['full_accuracy'],
              'run_e_selected_epoch': e['config']['selected_epoch'],
              'run_e_protected_bit_exact': e_protection['bit_exact'],
              'run_e_protected_sha256': e_protection['protected_before_sha256'],
              'promotion': promotion,
              'claim_boundary': 'D is a fresh deterministic retraining of run C’s main phase with the exact retained corpus/config and finetune disabled. E changes only Hroute/Hbroute and selects on generated development data before frozen evaluation.'
          }
          (out / 'true-isolation-summary.json').write_text(json.dumps(summary, indent=2) + '\n')

          def pct(value): return '—' if value is None else f'{100*value:.1f}%'
          lines = [
              '# True neural real-dominant isolation', '',
              'The previously retained pre-fine-tune surrogate was byte-identical to run B and therefore invalid for corpus-mix isolation. Run D is the actual from-scratch deterministic rerun of run C’s main phase with the exact 925-row corpus, same seed/config, and no post-hoc fine-tune. Run E permits only the route head to change.', '',
              '| run | blind full | blind route | 498 | 60 | 48 | weights |',
              '|---|---:|---:|---:|---:|---:|---|',
          ]
          for row in rows:
              lines.append(f"| {row['run']} `{row['tag']}` | {pct(row['blind_429']['full_accuracy'])} | {pct(row['blind_429']['route_accuracy'])} | {pct(row['router-v2-original-heldout']['route_accuracy'])} | {pct(row['router-real-v2-heldout']['route_accuracy'])} | {pct(row['router-real-v3-final']['route_accuracy'])} | `{row['weights_sha256'][:16]}…` |")
          lines += ['', '## Decision', '',
              f"- Real-dominant training without fine-tuning changes blind full accuracy by {summary['d_minus_b_blind_full']*100:+.1f} points relative to B.",
              f"- Removing C’s destructive fine-tune changes blind full accuracy by {summary['d_minus_c_blind_full']*100:+.1f} points.",
              f"- Protected route-head adaptation changes blind full accuracy by {summary['e_minus_d_blind_full']*100:+.1f} points and selected epoch {summary['run_e_selected_epoch']}.",
              f"- Shared trunk and auxiliary heads are bit-exact in E: `{summary['run_e_protected_bit_exact']}` (`{summary['run_e_protected_sha256']}`).",
              f"- Promotion: `{promotion}`. Production remains unchanged.", '',
          ]
          (out / 'TRUE_ISOLATION.md').write_text('\n'.join(lines))
          print('\n'.join(lines))
          PY

      - name: Upload true digest-bound evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-neural-true-isolation-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            .tmp/true-isolation/input-manifest.json
            .tmp/true-isolation/npt-realdom-noft-true-d128-seed424243.npz
            .tmp/true-isolation/npt-realdom-noft-true-d128-seed424243-receipt.json
            .tmp/true-isolation/npt-realdom-headsafe-true-d128-seed424243.npz
            .tmp/true-isolation/npt-realdom-headsafe-true-d128-seed424243-receipt.json
            .tmp/true-isolation/true-isolation-summary.json
            .tmp/true-isolation/TRUE_ISOLATION.md
          if-no-files-found: error
          retention-days: 14
