name: Build and deploy profile content feed

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Extract base product layers
        run: |
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz
          cat general-overlay.part.* | base64 -d > general-overlay.tar.xz
          tar -xJf general-overlay.tar.xz
          python general/patch.py
          cat profile-overlay.part.* | base64 -d > profile-overlay.tar.xz
          tar -xJf profile-overlay.tar.xz
          python profile/patch.py

      - name: Assemble manual overlay text
        run: |
          cat manual-overlay.b64.part.* > manual-overlay.b64
          test "$(wc -c < manual-overlay.b64)" = "44760"

      - name: Check manual overlay text
        run: echo "0d45c1ed47cdf73667f554e45c60c76f4fabd799fe7b4a0523dfa5adc58651d5  manual-overlay.b64" | sha256sum -c -

      - name: Decode manual overlay archive
        run: |
          base64 -d manual-overlay.b64 > manual-overlay.tar.xz
          echo "b18d2e3ca6dc53efb8286f3162aae6c8d6320875a8699346886c8621022c00af  manual-overlay.tar.xz" | sha256sum -c -

      - name: Extract manual product layer
        run: |
          tar -xJf manual-overlay.tar.xz
          python manual/patch.py

      - name: Install shared manual saturation kernel
        run: |
          cat manual-kernel.tar.xz.b64.part.* | base64 -d > manual-kernel.tar.xz
          echo "1be2d8e725fb87959a0a09f84291b955c1796da9b233d74b5119d069f1816c70  manual-kernel.tar.xz" | sha256sum -c -
          tar -xJf manual-kernel.tar.xz
          python manual-kernel/patch.py

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install media tooling
        run: python -m pip install --disable-pip-version-check pillow

      - name: Cache source mirror and compressed media
        uses: actions/cache@v4
        with:
          path: |
            .cache/wikinews
            corpus/media
          key: general-content-media-v1-${{ runner.os }}

      - name: Retrieve article source records
        run: |
          python scripts/fetch_wikinews.py \
            --min-date 2010-01-01 \
            --cutoff "$(date -u +%F)" \
            --output corpus/wikinews-current.jsonl.gz
          python general/normalize_articles.py \
            --input corpus/wikinews-current.jsonl.gz \
            --output corpus/articles.jsonl.gz \
            --max-records 1800

      - name: Retrieve forum source records
        run: |
          python general/fetch_forum.py \
            --output corpus/forum.jsonl.gz \
            --min-year 2007 \
            --max-year "$(date -u +%Y)" \
            --max-records 800 \
            --detail-records 240

      - name: Retrieve social source records
        run: |
          python general/fetch_social.py \
            --output corpus/social.jsonl.gz \
            --pages 4 \
            --max-records 800

      - name: Normalize article forum social model
        run: |
          python general/merge.py \
            --articles corpus/articles.jsonl.gz \
            --forums corpus/forum.jsonl.gz \
            --social corpus/social.jsonl.gz \
            --output corpus/general.jsonl.gz

      - name: Retrieve and compress display media
        run: |
          python general/media.py \
            --input corpus/general.jsonl.gz \
            --output corpus/general-media.jsonl.gz \
            --media-dir corpus/media \
            --max-media 240 \
            --discover-forum 100

      - name: Generate one million candidate instances
        env:
          POST_COUNT: 1000000
          CHUNK_SIZE: 1024
          CONTENT_CHUNK_SIZE: 128
          CORPUS_SEED: 20260712
          CORPUS_FILE: corpus/general-media.jsonl.gz
        run: node scripts/build.mjs

      - name: Verify root product
        run: python verify-profile-build.py

      - name: Verify empty manual edition
        run: python verify-manual-edition.py

      - name: Verify shared manual saturation kernel
        run: python manual-kernel/verify.py

      - name: Package generated code for PR inspection
        if: github.event_name == 'pull_request'
        run: |
          python - <<'PY'
          from pathlib import Path
          import tarfile

          roots = [Path('dist'), Path('manual'), Path('general'), Path('profile'), Path('scripts')]
          keep_suffixes = {'.js', '.mjs', '.py', '.html', '.css', '.json', '.md'}
          with tarfile.open('inspectable-build.tar.gz', 'w:gz') as archive:
              for root in roots:
                  if not root.exists():
                      continue
                  for path in root.rglob('*'):
                      if not path.is_file() or path.suffix.lower() not in keep_suffixes:
                          continue
                      if any(part in {'data', 'media', 'node_modules'} for part in path.parts):
                          continue
                      if path.stat().st_size > 2_000_000:
                          continue
                      archive.add(path, arcname=path.as_posix())
          PY

      - name: Upload generated code for PR inspection
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: inspectable-build
          path: inspectable-build.tar.gz
          if-no-files-found: error
          retention-days: 3

      - name: Configure Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record successful deployment
        uses: actions/github-script@v7
        env:
          DEPLOYED_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Manual corpus edition deployed',
              body: [
                `ROOT_URL=${process.env.DEPLOYED_URL}`,
                `MANUAL_URL=${process.env.DEPLOYED_URL}manual/`,
                `COMMIT=${context.sha}`,
                'ROOT_PRODUCT=unchanged',
                'MANUAL_CORPUS=empty',
                'MANUAL_STORAGE=browser-local IndexedDB',
                'UPLOADS=files/folders/paste/links/JSON/CSV/ZIP/PDF/Office/media',
                'PACKS=portable JSON with local assets',
                'BUTTON_LANGUAGE=WALL-E',
                'RANKING_KERNEL=root-exact',
                'DEBUG_ROUTE=manual/?debug=1',
                'PROOF_ROUTE=manual/?debug=1&fixture=20',
                'PROOF_GATE=0.000->0.877'
              ].join('\n')
            });
