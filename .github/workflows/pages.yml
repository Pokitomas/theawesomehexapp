name: Build and deploy manual root-kernel feed

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remote-gate:
    runs-on: ubuntu-latest
    outputs:
      decision: ${{ steps.gate.outputs.decision }}
      reason: ${{ steps.gate.outputs.reason }}
      session: ${{ steps.gate.outputs.session }}
      generation: ${{ steps.gate.outputs.generation }}
      head_sha: ${{ steps.gate.outputs.head_sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - id: gate
        name: Read the universal remote
        env:
          REMOTE_URL: ${{ vars.REMOTE_URL }}
          REMOTE_SESSION: ${{ vars.REMOTE_SESSION }}
          REMOTE_GATE_FAIL_CLOSED: ${{ vars.REMOTE_GATE_FAIL_CLOSED }}
        run: node scripts/remote-gate.mjs

  build:
    needs: remote-gate
    if: needs.remote-gate.outputs.decision == 'proceed'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Verify exact-head deployment receipt contract
        run: node --test scripts/tests/deployment-receipt.test.mjs

      - name: Verify bounded discovery and connected import
        run: npm run test:ingestion

      - name: Extract base product layers
        run: |
          set -euo pipefail
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz
          cat general-overlay.part.* | base64 -d > general-overlay.tar.xz
          tar -xJf general-overlay.tar.xz
          python general/patch.py
          cat profile-overlay.part.* | base64 -d > profile-overlay.tar.xz
          tar -xJf profile-overlay.tar.xz
          python profile/patch.py

      - name: Assemble manual overlay text
        run: |
          cat manual-overlay.b64.part.* > manual-overlay.b64
          test "$(wc -c < manual-overlay.b64)" = "44760"

      - name: Check manual overlay text
        run: echo "0d45c1ed47cdf73667f554e45c60c76f4fabd799fe7b4a0523dfa5adc58651d5  manual-overlay.b64" | sha256sum -c -

      - name: Decode manual overlay archive
        run: |
          base64 -d manual-overlay.b64 > manual-overlay.tar.xz
          echo "b18d2e3ca6dc53efb8286f3162aae6c8d6320875a8699346886c8621022c00af  manual-overlay.tar.xz" | sha256sum -c -

      - name: Extract manual product layer
        run: |
          tar -xJf manual-overlay.tar.xz
          python manual/patch.py

      - name: Reuse the exact root saturation kernel
        run: |
          set -euo pipefail
          cat manual-kernel-overlay.b64.part.* > manual-kernel-overlay.b64
          test "$(wc -c < manual-kernel-overlay.b64)" = "13724"
          echo "d22c6b2b2cca69f1c6da08e0dcd7d8088d880aec1f0d030fb52bcac41a5df8d4  manual-kernel-overlay.b64" | sha256sum -c -
          base64 -d manual-kernel-overlay.b64 > manual-kernel-overlay.tar.xz
          echo "ecfd092ff68c5562eca2e8228c3eed62e2089af79006bac991b15b79c23bf1ce  manual-kernel-overlay.tar.xz" | sha256sum -c -
          tar -xJf manual-kernel-overlay.tar.xz
          python studio/manual/prepare-kernel.py
          python manual-kernel/patch.py
          cp manual-phone-check.mjs manual-kernel/phone-check.mjs

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Apply editable manual studio and importer
        run: |
          python studio/manual/apply.py
          python studio/manual/verify.py

      - name: Assemble manual-only PR artifact
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p dist/manual
          cp -a manual-app/. dist/manual/

      - name: Install locked browser and remote tooling
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            python -m pip install --disable-pip-version-check pillow
          fi
          git checkout -- package.json package-lock.json
          npm ci --ignore-scripts --include=dev
          node -e "import('playwright-core')"

      - name: Cache compressed media
        if: github.event_name == 'push'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: corpus/media
          key: bounded-public-media-v1-${{ runner.os }}

      - name: Build bounded public discovery snapshot
        if: github.event_name == 'push'
        env:
          SIDEWAYS_PUBLIC_SOURCES: ${{ vars.SIDEWAYS_PUBLIC_SOURCES }}
        run: |
          set -euo pipefail
          mkdir -p corpus
          timeout 900s node scripts/build-web-source-snapshot.mjs --output corpus/general.jsonl.gz
          node scripts/verify-web-source-snapshot.mjs corpus/general.jsonl.gz corpus/general.jsonl.gz.meta.json

      - name: Retrieve and compress display media
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          if timeout 600s python general/media.py \
            --input corpus/general.jsonl.gz \
            --output corpus/general-media.jsonl.gz \
            --media-dir corpus/media \
            --max-media 180 \
            --discover-forum 80; then
            echo 'display media ready'
          else
            echo 'media retrieval unavailable; deploying text-first bounded snapshot' >&2
            cp corpus/general.jsonl.gz corpus/general-media.jsonl.gz
          fi

      - name: Materialize the existing root candidate projection from bounded sources
        if: github.event_name == 'push'
        env:
          POST_COUNT: 1000000
          CHUNK_SIZE: 1024
          CONTENT_CHUNK_SIZE: 128
          CORPUS_SEED: 20260712
          CORPUS_FILE: corpus/general-media.jsonl.gz
        run: timeout 1200s node scripts/build.mjs

      - name: Verify root product
        if: github.event_name == 'push'
        run: python verify-profile-build.py

      - name: Write deployment identity
        if: github.event_name == 'push'
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
        run: node scripts/deployment-receipt.cjs write-sentinel

      - name: Publish founder room into product artifact
        run: |
          node scripts/tests/founder-room.test.mjs
          mkdir -p dist/founder
          cp founder/index.html founder/founder.css founder/founder.js dist/founder/

      - name: Publish phone Maker console into product artifact
        run: |
          node scripts/tests/maker-console.test.mjs
          node --test scripts/tests/maker-ios-install.test.mjs
          mkdir -p dist/maker
          cp maker/index.html maker/ios.html maker/maker.css maker/maker.js maker/manifest.webmanifest maker/sw.js maker/icon.svg dist/maker/

      - name: Publish Archie into product artifact
        run: |
          node --test scripts/tests/archie-phone-product.test.mjs
          mkdir -p dist/archie
          cp archie/index.html archie/archie.css archie/archie.js archie/manifest.webmanifest archie/sw.js archie/icon.svg dist/archie/

      - name: Verify empty manual edition
        run: python verify-manual-edition.py

      - name: Verify kernel, studio, remote, importer, receipt, and deployed assets
        run: |
          node --check manual-app/app.js
          node --check manual-app/kernel.js
          node --check manual-app/studio.js
          node --check manual-app/copy.js
          node --check manual-app/remote-terminal.js
          node --check manual-app/import-studio.js
          node --check manual-app/import-phone.js
          node --check manual-app/add-to-sideways-runtime.js
          node --check manual-app/discovery-source.js
          node --check manual-app/account-connections.js
          node --check manual-app/imports/registry.js
          node --check manual-app/imports/runtime.js
          node --check scripts/build-web-source-snapshot.mjs
          node --check scripts/web-source-security.mjs
          node --check scripts/web-source-records.mjs
          node --check scripts/verify-web-source-snapshot.mjs
          node --check netlify/functions/remote-core.mjs
          node --check netlify/functions/remote-service.mjs
          node --check netlify/functions/remote.mjs
          node --check scripts/remote-client.mjs
          node --check scripts/remote-gate.mjs
          node --check scripts/deployment-receipt.cjs
          node --check archie/archie.js
          node --check dist/archie/archie.js
          node --test scripts/tests/remote-service.test.mjs
          python studio/manual/verify.py
          node studio/manual/tests/remote-terminal-contract.mjs
          node manual-kernel/verify-kernel.mjs
          grep -q 'FORMULAS ARE THE ROOT FEED FORMULAS' manual-app/kernel.js
          grep -q 'id="debugPanel"' dist/manual/index.html
          grep -q 'data-studio-product' dist/manual/index.html
          grep -q 'data-import-workbench' dist/manual/index.html
          grep -q 'data-import-phone' dist/manual/index.html
          grep -q 'data-add-to-sideways' dist/manual/index.html
          grep -q 'data-add-to-sideways-runtime' dist/manual/index.html
          grep -q 'data-remote-terminal' dist/manual/index.html
          grep -q 'data-sideways-remote' dist/manual/index.html
          test -f dist/manual/kernel.js
          test -f dist/manual/studio.css
          test -f dist/manual/studio-components.css
          test -f dist/manual/studio-reset.css
          test -f dist/manual/studio.js
          test -f dist/manual/copy.js
          test -f dist/manual/remote-terminal.css
          test -f dist/manual/remote-terminal.js
          test -f dist/manual/remote-snapshot.json
          test -f dist/manual/.well-known/sideways-remote.json
          test -f dist/manual/import-studio.css
          test -f dist/manual/import-studio.js
          test -f dist/manual/import-phone.js
          test -f dist/manual/add-to-sideways.css
          test -f dist/manual/add-to-sideways-runtime.js
          test -f dist/manual/discovery-source.js
          test -f dist/manual/account-connections.js
          test -f dist/manual/imports/registry.js
          test -f dist/manual/imports/runtime.js
          test -f dist/founder/index.html
          test -f dist/founder/founder.css
          test -f dist/founder/founder.js
          test -f dist/maker/index.html
          test -f dist/maker/ios.html
          test -f dist/maker/maker.css
          test -f dist/maker/maker.js
          test -f dist/maker/manifest.webmanifest
          test -f dist/maker/sw.js
          test -f dist/maker/icon.svg
          test -f dist/archie/index.html
          test -f dist/archie/archie.css
          test -f dist/archie/archie.js
          test -f dist/archie/manifest.webmanifest
          test -f dist/archie/sw.js
          test -f dist/archie/icon.svg

      - name: Check Add to Sideways on phone and desktop
        run: |
          set -euo pipefail
          python -m http.server 4173 --directory dist >/tmp/manual-http.log 2>&1 &
          server=$!
          trap 'kill $server || true' EXIT
          sleep 2
          set +e
          node manual-kernel/phone-check.mjs > /tmp/add-to-sideways.log 2>&1
          status=$?
          set -e
          cat /tmp/add-to-sideways.log
          exit "$status"

      - name: Upload Add to Sideways proof
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: manual-phone-gate
          path: |
            add-to-sideways-phone.png
            add-to-sideways-desktop.png
            /tmp/add-to-sideways.log
            /tmp/manual-http.log
          if-no-files-found: warn
          retention-days: 5

      - name: Configure Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist

  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
      issues: write
    if: github.event_name == 'push' && needs.remote-gate.outputs.decision == 'proceed'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [remote-gate, build]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Verify deployed commit identity
        env:
          DEPLOYED_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
        run: node scripts/deployment-receipt.cjs verify-live

      - name: Verify Archie is anonymously reachable
        env:
          DEPLOYED_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
        run: |
          node scripts/deployment-receipt.cjs verify-archie-live > archie-public-reachability-receipt.json
          cat archie-public-reachability-receipt.json

      - name: Upsert successful deployment receipt
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          DEPLOYED_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            const fs = require('node:fs');
            const { upsertDeploymentReceipt } = require('./scripts/deployment-receipt.cjs');
            const archieReceipt = JSON.parse(fs.readFileSync('archie-public-reachability-receipt.json', 'utf8'));
            const result = await upsertDeploymentReceipt({
              github,
              context,
              deployedUrl: process.env.DEPLOYED_URL,
              archieReceipt
            });
            core.info(`deployment receipt #${result.primary.number}; closed stale receipts: ${result.closedDuplicates.join(', ') || 'none'}`);
