name: Build and deploy manual root-kernel feed

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Extract base product layers
        run: |
          set -euo pipefail
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz
          cat general-overlay.part.* | base64 -d > general-overlay.tar.xz
          tar -xJf general-overlay.tar.xz
          python general/patch.py
          cat profile-overlay.part.* | base64 -d > profile-overlay.tar.xz
          tar -xJf profile-overlay.tar.xz
          python profile/patch.py

      - name: Assemble manual overlay text
        run: |
          cat manual-overlay.b64.part.* > manual-overlay.b64
          test "$(wc -c < manual-overlay.b64)" = "44760"

      - name: Check manual overlay text
        run: echo "0d45c1ed47cdf73667f554e45c60c76f4fabd799fe7b4a0523dfa5adc58651d5  manual-overlay.b64" | sha256sum -c -

      - name: Decode manual overlay archive
        run: |
          base64 -d manual-overlay.b64 > manual-overlay.tar.xz
          echo "b18d2e3ca6dc53efb8286f3162aae6c8d6320875a8699346886c8621022c00af  manual-overlay.tar.xz" | sha256sum -c -

      - name: Extract manual product layer
        run: |
          tar -xJf manual-overlay.tar.xz
          python manual/patch.py

      - name: Reuse the exact root saturation kernel
        run: |
          set -euo pipefail
          cat manual-kernel-overlay.b64.part.* > manual-kernel-overlay.b64
          test "$(wc -c < manual-kernel-overlay.b64)" = "13264"
          echo "f5e47fe3724e2193cdab1199e811250af99d2a552294afbc96367566bc8a60a9  manual-kernel-overlay.b64" | sha256sum -c -
          base64 -d manual-kernel-overlay.b64 > manual-kernel-overlay.tar.xz
          echo "26d1602bc9a1f9bb381c8b819d923fb14bc692588715623ef9214ba8c134ef2c  manual-kernel-overlay.tar.xz" | sha256sum -c -
          tar -xJf manual-kernel-overlay.tar.xz
          python studio/manual/prepare-kernel.py
          python manual-kernel/patch.py
          cp manual-phone-check.mjs manual-kernel/phone-check.mjs

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply editable manual studio and importer
        run: |
          python studio/manual/apply.py
          python studio/manual/verify.py

      - name: Assemble manual-only PR artifact
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p dist/manual
          cp -a manual-app/. dist/manual/

      - name: Install browser tooling
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            python -m pip install --disable-pip-version-check pillow
          fi
          npm install --no-save playwright-core@1.55.0

      - name: Cache source mirror and compressed media
        if: github.event_name == 'push'
        uses: actions/cache@v4
        with:
          path: |
            .cache/wikinews
            corpus/media
          key: general-content-media-v1-${{ runner.os }}

      - name: Retrieve article source records
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          mkdir -p corpus
          if timeout 300s python scripts/fetch_wikinews.py \
            --min-date 2010-01-01 \
            --cutoff "$(date -u +%F)" \
            --output corpus/wikinews-current.jsonl.gz \
            && python general/normalize_articles.py \
            --input corpus/wikinews-current.jsonl.gz \
            --output corpus/articles.jsonl.gz \
            --max-records 1800; then
            echo 'article source ready'
          else
            echo 'article source unavailable; writing a valid empty source' >&2
            python - <<'PY'
          import gzip
          with gzip.open('corpus/articles.jsonl.gz', 'wt', encoding='utf-8'):
              pass
          PY
          fi

      - name: Retrieve forum source records
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          if timeout 360s python general/fetch_forum.py \
            --output corpus/forum.jsonl.gz \
            --min-year 2007 \
            --max-year "$(date -u +%Y)" \
            --max-records 600 \
            --detail-records 120; then
            echo 'forum source ready'
          else
            echo 'forum source unavailable; continuing without it' >&2
            python - <<'PY'
          import gzip
          with gzip.open('corpus/forum.jsonl.gz', 'wt', encoding='utf-8'):
              pass
          PY
          fi

      - name: Retrieve social source records
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          if timeout 240s python general/fetch_social.py \
            --output corpus/social.jsonl.gz \
            --pages 4 \
            --max-records 800; then
            echo 'social source ready'
          else
            echo 'social source unavailable; continuing without it' >&2
            python - <<'PY'
          import gzip
          with gzip.open('corpus/social.jsonl.gz', 'wt', encoding='utf-8'):
              pass
          PY
          fi

      - name: Normalize article forum social model
        if: github.event_name == 'push'
        run: |
          python general/merge.py \
            --articles corpus/articles.jsonl.gz \
            --forums corpus/forum.jsonl.gz \
            --social corpus/social.jsonl.gz \
            --output corpus/general.jsonl.gz

      - name: Retrieve and compress display media
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          if timeout 600s python general/media.py \
            --input corpus/general.jsonl.gz \
            --output corpus/general-media.jsonl.gz \
            --media-dir corpus/media \
            --max-media 180 \
            --discover-forum 80; then
            echo 'display media ready'
          else
            echo 'media retrieval unavailable; deploying text-first corpus' >&2
            cp corpus/general.jsonl.gz corpus/general-media.jsonl.gz
          fi

      - name: Generate one million root candidates
        if: github.event_name == 'push'
        env:
          POST_COUNT: 1000000
          CHUNK_SIZE: 1024
          CONTENT_CHUNK_SIZE: 128
          CORPUS_SEED: 20260712
          CORPUS_FILE: corpus/general-media.jsonl.gz
        run: timeout 1200s node scripts/build.mjs

      - name: Verify root product
        if: github.event_name == 'push'
        run: python verify-profile-build.py

      - name: Verify empty manual edition
        run: python verify-manual-edition.py

      - name: Verify kernel, studio, importer, and deployed assets
        run: |
          node --check manual-app/app.js
          node --check manual-app/kernel.js
          node --check manual-app/studio.js
          node --check manual-app/copy.js
          node --check manual-app/import-studio.js
          node --check manual-app/import-phone.js
          node --check manual-app/imports/registry.js
          node --check manual-app/imports/runtime.js
          python studio/manual/verify.py
          node manual-kernel/verify-kernel.mjs
          grep -q 'FORMULAS ARE THE ROOT FEED FORMULAS' manual-app/kernel.js
          grep -q 'id="debugPanel"' dist/manual/index.html
          grep -q 'data-studio-product' dist/manual/index.html
          grep -q 'data-import-workbench' dist/manual/index.html
          grep -q 'data-import-phone' dist/manual/index.html
          test -f dist/manual/kernel.js
          test -f dist/manual/studio.css
          test -f dist/manual/studio-components.css
          test -f dist/manual/studio-reset.css
          test -f dist/manual/studio.js
          test -f dist/manual/copy.js
          test -f dist/manual/import-studio.css
          test -f dist/manual/import-studio.js
          test -f dist/manual/import-phone.js
          test -f dist/manual/imports/registry.js
          test -f dist/manual/imports/runtime.js

      - name: Check manual gate and importer on a phone viewport
        run: |
          python -m http.server 4173 --directory dist >/tmp/manual-http.log 2>&1 &
          server=$!
          trap 'kill $server || true' EXIT
          sleep 2
          node manual-kernel/phone-check.mjs

      - name: Upload phone proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-phone-gate
          path: |
            manual-phone-gate.png
            manual-onboarding-phone.png
          if-no-files-found: ignore
          retention-days: 5

      - name: Configure Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record successful deployment
        uses: actions/github-script@v7
        env:
          DEPLOYED_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Sideways consumer app deployed',
              body: [
                `ROOT_URL=${process.env.DEPLOYED_URL}`,
                `MANUAL_URL=${process.env.DEPLOYED_URL}manual/`,
                `PHONE_TEST_URL=${process.env.DEPLOYED_URL}manual/?debug=1&test=1&autorun=1`,
                `COMMIT=${context.sha}`,
                'ROOT_PRODUCT=one-million-candidate feed verified',
                'MANUAL_CORPUS=empty until the user imports an app',
                'MANUAL_KERNEL=root-exact and parity checked',
                'MANUAL_STUDIO=one-tap consumer importer with no setup gate',
                'MANUAL_IMPORTS=Instagram Reddit TikTok YouTube Spotify X Mastodon bookmarks RSS JSON CSV text and canonical document/media support',
                'IMPORT_RUNTIME=chunked cancellable IndexedDB writes with dedupe and quota checks',
                'PHONE_GATE_TEST=real 390x844 touch import and in-place feed refresh',
                'IPHONE_IMPORTER=native multi-item system picker',
                'AUTOMATIC_RELOADS=zero',
                'MANUAL_STORAGE=browser-local IndexedDB'
              ].join('\n')
            });
