name: Build and deploy archive-backed feed

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract product source
        run: |
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz
      - name: Package extracted source for inspection
        if: github.event_name == 'pull_request'
        run: |
          tar --exclude='.git' --exclude='source.xz.part.*' --exclude='source.tar.xz' -czf extracted-source.tar.gz .
      - name: Upload extracted source
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: extracted-source
          path: extracted-source.tar.gz
          retention-days: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache Wikinews mirror
        uses: actions/cache@v4
        with:
          path: |
            .cache/wikinews
            corpus/wikinews-2017.jsonl.gz
            corpus/wikinews-2017.jsonl.meta.json
          key: enwikinews-through-2017-v2
      - name: Mirror English Wikinews through 2017
        run: python scripts/fetch_wikinews.py
      - name: Generate one million candidate instances
        env:
          POST_COUNT: 1000000
          CHUNK_SIZE: 1024
          ARTICLE_CHUNK_SIZE: 128
          CORPUS_SEED: 20260711
          CORPUS_FILE: corpus/wikinews-2017.jsonl.gz
        run: node scripts/build.mjs
      - name: Verify archive-backed build
        run: |
          test "$(node -p "require('./dist/data/manifest.json').count")" = "1000000"
          test "$(node -p "require('./dist/data/manifest.json').corpus.mode")" = "wikinews-archive"
          test "$(node -p "require('./dist/data/manifest.json').corpus.articles > 1000")" = "true"
          test "$(find dist/data -maxdepth 1 -type f -name '[0-9][0-9][0-9][0-9][0-9][0-9].json' | wc -l)" = "977"
          test -f dist/data/source-index.json
          test -n "$(find dist/data/articles -type f -name '*.json' -print -quit)"
          node --check dist/app.js
      - name: Configure Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
