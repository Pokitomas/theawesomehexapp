name: Build and deploy Archie one-task workflow
# Release trigger: admitted-router-140441b9ae07b03bd9069f016ea0030ad39a7dca

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remote-gate:
    runs-on: ubuntu-latest
    outputs:
      decision: ${{ steps.gate.outputs.decision }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - id: gate
        env:
          REMOTE_URL: ${{ vars.REMOTE_URL }}
          REMOTE_SESSION: ${{ vars.REMOTE_SESSION }}
          REMOTE_GATE_FAIL_CLOSED: ${{ vars.REMOTE_GATE_FAIL_CLOSED }}
        run: node scripts/remote-gate.mjs

  build:
    needs: remote-gate
    if: needs.remote-gate.outputs.decision == 'proceed'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked browser tooling
        run: npm ci --ignore-scripts --include=dev
      - name: Train and admit local neural router
        run: |
          set -euo pipefail
          python3 archie/model/train_router.py --output-dir archie | tee /tmp/archie-router-training.json
          grep -q '"admission": "admitted"' /tmp/archie-router-training.json
          grep -q '"changed_tensors": true' /tmp/archie-router-training.json
          sha256sum archie/router-model.json | grep -q '^202a6957bd0bbf0a9b4e92cd74014b2b9689393be539de8f5ab44f567a691916 '
      - name: Verify deployment and superiority contracts
        run: node --test scripts/tests/deployment-receipt.test.mjs scripts/tests/founder-superiority.test.mjs
      - name: Verify one-task progressive views
        run: npm run test:xp-surfaces
      - name: Verify product portfolio
        run: npm run test:portfolio
      - name: Verify Founder
        run: npm run test:founder
      - name: Verify Foundry
        run: npm run test:foundry:human
      - name: Verify Frontier Expo
        run: npm run test:frontier-expo
      - name: Verify Maker console
        run: node scripts/tests/maker-console.test.mjs
      - name: Verify phone install contracts
        run: node --test scripts/tests/maker-ios-install.test.mjs scripts/tests/archie-phone-product.test.mjs
      - name: Assemble admitted public surfaces
        run: |
          set -euo pipefail
          rm -rf dist
          node scripts/publish-human-surfaces.mjs dist
          mkdir -p dist/maker dist/archie dist/world-expo dist/design dist/evidence dist/product
          cp maker/index.html maker/ios.html maker/maker.css maker/maker.js maker/manifest.webmanifest maker/sw.js maker/icon.svg dist/maker/
          cp archie/index.html archie/archie.css archie/archie.js archie/router-model.json archie/router-admission.json archie/manifest.webmanifest archie/sw.js archie/icon.svg dist/archie/
          cp world-expo/index.html world-expo/expo.css world-expo/expo.js dist/world-expo/
          cp design/frontier-world-expo.json dist/design/
          cp product/xp-program-surfaces.json dist/product/
          cp benchmarks/founder-vibe-superiority.v1.json dist/evidence/
          node scripts/founder-superiority.mjs status --protocol benchmarks/founder-vibe-superiority.v1.json > dist/evidence/founder-superiority-status.json
      - name: Write exact deployment identity
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
        run: node scripts/deployment-receipt.cjs write-sentinel
      - name: Verify final artifact and phone journeys
        run: |
          set -euo pipefail
          grep -q 'Archie Program Manager' dist/index.html
          grep -q 'What should happen?' dist/index.html
          grep -q 'You are the lab now' dist/foundry/index.html || grep -q 'Foundry Research Control' dist/foundry/index.html
          grep -q 'Tiny Public Things' dist/examples/site/index.html
          grep -q 'Admitted local neural router verified' dist/archie/archie.js
          grep -q '"admission":"admitted"' dist/archie/router-admission.json
          test -f dist/desktop/index.html
          test -f dist/archie/index.html
          test -f dist/archie/router-model.json
          test -f dist/archie/router-admission.json
          test -f dist/maker/index.html
          test -f dist/world-expo/index.html
          test -f dist/product/xp-program-surfaces.json
          test -f dist/evidence/founder-superiority-status.json
          ! test -e dist/manual
          python -m http.server 4174 --directory dist >/tmp/founder-http.log 2>&1 &
          server=$!
          trap 'kill $server || true' EXIT
          sleep 2
          curl -fsS http://127.0.0.1:4174/archie/router-model.json | sha256sum | grep -q '^202a6957bd0bbf0a9b4e92cd74014b2b9689393be539de8f5ab44f567a691916 '
          FOUNDER_TEST_URL=http://127.0.0.1:4174/founder/ node scripts/tests/founder-room-phone.mjs
      - name: Upload human-power proof
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: founder-human-power-proof
          path: |
            founder-room-phone.png
            founder-room-proof.json
            dist/human-surfaces-publish.json
            dist/product/xp-program-surfaces.json
            dist/evidence/founder-superiority-status.json
            dist/archie/router-admission.json
            /tmp/archie-router-training.json
            /tmp/founder-http.log
          if-no-files-found: warn
          retention-days: 14
      - name: Configure Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - name: Upload Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist

  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
      issues: write
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.remote-gate.outputs.decision == 'proceed'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [remote-gate, build]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
      - name: Verify deployed commit identity
        env:
          DEPLOYED_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
        run: node scripts/deployment-receipt.cjs verify-live
      - name: Verify every final view is anonymously reachable
        env:
          DEPLOYED_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
        run: |
          node scripts/deployment-receipt.cjs verify-all-live > public-surface-reachability-receipts.json
          cat public-surface-reachability-receipts.json
      - name: Verify admitted router is live
        env:
          DEPLOYED_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          curl -fsS "${DEPLOYED_URL%/}/archie/router-model.json" | sha256sum | grep -q '^202a6957bd0bbf0a9b4e92cd74014b2b9689393be539de8f5ab44f567a691916 '
          curl -fsS "${DEPLOYED_URL%/}/archie/router-admission.json" | grep -q '"admission":"admitted"'
      - name: Upsert successful deployment receipt
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          DEPLOYED_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            const fs = require('node:fs');
            const { upsertDeploymentReceipt } = require('./scripts/deployment-receipt.cjs');
            const publicSurfaceSet = JSON.parse(fs.readFileSync('public-surface-reachability-receipts.json', 'utf8'));
            const result = await upsertDeploymentReceipt({
              github,
              context,
              deployedUrl: process.env.DEPLOYED_URL,
              surfaceReceipts: publicSurfaceSet.receipts
            });
            core.info(`deployment receipt #${result.primary.number}; closed stale receipts: ${result.closedDuplicates.join(', ') || 'none'}`);
