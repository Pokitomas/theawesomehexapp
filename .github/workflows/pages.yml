name: Build and deploy 2010s archive-social feed

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract product source
        run: |
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz
      - name: Patch product for mixed corpus
        run: python social/patch.py
      - name: Package current product source
        if: github.event_name == 'pull_request'
        run: tar --exclude='./.git' --exclude='./source.xz.part.*' --exclude='./source.tar.xz' --exclude='./corpus' --exclude='./dist' -czf /tmp/current-product-source.tar.gz .
      - name: Upload current product source
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: current-product-source
          path: /tmp/current-product-source.tar.gz
          retention-days: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache corpus mirrors
        uses: actions/cache@v4
        with:
          path: |
            .cache/wikinews
            corpus/wikinews-2019.jsonl.gz
            corpus/hn-2010s.jsonl.gz
            corpus/mixed-2010s.jsonl.gz
            corpus/mixed-2010s.jsonl.gz.meta.json
          key: 2010s-wikinews-hn-v1
      - name: Mirror English Wikinews 2010–2019
        run: python scripts/fetch_wikinews.py --min-date 2010-01-01 --cutoff 2019-12-31 --output corpus/wikinews-2019.jsonl.gz
      - name: Mirror public social records 2010–2019
        run: python social/fetch_social.py --output corpus/hn-2010s.jsonl.gz
      - name: Build balanced revival corpus
        run: python social/merge.py --articles corpus/wikinews-2019.jsonl.gz --social corpus/hn-2010s.jsonl.gz --output corpus/mixed-2010s.jsonl.gz
      - name: Generate one million candidate instances
        env:
          POST_COUNT: 1000000
          CHUNK_SIZE: 1024
          ARTICLE_CHUNK_SIZE: 128
          CORPUS_SEED: 20260711
          CORPUS_FILE: corpus/mixed-2010s.jsonl.gz
        run: node scripts/build.mjs
      - name: Verify balanced archive-social build
        run: |
          test "$(node -p "require('./dist/data/manifest.json').count")" = "1000000"
          test "$(node -p "require('./dist/data/manifest.json').corpus.mode")" = "2010s-archive-social"
          test "$(node -p "require('./dist/data/manifest.json').corpus.archiveArticles > 1000")" = "true"
          test "$(node -p "require('./dist/data/manifest.json').corpus.socialRecords > 500")" = "true"
          test "$(node -p "require('./dist/data/mix.json').articleCandidates")" = "500000"
          test "$(node -p "require('./dist/data/mix.json').socialCandidates")" = "500000"
          test "$(find dist/data -maxdepth 1 -type f -name '[0-9][0-9][0-9][0-9][0-9][0-9].json' | wc -l)" = "977"
          test -f dist/data/source-index.json
          test -n "$(find dist/data/articles -type f -name '*.json' -print -quit)"
          node --check dist/app.js
      - name: Configure Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Record successful corpus deployment
        uses: actions/github-script@v7
        env:
          DEPLOYED_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '2010s archive-social feed deployed',
              body: [
                `DEPLOYED_URL=${process.env.DEPLOYED_URL}`,
                `COMMIT=${context.sha}`,
                'CANDIDATES=1000000',
                'ARCHIVE_CANDIDATES=500000',
                'SOCIAL_CANDIDATES=500000',
                'DATE_RANGE=2010-01-01..2019-12-31'
              ].join('\n')
            });
