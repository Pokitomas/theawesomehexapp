name: Build and deploy independent program surfaces

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remote-gate:
    runs-on: ubuntu-latest
    outputs:
      decision: ${{ steps.gate.outputs.decision }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - id: gate
        env:
          REMOTE_URL: ${{ vars.REMOTE_URL }}
          REMOTE_SESSION: ${{ vars.REMOTE_SESSION }}
          REMOTE_GATE_FAIL_CLOSED: ${{ vars.REMOTE_GATE_FAIL_CLOSED }}
        run: node scripts/remote-gate.mjs

  build:
    needs: remote-gate
    if: needs.remote-gate.outputs.decision == 'proceed'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked browser tooling
        run: npm ci --ignore-scripts --include=dev
      - name: Verify public product contracts
        run: |
          node --test scripts/tests/deployment-receipt.test.mjs scripts/tests/founder-superiority.test.mjs
          npm run test:xp-surfaces
          npm run test:portfolio
          npm run test:founder
          npm run test:foundry:human
          npm run test:frontier-expo
          node scripts/tests/maker-console.test.mjs
          node --test scripts/tests/maker-ios-install.test.mjs scripts/tests/archie-phone-product.test.mjs
      - name: Assemble admitted public surfaces
        run: |
          set -euo pipefail
          rm -rf dist
          node scripts/publish-human-surfaces.mjs dist
          mkdir -p dist/maker dist/archie dist/world-expo dist/design dist/evidence dist/product
          cp maker/index.html maker/ios.html maker/maker.css maker/maker.js maker/manifest.webmanifest maker/sw.js maker/icon.svg dist/maker/
          cp archie/index.html archie/archie.css archie/archie.js archie/manifest.webmanifest archie/sw.js archie/icon.svg dist/archie/
          cp world-expo/index.html world-expo/expo.css world-expo/expo.js dist/world-expo/
          cp design/frontier-world-expo.json dist/design/
          cp product/xp-program-surfaces.json dist/product/
          cp benchmarks/founder-vibe-superiority.v1.json dist/evidence/
          node scripts/founder-superiority.mjs status --protocol benchmarks/founder-vibe-superiority.v1.json > dist/evidence/founder-superiority-status.json
      - name: Write exact deployment identity
        if: github.event_name == 'push'
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
        run: node scripts/deployment-receipt.cjs write-sentinel
      - name: Verify final artifact and phone journeys
        run: |
          set -euo pipefail
          grep -q 'Archie Program Manager' dist/index.html
          grep -q 'You are the lab now' dist/foundry/index.html || grep -q 'Foundry Research Control' dist/foundry/index.html
          grep -q 'Tiny Public Things' dist/examples/site/index.html
          test -f dist/desktop/index.html
          test -f dist/archie/index.html
          test -f dist/maker/index.html
          test -f dist/world-expo/index.html
          test -f dist/product/xp-program-surfaces.json
          test -f dist/evidence/founder-superiority-status.json
          ! test -e dist/manual
          python -m http.server 4174 --directory dist >/tmp/founder-http.log 2>&1 &
          server=$!
          trap 'kill $server || true' EXIT
          sleep 2
          FOUNDER_TEST_URL=http://127.0.0.1:4174/founder/ node scripts/tests/founder-room-phone.mjs
      - name: Upload human-power proof
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: founder-human-power-proof
          path: |
            founder-room-phone.png
            founder-room-proof.json
            dist/human-surfaces-publish.json
            dist/product/xp-program-surfaces.json
            dist/evidence/founder-superiority-status.json
            /tmp/founder-http.log
          if-no-files-found: error
          retention-days: 14
      - name: Configure Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@983d7736d9b0ae728b81ad16ebd13914f8d7745b # v5
      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist

  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
      issues: write
    if: github.event_name == 'push' && needs.remote-gate.outputs.decision == 'proceed'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [remote-gate, build]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
      - name: Verify deployed commit identity
        env:
          DEPLOYED_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
        run: node scripts/deployment-receipt.cjs verify-live
      - name: Verify Founder and Archie are anonymously reachable
        env:
          DEPLOYED_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
        run: |
          node scripts/deployment-receipt.cjs verify-founder-live > founder-public-reachability-receipt.json
          node scripts/deployment-receipt.cjs verify-archie-live > archie-public-reachability-receipt.json
          cat founder-public-reachability-receipt.json
          cat archie-public-reachability-receipt.json
      - name: Upsert successful deployment receipt
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          DEPLOYED_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            const fs = require('node:fs');
            const { upsertDeploymentReceipt } = require('./scripts/deployment-receipt.cjs');
            const founderReceipt = JSON.parse(fs.readFileSync('founder-public-reachability-receipt.json', 'utf8'));
            const archieReceipt = JSON.parse(fs.readFileSync('archie-public-reachability-receipt.json', 'utf8'));
            const result = await upsertDeploymentReceipt({
              github,
              context,
              deployedUrl: process.env.DEPLOYED_URL,
              founderReceipt,
              archieReceipt
            });
            core.info(`deployment receipt #${result.primary.number}; closed stale receipts: ${result.closedDuplicates.join(', ') || 'none'}`);
