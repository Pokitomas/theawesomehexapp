name: Diagnose assembled ingestion contracts

on:
  pull_request:
    paths:
      - 'studio/manual/**'
      - 'scripts/build-web-source-snapshot.mjs'
      - 'scripts/tests/discovery-connected-import.test.mjs'
      - 'scripts/tests/web-source-snapshot.test.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pages.yml'
      - '.github/workflows/ingestion-diagnostic.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Assemble the same manual product
        run: |
          set -euo pipefail
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz
          cat general-overlay.part.* | base64 -d > general-overlay.tar.xz
          tar -xJf general-overlay.tar.xz
          python general/patch.py
          cat profile-overlay.part.* | base64 -d > profile-overlay.tar.xz
          tar -xJf profile-overlay.tar.xz
          python profile/patch.py
          cat manual-overlay.b64.part.* > manual-overlay.b64
          base64 -d manual-overlay.b64 > manual-overlay.tar.xz
          tar -xJf manual-overlay.tar.xz
          python manual/patch.py
          cat manual-kernel-overlay.b64.part.* > manual-kernel-overlay.b64
          base64 -d manual-kernel-overlay.b64 > manual-kernel-overlay.tar.xz
          tar -xJf manual-kernel-overlay.tar.xz
          python studio/manual/prepare-kernel.py
          python manual-kernel/patch.py
          python studio/manual/apply.py
          python studio/manual/verify.py
      - name: Install locked tooling
        run: npm ci --ignore-scripts --include=dev
      - name: Capture ingestion contract output
        id: contracts
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:ingestion 2>&1 | tee ingestion-contracts.log
      - name: Upload complete diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: assembled-ingestion-diagnostic-${{ github.run_id }}
          path: ingestion-contracts.log
          if-no-files-found: error
          retention-days: 3
      - name: Fail when contracts failed
        if: steps.contracts.outcome != 'success'
        run: exit 1
