name: Lead engineer post-timeout sweep

on:
  pull_request:
    paths:
      - '.github/workflows/lead-engineer-post-timeout-sweep.yml'
      - 'scripts/maker-*.mjs'
      - 'scripts/tests/maker-*.test.mjs'
      - 'maker/runtime/**'
      - 'maker/contracts/**'

permissions:
  contents: read

jobs:
  targeted-runtime-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run current unresolved Maker suites
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p "$RUNNER_TEMP/lead-post-timeout-sweep"
          failed=0
          suites=(
            scripts/tests/maker-edit-broker.test.mjs
            scripts/tests/maker-model-router.test.mjs
            scripts/tests/maker-repository-intelligence.test.mjs
            scripts/tests/maker-orchestrator.test.mjs
            scripts/tests/maker-plugin-registry.test.mjs
            scripts/tests/maker-runtime-platform.test.mjs
            scripts/tests/maker-worker-fleet.test.mjs
          )
          for suite in "${suites[@]}"; do
            name="$(basename "$suite" .test.mjs)"
            set +e
            node --test "$suite" 2>&1 | tee "$RUNNER_TEMP/lead-post-timeout-sweep/$name.log"
            status=${PIPESTATUS[0]}
            set -e
            printf '%s\n' "$status" > "$RUNNER_TEMP/lead-post-timeout-sweep/$name.exit-code"
            if [ "$status" -ne 0 ]; then failed=1; fi
          done
          exit "$failed"
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lead-post-timeout-sweep-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/lead-post-timeout-sweep
          if-no-files-found: error
          retention-days: 14
