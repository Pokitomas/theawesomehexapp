name: Prove universal media lab on phone

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  universal-media:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Assemble the manual product
        run: |
          set -euo pipefail
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz
          cat general-overlay.part.* | base64 -d > general-overlay.tar.xz
          tar -xJf general-overlay.tar.xz
          python general/patch.py
          cat profile-overlay.part.* | base64 -d > profile-overlay.tar.xz
          tar -xJf profile-overlay.tar.xz
          python profile/patch.py
          cat manual-overlay.b64.part.* > manual-overlay.b64
          base64 -d manual-overlay.b64 > manual-overlay.tar.xz
          tar -xJf manual-overlay.tar.xz
          python manual/patch.py
          cat manual-kernel-overlay.b64.part.* > manual-kernel-overlay.b64
          base64 -d manual-kernel-overlay.b64 > manual-kernel-overlay.tar.xz
          tar -xJf manual-kernel-overlay.tar.xz
          python studio/manual/prepare-kernel.py
          python manual-kernel/patch.py
          python studio/manual/apply.py
          python studio/manual/verify.py
          mkdir -p dist/manual
          cp -a manual-app/. dist/manual/
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked browser tooling
        run: |
          git checkout -- package.json package-lock.json
          set +e
          npm ci --ignore-scripts --include=dev >npm-ci-browser.log 2>&1
          install_status=$?
          set -e
          cat npm-ci-browser.log
          if [ "$install_status" -ne 0 ]; then exit "$install_status"; fi
          node -e "import('playwright-core')" 2>&1 | tee playwright-import.log
      - name: Prove byte classification surfaces modes and imported deletion
        run: |
          set -euo pipefail
          python -m http.server 4173 --directory dist >/tmp/universal-media-http.log 2>&1 &
          server=$!
          trap 'kill $server || true' EXIT
          sleep 2

          run_proof() {
            log="$1"
            shift
            set +e
            "$@" >"$log" 2>&1
            status=$?
            set -e
            cat "$log"
            return "$status"
          }

          run_proof universal-media-check.log node studio/manual/tests/universal-media-clickthrough.mjs http://127.0.0.1:4173/manual/
          run_proof runtime-hardening-check.log node studio/manual/tests/runtime-hardening-clickthrough.mjs http://127.0.0.1:4173/manual/
      - name: Upload media lab proof
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: universal-media-phone
          path: |
            manual-universal-media-grid.png
            manual-universal-media-empty.png
            npm-ci-browser.log
            playwright-import.log
            universal-media-check.log
            runtime-hardening-check.log
            /tmp/universal-media-http.log
          if-no-files-found: warn
          retention-days: 5
