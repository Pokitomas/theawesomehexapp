name: Authority manifest drift

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authority-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check authority manifest and drift
        shell: bash
        run: |
          set -o pipefail
          npm run test:authority 2>&1 | tee authority-audit.log
      - name: Preserve complete authority drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: authority-audit-report
          path: authority-audit.log
          if-no-files-found: error
          retention-days: 14
