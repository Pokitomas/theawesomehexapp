name: Authority manifest drift

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authority-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Check authority manifest and drift
        shell: bash
        run: |
          set -o pipefail
          npm run test:authority 2>&1 | tee authority-audit.log
      - name: Preserve complete authority drift report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: authority-audit-report
          path: authority-audit.log
          if-no-files-found: error
          retention-days: 14
