name: Admit exact green Maker runtime composition

on:
  pull_request:
    paths:
      - '.archie-payload/runtime-composition/final.tar.gz'
      - '.github/workflows/admit-plugin-worker-timeout-repair.yml'

permissions:
  contents: write

jobs:
  admit:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      TARGET_BRANCH: agent/maker-archie-final-integration
      EXPECTED_TARGET_HEAD: 30fed919a500cc13963e25d55d557ac371ddac8a
      ARCHIVE_SHA256: 16e9af8623fe1a739ed3e8c094a99691c70065553a8eecb75c49257fca97431e
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: npm
      - name: Verify exact seven-path archive
        shell: bash
        run: |
          set -euo pipefail
          archive=.archie-payload/runtime-composition/final.tar.gz
          test -f "$archive"
          echo "$ARCHIVE_SHA256  $archive" | sha256sum --check --strict
          tar -tzf "$archive" | sed 's#^\./##' | sort > /tmp/archive-paths.txt
          cat > /tmp/expected-paths.txt <<'PATHS'
          maker/contracts/plugin-manifest.schema.json
          scripts/maker-model-router.mjs
          scripts/maker-plugin-registry.mjs
          scripts/maker-runtime-platform.mjs
          scripts/maker-worker-fleet.mjs
          scripts/tests/maker-plugin-registry.test.mjs
          scripts/tests/maker-runtime-platform.test.mjs
          PATHS
          sort -o /tmp/expected-paths.txt /tmp/expected-paths.txt
          diff -u /tmp/expected-paths.txt /tmp/archive-paths.txt
      - name: Guard and materialize exact target candidate
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "$TARGET_BRANCH"
          test "$(git rev-parse FETCH_HEAD)" = "$EXPECTED_TARGET_HEAD"
          git checkout -B "$TARGET_BRANCH" FETCH_HEAD
          tar -xzf "$GITHUB_WORKSPACE/.archie-payload/runtime-composition/final.tar.gz" -C .
          git status --short
      - name: Capture exact composed proof
        shell: bash
        run: |
          set -uo pipefail
          npm ci --ignore-scripts > /tmp/npm-ci.log 2>&1
          npm_status=$?
          node --check scripts/maker-model-router.mjs > /tmp/model-check.log 2>&1
          model_check_status=$?
          node --check scripts/maker-worker-fleet.mjs > /tmp/worker-check.log 2>&1
          worker_check_status=$?
          node --check scripts/maker-plugin-registry.mjs > /tmp/plugin-check.log 2>&1
          plugin_check_status=$?
          node --check scripts/maker-runtime-platform.mjs > /tmp/runtime-check.log 2>&1
          runtime_check_status=$?
          node --check scripts/tests/maker-plugin-registry.test.mjs >> /tmp/plugin-check.log 2>&1
          plugin_test_check_status=$?
          node --check scripts/tests/maker-runtime-platform.test.mjs >> /tmp/runtime-check.log 2>&1
          runtime_test_check_status=$?
          node -e "JSON.parse(require('fs').readFileSync('maker/contracts/plugin-manifest.schema.json','utf8'))" > /tmp/schema.log 2>&1
          schema_status=$?
          node --test scripts/tests/maker-model-router.test.mjs > /tmp/model-test.log 2>&1
          model_status=$?
          node --test scripts/tests/maker-worker-fleet.test.mjs > /tmp/worker-test.log 2>&1
          worker_status=$?
          node --test scripts/tests/maker-plugin-registry.test.mjs > /tmp/plugin-test.log 2>&1
          plugin_status=$?
          node --test scripts/tests/maker-runtime-platform.test.mjs > /tmp/runtime-test.log 2>&1
          runtime_status=$?
          node --test scripts/tests/maker-control-plane.test.mjs > /tmp/control-test.log 2>&1
          control_status=$?
          git diff --check > /tmp/diff-check.log 2>&1
          diff_status=$?
          printf 'npm=%s\nmodel_check=%s\nworker_check=%s\nplugin_check=%s\nruntime_check=%s\nplugin_test_check=%s\nruntime_test_check=%s\nschema=%s\nmodel=%s\nworker=%s\nplugin=%s\nruntime=%s\ncontrol=%s\ndiff=%s\n' \
            "$npm_status" "$model_check_status" "$worker_check_status" "$plugin_check_status" "$runtime_check_status" "$plugin_test_check_status" "$runtime_test_check_status" "$schema_status" "$model_status" "$worker_status" "$plugin_status" "$runtime_status" "$control_status" "$diff_status" | tee /tmp/proof-status.txt
          for log in /tmp/npm-ci.log /tmp/model-check.log /tmp/worker-check.log /tmp/plugin-check.log /tmp/runtime-check.log /tmp/schema.log /tmp/model-test.log /tmp/worker-test.log /tmp/plugin-test.log /tmp/runtime-test.log /tmp/control-test.log /tmp/diff-check.log; do echo "===== $log ====="; cat "$log"; done
      - name: Upload exact pre-admission proof
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: maker-runtime-composition-pre-admission
          path: |
            /tmp/archive-paths.txt
            /tmp/expected-paths.txt
            /tmp/proof-status.txt
            /tmp/npm-ci.log
            /tmp/model-check.log
            /tmp/worker-check.log
            /tmp/plugin-check.log
            /tmp/runtime-check.log
            /tmp/schema.log
            /tmp/model-test.log
            /tmp/worker-test.log
            /tmp/plugin-test.log
            /tmp/runtime-test.log
            /tmp/control-test.log
            /tmp/diff-check.log
          if-no-files-found: error
          retention-days: 14
      - name: Enforce proof and push guarded candidate
        shell: bash
        run: |
          set -euo pipefail
          for key in npm model_check worker_check plugin_check runtime_check plugin_test_check runtime_test_check schema model worker plugin runtime control diff; do
            test "$(awk -F= -v key="$key" '$1==key{print $2}' /tmp/proof-status.txt)" = 0
          done
          grep -Eq '# tests 30|tests 30' /tmp/model-test.log
          grep -Eq '# pass 30|pass 30' /tmp/model-test.log
          grep -Eq '# tests 25|tests 25' /tmp/worker-test.log
          grep -Eq '# pass 25|pass 25' /tmp/worker-test.log
          grep -Eq '# tests 32|tests 32' /tmp/plugin-test.log
          grep -Eq '# pass 32|pass 32' /tmp/plugin-test.log
          grep -Eq '# tests 13|tests 13' /tmp/runtime-test.log
          grep -Eq '# pass 13|pass 13' /tmp/runtime-test.log
          remote_head="$(git ls-remote origin "refs/heads/$TARGET_BRANCH" | cut -f1)"
          test "$remote_head" = "$EXPECTED_TARGET_HEAD"
          git config user.name 'sideways-maker-coordinator'
          git config user.email 'actions@users.noreply.github.com'
          git add maker/contracts/plugin-manifest.schema.json scripts/maker-model-router.mjs scripts/maker-plugin-registry.mjs scripts/maker-runtime-platform.mjs scripts/maker-worker-fleet.mjs scripts/tests/maker-plugin-registry.test.mjs scripts/tests/maker-runtime-platform.test.mjs
          test "$(git diff --cached --name-only | sort | paste -sd ' ' -)" = "maker/contracts/plugin-manifest.schema.json scripts/maker-model-router.mjs scripts/maker-plugin-registry.mjs scripts/maker-runtime-platform.mjs scripts/maker-worker-fleet.mjs scripts/tests/maker-plugin-registry.test.mjs scripts/tests/maker-runtime-platform.test.mjs"
          git commit -m 'Compose strongest admitted Maker runtime'
          new_head="$(git rev-parse HEAD)"
          git push origin "HEAD:refs/heads/$TARGET_BRANCH"
          sha256sum maker/contracts/plugin-manifest.schema.json scripts/maker-model-router.mjs scripts/maker-plugin-registry.mjs scripts/maker-runtime-platform.mjs scripts/maker-worker-fleet.mjs scripts/tests/maker-plugin-registry.test.mjs scripts/tests/maker-runtime-platform.test.mjs > /tmp/admitted-files.sha256
          printf 'source_pr=361\narchive_sha256=%s\nexpected_target_head=%s\nnew_target_head=%s\nchanged_paths=7\nmodel_router_tests=30/30\nworker_fleet_tests=25/25\nplugin_registry_tests=32/32\nruntime_platform_tests=13/13\ncontrol_plane_tests=passed\nmutation_scope=exact-seven-path-archive\n' "$ARCHIVE_SHA256" "$EXPECTED_TARGET_HEAD" "$new_head" > /tmp/admission-receipt.txt
      - name: Upload exact admission receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: maker-runtime-composition-admission
          path: |
            /tmp/admission-receipt.txt
            /tmp/admitted-files.sha256
          if-no-files-found: warn
          retention-days: 14
