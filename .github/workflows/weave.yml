name: Verify weave protocol

on:
  pull_request:
    paths:
      - 'scripts/weave-*.mjs'
      - 'scripts/tests/weave-*.test.mjs'
      - 'netlify/functions/weave-lasso-service.mjs'
      - 'netlify/functions/remote-service.mjs'
      - 'WEAVE_PROTOCOL.md'
      - 'PROGRAM_ONTOLOGY.md'
      - '.github/workflows/weave.yml'
      - '.github/workflows/weave-lasso.yml'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - 'scripts/weave-*.mjs'
      - 'scripts/tests/weave-*.test.mjs'
      - 'netlify/functions/weave-lasso-service.mjs'
      - 'netlify/functions/remote-service.mjs'
      - 'WEAVE_PROTOCOL.md'
      - 'PROGRAM_ONTOLOGY.md'
      - '.github/workflows/weave.yml'
      - '.github/workflows/weave-lasso.yml'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read

jobs:
  weave-protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install runtime dependencies
        run: npm install --ignore-scripts
      - name: Verify weave modules
        run: |
          node --check scripts/weave-protocol.mjs
          node --check scripts/weave-client.mjs
          node --check scripts/weave-lasso.mjs
          node --check netlify/functions/weave-lasso-service.mjs
          node --check netlify/functions/remote-service.mjs
          node --test scripts/tests/weave-*.test.mjs
