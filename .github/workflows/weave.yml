name: Verify weave protocol

on:
  pull_request:
    paths:
      - 'scripts/weave-protocol.mjs'
      - 'scripts/weave-client.mjs'
      - 'scripts/weave-lasso.mjs'
      - 'scripts/tests/weave-protocol.test.mjs'
      - 'scripts/tests/weave-lasso.test.mjs'
      - 'scripts/tests/weave-lasso-service.test.mjs'
      - 'scripts/tests/weave-lasso-adversarial.test.mjs'
      - 'scripts/tests/weave-active-state.test.mjs'
      - 'netlify/functions/weave-lasso-service.mjs'
      - 'netlify/functions/remote-service.mjs'
      - 'WEAVE_PROTOCOL.md'
      - 'PROGRAM_ONTOLOGY.md'
      - '.github/workflows/weave.yml'
      - '.github/workflows/weave-lasso.yml'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - 'scripts/weave-protocol.mjs'
      - 'scripts/weave-client.mjs'
      - 'scripts/weave-lasso.mjs'
      - 'scripts/tests/weave-protocol.test.mjs'
      - 'scripts/tests/weave-lasso.test.mjs'
      - 'scripts/tests/weave-lasso-service.test.mjs'
      - 'scripts/tests/weave-lasso-adversarial.test.mjs'
      - 'scripts/tests/weave-active-state.test.mjs'
      - 'netlify/functions/weave-lasso-service.mjs'
      - 'netlify/functions/remote-service.mjs'
      - 'WEAVE_PROTOCOL.md'
      - 'PROGRAM_ONTOLOGY.md'
      - '.github/workflows/weave.yml'
      - '.github/workflows/weave-lasso.yml'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read

jobs:
  weave-protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked runtime dependencies
        run: npm ci --ignore-scripts
      - name: Check v1 weave modules
        run: |
          node --check scripts/weave-protocol.mjs
          node --check scripts/weave-client.mjs
          node --check scripts/weave-lasso.mjs
          node --check netlify/functions/weave-lasso-service.mjs
          node --check netlify/functions/remote-service.mjs
      - name: Verify v1 weave protocol
        run: npm run test:weave
