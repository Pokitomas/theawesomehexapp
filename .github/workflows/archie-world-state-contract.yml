name: Archie world-state contract

on:
  pull_request:
    paths:
      - "foundry/archie-distill/archie_hybrid_core.py"
      - "foundry/archie-distill/archie_world_state_core.py"
      - "foundry/archie-distill/train_archie_world_state.py"
      - "foundry/archie-distill/evaluate_world_state_transfer.py"
      - "foundry/archie-distill/test_archie_world_state_core.py"
      - ".github/workflows/archie-world-state-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install runtime dependencies
        run: python -m pip install --upgrade pip numpy torch
      - name: Verify world-state architecture
        working-directory: foundry/archie-distill
        run: |
          python test_archie_world_state_core.py
          python train_archie_world_state.py --selftest
          python evaluate_world_state_transfer.py --selftest
