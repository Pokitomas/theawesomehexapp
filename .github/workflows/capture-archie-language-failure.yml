name: Capture Archie language failure

on:
  pull_request:
    paths:
      - .github/workflows/capture-archie-language-failure.yml

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - name: Remove diagnostic from test tree
        run: rm .github/workflows/capture-archie-language-failure.yml
      - id: tests
        name: Capture focused TAP output
        shell: bash
        run: |
          set +e
          node --test foundry/archie-neural/tests/archie-language.test.mjs >archie-language.tap 2>&1
          language_status=$?
          node --test foundry/archie-neural/tests/archie-evidence-compiler.test.mjs >archie-evidence.tap 2>&1
          evidence_status=$?
          set -e
          cat archie-language.tap
          cat archie-evidence.tap
          echo "language_status=$language_status" >> "$GITHUB_OUTPUT"
          echo "evidence_status=$evidence_status" >> "$GITHUB_OUTPUT"
      - name: Upload focused TAP output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: archie-language-tap
          path: |
            archie-language.tap
            archie-evidence.tap
          if-no-files-found: error
          retention-days: 5
      - name: Remove capture workflow from branch
        if: always()
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git reset
          git add -u .github/workflows/capture-archie-language-failure.yml
          test "$(git diff --cached --name-only)" = ".github/workflows/capture-archie-language-failure.yml"
          git commit -m "chore: remove Archie TAP capture"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Preserve test status
        if: steps.tests.outputs.language_status != '0' || steps.tests.outputs.evidence_status != '0'
        run: exit 1
