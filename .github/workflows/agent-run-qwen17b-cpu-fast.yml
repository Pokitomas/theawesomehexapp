name: Execute exact Qwen3 1.7B CPU fast lane

# Launch marker: exact target fast v1
on:
  pull_request:
    types: [synchronize]
    paths:
      - '.github/workflows/agent-run-qwen17b-cpu-fast.yml'

permissions:
  contents: read

jobs:
  target_fast:
    runs-on: ubuntu-24.04
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755
        with:
          python-version: '3.12'
      - name: Install CPU training packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.7.1
          python -m pip install transformers==4.53.2 peft==0.16.0 accelerate==1.8.1 safetensors==0.5.3
      - name: Execute exact target update
        continue-on-error: true
        run: |
          mkdir -p /tmp/archie-qwen17b-fast
          export HF_HOME=/tmp/huggingface
          export HF_HUB_DISABLE_TELEMETRY=1
          export TOKENIZERS_PARALLELISM=false
          export PYTHONUNBUFFERED=1
          set -o pipefail
          python foundry/archie-distill/linux_cpu_rslora_train.py \
            --lane target-1.7b-fast \
            --model Qwen/Qwen3-1.7B \
            --revision 8d4744f9e13072f4920c326350fa81eedb74eae9 \
            --dtype bfloat16 \
            --corpus foundry/archie-distill/linux_cpu_training_corpus.jsonl \
            --output /tmp/archie-qwen17b-fast \
            --max-steps 1 \
            --train-limit 1 \
            --eval-limit 1 \
            --rank 4 \
            --alpha 8 \
            --learning-rate 0.0003 \
            --max-seq-length 32 \
            --prompt-replay-tokens 8 \
            --prompt-head-tokens 4 \
            --shared-prefix-replay-tokens 4 \
            --max-divergence-tokens 24 \
            --time-budget-minutes 270 \
            --threads 2 \
            --target-modules q_proj,v_proj 2>&1 | tee /tmp/archie-qwen17b-fast/run.log
      - name: Compact and print evidence
        if: always()
        run: |
          cat /tmp/archie-qwen17b-fast/training-receipt.json || true
          rm -rf /tmp/archie-qwen17b-fast/checkpoints /tmp/archie-qwen17b-fast/tokenizer
          find /tmp/archie-qwen17b-fast -maxdepth 3 -type f -print || true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: archie-qwen17b-fast-${{ github.run_id }}
          path: /tmp/archie-qwen17b-fast
          if-no-files-found: warn
          compression-level: 0
          retention-days: 30
