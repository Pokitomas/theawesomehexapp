name: Archie audit-backed factorized experiment

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: archie-factorized-audit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  train-and-evaluate:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out exact candidate head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755 # v6.2.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install numerical dependencies
        run: python -m pip install --upgrade numpy scipy scikit-learn joblib

      - name: Verify experiment source
        working-directory: foundry/archie-protocol/factorized
        run: |
          set -euo pipefail
          python -m py_compile factorized_controller.py audit_factorized_train.py
          python - <<'PY'
          import ast
          from pathlib import Path
          source = Path('audit_factorized_train.py').read_text()
          tree = ast.parse(source)
          calls = [node for node in ast.walk(tree) if isinstance(node, ast.Call)]
          if 'not-admitted' not in source or 'production_changed' not in source:
              raise SystemExit('non-promotion contract missing')
          if 'frozen_evidence_used_for_selection' not in source:
              raise SystemExit('selection boundary missing')
          print({'python_calls': len(calls), 'source_bytes': len(source.encode())})
          PY

      - name: Train and evaluate bounded factorized candidates
        run: |
          set -euo pipefail
          python foundry/archie-protocol/factorized/audit_factorized_train.py \
            --audit-corpus foundry/archie-protocol/neural/data/route-train-v6.json \
            --frozen-challenge foundry/archie-protocol/factorized/blind-challenge-pack.frozen.json \
            --legacy-dir foundry/archie-protocol/neural/data \
            --out foundry/archie-protocol/factorized/runs/audit-925 \
            --seed 91017

      - name: Verify immutable receipt and rejection
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          out = Path('foundry/archie-protocol/factorized/runs/audit-925')
          receipt = json.loads((out / 'factorized-audit-receipt.json').read_text())
          comparison = json.loads((out / 'factorized-audit-comparison.json').read_text())
          model = out / receipt['model']['path']
          actual = hashlib.sha256(model.read_bytes()).hexdigest()
          if actual != receipt['model']['sha256'] or actual != comparison['model_sha256']:
              raise SystemExit('factorized model digest mismatch')
          if receipt['promotion'] != 'not-admitted' or comparison['promotion'] != 'not-admitted':
              raise SystemExit('factorized experiment attempted promotion')
          if receipt['production_changed'] or comparison['production_changed']:
              raise SystemExit('factorized experiment claims production mutation')
          if receipt['data']['frozen_exact_overlap'] != 0:
              raise SystemExit('frozen overlap gate failed')
          print(json.dumps(comparison, indent=2))
          PY

      - name: Upload digest-bound factorized evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-factorized-audit-${{ github.event.pull_request.head.sha || github.sha }}
          path: foundry/archie-protocol/factorized/runs/audit-925
          if-no-files-found: error
          retention-days: 30
