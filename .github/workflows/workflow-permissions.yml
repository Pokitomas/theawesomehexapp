name: Verify workflow authority

on:
  pull_request:
    paths:
      - '.github/workflows/*.yml'
      - 'scripts/tests/workflow-permissions.test.mjs'
  push:
    branches: [main]
    paths:
      - '.github/workflows/*.yml'
      - 'scripts/tests/workflow-permissions.test.mjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: node --test scripts/tests/workflow-permissions.test.mjs
