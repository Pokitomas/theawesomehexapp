name: Prove profile-first starter on phone

on:
  pull_request:
    paths:
      - 'studio/manual/**'
      - 'manual-phone-check.mjs'
      - 'netlify/**'
      - 'package.json'
      - 'netlify.toml'
      - '.github/workflows/frontier-phone-proof.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontier-phone:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install proof runtime
        run: |
          npm install
          npm install --no-save playwright-core@1.55.0
          command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser

      - name: Assemble the canonical manual product
        run: |
          set -euo pipefail
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz
          cat general-overlay.part.* | base64 -d > general-overlay.tar.xz
          tar -xJf general-overlay.tar.xz
          python3 general/patch.py
          cat profile-overlay.part.* | base64 -d > profile-overlay.tar.xz
          tar -xJf profile-overlay.tar.xz
          python3 profile/patch.py
          cat manual-overlay.b64.part.* > manual-overlay.b64
          base64 -d manual-overlay.b64 > manual-overlay.tar.xz
          tar -xJf manual-overlay.tar.xz
          python3 manual/patch.py
          cat manual-kernel-overlay.b64.part.* > manual-kernel-overlay.b64
          base64 -d manual-kernel-overlay.b64 > manual-kernel-overlay.tar.xz
          tar -xJf manual-kernel-overlay.tar.xz
          python3 studio/manual/prepare-kernel.py
          python3 manual-kernel/patch.py
          python3 studio/manual/apply.py

      - name: Verify the product, backend, and live terminal contracts
        run: |
          python3 studio/manual/verify.py
          node studio/manual/tests/frontier-contract.mjs
          node --check studio/manual/product/frontier.js
          node --check studio/manual/product/remote-terminal.js
          node --check netlify/functions/profile.mjs
          node --check netlify/functions/starter.mjs
          node --check netlify/functions/remote-engine.mjs
          node --check netlify/functions/remote-core.mjs
          node --test tests/remote-core.test.mjs tests/remote-gate.test.mjs

      - name: Run the real phone journeys
        run: |
          python3 -m http.server 4173 --directory manual-app > /tmp/sideways-frontier-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4173/index.html >/dev/null && break
            sleep 1
          done
          node studio/manual/tests/frontier-onboarding-clickthrough.mjs http://127.0.0.1:4173/index.html
          node studio/manual/tests/remote-terminal-clickthrough.mjs http://127.0.0.1:4173/index.html

      - name: Upload direct visual proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontier-phone-proof
          path: |
            frontier-profile-proof.png
            frontier-starter-proof.png
            frontier-phone-proof.png
            remote-terminal-phone-proof.png
            /tmp/sideways-frontier-server.log
          if-no-files-found: warn
          retention-days: 5
