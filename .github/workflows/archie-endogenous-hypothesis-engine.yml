name: Archie endogenous hypothesis engine

on:
  pull_request:
    paths:
      - 'foundry/archie-distill/archie_endogenous_hypothesis_engine.py'
      - 'foundry/archie-distill/test_archie_endogenous_hypothesis_engine.py'
      - 'foundry/archie-distill/run_archie_endogenous_hypothesis_engine.sh'
      - '.github/workflows/archie-endogenous-hypothesis-engine.yml'
  push:
    branches:
      - 'agent/archie-endogenous-hypothesis-engine-20260723'

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install CPU torch
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Compile and shell-check
        run: |
          python -m py_compile \
            foundry/archie-distill/archie_endogenous_hypothesis_engine.py \
            foundry/archie-distill/test_archie_endogenous_hypothesis_engine.py
          bash -n foundry/archie-distill/run_archie_endogenous_hypothesis_engine.sh
      - name: Structural court
        working-directory: foundry/archie-distill
        run: python -m unittest -v test_archie_endogenous_hypothesis_engine.EndogenousHypothesisEngineTest
      - name: CPU end-to-end smoke
        working-directory: foundry/archie-distill
        run: |
          python archie_endogenous_hypothesis_engine.py \
            --profile smoke \
            --device cpu \
            --output-dir /tmp/archie-endogenous-hypothesis
          test -s /tmp/archie-endogenous-hypothesis/endogenous-hypothesis-engine.json
