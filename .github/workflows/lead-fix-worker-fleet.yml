name: Apply exact worker-fleet liveness repair

on:
  push:
    branches: [lead/fix-worker-fleet-liveness-20260717]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor == 'Pokitomas'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Apply exact timer and export repair
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/maker-worker-fleet.mjs')
          text = path.read_text()
          needle = '.unref?.()'
          count = text.count(needle)
          if count != 1:
              raise SystemExit(f'expected one worker-fleet timeout unref, found {count}')
          text = text.replace(needle, '')
          aliases = '\nexport const createFleetAdapterRegistry = createWorkerAdapterRegistry;\nexport const registerDefaultFleetAdapters = registerDefaultWorkerAdapters;\n'
          if 'export const createFleetAdapterRegistry' in text or 'export const registerDefaultFleetAdapters' in text:
              raise SystemExit('canonical fleet aliases already exist unexpectedly')
          path.write_text(text + aliases)
          PY
      - name: Prove focused fleet and import contracts
        run: |
          node --check scripts/maker-worker-fleet.mjs
          node --test scripts/tests/maker-worker-fleet.test.mjs
          node --input-type=module -e "import('./scripts/maker-worker-fleet.mjs').then(m => { if (typeof m.createFleetAdapterRegistry !== 'function' || typeof m.registerDefaultFleetAdapters !== 'function') process.exit(1); })"
      - name: Commit only the proven source repair
        run: |
          rm .github/workflows/lead-fix-worker-fleet.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/maker-worker-fleet.mjs .github/workflows/lead-fix-worker-fleet.yml
          git commit -m 'Repair worker fleet timeout liveness and exports'
          git push origin HEAD:${{ github.ref_name }}
