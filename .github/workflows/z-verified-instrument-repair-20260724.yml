name: Verified instrument genesis repair

on:
  pull_request:
    branches:
      - 'agent/archie-endogenous-hypothesis-engine-20260723'
  push:
    branches:
      - 'agent/archie-instrument-genesis-v2-20260723'

permissions:
  contents: write

concurrency:
  group: verified-instrument-genesis-repair
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/archie-instrument-genesis-v2-20260723
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Reconstruct verified payload
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, hashlib, tarfile
          from pathlib import Path
          names = [
              'part-00','part-01','part-02-00','part-02-01','part-02-02','part-02-03','part-02-04',
              'part-02-05-00','part-02-05-01-00','part-02-05-01-01','part-02-05-01-02','part-02-05-02',
              'part-03','part-04','part-05','part-06','part-07',
          ]
          root = Path('.github/repair-payload')
          encoded = ''.join((root / name).read_text(encoding='utf-8').strip() for name in names)
          payload = base64.b64decode(encoded, validate=True)
          digest = hashlib.sha256(payload).hexdigest()
          print({'encoded_bytes': len(encoded), 'decoded_bytes': len(payload), 'sha256': digest}, flush=True)
          assert digest == '0d431ca084fa59dac5ce3a42ca59a966686913ae478b6848bdd89b5358b501c9'
          archive = Path('/tmp/instrument-genesis-repair.tar.gz')
          archive.write_bytes(payload)
          with tarfile.open(archive, 'r:gz') as handle:
              print({'members': handle.getnames()}, flush=True)
              handle.extractall('.')
          PY
      - name: Validate repaired engine
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install numpy
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m py_compile \
            foundry/archie-distill/archie_instrument_genesis.py \
            foundry/archie-distill/test_archie_instrument_genesis.py
          cd foundry/archie-distill
          python -m unittest -v test_archie_instrument_genesis
      - name: Atomically publish repaired engine
        shell: bash
        run: |
          set -euo pipefail
          branch='agent/archie-instrument-genesis-v2-20260723'
          mkdir -p /tmp/validated/foundry/archie-distill /tmp/validated/.github/workflows
          cp foundry/archie-distill/archie_instrument_genesis.py /tmp/validated/foundry/archie-distill/
          cp foundry/archie-distill/test_archie_instrument_genesis.py /tmp/validated/foundry/archie-distill/
          cp .github/workflows/archie-instrument-genesis.yml /tmp/validated/.github/workflows/
          git config user.name 'archie-research-bot'
          git config user.email 'actions@users.noreply.github.com'
          for attempt in 1 2 3 4 5; do
            git fetch origin "$branch"
            remote_sha="$(git rev-parse "origin/$branch")"
            git reset --hard "$remote_sha"
            cp /tmp/validated/foundry/archie-distill/archie_instrument_genesis.py foundry/archie-distill/
            cp /tmp/validated/foundry/archie-distill/test_archie_instrument_genesis.py foundry/archie-distill/
            cp /tmp/validated/.github/workflows/archie-instrument-genesis.yml .github/workflows/
            rm -rf .github/repair-payload
            rm -f .github/workflows/agent-source-snapshot.yml
            rm -f .github/workflows/agent-apply-instrument-repair.yml
            rm -f .github/workflows/z-verified-instrument-repair-20260724.yml
            git add -A
            git commit -m 'fix(research): make instrument causal court executable'
            if git push --force-with-lease="refs/heads/$branch:$remote_sha" origin "HEAD:refs/heads/$branch"; then
              exit 0
            fi
            echo "publish race on attempt $attempt; refreshing branch" >&2
          done
          exit 1
