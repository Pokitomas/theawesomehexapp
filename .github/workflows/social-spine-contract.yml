name: Prove networked social spine

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  social-spine:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check server and client syntax
        run: |
          node --check netlify/functions/social-core.mjs
      - name: Prove two-account authoritative social contract
        run: node --test scripts/tests/social-spine.test.mjs
