name: Repair Archie lite full burn

on:
  push:
    branches: [agent/archie-low-compute-full-burn]
    paths:
      - '.github/workflows/archie-lite-full-burn-fix.yml'

permissions:
  contents: write

jobs:
  repair:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/archie-low-compute-full-burn
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - name: Apply exact CPU-authority and manifest repairs
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"expected patch marker missing in {path}")
              file.write_text(text.replace(old, new, 1))

          replace(
              'scripts/archie-lite-core.mjs',
              """const GPU_ARGUMENTS = Object.freeze(new Set([\n  '--gpu-layers', '-ngl', '--n-gpu-layers', '--device', '--split-mode', '--tensor-split', '--main-gpu', '--rpc', '--rpc-server'\n]));""",
              """const GPU_ARGUMENTS = Object.freeze(new Set([\n  '--gpu-layers', '-ngl', '--n-gpu-layers',\n  '--device', '-dev',\n  '--split-mode', '-sm',\n  '--tensor-split', '-ts',\n  '--main-gpu', '-mg',\n  '--rpc', '--rpc-server',\n  '--kv-offload', '-kvo',\n  '--op-offload',\n  '--mmproj-offload',\n  '--fit', '-fit',\n  '--fit-target', '-fitt',\n  '--fit-ctx', '-fitc',\n  '--override-tensor', '-ot'\n]));"""
          )

          replace(
              'scripts/archie-lite-core.mjs',
              """    runner_prefix_args: Object.freeze(['--gpu-layers', '0']),\n    env: Object.freeze({\n      ...env,\n      CUDA_VISIBLE_DEVICES: '',\n      HIP_VISIBLE_DEVICES: '',\n      ROCR_VISIBLE_DEVICES: '',\n      ZE_AFFINITY_MASK: '',\n      GGML_VK_VISIBLE_DEVICES: ''\n    }),\n    enforcement: Object.freeze({\n      backend: 'cpu',\n      llama_cpp_gpu_layers: 0,\n      hidden_accelerator_environments: Object.freeze([\n        'CUDA_VISIBLE_DEVICES',\n        'HIP_VISIBLE_DEVICES',\n        'ROCR_VISIBLE_DEVICES',\n        'ZE_AFFINITY_MASK',\n        'GGML_VK_VISIBLE_DEVICES'\n      ])\n    })""",
              """    runner_prefix_args: Object.freeze([\n      '--device', 'none',\n      '--gpu-layers', '0',\n      '--no-kv-offload',\n      '--no-op-offload',\n      '--no-mmproj-offload',\n      '--fit', 'off'\n    ]),\n    env: Object.freeze({\n      ...env,\n      CUDA_VISIBLE_DEVICES: '',\n      HIP_VISIBLE_DEVICES: '',\n      ROCR_VISIBLE_DEVICES: '',\n      ZE_AFFINITY_MASK: '',\n      GGML_VK_VISIBLE_DEVICES: '',\n      LLAMA_ARG_DEVICE: 'none',\n      LLAMA_ARG_N_GPU_LAYERS: '0',\n      LLAMA_ARG_KV_OFFLOAD: '0',\n      LLAMA_ARG_OP_OFFLOAD: '0',\n      LLAMA_ARG_MMPROJ_OFFLOAD: '0',\n      LLAMA_ARG_FIT: 'off'\n    }),\n    enforcement: Object.freeze({\n      backend: 'cpu',\n      llama_cpp_device: 'none',\n      llama_cpp_gpu_layers: 0,\n      llama_cpp_kv_offload: false,\n      llama_cpp_op_offload: false,\n      llama_cpp_mmproj_offload: false,\n      llama_cpp_fit: false,\n      hidden_accelerator_environments: Object.freeze([\n        'CUDA_VISIBLE_DEVICES',\n        'HIP_VISIBLE_DEVICES',\n        'ROCR_VISIBLE_DEVICES',\n        'ZE_AFFINITY_MASK',\n        'GGML_VK_VISIBLE_DEVICES'\n      ])\n    })"""
          )

          replace(
              'scripts/tests/maker-archie-lite.test.mjs',
              """test('CPU execution forces zero GPU layers, hides accelerators, and rejects competing manifest overrides', () => {\n  const options = buildCpuExecutionOptions(['--model', '{artifact}'], { PATH: '/test/bin', CUDA_VISIBLE_DEVICES: '0' });\n  assert.deepEqual(options.runner_prefix_args, ['--gpu-layers', '0']);\n  assert.equal(options.env.CUDA_VISIBLE_DEVICES, '');\n  assert.equal(options.env.HIP_VISIBLE_DEVICES, '');\n  assert.equal(options.enforcement.backend, 'cpu');\n  assert.equal(options.enforcement.llama_cpp_gpu_layers, 0);\n  assert.throws(() => buildCpuExecutionOptions(['--gpu-layers', '4']), /rejects manifest GPU override/i);\n  assert.throws(() => buildCpuExecutionOptions(['-ngl=4']), /rejects manifest GPU override/i);\n});""",
              """test('CPU execution disables model, KV, op, and projector offload and rejects competing manifest overrides', () => {\n  const options = buildCpuExecutionOptions(['--model', '{artifact}'], { PATH: '/test/bin', CUDA_VISIBLE_DEVICES: '0' });\n  assert.deepEqual(options.runner_prefix_args, [\n    '--device', 'none',\n    '--gpu-layers', '0',\n    '--no-kv-offload',\n    '--no-op-offload',\n    '--no-mmproj-offload',\n    '--fit', 'off'\n  ]);\n  assert.equal(options.env.CUDA_VISIBLE_DEVICES, '');\n  assert.equal(options.env.HIP_VISIBLE_DEVICES, '');\n  assert.equal(options.env.LLAMA_ARG_DEVICE, 'none');\n  assert.equal(options.env.LLAMA_ARG_N_GPU_LAYERS, '0');\n  assert.equal(options.env.LLAMA_ARG_KV_OFFLOAD, '0');\n  assert.equal(options.env.LLAMA_ARG_OP_OFFLOAD, '0');\n  assert.equal(options.env.LLAMA_ARG_MMPROJ_OFFLOAD, '0');\n  assert.equal(options.env.LLAMA_ARG_FIT, 'off');\n  assert.equal(options.enforcement.backend, 'cpu');\n  assert.equal(options.enforcement.llama_cpp_device, 'none');\n  assert.equal(options.enforcement.llama_cpp_gpu_layers, 0);\n  assert.equal(options.enforcement.llama_cpp_kv_offload, false);\n  assert.equal(options.enforcement.llama_cpp_op_offload, false);\n  assert.equal(options.enforcement.llama_cpp_mmproj_offload, false);\n  assert.equal(options.enforcement.llama_cpp_fit, false);\n  for (const argument of ['--gpu-layers=4', '-ngl=4', '--device=cuda0', '-dev=cuda0', '--kv-offload', '--op-offload', '--mmproj-offload', '--fit=on', '--override-tensor=x=CUDA0']) {\n    assert.throws(() => buildCpuExecutionOptions([argument]), /rejects manifest GPU override/i);\n  }\n});"""
          )

          replace(
              'ARCHIE_LITE.md',
              """8. rejects competing GPU arguments, hides accelerator devices, and invokes llama.cpp with `--gpu-layers 0`;""",
              """8. rejects competing accelerator arguments, hides accelerator devices, selects `--device none`, sets `--gpu-layers 0`, disables KV-cache, host-operation, and multimodal-projector offload, and turns automatic device fitting off;"""
          )

          manifest = Path('audit/authority-manifest.mjs')
          text = manifest.read_text()
          marker = "const persistentCoreWorkflowRow = {"
          if "id: 'workflow.archie-lite'" not in text:
              row = """const liteWorkflowRow = {\n  id: 'workflow.archie-lite', f: 'workflow', op: 'Verify bounded CPU-only GGUF planning and execution contracts',\n  actor: 'GitHub push, pull-request, or manual actor', principal: 'Read-only GitHub Actions token executing the exact candidate head across the hosted operating-system and Node matrix',\n  auth: 'contents:read only', object: 'Ephemeral checkout, low-compute contract results, and CLI help output', owner: 'Repository CI configuration',\n  deny: 'event or path filter does not match|checkout or dependency setup fails|syntax check fails|low-compute contract fails|operator help cannot render',\n  replay: 'Exact workflow run, candidate SHA, operating-system and Node matrix cell, pinned actions, syntax commands, contract test, and help command.',\n  pub: 'Public check status and test names.', priv: 'Ephemeral fixtures are discarded; no model artifact, secret, accelerator authority, or write token is consumed.', st: 'e',\n  s: ['workflow-permission:.github/workflows/archie-lite.yml:contents:read'],\n  impl: [['.github/workflows/archie-lite.yml', 'contents: read', 'persist-credentials: false', 'npm run test:archie:lite', 'node scripts/archie-lite.mjs --help']],\n  allow: [['scripts/tests/maker-archie-lite.test.mjs', 'installed GGUF planning binds metadata, RAM cap, CPU authority, and a durable receipt']],\n  denyW: [['scripts/tests/maker-archie-lite.test.mjs', 'CPU execution disables model, KV, op, and projector offload and rejects competing manifest overrides']]\n};\n\n"""
              if marker not in text:
                  raise SystemExit('authority manifest insertion marker missing')
              text = text.replace(marker, row + marker, 1)
              text = text.replace("  ...workflowProjectionRows,\n  persistentCoreWorkflowRow,", "  ...workflowProjectionRows,\n  liteWorkflowRow,\n  persistentCoreWorkflowRow,", 1)
              manifest.write_text(text)
          PY
      - name: Install exact dependency tree
        run: npm ci --ignore-scripts
      - name: Verify focused repair
        run: |
          node --check scripts/archie-lite-core.mjs
          node --check scripts/archie-lite.mjs
          node --check scripts/tests/maker-archie-lite.test.mjs
          npm run test:archie:lite
          npm run test:authority
          node --test scripts/tests/workflow-permissions.test.mjs
          node scripts/archie-lite.mjs --help
      - name: Verify complete repository
        env:
          CANDIDATE_HEAD_SHA: ${{ github.sha }}
        run: npm run verify:repository
      - name: Commit final implementation only
        shell: bash
        run: |
          rm .github/workflows/archie-lite-full-burn-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/archie-lite-core.mjs scripts/tests/maker-archie-lite.test.mjs ARCHIE_LITE.md audit/authority-manifest.mjs .github/workflows/archie-lite-full-burn-fix.yml
          git diff --cached --check
          git commit -m "Harden Archie lite CPU authority and verification"
          git push origin HEAD:agent/archie-low-compute-full-burn
