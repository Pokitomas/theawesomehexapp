name: Judge fixed register student v2

on:
  push:
    branches: [claude/archie-sprawl-training-5pe3i8]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: judge-register-student-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  judge-fixed-v2:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Download the already-fixed candidate and already-sealed untouched pack
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/register-candidate-v2 artifacts/sealed-register-pack-v2 artifacts/register-admission-v2
          curl --fail --location --retry 3 \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/Pokitomas/theawesomehexapp/actions/artifacts/8485232165/zip' \
            -o /tmp/candidate-v2.zip
          curl --fail --location --retry 3 \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/Pokitomas/theawesomehexapp/actions/artifacts/8485034556/zip' \
            -o /tmp/sealed-pack-v2.zip
          unzip -q /tmp/candidate-v2.zip -d artifacts/register-candidate-v2
          unzip -q /tmp/sealed-pack-v2.zip -d artifacts/sealed-register-pack-v2
          test -f artifacts/register-candidate-v2/register-student-model.mjs
          test -f artifacts/sealed-register-pack-v2/sealed-pack-v2.json
          sha256sum artifacts/register-candidate-v2/* > artifacts/register-admission-v2/CANDIDATE_SHA256SUMS
          sha256sum artifacts/sealed-register-pack-v2/* > artifacts/register-admission-v2/SEALED_PACK_SHA256SUMS
      - name: Decode exact v2 judge and repair module installation name
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/register-student-v2
          cat foundry/archie-protocol/register_student/bundles/v2-toolchain.tar.gz.b64.part* | base64 -d > /tmp/v2-toolchain.tar.gz
          echo '641820a60427a8f5b816463f95527494c9c16b81397012107f3c1ef3c831782b  /tmp/v2-toolchain.tar.gz' | sha256sum -c -
          tar -xzf /tmp/v2-toolchain.tar.gz -C /tmp/register-student-v2
          cp /tmp/register-student-v2/train_full_budget.py /tmp/register-student-v2/train_full_budget_v2.py
          cp /tmp/register-student-v2/register-student-core.mjs foundry/archie-protocol/register_student/register-student-core.mjs
          python3 -m py_compile /tmp/register-student-v2/train_full_budget.py /tmp/register-student-v2/train_full_budget_v2.py /tmp/register-student-v2/judge_candidate.py
          node --check foundry/archie-protocol/register_student/register-student-core.mjs
      - name: Install independent evaluation stack
        run: python3 -m pip install --disable-pip-version-check --no-input numpy scipy scikit-learn
      - name: Open the original sealed pack and execute independent admission
        id: judge
        shell: bash
        run: |
          set +e
          python3 /tmp/register-student-v2/judge_candidate.py \
            --repo . \
            --candidate artifacts/register-candidate-v2 \
            --pack artifacts/sealed-register-pack-v2/sealed-pack-v2.json \
            --pack-manifest artifacts/sealed-register-pack-v2/sealed-pack-v2.json.manifest.json \
            --legacy-dir foundry/archie-protocol/neural/data \
            --resource-seconds 60 \
            --out artifacts/register-admission-v2 \
            2>&1 | tee artifacts/register-admission-v2/judge.log
          STATUS=${PIPESTATUS[0]}
          set -e
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
      - name: Execute protected Archie suites only for independently admitted candidate
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f artifacts/register-admission-v2/promotion.json ]; then
            printf '{"executed":false,"passed":false,"reason":"judge-did-not-produce-promotion-receipt"}\n' > artifacts/register-admission-v2/protected-tests.json
            exit 0
          fi
          ADMITTED="$(node -e "const p=require('./artifacts/register-admission-v2/promotion.json'); process.stdout.write(String(p.admitted))")"
          if [ "$ADMITTED" != true ]; then
            printf '{"executed":false,"passed":false,"reason":"independent-admission-blocked"}\n' > artifacts/register-admission-v2/protected-tests.json
            exit 0
          fi
          cp artifacts/register-admission-v2/register-student-core.mjs archie-operator/register-student-core.mjs
          cp artifacts/register-admission-v2/register-student-model.mjs archie-operator/register-student-model.mjs
          cp artifacts/register-admission-v2/register-router.mjs archie-operator/register-router.mjs
          npm ci --ignore-scripts
          set +e
          npm run test:archie:baseline > artifacts/register-admission-v2/protected-baseline.log 2>&1
          BASELINE=$?
          npm run test:archie:completion > artifacts/register-admission-v2/protected-completion.log 2>&1
          COMPLETION=$?
          npm run test:archie:admission > artifacts/register-admission-v2/protected-admission.log 2>&1
          ADMISSION=$?
          set -e
          node - "$BASELINE" "$COMPLETION" "$ADMISSION" > artifacts/register-admission-v2/protected-tests.json <<'NODE'
          const [baseline, completion, admission] = process.argv.slice(2).map(Number);
          process.stdout.write(JSON.stringify({
            executed: true,
            passed: baseline === 0 && completion === 0 && admission === 0,
            exit_codes: { baseline, completion, admission }
          }, null, 2) + '\n');
          NODE
      - name: Bind final promotion status
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const promotionPath = 'artifacts/register-admission-v2/promotion.json';
          const protectedPath = 'artifacts/register-admission-v2/protected-tests.json';
          const promotion = fs.existsSync(promotionPath)
            ? JSON.parse(fs.readFileSync(promotionPath, 'utf8'))
            : { admitted: false, blockers: ['judge-receipt-missing'] };
          const protectedTests = fs.existsSync(protectedPath)
            ? JSON.parse(fs.readFileSync(protectedPath, 'utf8'))
            : { executed: false, passed: false, reason: 'protected-receipt-missing' };
          const final = {
            ...promotion,
            protected_tests: protectedTests,
            final_promotion_eligible: promotion.admitted === true && protectedTests.passed === true
          };
          fs.writeFileSync('artifacts/register-admission-v2/final-promotion.json', JSON.stringify(final, null, 2) + '\n');
          NODE
          sha256sum artifacts/register-admission-v2/* > artifacts/register-admission-v2/SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: register-student-v2-fixed-judge-${{ github.sha }}
          path: artifacts/register-admission-v2
          if-no-files-found: error
          retention-days: 14
      - name: Enforce final promotion contract
        shell: bash
        run: |
          node -e "const p=require('./artifacts/register-admission-v2/final-promotion.json'); if(!p.final_promotion_eligible){console.error(JSON.stringify(p,null,2)); process.exit(1)}"
