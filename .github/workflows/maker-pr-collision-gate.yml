name: Block overlapping Maker PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: maker-pr-collision-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  path-lease:
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted default-branch gate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
      - name: Compare open Maker path leases
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { pathToFileURL } = require('node:url');
            const gate = await import(pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/maker-pr-collision-gate.mjs`).href);
            const current = context.payload.pull_request;
            const changed = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: current.number,
              per_page: 100
            });
            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const result = gate.evaluatePathLease({
              current,
              changed_files: changed.map(file => file.filename),
              open_pull_requests: openPulls
            });

            const detail = [];
            if (result.reason) detail.push(`reason: ${result.reason}`);
            if (result.error) detail.push(`lease error: ${result.error}`);
            if (result.uncovered_paths?.length) detail.push(`uncovered paths: ${result.uncovered_paths.join(', ')}`);
            for (const collision of result.collisions || []) {
              const paths = collision.overlaps.map(value => `${value.current} ↔ ${value.peer}`).join(', ');
              detail.push(`collision with #${collision.number}: ${paths}`);
            }
            for (const peer of result.invalid_peers || []) detail.push(`unleased/invalid Maker PR #${peer.number}: ${peer.reason}`);

            await core.summary
              .addHeading('Maker path lease')
              .addRaw(`status: ${result.status}\n`)
              .addList(detail.length ? detail : ['No overlap detected.'])
              .write();

            if (result.status === 'not_applicable') {
              core.notice('Pull request is not a Maker or agent lane; collision gate is not applicable.');
            } else if (result.status === 'clear') {
              core.notice('Maker path lease is complete and does not overlap another open Maker or agent PR.');
            } else {
              core.setFailed(detail.join('\n') || 'Maker path lease blocked.');
            }
