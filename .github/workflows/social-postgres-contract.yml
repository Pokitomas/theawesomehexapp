name: Prove relational social authority

on:
  pull_request:
    branches: [main]
    paths:
      - 'migrations/*.sql'
      - 'netlify/functions/social*.mjs'
      - 'scripts/tests/social-postgres-contract.test.mjs'
      - 'scripts/tests/social-idempotency*.mjs'
      - 'package.json'
      - '.github/workflows/social-postgres-contract.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  postgres-contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sideways
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sideways"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/sideways
      SOCIAL_SESSION_SECRET: ci-relational-social-session-secret-32-bytes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install runtime dependencies
        run: npm install
      - name: Prove PostgreSQL transactions and HTTP parity
        shell: bash
        run: |
          set -o pipefail
          npm run test:social:postgres > social-postgres-test.log 2>&1 || {
            tail -n 90 social-postgres-test.log
            exit 1
          }
          cat social-postgres-test.log
      - name: Preserve existing in-memory contract
        shell: bash
        run: |
          set -o pipefail
          npm run test:social > social-in-memory-test.log 2>&1 || {
            tail -n 120 social-in-memory-test.log
            exit 1
          }
          cat social-in-memory-test.log
      - name: Upload relational contract logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relational-social-contract-logs
          path: |
            social-postgres-test.log
            social-in-memory-test.log
          if-no-files-found: error
          retention-days: 5
