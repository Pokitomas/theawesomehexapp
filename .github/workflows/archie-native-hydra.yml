name: Train native Archie Hydra

on:
  pull_request:
    paths:
      - 'foundry/archie-native/train_hydra.py'
      - '.github/workflows/archie-native-hydra.yml'
      - 'docs/archie-native-hydra.md'
  workflow_dispatch:

concurrency:
  group: archie-native-hydra-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: '1'
  OMP_NUM_THREADS: '4'
  MKL_NUM_THREADS: '4'

jobs:
  contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install pinned CPU PyTorch
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu 'torch==2.7.1'
      - name: Prove forward, backward, generation, and model scales
        run: |
          set -euo pipefail
          python -m py_compile foundry/archie-native/train_hydra.py
          python foundry/archie-native/train_hydra.py --selftest

  phase_1:
    needs: contract
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install pinned CPU PyTorch
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu 'torch==2.7.1'
      - id: train
        name: Train phase 1 of 3
        continue-on-error: true
        env:
          OUTPUT: ${{ runner.temp }}/archie-native-hydra
        run: |
          set -o pipefail
          mkdir -p "$OUTPUT"
          python foundry/archie-native/train_hydra.py \
            --repo . --output "$OUTPUT" --preset hosted \
            --seq 256 --batch 2 --eval-batch 2 --accum 4 \
            --epochs 40 --max-steps 8000 --learning-rate 0.0003 \
            --eval-every 50 --eval-batches 4 --checkpoint-every 25 \
            --log-every 5 --sample 256 --minutes 320 --threads 4 \
            2>&1 | tee "$OUTPUT/phase-1.log"
      - name: Summarize phase 1
        if: always()
        env:
          OUTPUT: ${{ runner.temp }}/archie-native-hydra
        run: |
          echo '## Native Archie Hydra — phase 1' >> "$GITHUB_STEP_SUMMARY"
          if [[ -f "$OUTPUT/training-receipt.json" ]]; then
            python - "$OUTPUT/training-receipt.json" >> "$GITHUB_STEP_SUMMARY" <<'PY'
          import json, pathlib, sys
          r=json.loads(pathlib.Path(sys.argv[1]).read_text())
          print(f"- Parameters: {r['model']['parameters']:,}")
          print(f"- Steps: {r['training']['steps']:,} / 8,000")
          print(f"- Tokens: {r['training']['tokens']:,}")
          print(f"- Initial dev loss: {r['training']['initial_development']['loss']:.4f}")
          print(f"- Current dev loss: {r['training']['final_development']['loss']:.4f}")
          print(f"- Promotion: {r['promotion']}")
          PY
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: archie-native-hydra-phase-1-${{ github.run_id }}
          path: ${{ runner.temp }}/archie-native-hydra
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
      - name: Enforce phase 1 success
        if: always() && steps.train.outcome != 'success'
        run: exit 1

  phase_2:
    needs: phase_1
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755 # v6.2.0
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: archie-native-hydra-phase-1-${{ github.run_id }}
          path: ${{ runner.temp }}/archie-native-hydra
      - name: Install pinned CPU PyTorch
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu 'torch==2.7.1'
      - id: train
        name: Resume training phase 2 of 3
        continue-on-error: true
        env:
          OUTPUT: ${{ runner.temp }}/archie-native-hydra
        run: |
          set -o pipefail
          python foundry/archie-native/train_hydra.py \
            --repo . --output "$OUTPUT" --preset hosted --resume \
            --seq 256 --batch 2 --eval-batch 2 --accum 4 \
            --epochs 40 --max-steps 8000 --learning-rate 0.0003 \
            --eval-every 50 --eval-batches 4 --checkpoint-every 25 \
            --log-every 5 --sample 256 --minutes 320 --threads 4 \
            2>&1 | tee "$OUTPUT/phase-2.log"
      - name: Summarize phase 2
        if: always()
        env:
          OUTPUT: ${{ runner.temp }}/archie-native-hydra
        run: |
          echo '## Native Archie Hydra — phase 2' >> "$GITHUB_STEP_SUMMARY"
          if [[ -f "$OUTPUT/training-receipt.json" ]]; then
            python - "$OUTPUT/training-receipt.json" >> "$GITHUB_STEP_SUMMARY" <<'PY'
          import json, pathlib, sys
          r=json.loads(pathlib.Path(sys.argv[1]).read_text())
          print(f"- Steps: {r['training']['steps']:,} / 8,000")
          print(f"- Tokens: {r['training']['tokens']:,}")
          print(f"- Current dev loss: {r['training']['final_development']['loss']:.4f}")
          print(f"- Best dev loss: {r['training']['best_loss']:.4f}")
          print(f"- Promotion: {r['promotion']}")
          PY
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: archie-native-hydra-phase-2-${{ github.run_id }}
          path: ${{ runner.temp }}/archie-native-hydra
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
      - name: Enforce phase 2 success
        if: always() && steps.train.outcome != 'success'
        run: exit 1

  phase_3:
    needs: phase_2
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755 # v6.2.0
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: archie-native-hydra-phase-2-${{ github.run_id }}
          path: ${{ runner.temp }}/archie-native-hydra
      - name: Install pinned CPU PyTorch
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu 'torch==2.7.1'
      - id: train
        name: Resume training phase 3 of 3
        continue-on-error: true
        env:
          OUTPUT: ${{ runner.temp }}/archie-native-hydra
        run: |
          set -o pipefail
          python foundry/archie-native/train_hydra.py \
            --repo . --output "$OUTPUT" --preset hosted --resume \
            --seq 256 --batch 2 --eval-batch 2 --accum 4 \
            --epochs 40 --max-steps 8000 --learning-rate 0.0003 \
            --eval-every 50 --eval-batches 4 --checkpoint-every 25 \
            --log-every 5 --sample 256 --minutes 320 --threads 4 \
            2>&1 | tee "$OUTPUT/phase-3.log"
      - name: Summarize terminal training state
        if: always()
        env:
          OUTPUT: ${{ runner.temp }}/archie-native-hydra
        run: |
          echo '## Native Archie Hydra — terminal phase' >> "$GITHUB_STEP_SUMMARY"
          if [[ -f "$OUTPUT/training-receipt.json" ]]; then
            python - "$OUTPUT/training-receipt.json" >> "$GITHUB_STEP_SUMMARY" <<'PY'
          import json, pathlib, sys
          r=json.loads(pathlib.Path(sys.argv[1]).read_text())
          print(f"- Parameters trained: {r['model']['parameters']:,}")
          print(f"- Optimizer steps: {r['training']['steps']:,}")
          print(f"- Tokens seen: {r['training']['tokens']:,}")
          print(f"- Corpus epochs: {r['training']['corpus_epochs']:.3f}")
          print(f"- Initial dev loss: {r['training']['initial_development']['loss']:.4f}")
          print(f"- Final dev loss: {r['training']['final_development']['loss']:.4f}")
          print(f"- Best dev loss: {r['training']['best_loss']:.4f}")
          print(f"- Large preset parameters: {r['model']['large_parameters']:,}")
          print(f"- Huge preset parameters: {r['model']['huge_parameters']:,}")
          print(f"- Promotion: {r['promotion']}")
          PY
          else
            echo '- No terminal receipt was produced; the artifact contains the latest bounded checkpoint and logs.' >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: archie-native-hydra-final-${{ github.sha }}-${{ github.run_id }}
          path: ${{ runner.temp }}/archie-native-hydra
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
      - name: Enforce terminal phase success
        if: always() && steps.train.outcome != 'success'
        run: exit 1
