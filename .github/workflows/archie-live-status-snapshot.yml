name: Archie live status and isolated repairs

on:
  push:
    branches:
      - agent/archie-live-status

permissions:
  contents: write
  issues: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Archive exact sidecar checkout
        run: |
          set -euo pipefail
          tar --exclude=.git -czf "$RUNNER_TEMP/archie-live-status-source.tgz" .
          sha256sum "$RUNNER_TEMP/archie-live-status-source.tgz" > "$RUNNER_TEMP/archie-live-status-source.sha256"
          git rev-parse HEAD > "$RUNNER_TEMP/archie-live-status-source-head.txt"
      - name: Upload exact sidecar checkout
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-live-status-source-${{ github.sha }}
          path: |
            ${{ runner.temp }}/archie-live-status-source.tgz
            ${{ runner.temp }}/archie-live-status-source.sha256
            ${{ runner.temp }}/archie-live-status-source-head.txt
          if-no-files-found: error
          retention-days: 2

  plugin_repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out sidecar evidence
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: evidence
          persist-credentials: false
      - name: Check out isolated plugin repair branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: agent/archie-plugin-registry-repair
          path: repair
          fetch-depth: 0
      - name: Use repository Node runtime
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Fetch and verify exact hostile repair bundle
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$(git -C repair rev-parse HEAD)" = "7e2e62afb6e82cf6ad00ecbaa84486f45697a049"
          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/4987246843" --jq .body > plugin-repair-comment.md
          awk 'BEGIN{inside=0} /^H4s/{inside=1} inside && /^B64$/{exit} inside{print}' plugin-repair-comment.md > plugin315-repair.b64
          test -s plugin315-repair.b64
          base64 -d plugin315-repair.b64 > plugin315-repair.tgz
          echo "68a4bb662356095d4d0e6724ef8da0d286a832a61f867b60016d6ab9fe7ac084  plugin315-repair.tgz" | sha256sum --check
          actual="$(tar -tzf plugin315-repair.tgz | sed 's#^\./##' | grep -v '/$' | sort)"
          expected="$(printf '%s\n' \
            maker/contracts/plugin-manifest.schema.json \
            scripts/maker-plugin-registry.mjs \
            scripts/tests/maker-plugin-registry.test.mjs | sort)"
          test "$actual" = "$expected"
      - name: Extract and check repaired plugin registry
        id: syntax
        run: |
          set -euo pipefail
          tar -xzf plugin315-repair.tgz -C repair
          node --check repair/scripts/maker-plugin-registry.mjs
          node -e "JSON.parse(require('node:fs').readFileSync('repair/maker/contracts/plugin-manifest.schema.json','utf8'))"
      - name: Prove 27-case hostile plugin suite
        id: focused
        run: |
          set -euo pipefail
          cd repair
          node --test scripts/tests/maker-plugin-registry.test.mjs 2>&1 | tee ../plugin-registry-focused.log
      - name: Validate exact three-path diff
        id: diff
        run: |
          set -euo pipefail
          cd repair
          git diff --check
          actual="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' \
            maker/contracts/plugin-manifest.schema.json \
            scripts/maker-plugin-registry.mjs \
            scripts/tests/maker-plugin-registry.test.mjs | sort)"
          test "$actual" = "$expected"
      - name: Commit isolated plugin repair
        id: commit
        run: |
          set -euo pipefail
          cd repair
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            maker/contracts/plugin-manifest.schema.json \
            scripts/maker-plugin-registry.mjs \
            scripts/tests/maker-plugin-registry.test.mjs
          git commit -m "Harden Maker plugin admission and lifecycle"
          git push origin HEAD:agent/archie-plugin-registry-repair
          echo "head=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Upload plugin repair receipts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-plugin-registry-repair-run-${{ github.run_id }}
          path: |
            plugin-registry-focused.log
            plugin315-repair.tgz
            plugin-repair-comment.md
          if-no-files-found: warn
          retention-days: 5
      - name: Update stable phone status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PLUGIN_HEAD: ${{ steps.commit.outputs.head }}
          VERIFY: ${{ steps.verify.outcome }}
          SYNTAX: ${{ steps.syntax.outcome }}
          FOCUSED: ${{ steps.focused.outcome }}
          DIFF: ${{ steps.diff.outcome }}
          COMMIT_RESULT: ${{ steps.commit.outcome }}
        run: |
          set -euo pipefail
          body=$(cat <<EOF
          <!-- archie-live-status:v1 -->
          ## Archie live status

          - observer/finalizer: GPT-5.6 Thinking
          - authoritative coordinator writer: existing co-engineer remains untouched
          - mode: isolated repair branches plus finalizer staging; no coordinator edits
          - coordinator: \`agent/archie-democratized-runtime@ba9a777504b96a49df29d2dac45988a3acbfb801\`
          - coordinator drift: none
          - router seam: green at \`4cf88a82adb4b878b1844321baefe182e076e3d9\`
          - control repair: green at \`f611b798a3fb7688c9e86208e4b330ff58db2fc2\` (35/35)
          - plugin workflow run: \`${GITHUB_RUN_ID}\`
          - plugin exact source + bundle digest: ${VERIFY}
          - plugin syntax/schema: ${SYNTAX}
          - plugin hostile suite: ${FOCUSED}
          - plugin exact three-path diff: ${DIFF}
          - plugin commit/push: ${COMMIT_RESULT}
          - plugin repair head: \`${PLUGIN_HEAD:-not-published}\`
          - plugin bundle SHA-256: \`68a4bb662356095d4d0e6724ef8da0d286a832a61f867b60016d6ab9fe7ac084\`
          - tokens remaining: 818,432 / 1,310,720 (manual-observed)
          - next: stage green control/router/plugin plus repaired worker fleet on the collision-free finalizer branch

          Phone commands:

          \`node scripts/archie-live-status.mjs tokens 818432 1310720\`

          \`node scripts/archie-live-status.mjs watch 20\`

          No merge or deployment.
          EOF
          )
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/4987929903" -f body="$body" >/dev/null
