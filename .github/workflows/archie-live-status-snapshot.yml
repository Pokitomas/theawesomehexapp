name: Archie live status and isolated repairs

on:
  push:
    branches:
      - agent/archie-live-status

permissions:
  contents: write
  issues: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Archive exact sidecar checkout
        run: |
          set -euo pipefail
          tar --exclude=.git -czf "$RUNNER_TEMP/archie-live-status-source.tgz" .
          sha256sum "$RUNNER_TEMP/archie-live-status-source.tgz" > "$RUNNER_TEMP/archie-live-status-source.sha256"
          git rev-parse HEAD > "$RUNNER_TEMP/archie-live-status-source-head.txt"
      - name: Upload exact sidecar checkout
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-live-status-source-${{ github.sha }}
          path: |
            ${{ runner.temp }}/archie-live-status-source.tgz
            ${{ runner.temp }}/archie-live-status-source.sha256
            ${{ runner.temp }}/archie-live-status-source-head.txt
          if-no-files-found: error
          retention-days: 2

  control_repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repair evidence
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: evidence
          persist-credentials: false
      - name: Check out isolated control repair branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: agent/archie-control-plane-repair
          path: repair
          fetch-depth: 0
      - name: Use repository Node runtime
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Verify exact base and repair bundle
        id: verify
        run: |
          set -euo pipefail
          test "$(git -C repair rev-parse HEAD)" = "ba9a777504b96a49df29d2dac45988a3acbfb801"
          echo "7928445b49ce25460280502aac4c26abfb96a285f99c7417270c1d3789f8b591  evidence/audit/patches/archie-control-plane-repair.patch.gz.b64" | sha256sum --check
          base64 -d evidence/audit/patches/archie-control-plane-repair.patch.gz.b64 | gzip -dc > control-plane-repair.patch
          echo "570167cc52d9dfd394afe1116ea07f00948133a7b8237037a41e5da6aedd00ac  control-plane-repair.patch" | sha256sum --check
          git -C repair apply --check ../control-plane-repair.patch
      - name: Apply and check hardened control modules
        id: syntax
        run: |
          set -euo pipefail
          git -C repair apply ../control-plane-repair.patch
          node --check repair/scripts/maker-control-plane.mjs
          node --check repair/scripts/maker-control-cli.mjs
          node -e "JSON.parse(require('node:fs').readFileSync('repair/maker/contracts/control-plane.schema.json','utf8'))"
      - name: Prove focused hostile control suite
        id: focused
        run: |
          set -euo pipefail
          cd repair
          node --test scripts/tests/maker-control-plane.test.mjs 2>&1 | tee ../control-plane-focused.log
      - name: Validate exact four-path diff
        id: diff
        run: |
          set -euo pipefail
          cd repair
          git diff --check
          actual="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' \
            maker/contracts/control-plane.schema.json \
            scripts/maker-control-cli.mjs \
            scripts/maker-control-plane.mjs \
            scripts/tests/maker-control-plane.test.mjs | sort)"
          test "$actual" = "$expected"
      - name: Commit isolated control repair
        id: commit
        run: |
          set -euo pipefail
          cd repair
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            maker/contracts/control-plane.schema.json \
            scripts/maker-control-cli.mjs \
            scripts/maker-control-plane.mjs \
            scripts/tests/maker-control-plane.test.mjs
          git commit -m "Harden Maker control-plane authority and atomicity"
          git push origin HEAD:agent/archie-control-plane-repair
          echo "head=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Upload control repair receipts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-control-plane-repair-run-${{ github.run_id }}
          path: |
            control-plane-focused.log
            control-plane-repair.patch
            evidence/audit/patches/archie-control-plane-repair.patch.gz.b64
          if-no-files-found: warn
          retention-days: 5
      - name: Update stable phone status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          CONTROL_HEAD: ${{ steps.commit.outputs.head }}
          VERIFY: ${{ steps.verify.outcome }}
          SYNTAX: ${{ steps.syntax.outcome }}
          FOCUSED: ${{ steps.focused.outcome }}
          DIFF: ${{ steps.diff.outcome }}
          COMMIT_RESULT: ${{ steps.commit.outcome }}
        run: |
          set -euo pipefail
          body=$(cat <<EOF
          <!-- archie-live-status:v1 -->
          ## Archie live status

          - observer: GPT-5.6 Thinking
          - authoritative writer: existing coordinator co-engineer
          - mode: isolated sidecar repairs; no coordinator edits
          - coordinator: \`agent/archie-democratized-runtime@ba9a777504b96a49df29d2dac45988a3acbfb801\`
          - coordinator drift: none
          - router seam repair: green at \`4cf88a82adb4b878b1844321baefe182e076e3d9\`
          - router proof: 43/43 seam; 97 total = 96 pass, 1 declared skip, 0 fail
          - control workflow run: \`${GITHUB_RUN_ID}\`
          - control workflow source: \`${GITHUB_SHA}\`
          - control exact base + bundle: ${VERIFY}
          - control syntax/schema: ${SYNTAX}
          - control hostile focused suite: ${FOCUSED}
          - control exact four-path diff: ${DIFF}
          - control commit/push: ${COMMIT_RESULT}
          - control repair head: \`${CONTROL_HEAD:-not-published}\`
          - control patch SHA-256: \`570167cc52d9dfd394afe1116ea07f00948133a7b8237037a41e5da6aedd00ac\`
          - composed integration truth: 65/66; one fail-closed runtime authority fixture remains for the integration lane
          - tokens remaining: 941,504 / 1,310,720 (manual-observed)
          - next: coordinator writer exact-head reviews/source-admits green repair branches; sidecar proceeds without overlapping writes

          Phone commands:

          \`node scripts/archie-live-status.mjs tokens 941504 1310720\`

          \`node scripts/archie-live-status.mjs watch 20\`

          No merge or deployment.
          EOF
          )
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/4987929903" -f body="$body" >/dev/null
