name: Verify product form factors

on:
  pull_request:
    paths:
      - 'archie/**'
      - 'dist/archie/**'
      - 'maker/**'
      - 'founder/**'
      - 'design/**'
      - 'scripts/tests/product-form-factor-study.test.mjs'
      - '.github/workflows/product-form-factor.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  form-factor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - name: Verify machine-readable study and product personalities
        run: node --test scripts/tests/product-form-factor-study.test.mjs
      - name: Verify browser syntax
        run: |
          node --check archie/archie.js
          node --check dist/archie/archie.js
      - name: Verify no accidental diff damage
        run: git diff --check HEAD^
