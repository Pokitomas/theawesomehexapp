name: Archie winner model and app

on:
  push:
    branches:
      - agent/archie-generalized-program-v1-20260721
    paths:
      - .github/workflows/archie-productize-winner.yml
      - foundry/archie-protocol/latent_world_benchmark/product/**
  pull_request:
    branches:
      - agent/archie-register-v4-admission-20260720
    paths:
      - .github/workflows/archie-productize-winner.yml
      - foundry/archie-protocol/latent_world_benchmark/product/**
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Completed causal-mechanism campaign run
        required: true
        default: "29834460894"
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: archie-winner-product-${{ github.ref }}
  cancel-in-progress: false

jobs:
  productize:
    name: Select, continue-train, and package winner
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      GH_TOKEN: ${{ github.token }}
      SOURCE_RUN_ID: ${{ github.event.inputs.source_run_id || '29834460894' }}
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
      OPENBLAS_NUM_THREADS: "4"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CPU runtime
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check "numpy<3"
          python3 -m pip install --disable-pip-version-check torch --index-url https://download.pytorch.org/whl/cpu

      - name: Materialize and verify exact sources
        shell: bash
        run: |
          set -euo pipefail
          python3 foundry/archie-protocol/latent_world_benchmark/materialize.py
          python3 foundry/archie-protocol/latent_world_benchmark/campaign_v2/materialize.py
          python3 foundry/archie-protocol/latent_world_benchmark/product/materialize.py
          cd foundry/archie-protocol/latent_world_benchmark
          python3 -m py_compile \
            latent_world_benchmark.py \
            full_budget_campaign.py \
            product/winner_productization.py \
            product/world_state_app.py \
            product/test_winner_productization.py
          cd product
          PYTHONPATH=.. python3 -m unittest -v test_winner_productization.py

      - name: Download completed campaign evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p source-artifacts
          gh run download "$SOURCE_RUN_ID" --repo "$GITHUB_REPOSITORY" --dir source-artifacts
          evidence="$(find source-artifacts -type f -name evidence-bundle.json -print -quit)"
          test -n "$evidence"
          campaign_root="$(dirname "$evidence")"
          echo "CAMPAIGN_ROOT=$GITHUB_WORKSPACE/$campaign_root" >> "$GITHUB_ENV"
          echo "Campaign root: $campaign_root"

      - name: Independently verify source campaign
        working-directory: foundry/archie-protocol/latent_world_benchmark
        shell: bash
        run: |
          set -euo pipefail
          python3 full_budget_campaign.py verify --output "$CAMPAIGN_ROOT"

      - name: Continue selected winner with 0.8x source budget
        working-directory: foundry/archie-protocol/latent_world_benchmark
        shell: bash
        run: |
          set -euo pipefail
          rm -rf product-release
          PYTHONPATH=. python3 product/winner_productization.py \
            --campaign "$CAMPAIGN_ROOT" \
            --output product-release \
            --fraction 0.8 \
            --batch-size 64 \
            --eval-batches 8 \
            --eval-batch-size 64 \
            --threads 4 | tee product-release-command.json

      - name: Smoke-test packaged app runtime
        working-directory: foundry/archie-protocol/latent_world_benchmark/product-release
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path
          from world_state_app import Runtime
          runtime = Runtime(Path("productized-checkpoint.pt"))
          result = runtime.predict(runtime.example())
          assert result["steps"]
          assert result["model"]["promotion"] == "shadow-product-not-admitted"
          Path("app-smoke.json").write_text(json.dumps({
              "family": result["model"]["family"],
              "source_candidate": result["model"]["source_candidate"],
              "events": len(result["steps"]),
              "terminal_exact": result["terminal_exact"],
              "promotion": result["model"]["promotion"],
          }, indent=2, sort_keys=True) + "\n")
          PY
          find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Publish product summary
        working-directory: foundry/archie-protocol/latent_world_benchmark
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          root = Path("product-release")
          manifest = json.loads((root / "release-manifest.json").read_text())
          continuation = json.loads((root / "continuation-report.json").read_text())
          print("# Archie winner model and app")
          print()
          print(f"- Selected family: `{manifest['selected_family']}`")
          print(f"- Selected candidate: `{manifest['selected_candidate']}`")
          print(f"- Extra optimizer steps: `{manifest['continuation']['extra_steps']}`")
          print(f"- Continuation fraction: `{manifest['continuation']['fraction']}`")
          print(f"- Baseline objective: `{manifest['continuation']['baseline_objective']:.6f}`")
          print(f"- Final objective: `{manifest['continuation']['final_objective']:.6f}`")
          print(f"- Product checkpoint: `{manifest['product_checkpoint_sha256']}`")
          print(f"- Promotion: `{manifest['promotion']}`")
          print()
          print("The release includes a local HTTP app that displays neural predictions beside the exact symbolic interpreter.")
          PY
          tar -czf archie-world-state-lab.tgz -C product-release .
          sha256sum archie-world-state-lab.tgz > archie-world-state-lab.tgz.sha256

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: archie-world-state-lab-${{ github.run_id }}
          path: |
            foundry/archie-protocol/latent_world_benchmark/product-release
            foundry/archie-protocol/latent_world_benchmark/archie-world-state-lab.tgz
            foundry/archie-protocol/latent_world_benchmark/archie-world-state-lab.tgz.sha256
            foundry/archie-protocol/latent_world_benchmark/product-release-command.json
          if-no-files-found: error
          retention-days: 90
