name: Prove authoritative social spine on phone

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  social-spine:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      SOCIAL_LIVE_ENDPOINT: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked runtime and browser tooling
        run: npm ci --ignore-scripts
      - name: Prove server social contract
        run: npm run test:social
      - name: Assemble the manual product
        run: |
          set -euo pipefail
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz
          cat general-overlay.part.* | base64 -d > general-overlay.tar.xz
          tar -xJf general-overlay.tar.xz
          python general/patch.py
          cat profile-overlay.part.* | base64 -d > profile-overlay.tar.xz
          tar -xJf profile-overlay.tar.xz
          python profile/patch.py
          cat manual-overlay.b64.part.* > manual-overlay.b64
          base64 -d manual-overlay.b64 > manual-overlay.tar.xz
          tar -xJf manual-overlay.tar.xz
          python manual/patch.py
          cat manual-kernel-overlay.b64.part.* > manual-kernel-overlay.b64
          base64 -d manual-kernel-overlay.b64 > manual-kernel-overlay.tar.xz
          tar -xJf manual-kernel-overlay.tar.xz
          python studio/manual/prepare-kernel.py
          python manual-kernel/patch.py
          python studio/manual/apply.py
          python studio/manual/verify.py
          node studio/manual/tests/social-spine-contract.mjs
          mkdir -p dist/manual
          cp -a manual-app/. dist/manual/
      - name: Prove two isolated accounts on phone
        run: |
          set -euo pipefail
          node scripts/social-proof-server.mjs dist/manual 4174 >/tmp/social-proof-server.log 2>&1 &
          server=$!
          trap 'kill $server || true' EXIT
          sleep 2
          node studio/manual/tests/social-spine-clickthrough.mjs http://127.0.0.1:4174/manual/ 2>&1 | tee social-spine-check.log
      - name: Upload social phone proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: authoritative-social-spine-phone
          path: |
            social-alice-post.png
            social-bob-following-reply.png
            social-alice-like.png
            social-spine-check.log
            /tmp/social-proof-server.log
          if-no-files-found: warn
          retention-days: 5
