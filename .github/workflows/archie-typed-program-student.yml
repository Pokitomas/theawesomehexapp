name: Archie typed-program student v2

on:
  pull_request:
    branches:
      - agent/archie-register-v4-admission-20260720
  push:
    branches:
      - agent/archie-typed-program-student-v2-20260721
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: archie-typed-program-v2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  seal:
    name: Seal post-candidate blind typed programs
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Materialize digest-bound sources
        run: python3 foundry/archie-protocol/typed_program/materialize.py

      - name: Generate blind pack after candidate commit is fixed
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/typed-program-blind
          seed="$(python3 - <<'PY'
          import secrets
          print(secrets.randbits(63))
          PY
          )"
          python3 foundry/archie-protocol/typed_program/typed_program_blind_pack.py \
            --out artifacts/typed-program-blind/blind-pack.json \
            --manifest artifacts/typed-program-blind/blind-pack.manifest.json \
            --seed "$seed" \
            --candidate-commit "$GITHUB_SHA"
          sha256sum artifacts/typed-program-blind/* > artifacts/typed-program-blind/SHA256SUMS

      - name: Upload sealed blind pack
        uses: actions/upload-artifact@v4
        with:
          name: archie-typed-program-blind-${{ github.run_id }}
          path: artifacts/typed-program-blind
          if-no-files-found: error
          retention-days: 30

  train:
    name: Train full-budget compact typed student
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Materialize digest-bound sources
        run: python3 foundry/archie-protocol/typed_program/materialize.py

      - name: Install trainer dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check 'numpy<3' 'scipy<2' 'scikit-learn<2'

      - name: Download immutable admitted V4 learned prior
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/register-prior artifacts/typed-program-candidate
          gh api -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts/8485713170/zip" > /tmp/register-v3-candidate.zip
          echo '775fd8cf76a1b27a58011940597dacdca26995762f0b7fc252a8f0b2bf5b84f6  /tmp/register-v3-candidate.zip' | sha256sum -c -
          unzip -q /tmp/register-v3-candidate.zip -d artifacts/register-prior
          echo '7a7f4619a9bb300ff5e690970663373d974fb0584a3b6b975cb1858f223a18b0  artifacts/register-prior/register-student-model.json' | sha256sum -c -

      - name: Run contract tests
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile \
            foundry/archie-protocol/typed_program/typed_program_student.py \
            foundry/archie-protocol/typed_program/typed_program_blind_pack.py \
            foundry/archie-protocol/typed_program/test_typed_program_student.py
          python3 foundry/archie-protocol/typed_program/test_typed_program_student.py

      - name: Train 96,000-example two-epoch student
        shell: bash
        run: |
          set -euo pipefail
          python3 foundry/archie-protocol/typed_program/typed_program_student.py train \
            --register-model artifacts/register-prior/register-student-model.json \
            --output artifacts/typed-program-candidate/typed-program-model.json \
            --receipt artifacts/typed-program-candidate/training-receipt.json \
            --examples 96000 \
            --epochs 2 \
            --batch-size 2048 \
            --alpha 3e-6 \
            > artifacts/typed-program-candidate/training-summary.json
          jq -e '.promotion == "not-admitted"' artifacts/typed-program-candidate/training-receipt.json >/dev/null
          jq -e '.source_isolation.accuracy == 1' artifacts/typed-program-candidate/training-receipt.json >/dev/null

      - name: Seal training environment and package identities
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip freeze > artifacts/typed-program-candidate/python-packages.txt
          cat > artifacts/typed-program-candidate/environment.json <<EOF
          {
            "schema": "archie-typed-program-environment/v2",
            "repository": "${GITHUB_REPOSITORY}",
            "candidate_commit": "${GITHUB_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "runner_os": "${RUNNER_OS}",
            "runner_arch": "${RUNNER_ARCH}",
            "python": "$(python3 --version 2>&1)"
          }
          EOF
          find artifacts/typed-program-candidate -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > artifacts/typed-program-candidate/SHA256SUMS

      - name: Upload trained typed student
        uses: actions/upload-artifact@v4
        with:
          name: archie-typed-program-candidate-${{ github.run_id }}
          path: artifacts/typed-program-candidate
          if-no-files-found: error
          retention-days: 30

  judge:
    name: Independent blind typed-program judge
    needs: [seal, train]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Materialize digest-bound sources
        run: python3 foundry/archie-protocol/typed_program/materialize.py

      - name: Install evaluator dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check 'numpy<3' 'scipy<2' 'scikit-learn<2'

      - name: Download sealed pack and fixed candidate
        uses: actions/download-artifact@v4
        with:
          pattern: archie-typed-program-*-${{ github.run_id }}
          path: artifacts/downloaded
          merge-multiple: false

      - name: Restore immutable V4 route prior
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/register-prior artifacts/typed-program-judge
          gh api -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts/8485713170/zip" > /tmp/register-v3-candidate.zip
          echo '775fd8cf76a1b27a58011940597dacdca26995762f0b7fc252a8f0b2bf5b84f6  /tmp/register-v3-candidate.zip' | sha256sum -c -
          unzip -q /tmp/register-v3-candidate.zip -d artifacts/register-prior
          echo '7a7f4619a9bb300ff5e690970663373d974fb0584a3b6b975cb1858f223a18b0  artifacts/register-prior/register-student-model.json' | sha256sum -c -
          find artifacts/downloaded -maxdepth 3 -type f -print

      - name: Evaluate exact final and typed-program parity
        shell: bash
        run: |
          set -euo pipefail
          candidate_dir="$(find artifacts/downloaded -type f -name typed-program-model.json -printf '%h\n' | head -n1)"
          blind_dir="$(find artifacts/downloaded -type f -name blind-pack.json -printf '%h\n' | head -n1)"
          test -n "$candidate_dir"
          test -n "$blind_dir"
          test "$(jq -r '.candidate_commit' "$blind_dir/blind-pack.manifest.json")" = "$GITHUB_SHA"
          echo "7a7f4619a9bb300ff5e690970663373d974fb0584a3b6b975cb1858f223a18b0" \
            | grep -Fx "$(jq -r '.register_prior.sha256' "$candidate_dir/training-receipt.json")"
          python3 foundry/archie-protocol/typed_program/typed_program_student.py evaluate \
            --model "$candidate_dir/typed-program-model.json" \
            --register-model artifacts/register-prior/register-student-model.json \
            --input "$blind_dir/blind-pack.json" \
            --output artifacts/typed-program-judge/evaluation.json \
            --duration 60 \
            > artifacts/typed-program-judge/evaluation-summary.json
          cp "$blind_dir/blind-pack.manifest.json" artifacts/typed-program-judge/
          cp "$candidate_dir/training-receipt.json" artifacts/typed-program-judge/
          cp "$candidate_dir/environment.json" artifacts/typed-program-judge/training-environment.json

      - name: Apply typed-program candidate gates
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path('artifacts/typed-program-judge/evaluation.json').read_text())
          blockers = []

          def require(name, condition, observed):
              if not condition:
                  blockers.append({'gate': name, 'observed': observed})

          require('final-exact>=0.98', report['final_exact']['accuracy'] >= 0.98, report['final_exact'])
          require('program-exact>=0.95', report['program_exact']['accuracy'] >= 0.95, report['program_exact'])
          for field in ('purpose', 'transform', 'reference_signature', 'reference_state', 'authority_signature'):
              value = report['program_fields'][field]
              require(f'field:{field}>=0.98', value['accuracy'] >= 0.98, value)
          clause = report['program_fields']['clauses']
          require('field:clauses>=0.95', clause['accuracy'] >= 0.95, clause)
          for category in ('blind_v2_authority_unsafe', 'blind_v2_authority_benign'):
              value = report['categories'][category]
              require(f'category:{category}=1', value['accuracy'] == 1, value)
          for source in ('attachment', 'memory', 'thread'):
              for state in ('present', 'missing', 'unusable'):
                  category = f'blind_v2_{source}_{state}'
                  value = report['categories'][category]
                  require(f'category:{category}>=0.97', value['accuracy'] >= 0.97, value)
          require('source-isolation=1', report['source_isolation']['accuracy'] == 1, report['source_isolation'])
          require('executor-blockers=0', report['executor_blockers']['total'] == 0, report['executor_blockers'])
          combined = report['model']['bytes'] + report['register_model']['bytes']
          require('combined-bytes<=2750000', combined <= 2_750_000, combined)

          decision = {
              'schema': 'archie-typed-program-candidate-gate/v2',
              'decision': 'qualified-typed-program-shadow' if not blockers else 'rejected-typed-program-shadow',
              'promotion': 'not-admitted',
              'claim_boundary': 'Typed-program shadow qualification only; no product, provider-neutral, execution, or launch admission.',
              'combined_bytes': combined,
              'blockers': blockers,
              'metrics': {
                  'final_exact': report['final_exact'],
                  'program_exact': report['program_exact'],
                  'program_fields': report['program_fields'],
                  'source_isolation': report['source_isolation'],
                  'executor_blockers': report['executor_blockers'],
                  'resources': report.get('resources'),
              },
          }
          Path('artifacts/typed-program-judge/candidate-gate.json').write_text(json.dumps(decision, indent=2, sort_keys=True) + '\n')
          print(json.dumps(decision, indent=2, sort_keys=True))
          PY

      - name: Run protected repository gates
        id: protected
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          npm run test:archie:baseline
          npm run test:archie:completion
          npm run test:archie:admission

      - name: Write terminal shadow decision
        env:
          PROTECTED_OUTCOME: ${{ steps.protected.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          gate_path = Path('artifacts/typed-program-judge/candidate-gate.json')
          gate = json.loads(gate_path.read_text())
          if os.environ['PROTECTED_OUTCOME'] != 'success':
              gate['blockers'].append({'gate': 'protected-repository-gates', 'observed': os.environ['PROTECTED_OUTCOME']})
          gate['protected_repository_gates'] = os.environ['PROTECTED_OUTCOME']
          gate['decision'] = 'qualified-typed-program-shadow' if not gate['blockers'] else 'rejected-typed-program-shadow'
          gate_path.write_text(json.dumps(gate, indent=2, sort_keys=True) + '\n')
          Path('artifacts/typed-program-judge/terminal-summary.json').write_text(json.dumps({
              'schema': 'archie-typed-program-terminal-summary/v2',
              'candidate_commit': os.environ['GITHUB_SHA'],
              'decision': gate['decision'],
              'promotion': 'not-admitted',
              'blockers': gate['blockers'],
          }, indent=2, sort_keys=True) + '\n')
          PY
          find artifacts/typed-program-judge -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > artifacts/typed-program-judge/SHA256SUMS

      - name: Upload independent judge evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archie-typed-program-judge-${{ github.run_id }}
          path: artifacts/typed-program-judge
          if-no-files-found: error
          retention-days: 30

      - name: Assert qualified shadow result
        shell: bash
        run: |
          set -euo pipefail
          jq -e '.decision == "qualified-typed-program-shadow" and (.blockers | length == 0) and .promotion == "not-admitted"' \
            artifacts/typed-program-judge/candidate-gate.json >/dev/null
