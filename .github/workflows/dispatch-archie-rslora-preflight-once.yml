name: Dispatch Archie RSLoRA preflight once

# Final bounded revision: persist the canonical authorize/blocker result, then retire this workflow.
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/dispatch-archie-rslora-preflight-once.yml'

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: dispatch-archie-rslora-preflight-once
  cancel-in-progress: false

jobs:
  dispatch:
    if: github.repository == 'Pokitomas/theawesomehexapp'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REQUEST_ID: pok-721-canonical-elastic-preflight-v2-20260721
      RECEIPT_PATH: .github/training/pok-721-canonical-elastic-preflight.json
    steps:
      - name: Dispatch exact canonical campaign preflight
        id: dispatch
        run: |
          set -euo pipefail
          started_epoch="$(date -u +%s)"
          jq -n --arg request_id "$REQUEST_ID" \
            '{ref:"main",inputs:{request_id:$request_id,round:"0",shards:"2",rungs:"4",max_fused_rank:"64"}}' \
            | gh api --method POST \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/archie-information-budgeted-rslora.yml/dispatches" \
                --input -
          printf 'started_epoch=%s\n' "$started_epoch" >> "$GITHUB_OUTPUT"
      - name: Capture authoritative authorize/blocker receipt
        env:
          STARTED_EPOCH: ${{ steps.dispatch.outputs.started_epoch }}
        run: |
          set -euo pipefail
          run_id=''
          runs=''
          for _ in $(seq 1 30); do
            runs="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/archie-information-budgeted-rslora.yml/runs?event=workflow_dispatch&per_page=30")"
            run_id="$(jq -r --argjson started "$STARTED_EPOCH" '[.workflow_runs[] | select((.created_at | fromdateiso8601) >= $started)] | sort_by(.created_at) | last | .id // empty' <<<"$runs")"
            [[ -n "$run_id" ]] && break
            sleep 2
          done
          test -n "$run_id"

          for _ in $(seq 1 60); do
            run="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}")"
            status="$(jq -r '.status' <<<"$run")"
            [[ "$status" == 'completed' ]] && break
            sleep 2
          done
          run="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}")"
          jobs="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100")"
          failed_log="$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --log-failed 2>&1 || true)"
          failed_log="$(printf '%s\n' "$failed_log" | tail -n 200 | sed -E 's/\x1B\[[0-9;]*[A-Za-z]//g')"

          jq -n \
            --arg schema 'archie-rslora-canonical-preflight/v1' \
            --arg request_id "$REQUEST_ID" \
            --arg source_sha "$(jq -r '.head_sha' <<<"$run")" \
            --arg run_id "$run_id" \
            --arg run_url "$(jq -r '.html_url' <<<"$run")" \
            --arg status "$(jq -r '.status' <<<"$run")" \
            --arg conclusion "$(jq -r '.conclusion // ""' <<<"$run")" \
            --arg dispatch_actor 'github-actions[bot]' \
            --arg failed_log "$failed_log" \
            --arg created_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson jobs "$(jq '[.jobs[] | {id,name,status,conclusion,runner_name,runner_group_name,started_at,completed_at}]' <<<"$jobs")" \
            '{schema:$schema,request_id:$request_id,source_sha:$source_sha,run_id:($run_id|tonumber),run_url:$run_url,status:$status,conclusion:$conclusion,dispatch_actor:$dispatch_actor,jobs:$jobs,failed_log:$failed_log,created_at:$created_at,promotion:"not-admitted",claim_boundary:"Canonical workflow preflight only; no CUDA training or model result is claimed."}' \
            > /tmp/preflight.json

          existing_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${RECEIPT_PATH}?ref=main" --jq '.sha' 2>/dev/null || true)"
          payload="$(jq -n \
            --arg message 'Record canonical RSLoRA preflight blocker' \
            --arg content "$(base64 -w0 /tmp/preflight.json)" \
            --arg branch main \
            --arg sha "$existing_sha" \
            'if $sha == "" then {message:$message,content:$content,branch:$branch} else {message:$message,content:$content,branch:$branch,sha:$sha} end')"
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${RECEIPT_PATH}" --input - <<<"$payload"

          printf 'Canonical RSLoRA preflight completed.\n\nrequest_id: %s\nrun: %s\nsource_sha: %s\nconclusion: %s\nreceipt: %s\n\nThe receipt contains the exact authorize/blocker job set and failed logs. No model result is claimed.\n' \
            "$REQUEST_ID" "$run_id" "$(jq -r '.head_sha' <<<"$run")" "$(jq -r '.conclusion // ""' <<<"$run")" "$RECEIPT_PATH" \
            > /tmp/comment.md
          gh issue comment 721 --repo "$GITHUB_REPOSITORY" --body-file /tmp/comment.md
