name: Capture exact post-merge Pages evidence

on:
  pull_request:
    paths:
      - .github/workflows/capture-post-merge-pages.yml

permissions:
  actions: read
  contents: write
  issues: read

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    env:
      EXPECTED_SHA: 62a9488bcfb44733a673a02edfbff14f4733d837
      EXPECTED_REPOSITORY: Pokitomas/theawesomehexapp
      RECEIPT_ISSUE: '396'
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
      - name: Remove temporary capture from proof tree
        run: rm .github/workflows/capture-post-merge-pages.yml
      - id: capture
        name: Capture then validate push run sentinel and receipt
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          node <<'NODE'
          const fs = require('node:fs');
          const expectedSha = process.env.EXPECTED_SHA;
          const expectedRepository = process.env.EXPECTED_REPOSITORY;
          const headers = {
            accept: 'application/vnd.github+json',
            authorization: `Bearer ${process.env.GH_TOKEN}`,
            'x-github-api-version': '2022-11-28',
            'user-agent': 'sideways-post-merge-capture'
          };
          async function read(url, options = {}) {
            const response = await fetch(url, { ...options, headers: { ...headers, ...(options.headers || {}) } });
            const text = await response.text();
            let data;
            try { data = JSON.parse(text); } catch { data = { raw: text }; }
            return { url, status: response.status, ok: response.ok, data };
          }
          (async () => {
            const runsResponse = await read(`https://api.github.com/repos/${expectedRepository}/actions/runs?head_sha=${expectedSha}&event=push&per_page=100`);
            const allRuns = Array.isArray(runsResponse.data?.workflow_runs) ? runsResponse.data.workflow_runs : [];
            const matching = allRuns.filter(run => run.name === 'Build and deploy manual root-kernel feed' && run.head_sha === expectedSha && run.event === 'push');
            const run = [...matching].sort((a, b) => Number(b.id) - Number(a.id))[0] || null;
            const jobsResponse = run ? await read(`https://api.github.com/repos/${expectedRepository}/actions/runs/${run.id}/jobs?per_page=100`) : null;
            const sentinelResponse = await read(`https://pokitomas.github.io/theawesomehexapp/.well-known/sideways-deployment.json?proof=${Date.now()}`, {
              headers: { accept: 'application/json', 'cache-control': 'no-cache', authorization: '' }
            });
            const receiptResponse = await read(`https://api.github.com/repos/${expectedRepository}/issues/${process.env.RECEIPT_ISSUE}`);
            const capture = {
              schema: 'sideways-post-merge-pages-capture/v1',
              expected: { repository: expectedRepository, commit: expectedSha, receipt_issue: Number(process.env.RECEIPT_ISSUE) },
              runs_api: { status: runsResponse.status, total_count: runsResponse.data?.total_count, matching_runs: matching.map(item => ({ id: item.id, name: item.name, event: item.event, status: item.status, conclusion: item.conclusion, head_sha: item.head_sha, run_number: item.run_number, html_url: item.html_url })) },
              selected_run: run ? { id: run.id, name: run.name, event: run.event, status: run.status, conclusion: run.conclusion, head_sha: run.head_sha, run_number: run.run_number, html_url: run.html_url } : null,
              jobs_api: jobsResponse ? { status: jobsResponse.status, jobs: (jobsResponse.data?.jobs || []).map(job => ({ id: job.id, name: job.name, status: job.status, conclusion: job.conclusion, html_url: job.html_url })) } : null,
              sentinel_http: { status: sentinelResponse.status, ok: sentinelResponse.ok, body: sentinelResponse.data },
              receipt_api: { status: receiptResponse.status, body: receiptResponse.data },
              captured_at: new Date().toISOString()
            };
            fs.writeFileSync('post-merge-pages-capture.json', `${JSON.stringify(capture, null, 2)}\n`);
            console.log(JSON.stringify(capture, null, 2));
            const errors = [];
            if (!runsResponse.ok) errors.push(`runs API ${runsResponse.status}`);
            if (!run) errors.push(`no exact push Pages run; matching=${matching.length}`);
            else if (run.status !== 'completed' || run.conclusion !== 'success') errors.push(`run ${run.id} ${run.status}/${run.conclusion}`);
            const jobs = jobsResponse?.data?.jobs || [];
            for (const required of ['remote-gate', 'build', 'deploy']) {
              const job = jobs.find(candidate => candidate.name === required);
              if (!job) errors.push(`missing job ${required}; names=${jobs.map(item => item.name).join(',')}`);
              else if (job.status !== 'completed' || job.conclusion !== 'success') errors.push(`job ${required} ${job.status}/${job.conclusion}`);
            }
            if (!sentinelResponse.ok) errors.push(`sentinel HTTP ${sentinelResponse.status}`);
            const sentinel = sentinelResponse.data || {};
            const sentinelSha = sentinel.commit || sentinel.sha || sentinel.commit_sha || sentinel.COMMIT;
            const sentinelRepository = sentinel.repository || sentinel.repo || sentinel.repository_full_name || sentinel.REPOSITORY;
            if (sentinelSha !== expectedSha) errors.push(`sentinel SHA ${sentinelSha}`);
            if (sentinelRepository !== expectedRepository) errors.push(`sentinel repository ${sentinelRepository}`);
            const receipt = receiptResponse.data || {};
            if (!receiptResponse.ok) errors.push(`receipt API ${receiptResponse.status}`);
            if (receipt.state !== 'open') errors.push(`receipt state ${receipt.state}`);
            if (!String(receipt.body || '').includes(`COMMIT=${expectedSha}`)) errors.push('receipt exact COMMIT missing');
            if (!String(receipt.body || '').includes('LIVE_COMMIT_VERIFIED=true')) errors.push('receipt live verification missing');
            if (errors.length) throw new Error(errors.join(' | '));
            fs.writeFileSync('post-merge-pages-proof.json', `${JSON.stringify({
              schema: 'sideways-post-merge-pages-proof/v1',
              repository: expectedRepository,
              commit: expectedSha,
              pages_run: capture.selected_run,
              jobs: capture.jobs_api.jobs,
              sentinel: { url: 'https://pokitomas.github.io/theawesomehexapp/.well-known/sideways-deployment.json', body: sentinel },
              receipt: { issue: receipt.number, state: receipt.state, html_url: receipt.html_url, commit_verified: true, live_commit_verified: true },
              verified_at: new Date().toISOString()
            }, null, 2)}\n`);
          })().catch(error => {
            fs.writeFileSync('post-merge-pages-error.log', `${error.stack || error.message}\n`);
            console.error(error.stack || error.message);
            process.exitCode = 1;
          });
          NODE
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload captured post-merge evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: captured-post-merge-pages-evidence
          path: |
            post-merge-pages-capture.json
            post-merge-pages-proof.json
            post-merge-pages-error.log
          if-no-files-found: error
          retention-days: 5
      - name: Remove capture workflow from branch
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git reset
          git add -u .github/workflows/capture-post-merge-pages.yml
          test "$(git diff --cached --name-only)" = ".github/workflows/capture-post-merge-pages.yml"
          git commit -m "chore: remove post-merge Pages capture"
          git push origin HEAD:${TARGET_BRANCH}
      - name: Preserve validation status
        if: steps.capture.outputs.status != '0'
        run: exit 1
