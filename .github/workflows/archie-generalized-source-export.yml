name: Archie generalized source export

on:
  push:
    branches:
      - agent/archie-generalized-program-v1-20260721
    paths:
      - .github/workflows/archie-generalized-source-export.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Materialize typed-program sources
        run: python3 foundry/archie-protocol/typed_program/materialize.py
      - name: Package exact research sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/generalized-source
          cp foundry/archie-protocol/typed_program/typed_program_student.py artifacts/generalized-source/
          cp foundry/archie-protocol/typed_program/typed_program_blind_pack.py artifacts/generalized-source/
          cp foundry/archie-protocol/typed_program/test_typed_program_student.py artifacts/generalized-source/
          cp foundry/archie-protocol/typed_program/README.md artifacts/generalized-source/
          cp .github/workflows/archie-typed-program-student.yml artifacts/generalized-source/
          find artifacts/generalized-source -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > artifacts/generalized-source/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: archie-generalized-source-${{ github.run_id }}
          path: artifacts/generalized-source
          if-no-files-found: error
          retention-days: 7
