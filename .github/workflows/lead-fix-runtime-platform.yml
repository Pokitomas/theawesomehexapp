name: Apply runtime-platform composition repair

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor == 'Pokitomas'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Apply exact current-contract patch
        run: |
          printf '%s' '' | base64 -d | gzip -d > /tmp/runtime-platform.patch
          git apply --check /tmp/runtime-platform.patch
          git apply /tmp/runtime-platform.patch
      - name: Prove current composition contract
        run: |
          node --check scripts/maker-runtime-platform.mjs
          node --test scripts/tests/maker-runtime-platform.test.mjs
          node --test scripts/tests/maker-model-router.test.mjs
          node --test scripts/tests/maker-worker-fleet.test.mjs
      - name: Commit only the proven runtime and test repair
        run: |
          rm .github/workflows/lead-fix-runtime-platform.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/maker-runtime-platform.mjs scripts/tests/maker-runtime-platform.test.mjs .github/workflows/lead-fix-runtime-platform.yml
          git commit -m 'Repair Maker runtime platform composition'
          git push origin HEAD:${{ github.head_ref }}
