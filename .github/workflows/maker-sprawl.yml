name: Maker Actions sprawl

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions:
  contents: read

concurrency:
  group: maker-sprawl-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  collision-gate:
    if: startsWith(github.head_ref, 'maker/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      session_id: ${{ steps.lease.outputs.session_id }}
      selected_lane: ${{ steps.lease.outputs.selected_lane }}
    steps:
      - id: lease
        name: Prove one writer and no overlapping open Maker lease
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const marker = 'sideways-maker-lease:v1';
            const currentPr = context.payload.pull_request;

            function normalize(value) {
              let raw = String(value || '').trim().replace(/\\/g, '/').replace(/^\.\//, '');
              if (!raw) throw new Error('lease path is empty');
              if (raw === '*' || raw === '**' || raw === '**/*') return '**';
              if (raw.startsWith('/') || /^[A-Za-z]:\//.test(raw)) throw new Error(`absolute lease path: ${raw}`);
              const parts = raw.split('/').filter(Boolean);
              if (parts.some(part => part === '.' || part === '..')) throw new Error(`traversing lease path: ${raw}`);
              const wildcard = raw.indexOf('*');
              if (wildcard !== -1 && !raw.endsWith('/**')) throw new Error(`unsupported lease wildcard: ${raw}`);
              raw = parts.join('/');
              if (raw.endsWith('/**')) raw = raw.slice(0, -3).replace(/\/$/, '');
              return raw || '**';
            }

            function paths(lease) {
              const values = Array.isArray(lease?.owned_paths) && lease.owned_paths.length ? lease.owned_paths : ['**'];
              const normalized = [...new Set(values.map(normalize))];
              return normalized.includes('**') ? ['**'] : normalized.sort();
            }

            function overlap(a, b) {
              if (a === '**' || b === '**') return true;
              return a === b || a.startsWith(`${b}/`) || b.startsWith(`${a}/`);
            }

            function leasesOverlap(left, right) {
              return paths(left).some(a => paths(right).some(b => overlap(a, b)));
            }

            function parseLease(body) {
              const escaped = marker.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const match = new RegExp(`<!--\\s*${escaped}\\s*\\n([\\s\\S]*?)\\n-->`, 'm').exec(String(body || ''));
              if (!match) return null;
              const lease = JSON.parse(match[1]);
              if (lease?.schema !== 'sideways-maker-lease/v1') throw new Error('wrong Maker lease schema');
              if (lease?.writer_count !== 1) throw new Error('Maker lease must authorize exactly one writer');
              if (!String(lease?.session_id || '').trim()) throw new Error('Maker lease has no session_id');
              if (!String(lease?.branch || '').startsWith('maker/')) throw new Error('Maker lease branch must start with maker/');
              if (!/^[0-9a-f]{40}$/i.test(String(lease?.base_sha || ''))) throw new Error('Maker lease base_sha is not an exact commit');
              lease.owned_paths = paths(lease);
              return lease;
            }

            const current = parseLease(currentPr.body);
            if (!current) throw new Error('Maker PR is missing the sideways-maker-lease:v1 marker.');
            if (current.branch !== currentPr.head.ref) throw new Error(`Lease branch ${current.branch} does not match PR head ${currentPr.head.ref}.`);
            if (current.base_branch !== currentPr.base.ref) throw new Error(`Lease base ${current.base_branch} does not match PR base ${currentPr.base.ref}.`);

            const open = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const collisions = [];
            for (const other of open) {
              if (other.number === currentPr.number) continue;
              let lease;
              try { lease = parseLease(other.body); }
              catch (error) {
                core.warning(`Ignoring malformed Maker marker on PR #${other.number}: ${error.message}`);
                continue;
              }
              if (!lease) continue;
              if (leasesOverlap(current, lease)) {
                collisions.push({ number: other.number, branch: other.head.ref, paths: lease.owned_paths });
              }
            }

            if (collisions.length) {
              throw new Error(`Maker collision: ${current.owned_paths.join(', ')} overlaps ${collisions.map(value => `#${value.number} ${value.branch} [${value.paths.join(', ')}]`).join('; ')}`);
            }

            core.setOutput('session_id', current.session_id);
            core.setOutput('selected_lane', current.selected_lane || 'unknown');
            core.notice(`Maker lease admitted: ${current.session_id}; paths=${current.owned_paths.join(', ')}`);

  verification-sprawl:
    needs: collision-gate
    if: needs.collision-gate.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: product
            command: npm run verify:quality
          - lane: social
            command: npm run test:social
          - lane: operator
            command: npm run test:native-maker && npm run test:maker
          - lane: hostile
            command: node --test scripts/tests/workflow-permissions.test.mjs scripts/tests/supply-chain-contract.test.mjs && npm run verify:operations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out exact Maker candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci --ignore-scripts
      - name: Run ${{ matrix.lane }} witness lane
        run: ${{ matrix.command }}
