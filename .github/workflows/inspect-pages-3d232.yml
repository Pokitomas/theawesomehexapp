name: Inspect Pages 3d232

on:
  push:
    branches:
      - agent/inspect-pages-3d232
    paths:
      - .github/workflows/inspect-pages-3d232.yml

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.ref_name }}
      - name: Record exact Pages run
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_COMMIT: 3d23242764d1096290b36d316b8f1c14aaa69b33
        run: |
          mkdir -p audit
          node <<'NODE' > audit/pages-3d232-status.json
          const response = await fetch('https://api.github.com/repos/Pokitomas/theawesomehexapp/actions/workflows/pages.yml/runs?event=push&branch=main&per_page=40', {
            headers: { accept: 'application/vnd.github+json', authorization: `Bearer ${process.env.GH_TOKEN}`, 'x-github-api-version': '2022-11-28', 'user-agent': 'sideways-pages-status' }
          });
          if (!response.ok) throw new Error(`GitHub API ${response.status}: ${await response.text()}`);
          const payload = await response.json();
          const run = (payload.workflow_runs || []).find(item => item.head_sha === process.env.EXPECTED_COMMIT) || null;
          console.log(JSON.stringify({ checked_at: new Date().toISOString(), expected_commit: process.env.EXPECTED_COMMIT, run: run && { id: run.id, status: run.status, conclusion: run.conclusion, html_url: run.html_url, run_number: run.run_number, created_at: run.created_at, updated_at: run.updated_at } }, null, 2));
          NODE
          rm .github/workflows/inspect-pages-3d232.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add audit/pages-3d232-status.json .github/workflows/inspect-pages-3d232.yml
          git commit -m "audit: record Pages 3d232 status"
          git push origin HEAD:${GITHUB_REF_NAME}
