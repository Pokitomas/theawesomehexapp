name: Apply Archie low-compute final

on:
  push:
    branches:
      - agent/archie-low-compute-final

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - name: Apply outcome reliability and CPU consumer integration
        run: python3 .github/agent/apply-archie-low-compute.py
      - name: Set executable entrypoints
        run: chmod +x scripts/archie-lite.mjs scripts/install-archie-lite-linux.sh
      - name: Install exact dependency tree
        run: npm ci --ignore-scripts
      - name: Verify specialist outcome reliability
        run: node --test scripts/tests/maker-archie-brain.test.mjs
      - name: Verify GGUF memory planner and CPU command
        run: npm run test:archie:lite
      - name: Verify install surface
        run: npm run test:archie:install
      - name: Verify learning contracts
        run: npm run test:archie:learning
      - name: Verify CLI syntax and shell installer
        run: |
          node --check scripts/archie.mjs
          node --check scripts/archie-lite.mjs
          bash -n scripts/install-archie-lite-linux.sh
      - name: Commit verified final implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/agent/apply-archie-low-compute.py
          git rm .github/workflows/agent-apply-archie-low-compute-final.yml
          git add scripts/maker-archie-brain.mjs scripts/tests/maker-archie-brain.test.mjs \
            scripts/archie-lite.mjs scripts/tests/archie-lite.test.mjs \
            scripts/install-archie-lite-linux.sh scripts/archie.mjs \
            ARCHIE_LITE.md INSTALL.md package.json
          git commit -m "Ship outcome-weighted CPU Archie"
          git push origin HEAD:agent/archie-low-compute-final

# Existing-workflow trigger commit.
