name: Inspect Pages failure

on:
  push:
    branches:
      - agent/inspect-pages-failure
    paths:
      - .github/workflows/inspect-pages-failure.yml

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.ref_name }}
      - name: Extract redacted failed-step log
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_JOB_ID: '87587991973'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit
          node <<'NODE'
          const response = await fetch(`https://api.github.com/repos/Pokitomas/theawesomehexapp/actions/jobs/${process.env.FAILED_JOB_ID}/logs`, {
            headers: {
              accept: 'application/vnd.github+json',
              authorization: `Bearer ${process.env.GH_TOKEN}`,
              'x-github-api-version': '2022-11-28',
              'user-agent': 'sideways-pages-failure-inspector'
            },
            redirect: 'follow'
          });
          if (!response.ok) throw new Error(`logs HTTP ${response.status}: ${await response.text()}`);
          const text = await response.text();
          const lines = text.split(/\r?\n/);
          const marker = lines.findIndex(line => line.includes('Build bounded public discovery snapshot'));
          const selected = marker >= 0 ? lines.slice(marker, Math.min(lines.length, marker + 220)) : lines.slice(-260);
          const redacted = selected.map(line => line.replace(/(authorization:|token:|key:|secret:)[^\s]*/ig, '$1***'));
          require('node:fs').writeFileSync('audit/final-pages-failure.log', `${redacted.join('\n')}\n`);
          NODE
          rm .github/workflows/inspect-pages-failure.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add audit/final-pages-failure.log .github/workflows/inspect-pages-failure.yml
          git commit -m "audit: preserve final Pages failure excerpt"
          git push origin HEAD:${GITHUB_REF_NAME}
