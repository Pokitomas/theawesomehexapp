name: Normalize live research sources

on:
  push:
    paths:
      - scripts/normalize-live-research.py
      - .github/workflows/normalize-live-research.yml
  pull_request:
    paths:
      - scripts/normalize-live-research.py
      - .github/workflows/normalize-live-research.yml

permissions:
  contents: write

concurrency:
  group: normalize-live-research-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Rewrite research surfaces around live sources
        run: python3 scripts/normalize-live-research.py
      - name: Commit normalized tree
        shell: bash
        run: |
          set -euo pipefail
          target="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Remove dates and research identity seals"
          git push origin "HEAD:${target}"
