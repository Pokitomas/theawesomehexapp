# synchronize trusted pull-request integrator
name: Publish Archie causal repair gate

on:
  push:
    branches:
      - agent/archie-causal-repair-gate

permissions:
  contents: write

concurrency:
  group: archie-causal-repair-gate
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify exact base
        shell: bash
        run: |
          git fetch origin main --depth=1
          test "$(git rev-parse origin/main)" = "8b26aa602c6e20161780c3edc3e659c797078a30" || { echo "main moved"; exit 1; }
          test "$(git merge-base HEAD origin/main)" = "8b26aa602c6e20161780c3edc3e659c797078a30" || { echo "unexpected merge base"; exit 1; }
      - name: Apply reviewed patch
        shell: bash
        env:
          PATCH_GZ_B64: 
        run: |
          printf '%s' "$PATCH_GZ_B64" | base64 -d | gzip -d > /tmp/archie.patch
          echo '0dda0413b15048deb7430454e2866321c08ef62e9a487752a83e392848dfd3bd  /tmp/archie.patch' | sha256sum -c -
          git apply --check /tmp/archie.patch
          git apply /tmp/archie.patch
          git diff --check
      - name: Verify repair engine
        shell: bash
        run: |
          node --test scripts/tests/maker-engine.contract.mjs
          npm run test:native-maker
          npm run test:foundry
          node --test scripts/tests/maker-worker-fleet.test.mjs scripts/tests/maker-model-router.test.mjs scripts/tests/maker-control-plane.test.mjs scripts/tests/maker-foundry-adapter.test.mjs
      - name: Commit exact result
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/maker-engine.mjs maker/runtime/autonomous-agent.mjs scripts/tests/maker-engine.contract.mjs
          git commit -m 'Require causal repair witnesses'
          git push origin HEAD:agent/archie-causal-repair-gate
