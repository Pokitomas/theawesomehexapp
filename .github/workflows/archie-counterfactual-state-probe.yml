name: Archie counterfactual state probe

on:
  pull_request:
    paths:
      - 'foundry/archie-distill/archie_counterfactual_state_probe.py'
      - 'foundry/archie-distill/test_archie_counterfactual_state_probe.py'
      - 'foundry/archie-distill/run_archie_counterfactual_state_probe.sh'
      - '.github/workflows/archie-counterfactual-state-probe.yml'
  push:
    branches:
      - 'agent/archie-counterfactual-state-probe-20260723'

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Compile and shell-check
        run: |
          python -m py_compile \
            foundry/archie-distill/archie_counterfactual_state_probe.py \
            foundry/archie-distill/test_archie_counterfactual_state_probe.py
          bash -n foundry/archie-distill/run_archie_counterfactual_state_probe.sh
      - name: Structural counterfactual court
        working-directory: foundry/archie-distill
        run: python -m unittest -v test_archie_counterfactual_state_probe.CounterfactualStateProbeTest
      - name: CPU smoke
        working-directory: foundry/archie-distill
        run: |
          python archie_counterfactual_state_probe.py \
            --profile smoke \
            --device cpu \
            --steps 4 \
            --output-dir /tmp/archie-counterfactual-smoke
          test -s /tmp/archie-counterfactual-smoke/counterfactual-state-probe.json
