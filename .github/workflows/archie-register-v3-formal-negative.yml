name: Archie register v3 formal negative admission

on:
  pull_request:
  push:
    branches: [claude/archie-sprawl-training-5pe3i8]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: archie-register-v3-formal-negative-${{ github.ref }}
  cancel-in-progress: false

jobs:
  formal-negative-admission:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Download and verify exact candidate evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/register-candidate-v3 /tmp/register-admission-v3 /tmp/register-reproduction-v3 artifacts/register-formal-v3
          curl --fail --location --retry 3 \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/Pokitomas/theawesomehexapp/actions/artifacts/8485713170/zip' \
            -o /tmp/register-candidate-v3.zip
          curl --fail --location --retry 3 \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/Pokitomas/theawesomehexapp/actions/artifacts/8485745528/zip' \
            -o /tmp/register-admission-v3.zip
          curl --fail --location --retry 3 \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/Pokitomas/theawesomehexapp/actions/artifacts/8485722290/zip' \
            -o /tmp/register-reproduction-v3.zip
          echo '775fd8cf76a1b27a58011940597dacdca26995762f0b7fc252a8f0b2bf5b84f6  /tmp/register-candidate-v3.zip' | sha256sum -c -
          echo 'c11c17c2ff16dfd0a24f11d329c2ee39de76a6c45a1c55ba99f673756558565a  /tmp/register-admission-v3.zip' | sha256sum -c -
          echo 'c51ccf2cd4d4447c04e00ebcdb08c9057912d1040928ce31b2cd2abab5a87c3c  /tmp/register-reproduction-v3.zip' | sha256sum -c -
          unzip -q /tmp/register-candidate-v3.zip -d /tmp/register-candidate-v3
          unzip -q /tmp/register-admission-v3.zip -d /tmp/register-admission-v3
          unzip -q /tmp/register-reproduction-v3.zip -d /tmp/register-reproduction-v3
          test -f /tmp/register-candidate-v3/register-student-model.json
          test -f /tmp/register-candidate-v3/register-student-core.mjs
          test -f /tmp/register-candidate-v3/training-receipt.json
          test -f /tmp/register-admission-v3/admission-report.json
          test -f /tmp/register-admission-v3/protected-tests.json
          test -f /tmp/register-reproduction-v3/reproduction.json
          test -f /tmp/register-reproduction-v3/development-evaluation.macos.json
      - name: Execute repository formal admission contract fail-closed
        shell: bash
        run: |
          set -euo pipefail
          node foundry/archie-protocol/register_student/v3/formal/build_formal_negative_admission.mjs \
            /tmp/register-candidate-v3 \
            /tmp/register-admission-v3 \
            /tmp/register-reproduction-v3 \
            artifacts/register-formal-v3 \
            2>&1 | tee artifacts/register-formal-v3/formal-admission.log
          node -e "const r=require('./artifacts/register-formal-v3/formal-admission.json'); if(r.decision!=='rejected-incomplete-student-evidence' || r.launch_candidate_intelligence_binding!==null){throw new Error('formal contract did not fail closed as required')}"
          sha256sum artifacts/register-formal-v3/* > artifacts/register-formal-v3/SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: register-student-v3-formal-negative-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/register-formal-v3
          if-no-files-found: error
          retention-days: 14
