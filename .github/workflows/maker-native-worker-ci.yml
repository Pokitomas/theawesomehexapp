name: Inspect exact Archie coordinator tree

on:
  pull_request:
    branches:
      - agent/archie-ccf85fa-inspection-base

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ccf85fa454da74439e9512e9a2c4c4f31374f9bb
      - name: Verify and archive exact tree with Git history
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "ccf85fa454da74439e9512e9a2c4c4f31374f9bb"
          git rev-parse HEAD | tee "$RUNNER_TEMP/head.txt"
          git status --short | tee "$RUNNER_TEMP/status.txt"
          test ! -s "$RUNNER_TEMP/status.txt"
          tar -czf "$RUNNER_TEMP/tree-with-git.tgz" .
          sha256sum "$RUNNER_TEMP/tree-with-git.tgz" | tee "$RUNNER_TEMP/tree.sha256"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-ccf85fa-exact-tree
          path: |
            ${{ runner.temp }}/tree-with-git.tgz
            ${{ runner.temp }}/tree.sha256
            ${{ runner.temp }}/head.txt
            ${{ runner.temp }}/status.txt
          if-no-files-found: error
          retention-days: 2
