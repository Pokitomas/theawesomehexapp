name: Archie coordinator exact-tree snapshot

on:
  push:
    branches:
      - agent/archie-coordinator-exact-snapshot-20260715
  pull_request:
    branches:
      - agent/archie-coordinator-exact-snapshot-20260715
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Archive exact checkout with full Git history
        run: |
          set -euo pipefail
          git rev-parse HEAD | tee "$RUNNER_TEMP/archie-source-head.txt"
          git status --short | tee "$RUNNER_TEMP/archie-source-status.txt"
          tar -czf "$RUNNER_TEMP/archie-source-with-git.tgz" .
          sha256sum "$RUNNER_TEMP/archie-source-with-git.tgz" | tee "$RUNNER_TEMP/archie-source.sha256"
      - name: Recover and verify hostile plugin repair bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Pokitomas/theawesomehexapp/issues/comments/4987246843 \
            > "$RUNNER_TEMP/plugin-comment.json"
          python - "$RUNNER_TEMP/plugin-comment.json" "$RUNNER_TEMP/plugin315-repair.tgz" <<'PY'
          import base64, json, pathlib, re, sys
          payload = json.loads(pathlib.Path(sys.argv[1]).read_text())
          body = payload.get('body', '')
          match = re.search(r"(H4sIA[A-Za-z0-9+/=\r\n]+?)(?=\r?\nB64(?:\r?\n|$))", body, re.S)
          if not match:
              pathlib.Path(sys.argv[1] + '.body.txt').write_text(body)
              raise SystemExit('repair bundle block missing')
          encoded = ''.join(match.group(1).split())
          pathlib.Path(sys.argv[2]).write_bytes(base64.b64decode(encoded, validate=True))
          PY
          echo "68a4bb662356095d4d0e6724ef8da0d286a832a61f867b60016d6ab9fe7ac084  $RUNNER_TEMP/plugin315-repair.tgz" | sha256sum -c -
          tar -tzf "$RUNNER_TEMP/plugin315-repair.tgz" | tee "$RUNNER_TEMP/plugin315-repair.files.txt"
          python - "$RUNNER_TEMP/plugin315-repair.files.txt" <<'PY'
          import pathlib, sys
          expected = {
            'scripts/maker-plugin-registry.mjs',
            'scripts/tests/maker-plugin-registry.test.mjs',
            'maker/contracts/plugin-manifest.schema.json',
          }
          actual = {line.strip().lstrip('./') for line in pathlib.Path(sys.argv[1]).read_text().splitlines() if line.strip() and not line.rstrip().endswith('/')}
          if actual != expected:
              raise SystemExit(f'unexpected repair paths: {sorted(actual)}')
          PY
      - name: Upload exact checkout and verified repair evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-coordinator-source-with-plugin-repair-${{ github.sha }}
          path: |
            ${{ runner.temp }}/archie-source-with-git.tgz
            ${{ runner.temp }}/archie-source.sha256
            ${{ runner.temp }}/archie-source-head.txt
            ${{ runner.temp }}/archie-source-status.txt
            ${{ runner.temp }}/plugin-comment.json
            ${{ runner.temp }}/plugin-comment.json.body.txt
            ${{ runner.temp }}/plugin315-repair.tgz
            ${{ runner.temp }}/plugin315-repair.files.txt
          if-no-files-found: warn
          retention-days: 2
