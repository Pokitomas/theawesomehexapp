name: Archie worker-fleet exact-tree snapshot

on:
  pull_request:
    branches:
      - agent/worker-fleet
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Archive exact checkout
        run: |
          set -euo pipefail
          tar --exclude=.git -czf "$RUNNER_TEMP/archie-source.tgz" .
          sha256sum "$RUNNER_TEMP/archie-source.tgz" | tee "$RUNNER_TEMP/archie-source.sha256"
          git rev-parse HEAD | tee "$RUNNER_TEMP/archie-source-head.txt"
      - name: Upload exact checkout
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-worker-fleet-source-${{ github.sha }}
          path: |
            ${{ runner.temp }}/archie-source.tgz
            ${{ runner.temp }}/archie-source.sha256
            ${{ runner.temp }}/archie-source-head.txt
          if-no-files-found: error
          retention-days: 2
