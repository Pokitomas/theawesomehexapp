name: Capture historical Archie patch blobs

on:
  pull_request:
    branches:
      - agent/archie-drift-c-exact-snapshot

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: 8797ab484137926a158efc8d4a6c69054f0bc3dc
      - name: Capture immutable blob bytes and actual checksums
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "8797ab484137926a158efc8d4a6c69054f0bc3dc"
          blobs=(ab1d7f4b5052aea315360c394e86e5ddcd94002e e6b397e3e8d74d9a5a087baf10780763d7ce665b 07095e89119d7b6d8b1128c3cd00cbd5e8868113 a5afe48bc6026aa28b80710584feac9afb6aea57 8d3a4ee312ff4ad2b95489f48709ff95df8f7f41 ca3fd77b10869c52496f07ea568be75b2ddabbc5)
          : > "$RUNNER_TEMP/archie-historical-patch.tgz"
          : > "$RUNNER_TEMP/archie-historical-checksums.txt"
          for index in "${!blobs[@]}"; do
            curl --fail --silent --show-error \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/$REPOSITORY/git/blobs/${blobs[$index]}" \
              > "$RUNNER_TEMP/blob.$index.json"
            jq -r '.content' "$RUNNER_TEMP/blob.$index.json" | tr -d '\n' | base64 -d > "$RUNNER_TEMP/patch.part.$index"
            sha256sum "$RUNNER_TEMP/patch.part.$index" | tee -a "$RUNNER_TEMP/archie-historical-checksums.txt"
            wc -c "$RUNNER_TEMP/patch.part.$index" | tee -a "$RUNNER_TEMP/archie-historical-checksums.txt"
            cat "$RUNNER_TEMP/patch.part.$index" >> "$RUNNER_TEMP/archie-historical-patch.tgz"
          done
          sha256sum "$RUNNER_TEMP/archie-historical-patch.tgz" | tee -a "$RUNNER_TEMP/archie-historical-checksums.txt"
          wc -c "$RUNNER_TEMP/archie-historical-patch.tgz" | tee -a "$RUNNER_TEMP/archie-historical-checksums.txt"
          tar -tzf "$RUNNER_TEMP/archie-historical-patch.tgz" > "$RUNNER_TEMP/archie-historical-patch.paths.txt" 2> "$RUNNER_TEMP/archie-historical-tar-error.txt" || true
      - name: Upload captured evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-historical-patch-capture
          path: |
            ${{ runner.temp }}/blob.*.json
            ${{ runner.temp }}/patch.part.*
            ${{ runner.temp }}/archie-historical-patch.tgz
            ${{ runner.temp }}/archie-historical-checksums.txt
            ${{ runner.temp }}/archie-historical-patch.paths.txt
            ${{ runner.temp }}/archie-historical-tar-error.txt
          if-no-files-found: warn
          retention-days: 2
