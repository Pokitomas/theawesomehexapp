name: Archie drift exact-tree snapshot

on:
  pull_request:
    branches:
      - agent/archie-drift-c-exact-snapshot

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: 8797ab484137926a158efc8d4a6c69054f0bc3dc
      - name: Verify and archive exact drift checkout
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "8797ab484137926a158efc8d4a6c69054f0bc3dc"
          git rev-parse HEAD | tee "$RUNNER_TEMP/archie-drift-head.txt"
          git status --short | tee "$RUNNER_TEMP/archie-drift-status.txt"
          test ! -s "$RUNNER_TEMP/archie-drift-status.txt"
          tar -czf "$RUNNER_TEMP/archie-drift-with-git.tgz" .
          sha256sum "$RUNNER_TEMP/archie-drift-with-git.tgz" | tee "$RUNNER_TEMP/archie-drift.sha256"
      - name: Upload exact drift checkout
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: archie-drift-source-8797ab484137926a158efc8d4a6c69054f0bc3dc
          path: |
            ${{ runner.temp }}/archie-drift-with-git.tgz
            ${{ runner.temp }}/archie-drift.sha256
            ${{ runner.temp }}/archie-drift-head.txt
            ${{ runner.temp }}/archie-drift-status.txt
          if-no-files-found: error
          retention-days: 2
