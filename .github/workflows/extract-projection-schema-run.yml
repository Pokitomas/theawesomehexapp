name: Extract projection schema run

on:
  pull_request:
    paths:
      - .github/workflows/extract-projection-schema-run.yml

permissions:
  contents: write
  actions: read

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.TARGET_BRANCH }}
      - name: Preserve exact live-build excerpt
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_RUN_ID: '29490597085'
          FAILED_JOB_ID: '87595497124'
        shell: bash
        run: |
          set +e
          gh run view "$FAILED_RUN_ID" --repo Pokitomas/theawesomehexapp --job "$FAILED_JOB_ID" --log > /tmp/projection-run.log 2>/tmp/projection-run.err
          gh_status=$?
          node <<'NODE'
          const fs = require('node:fs');
          const text = fs.existsSync('/tmp/projection-run.log') ? fs.readFileSync('/tmp/projection-run.log', 'utf8') : '';
          const error = fs.existsSync('/tmp/projection-run.err') ? fs.readFileSync('/tmp/projection-run.err', 'utf8') : '';
          const lines = text.split(/\r?\n/);
          const marker = lines.findIndex(line => line.includes('Run actual live snapshot, media bridge, and one-million projection'));
          const errorMarker = lines.findIndex(line => line.includes('##[error]'));
          const start = marker >= 0 ? marker : errorMarker >= 0 ? Math.max(0, errorMarker - 180) : Math.max(0, lines.length - 420);
          const selected = lines.slice(start, Math.min(lines.length, start + 420));
          fs.mkdirSync('audit', { recursive: true });
          fs.writeFileSync('audit/pages-projection-schema-live-failure.log', `${selected.join('\n')}\n\n## gh stderr\n${error}`);
          NODE
          echo "gh_status=${gh_status}" >> audit/pages-projection-schema-live-failure.log
          rm .github/workflows/extract-projection-schema-run.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add audit/pages-projection-schema-live-failure.log .github/workflows/extract-projection-schema-run.yml
          git commit -m "audit: preserve projection schema live failure"
          git push origin HEAD:${TARGET_BRANCH}
