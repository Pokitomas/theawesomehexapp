name: Revive dead-instance completion

on:
  pull_request:
    branches:
      - main
    paths:
      - .recovery/**
      - .github/workflows/revive-dead-instance.yml

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: revive-dead-instance-completion-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  recover-verify-push:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/archie-dead-instance-recovery-exec'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out the PR merge tree
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Reconstruct and verify the recovered vault patch
        shell: bash
        run: |
          set -euo pipefail
          cat .recovery/0001.patch.part.* > /tmp/0001.patch
          sed -i 's/|  60 ++++ -$/|  60 ++++-/' /tmp/0001.patch
          echo 'b18e8e171deead37e066adb2d895b6027b2db0a774cf99dcc364994c93c2cc9e  /tmp/0001.patch' | sha256sum -c -

      - name: Extract only the genuinely missing Overlay Vault files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'Archie Recovery Bot'
          git config user.email 'archie-recovery@users.noreply.github.com'

          # Teacher promotion and cold-start are already on main in stronger
          # form. Apply only the two new-file paths from the recovered patch.
          git apply --index \
            --include=scripts/overlay-vault.mjs \
            --include=scripts/tests/overlay-vault.test.mjs \
            /tmp/0001.patch

          test -f scripts/overlay-vault.mjs
          test -f scripts/tests/overlay-vault.test.mjs

          node <<'NODE'
          const fs = require('node:fs');
          const path = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          const testPath = 'scripts/tests/overlay-vault.test.mjs';
          const current = pkg.scripts['test:archie:portable'];
          if (!current.includes(testPath)) pkg.scripts['test:archie:portable'] = `${current} ${testPath}`;
          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
          git add package.json

          changed="$(git diff --cached --name-only | sort)"
          expected="$(printf '%s\n' \
            package.json \
            scripts/overlay-vault.mjs \
            scripts/tests/overlay-vault.test.mjs | sort)"
          if [ "$changed" != "$expected" ]; then
            echo 'Recovery produced an unexpected staged tree:' >&2
            printf '%s\n' "$changed" >&2
            exit 1
          fi
          git commit -m 'Add hash-verified append-only Overlay Vault'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install exact dependencies
        shell: bash
        run: npm ci

      - name: Run focused Overlay Vault regression
        shell: bash
        run: node --test scripts/tests/overlay-vault.test.mjs

      - name: Run full Archie and Maker verification matrix
        shell: bash
        run: |
          set -euo pipefail
          npm run test:archie
          npm run test:maker
          npm run test:archie:learning
          npm run test:archie:persistent
          npm run test:archie:portable
          npm run test:archie:evaluation
          npm run test:archie:distill

      - name: Replace staging artifacts with the verified implementation
        shell: bash
        run: |
          set -euo pipefail
          git rm -r .recovery .github/workflows/revive-dead-instance.yml
          git commit -m 'Remove recovery staging after verification'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
