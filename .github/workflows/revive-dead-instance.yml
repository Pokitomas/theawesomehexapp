name: Revive dead-instance completion

on:
  pull_request:
    branches:
      - main
    paths:
      - .recovery/**
      - .github/workflows/revive-dead-instance.yml

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: revive-dead-instance-completion-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  recover-verify-push:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/archie-dead-instance-recovery-exec'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out the PR merge tree
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Reconstruct and verify recovered patches
        shell: bash
        run: |
          set -euo pipefail
          cat .recovery/0001.patch.part.* > /tmp/0001.patch
          cat .recovery/0002.patch.part.* > /tmp/0002.patch
          sed -i 's/|  60 ++++ -$/|  60 ++++-/' /tmp/0001.patch
          echo 'b18e8e171deead37e066adb2d895b6027b2db0a774cf99dcc364994c93c2cc9e  /tmp/0001.patch' | sha256sum -c -
          echo '73c2c219887457953ca56cf2fa5f8c5c8b52033fd9a40bf6e262860c0452e2ab  /tmp/0002.patch' | sha256sum -c -

      - name: Apply recovered diffs in dependency order
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -u
          git config user.name 'Archie Recovery Bot'
          git config user.email 'archie-recovery@users.noreply.github.com'
          : > /tmp/recovery-apply.log
          git apply --3way --index /tmp/0001.patch >> /tmp/recovery-apply.log 2>&1
          first=$?
          if [ "$first" -eq 0 ]; then
            git apply --3way --index /tmp/0002.patch >> /tmp/recovery-apply.log 2>&1
            second=$?
          else
            second=99
          fi
          if [ "$first" -ne 0 ] || [ "$second" -ne 0 ]; then
            {
              echo '### Recovery patch application failed'
              echo
              echo '```text'
              cat /tmp/recovery-apply.log
              echo '```'
              echo
              echo "first_patch_exit=$first second_patch_exit=$second"
            } > /tmp/recovery-comment.md
            gh pr comment "$PR_NUMBER" --body-file /tmp/recovery-comment.md
            exit 1
          fi
          git commit -m 'Apply recovered Archie cognition and cold-start fixes'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install exact dependencies
        shell: bash
        run: npm ci

      - name: Run focused recovered regressions
        shell: bash
        run: node --test scripts/tests/maker-archie-cognition.test.mjs scripts/tests/overlay-vault.test.mjs

      - name: Run full Archie and Maker verification matrix
        shell: bash
        run: |
          set -euo pipefail
          npm run test:archie
          npm run test:maker
          npm run test:archie:learning
          npm run test:archie:persistent
          npm run test:archie:portable
          npm run test:archie:evaluation
          npm run test:archie:distill

      - name: Replace staging artifacts with the verified implementation
        shell: bash
        run: |
          set -euo pipefail
          git rm -r .recovery .github/workflows/revive-dead-instance.yml
          git commit -m 'Remove recovery staging after verification'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
