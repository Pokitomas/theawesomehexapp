name: Revive dead-instance completion

on:
  push:
    branches:
      - revive/dead-instance-completion-20260717
    paths:
      - .recovery/**
      - .github/workflows/revive-dead-instance.yml
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]
    paths:
      - .recovery/**
      - .github/workflows/revive-dead-instance.yml

permissions:
  contents: write

concurrency:
  group: revive-dead-instance-completion
  cancel-in-progress: false

jobs:
  recover-verify-push:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[skip recovery]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out exact recovery branch
        uses: actions/checkout@v4
        with:
          ref: revive/dead-instance-completion-20260717
          fetch-depth: 0

      - name: Reconstruct and verify recovered patches
        shell: bash
        run: |
          set -euo pipefail
          cat .recovery/0001.patch.part.* > /tmp/0001.patch
          cat .recovery/0002.patch.part.* > /tmp/0002.patch

          # Repair the single cosmetic diffstat spacing introduced while moving
          # the dead-session patch through the GitHub contents API. The actual
          # unified diff was staged byte-for-byte.
          sed -i 's/|  60 ++++ -$/|  60 ++++-/' /tmp/0001.patch

          echo 'b18e8e171deead37e066adb2d895b6027b2db0a774cf99dcc364994c93c2cc9e  /tmp/0001.patch' | sha256sum -c -
          echo '73c2c219887457953ca56cf2fa5f8c5c8b52033fd9a40bf6e262860c0452e2ab  /tmp/0002.patch' | sha256sum -c -

      - name: Apply dead-instance commits in dependency order
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'Archie Recovery Bot'
          git config user.email 'archie-recovery@users.noreply.github.com'
          git am --3way /tmp/0001.patch
          git am --3way /tmp/0002.patch

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install exact dependencies
        shell: bash
        run: npm ci

      - name: Run focused recovered regressions
        shell: bash
        run: node --test scripts/tests/maker-archie-cognition.test.mjs scripts/tests/overlay-vault.test.mjs

      - name: Run full Archie and Maker verification matrix
        shell: bash
        run: |
          set -euo pipefail
          npm run test:archie
          npm run test:maker
          npm run test:archie:learning
          npm run test:archie:persistent
          npm run test:archie:portable
          npm run test:archie:evaluation

      - name: Record exact verified head and push
        shell: bash
        run: |
          set -euo pipefail
          printf 'base=%s\nverified_head=%s\nworkflow_run=%s\n' \
            '1356a56dfe21d931ef0cad21f41050ebb7ac0684' \
            "$(git rev-parse HEAD)" \
            "${GITHUB_RUN_ID}" > .recovery/APPLIED
          git add .recovery/APPLIED
          git commit -m '[skip recovery] Apply and verify dead-instance completion'
          git push origin HEAD:revive/dead-instance-completion-20260717
