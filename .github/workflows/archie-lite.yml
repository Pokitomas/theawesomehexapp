name: Verify Archie low-compute runtime

on:
  pull_request:
    paths:
      - 'scripts/archie-lite-core.mjs'
      - 'scripts/archie-lite.mjs'
      - 'scripts/install-archie-lite-linux.sh'
      - 'scripts/tests/maker-archie-lite.test.mjs'
      - 'ARCHIE_LITE.md'
      - 'INSTALL.md'
      - 'package.json'
      - '.github/workflows/archie-lite.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/archie-lite-core.mjs'
      - 'scripts/archie-lite.mjs'
      - 'scripts/install-archie-lite-linux.sh'
      - 'scripts/tests/maker-archie-lite.test.mjs'
      - 'ARCHIE_LITE.md'
      - 'INSTALL.md'
      - 'package.json'
      - '.github/workflows/archie-lite.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  low-compute-runtime:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install exact dependency tree
        run: npm ci --ignore-scripts
      - name: Check low-compute modules and installer
        shell: bash
        run: |
          node --check scripts/archie-lite-core.mjs
          node --check scripts/archie-lite.mjs
          node --check scripts/tests/maker-archie-lite.test.mjs
          bash -n scripts/install-archie-lite-linux.sh
      - name: Run low-compute contract tests
        run: npm run test:archie:lite
      - name: Verify operator help
        run: node scripts/archie-lite.mjs --help
