name: Repair Pages social source window

on:
  pull_request:
    paths:
      - .github/workflows/repair-pages-social-window.yml
      - .github/tmp/repair-pages-social-window.py

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - name: Apply, execute, and report exact social-window repair
        env:
          SIDEWAYS_PUBLIC_SOURCES: ${{ vars.SIDEWAYS_PUBLIC_SOURCES }}
        shell: bash
        run: |
          set +e
          python .github/tmp/repair-pages-social-window.py
          patch_status=$?
          rm -f .github/tmp/repair-pages-social-window.py
          rm -f .github/workflows/repair-pages-social-window.yml
          rm -f audit/pages-snapshot-repair-failure.log
          mkdir -p audit /tmp/sideways-corpus
          log=audit/pages-social-window-repair-failure.log
          : > "$log"
          failed=$patch_status

          run_gate() {
            name="$1"
            shift
            echo "## ${name}" >> "$log"
            "$@" >> "$log" 2>&1
            status=$?
            echo "status=${status}" >> "$log"
            echo >> "$log"
            if [ "$status" -ne 0 ]; then failed=1; fi
          }

          run_gate npm-ci npm ci
          run_gate syntax node --check scripts/build-web-source-snapshot.mjs
          run_gate focused-tests node --test scripts/tests/web-source-snapshot.test.mjs scripts/tests/web-source-providers.test.mjs
          run_gate actual-snapshot timeout 900s node scripts/build-web-source-snapshot.mjs --output /tmp/sideways-corpus/general.jsonl.gz
          run_gate snapshot-verifier node scripts/verify-web-source-snapshot.mjs /tmp/sideways-corpus/general.jsonl.gz /tmp/sideways-corpus/general.jsonl.gz.meta.json

          if [ "$failed" -eq 0 ]; then
            run_gate ingestion npm run test:ingestion
            run_gate authority npm run test:authority
            run_gate repository npm run verify:repository
            run_gate diff-check git diff --check
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          if [ "$failed" -ne 0 ]; then
            tail -n 500 "$log" > "$log.tmp"
            mv "$log.tmp" "$log"
            git add -A
            git commit -m "test: preserve Pages social-window failure"
            git push origin HEAD:${TARGET_BRANCH}
            exit 1
          fi

          rm -f "$log"
          git add -A
          git commit -m "fix(pages): use bounded local social timelines"
          git push origin HEAD:${TARGET_BRANCH}
