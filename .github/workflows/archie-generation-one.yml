name: Archie Generation One evidence

on:
  pull_request:
    paths:
      - 'scripts/archie-generation-one-run.mjs'
      - 'scripts/archie-action-contract.mjs'
      - 'scripts/maker-archie-*.mjs'
      - 'scripts/tests/archie-generation-one-run.test.mjs'
      - 'scripts/tests/maker-archie-*.test.mjs'
      - 'maker/evaluations/**'
      - 'package.json'
      - '.github/workflows/archie-generation-one.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run Archie evaluation tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts
          npm run test:archie:evaluation 2>&1 | tee artifacts/archie-generation-one-test.log
      - name: Produce exact-head Generation One receipt
        run: npm run archie:generation-one -- --code-revision "$GITHUB_SHA" --output artifacts/archie-generation-one-receipt.json
      - name: Verify receipt is explicit and digest-bound
        run: |
          node -e "const fs=require('fs');const p='artifacts/archie-generation-one-receipt.json';const r=JSON.parse(fs.readFileSync(p));if(r.schema!=='archie-generation-one-run-receipt/v1'||!r.receipt_digest)process.exit(1);console.log(JSON.stringify({promotion:r.promotion,observed:r.observed,receipt_digest:r.receipt_digest},null,2));"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: archie-generation-one-${{ github.sha }}
          path: |
            artifacts/archie-generation-one-receipt.json
            artifacts/archie-generation-one-test.log
          if-no-files-found: warn
