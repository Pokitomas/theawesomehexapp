name: Archie Generation One evidence

on:
  pull_request:
    paths:
      - 'scripts/archie-generation-one-run.mjs'
      - 'scripts/archie-action-contract.mjs'
      - 'scripts/maker-archie-*.mjs'
      - 'scripts/tests/archie-generation-one-run.test.mjs'
      - 'scripts/tests/maker-archie-*.test.mjs'
      - 'maker/evaluations/**'
      - 'package.json'
      - '.github/workflows/archie-generation-one.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ARCHIE_CODE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run Archie evaluation tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts
          npm run test:archie:evaluation 2>&1 | tee artifacts/archie-generation-one-test.log
      - name: Run direct Archie benchmark and preserve command receipt
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p artifacts
          set +e
          npm run benchmark:archie > artifacts/archie-benchmark-command.log 2>&1
          status=$?
          set -e
          cat artifacts/archie-benchmark-command.log
          STATUS="$status" NODE_VERSION="$(node --version)" NPM_VERSION="$(npm --version)" node --input-type=module <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs';

          const canonical = value => Array.isArray(value)
            ? value.map(canonical)
            : value && typeof value === 'object'
              ? Object.fromEntries(Object.keys(value).sort().map(key => [key, canonical(value[key])]))
              : value;
          const digest = value => crypto.createHash('sha256').update(JSON.stringify(canonical(value))).digest('hex');
          const logPath = 'artifacts/archie-benchmark-command.log';
          const reportPath = 'artifacts/archie-benchmark-report.json';
          const receiptPath = 'artifacts/archie-benchmark-command-receipt.json';
          const log = fs.readFileSync(logPath, 'utf8');
          const start = log.indexOf('{');
          let report = null;
          let parseError = '';
          if (start >= 0) {
            try {
              report = JSON.parse(log.slice(start)).report || null;
            } catch (error) {
              parseError = error.message;
            }
          } else {
            parseError = 'benchmark JSON object missing from command output';
          }
          if (report) {
            const claimed = report.report_digest;
            const body = { ...report };
            delete body.report_digest;
            const computed = digest(body);
            if (!claimed || claimed !== computed) throw new Error(`benchmark report digest mismatch: claimed=${claimed || 'missing'} computed=${computed}`);
            fs.writeFileSync(reportPath, `${JSON.stringify(report, null, 2)}\n`);
          }
          const receiptBody = {
            schema: 'archie-benchmark-command-receipt/v1',
            command: 'npm run benchmark:archie',
            code_revision: process.env.ARCHIE_CODE_REVISION,
            event_sha: process.env.GITHUB_SHA,
            environment: {
              runner_os: process.env.RUNNER_OS || '',
              runner_arch: process.env.RUNNER_ARCH || '',
              runner_image: process.env.ImageOS || '',
              runner_image_version: process.env.ImageVersion || '',
              node_version: process.env.NODE_VERSION,
              npm_version: process.env.NPM_VERSION
            },
            exit_code: Number(process.env.STATUS),
            parse_error: parseError || null,
            suite_id: report?.suite_id || null,
            suite_digest: report?.suite_digest || null,
            candidate_id: report?.candidate_id || null,
            equivalence_score: report?.equivalence_score ?? null,
            task_success_rate: report?.metrics?.task_success_rate ?? null,
            report_digest: report?.report_digest || null
          };
          const receipt = { ...receiptBody, receipt_digest: digest(receiptBody) };
          fs.writeFileSync(receiptPath, `${JSON.stringify(receipt, null, 2)}\n`);
          if (Number(process.env.STATUS) === 0 && (!report || parseError)) throw new Error(parseError || 'benchmark report missing');
          NODE
          exit "$status"
      - name: Produce exact-head Generation One receipt
        run: npm run archie:generation-one -- --code-revision "$ARCHIE_CODE_REVISION" --output artifacts/archie-generation-one-receipt.json
      - name: Verify receipts are explicit, digest-bound, and exact-head
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const generation = JSON.parse(fs.readFileSync('artifacts/archie-generation-one-receipt.json', 'utf8'));
          const benchmark = JSON.parse(fs.readFileSync('artifacts/archie-benchmark-command-receipt.json', 'utf8'));
          const expected = process.env.ARCHIE_CODE_REVISION;
          if (generation.schema !== 'archie-generation-one-run-receipt/v1' || !generation.receipt_digest) process.exit(1);
          if (benchmark.schema !== 'archie-benchmark-command-receipt/v1' || !benchmark.receipt_digest || !benchmark.report_digest) process.exit(1);
          if (generation.code_revision !== expected || benchmark.code_revision !== expected || benchmark.exit_code !== 0) process.exit(1);
          console.log(JSON.stringify({
            code_revision: expected,
            benchmark: {
              exit_code: benchmark.exit_code,
              equivalence_score: benchmark.equivalence_score,
              task_success_rate: benchmark.task_success_rate,
              report_digest: benchmark.report_digest,
              receipt_digest: benchmark.receipt_digest
            },
            generation_one: {
              promotion: generation.promotion,
              observed: generation.observed,
              receipt_digest: generation.receipt_digest
            }
          }, null, 2));
          NODE
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: archie-generation-one-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            artifacts/archie-generation-one-receipt.json
            artifacts/archie-generation-one-test.log
            artifacts/archie-benchmark-command.log
            artifacts/archie-benchmark-command-receipt.json
            artifacts/archie-benchmark-report.json
          if-no-files-found: warn
