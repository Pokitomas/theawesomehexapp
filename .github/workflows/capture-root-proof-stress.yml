name: Capture repeated root proof

on:
  pull_request:
    paths:
      - .github/workflows/capture-root-proof-stress.yml

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
      SIDEWAYS_PUBLIC_SOURCES: ${{ vars.SIDEWAYS_PUBLIC_SOURCES }}
      POST_COUNT: 1000000
      CHUNK_SIZE: 1024
      CONTENT_CHUNK_SIZE: 128
      CORPUS_SEED: 20260712
      CORPUS_FILE: corpus/general-media.jsonl.gz
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Build exact projection once
        run: |
          rm .github/workflows/capture-root-proof-stress.yml
          python -m pip install --disable-pip-version-check pillow
          npm ci --ignore-scripts --include=dev
          cat source.xz.part.* | base64 -d > source.tar.xz
          tar -xJf source.tar.xz
          cat general-overlay.part.* | base64 -d > general-overlay.tar.xz
          tar -xJf general-overlay.tar.xz
          python general/patch.py
          cat profile-overlay.part.* | base64 -d > profile-overlay.tar.xz
          tar -xJf profile-overlay.tar.xz
          python profile/patch.py
          node scripts/build-web-source-snapshot.mjs --output corpus/general.jsonl.gz
          node scripts/verify-web-source-snapshot.mjs corpus/general.jsonl.gz corpus/general.jsonl.gz.meta.json
          python general/media.py --input corpus/general.jsonl.gz --output corpus/general-media.jsonl.gz --media-dir corpus/media --max-media 180 --discover-forum 80
          node scripts/build.mjs
      - id: stress
        name: Capture three independent profile proofs
        shell: bash
        run: |
          set +e
          failed=0
          for pass in 1 2 3; do
            python verify-profile-build.py >"profile-proof-${pass}.log" 2>&1
            status=$?
            echo "$status" >"profile-proof-${pass}.status"
            cp -f root-product-phone.png "root-product-phone-${pass}.png" 2>/dev/null || true
            cp -f root-product-desktop.png "root-product-desktop-${pass}.png" 2>/dev/null || true
            if [ "$status" -ne 0 ]; then failed=1; fi
          done
          set -e
          for pass in 1 2 3; do
            echo "===== PASS ${pass} STATUS $(cat profile-proof-${pass}.status) ====="
            cat "profile-proof-${pass}.log"
          done
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
      - name: Upload repeated root proof
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: repeated-root-proof
          path: |
            profile-proof-*.log
            profile-proof-*.status
            root-product-phone-*.png
            root-product-desktop-*.png
          if-no-files-found: error
          retention-days: 5
      - name: Remove capture workflow from branch
        if: always()
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git reset
          git add -u .github/workflows/capture-root-proof-stress.yml
          test "$(git diff --cached --name-only)" = ".github/workflows/capture-root-proof-stress.yml"
          git commit -m "chore: remove root proof capture"
          git push origin HEAD:${TARGET_BRANCH}
      - name: Preserve stress status
        if: steps.stress.outputs.failed != '0'
        run: exit 1
