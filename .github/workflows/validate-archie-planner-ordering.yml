name: Validate Archie planner ordering

on:
  push:
    branches:
      - agent/archie-derivational-cognition-pr
    paths:
      - .github/workflows/validate-archie-planner-ordering.yml

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - name: Remove temporary workflow
        run: rm .github/workflows/validate-archie-planner-ordering.yml
      - run: npm ci
      - name: Run exact omitted gates
        shell: bash
        run: |
          set -euo pipefail
          node --test scripts/tests/maker-archie-planner.test.mjs
          npm run test:archie
          npm run benchmark:archie:derive
          npm run benchmark:archie
          npm run test:maker
          npm run test:authority
          npm run verify:repository
          git diff --check
      - name: Publish validated head
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/validate-archie-planner-ordering.yml
          git commit -m "test: validate Archie planner ordering"
          git push origin HEAD:${GITHUB_REF_NAME}
