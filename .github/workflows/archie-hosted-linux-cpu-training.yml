name: Run Archie hosted Linux CPU training

on:
  push:
    branches:
      - agent/archie-information-budgeted-rslora
  pull_request:
    paths:
      - 'foundry/archie-distill/linux_cpu_rslora_train.py'
      - 'foundry/archie-distill/linux_cpu_training_corpus.jsonl'
      - '.github/workflows/archie-hosted-linux-cpu-training.yml'

permissions:
  contents: read

concurrency:
  group: archie-hosted-linux-cpu-${{ github.ref }}
  cancel-in-progress: false

jobs:
  contract:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755 # v6.2.0
        with:
          python-version: '3.12'
      - name: Validate bounded CPU trainer and corpus
        run: |
          set -euo pipefail
          python -m py_compile foundry/archie-distill/linux_cpu_rslora_train.py
          python - <<'PY'
          import json, pathlib
          rows = [json.loads(line) for line in pathlib.Path('foundry/archie-distill/linux_cpu_training_corpus.jsonl').read_text().splitlines() if line.strip()]
          assert len(rows) == 20
          assert sum(row['split'] == 'train' for row in rows) == 16
          assert sum(row['split'] == 'development' for row in rows) == 4
          assert len({row['pair_id'] for row in rows}) == len(rows)
          assert all(row['chosen_target'] != row['rejected_target'] for row in rows)
          PY

  train:
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: target-1.7b
            model: Qwen/Qwen3-1.7B
            revision: 8d4744f9e13072f4920c326350fa81eedb74eae9
            dtype: bfloat16
            max_steps: 1
            train_limit: 2
            eval_limit: 2
            rank: 8
            alpha: 16
            learning_rate: '0.0002'
            max_seq_length: 64
            prompt_replay_tokens: 24
            prompt_head_tokens: 8
            shared_prefix_replay_tokens: 12
            max_divergence_tokens: 40
          - lane: lite-0.6b
            model: Qwen/Qwen3-0.6B
            revision: main
            dtype: float32
            max_steps: 8
            train_limit: 12
            eval_limit: 4
            rank: 16
            alpha: 32
            learning_rate: '0.0003'
            max_seq_length: 128
            prompt_replay_tokens: 56
            prompt_head_tokens: 12
            shared_prefix_replay_tokens: 24
            max_divergence_tokens: 88
    runs-on: ${{ vars.ARCHIE_LINUX_LARGE_RUNNER_LABEL || 'ubuntu-24.04' }}
    timeout-minutes: 350
    env:
      HF_HOME: ${{ runner.temp }}/huggingface
      HF_HUB_DISABLE_TELEMETRY: '1'
      TOKENIZERS_PARALLELISM: 'false'
      PYTHONUNBUFFERED: '1'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
      - uses: actions/setup-python@bfe8cc55a7890e3d6672eda6460ef37bfcc70755 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install pinned CPU training stack
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu 'torch==2.7.1'
          python -m pip install 'transformers==4.53.2' 'peft==0.16.0' 'accelerate==1.8.1' 'safetensors==0.5.3'
      - id: train_cpu
        name: Train ${{ matrix.lane }} on hosted Linux CPU
        continue-on-error: true
        env:
          OUTPUT: ${{ runner.temp }}/archie-linux-cpu-${{ matrix.lane }}
        run: |
          set -uo pipefail
          mkdir -p "$OUTPUT"
          python foundry/archie-distill/linux_cpu_rslora_train.py \
            --lane '${{ matrix.lane }}' \
            --model '${{ matrix.model }}' \
            --revision '${{ matrix.revision }}' \
            --dtype '${{ matrix.dtype }}' \
            --corpus foundry/archie-distill/linux_cpu_training_corpus.jsonl \
            --output "$OUTPUT" \
            --max-steps '${{ matrix.max_steps }}' \
            --train-limit '${{ matrix.train_limit }}' \
            --eval-limit '${{ matrix.eval_limit }}' \
            --rank '${{ matrix.rank }}' \
            --alpha '${{ matrix.alpha }}' \
            --learning-rate '${{ matrix.learning_rate }}' \
            --max-seq-length '${{ matrix.max_seq_length }}' \
            --prompt-replay-tokens '${{ matrix.prompt_replay_tokens }}' \
            --prompt-head-tokens '${{ matrix.prompt_head_tokens }}' \
            --shared-prefix-replay-tokens '${{ matrix.shared_prefix_replay_tokens }}' \
            --max-divergence-tokens '${{ matrix.max_divergence_tokens }}' \
            --time-budget-minutes 270 \
            --threads 2 \
            --gradient-checkpointing 2>&1 | tee "$OUTPUT/run.log"
          status=${PIPESTATUS[0]}
          if [[ ! -f "$OUTPUT/training-receipt.json" ]]; then
            STATUS="$status" LANE='${{ matrix.lane }}' MODEL='${{ matrix.model }}' OUTPUT="$OUTPUT" python - <<'PY'
            import hashlib, json, os, pathlib, platform, time
            output = pathlib.Path(os.environ['OUTPUT'])
            body = {
              'schema': 'archie-linux-cpu-rslora-training-receipt/v1',
              'method': 'github-hosted-linux-cpu-causal-fork-rslora/v1',
              'lane': os.environ['LANE'],
              'status': 'process-terminated-without-python-receipt',
              'exit_code': int(os.environ['STATUS']),
              'model': {'requested': os.environ['MODEL'], 'device': 'cpu'},
              'runtime': {'python': platform.python_version()},
              'real_gradient_updates': False,
              'promotion': 'not-admitted',
              'claim_boundary': 'The hosted process terminated before a neural receipt could be emitted.',
              'created_at': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
            }
            stable = json.dumps(body, sort_keys=True, separators=(',', ':'))
            receipt = {**body, 'receipt_digest': hashlib.sha256(stable.encode()).hexdigest()}
            (output / 'training-receipt.json').write_text(json.dumps(receipt, indent=2, sort_keys=True) + '\n')
            PY
          fi
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Summarize bounded CPU result
        if: always()
        env:
          OUTPUT: ${{ runner.temp }}/archie-linux-cpu-${{ matrix.lane }}
        run: |
          set -euo pipefail
          echo '## Archie hosted CPU lane: ${{ matrix.lane }}' >> "$GITHUB_STEP_SUMMARY"
          python - "$OUTPUT/training-receipt.json" >> "$GITHUB_STEP_SUMMARY" <<'PY'
          import json, pathlib, sys
          value = json.loads(pathlib.Path(sys.argv[1]).read_text())
          optimization = value.get('optimization', {})
          comparison = value.get('evaluation', {}).get('comparison', {})
          print(f"- Status: {value.get('status', 'completed')}")
          print(f"- Model: {value.get('model', {}).get('requested')}")
          print(f"- Real optimizer steps: {optimization.get('completed_optimizer_steps', value.get('real_gradient_updates', False))}")
          print(f"- RSLoRA active: {optimization.get('rslora_active')}")
          print(f"- Held-out accuracy delta: {comparison.get('pair_accuracy_delta')}")
          print(f"- Held-out margin delta: {comparison.get('mean_pair_margin_delta')}")
          print(f"- Promotion: {value.get('promotion')}")
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: archie-linux-cpu-${{ matrix.lane }}-${{ github.sha }}-${{ github.run_id }}
          path: ${{ runner.temp }}/archie-linux-cpu-${{ matrix.lane }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
