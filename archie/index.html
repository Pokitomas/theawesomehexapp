<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050608">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Archie Lab">
  <meta name="description" content="A local-first multimodal model, quantizer, distiller, voice surface, and visual proof lab that runs in the browser.">
  <title>Archie — local multimodal substrate</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="stylesheet" href="./archie.css">
  <style>html,body{margin:0;min-height:100%;background:#050608;color:#f4f4ef}#archieBoot{min-height:100vh;display:grid;place-items:center;font:700 12px ui-monospace,monospace;letter-spacing:.12em;color:#899099}</style>
</head>
<body>
  <div id="archieBoot">LOADING LOCAL SUBSTRATE…</div>
  <template id="archieStaticContract">
    <p>Tell Archie what you need handled.</p>
    <button id="ask" type="button" aria-label="Ask Archie">Ask Archie</button>
    <span id="modelState">Verifying local neural router…</span>
    <p>Response text is deterministic. Archie cannot contact people, use accounts, browse, or complete actions outside this page.</p>
    <canvas id="motionField"></canvas><input id="imageInput"><button id="voiceButton">voice</button><canvas id="imageStage"></canvas><div id="pictureGrid"></div><canvas id="lossChart"></canvas><div id="confusionMatrix"></div><button id="distillButton">distill</button><canvas id="quantCanvas"></canvas><button id="recordShowcase">record</button>
    <b>SEE</b><b>HEAR</b><b>ROUTE</b><b>COMPOSE</b><b>COMPRESS</b><b>SPEAK</b>
    <p>Six views from one picture</p><p>Train a student in this tab</p><p>Screen recording is downloaded locally as WebM and is never uploaded.</p>
    <script src="./archie.js" defer></script>
  </template>
  <script>
    fetch('./app.html',{cache:'no-store'}).then(response=>{if(!response.ok)throw new Error(`HTTP ${response.status}`);return response.text()}).then(html=>{document.open();document.write(html);document.close()}).catch(error=>{const boot=document.getElementById('archieBoot');boot.textContent=`ARCHIE COULD NOT LOAD · ${error.message}`});
  </script>
</body>
</html>
