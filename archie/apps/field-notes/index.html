<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d1816">
<title>Field Notes</title>
<style>
:root{color-scheme:dark;font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;background:#0d1816;color:#edf8f3;--panel:#14231f;--line:#294039;--mint:#89f0c7;--muted:#9cb4ab;--danger:#ff9a9a}*{box-sizing:border-box}body{margin:0;min-height:100svh;background:radial-gradient(circle at 80% -10%,#25483d 0,transparent 36rem),#0d1816}.shell{width:min(760px,100%);margin:auto;padding:max(18px,env(safe-area-inset-top)) 14px max(32px,env(safe-area-inset-bottom))}header{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:8px 2px 22px}h1{margin:0;font-size:34px;letter-spacing:-.05em}.private{font-size:11px;color:var(--mint);text-transform:uppercase;letter-spacing:.12em}.panel{background:rgba(20,35,31,.94);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 25px 70px rgba(0,0,0,.28)}form{display:grid;gap:10px}input,textarea,button{font:inherit}input,textarea{width:100%;border:1px solid var(--line);border-radius:14px;background:#0c1614;color:#fff;padding:13px;outline:none}textarea{min-height:112px;resize:vertical}input:focus,textarea:focus{border-color:var(--mint)}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions{display:flex;gap:8px;flex-wrap:wrap}.button{min-height:44px;border:1px solid var(--line);border-radius:13px;background:#1a2e28;color:#fff;padding:0 14px;font-weight:750;cursor:pointer}.button.primary{background:var(--mint);color:#082019;border-color:transparent;margin-left:auto}.button.danger{color:var(--danger)}.file{position:relative;overflow:hidden}.file input{position:absolute;inset:0;opacity:0;cursor:pointer}.status{min-height:20px;color:var(--muted);font-size:12px}.toolbar{display:flex;gap:8px;margin:18px 0 10px}.toolbar input{flex:1}.notes{display:grid;gap:12px}.empty{padding:30px 12px;color:var(--muted);text-align:center;border:1px dashed var(--line);border-radius:18px}.note{border:1px solid var(--line);border-radius:18px;background:rgba(20,35,31,.82);overflow:hidden}.note img{display:block;width:100%;max-height:320px;object-fit:cover}.note-body{padding:15px}.note h2{font-size:19px;margin:0 0 8px}.note p{white-space:pre-wrap;line-height:1.5;color:#d3e2dc;margin:0}.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}.chip{font-size:10px;border:1px solid var(--line);border-radius:999px;padding:5px 8px;color:var(--muted)}.note-foot{display:flex;justify-content:space-between;align-items:center;margin-top:13px;color:var(--muted);font-size:11px}.note-foot button{border:0;background:none;color:var(--danger);cursor:pointer}footer{text-align:center;color:var(--muted);font-size:11px;padding:22px 0 0}@media(max-width:560px){.row{grid-template-columns:1fr}.button.primary{margin-left:0;flex:1}}
</style>
</head>
<body>
<main class="shell">
<header><div><div class="private">Private · offline · local</div><h1>Field Notes</h1></div><button class="button" id="export" type="button">Export JSON</button></header>
<section class="panel">
<form id="form">
<input id="title" maxlength="100" placeholder="What did you notice?" aria-label="Note title" required>
<textarea id="body" maxlength="4000" placeholder="Write the useful details…" aria-label="Note body"></textarea>
<div class="row"><input id="tags" placeholder="Tags, comma separated" aria-label="Tags"><input id="location" placeholder="Location (optional)" aria-label="Location"></div>
<div class="actions">
<label class="button file">Add photo<input id="photo" type="file" accept="image/*" capture="environment"></label>
<button class="button" id="locate" type="button">Use current location</button>
<button class="button primary" type="submit">Save note</button>
</div>
<div class="status" id="status">Nothing leaves this device.</div>
</form>
</section>
<div class="toolbar"><input id="search" type="search" placeholder="Search notes, tags, or location" aria-label="Search notes"><button class="button danger" id="clear" type="button">Clear all</button></div>
<section class="notes" id="notes" aria-live="polite"></section>
<footer>Standalone HTML app · no account · no server · data stays in this browser</footer>
</main>
<script>
const KEY='archie-field-notes/v1';
const $=id=>document.getElementById(id);
let notes=read();
let photoData='';
function read(){try{const value=JSON.parse(localStorage.getItem(KEY)||'[]');return Array.isArray(value)?value:[]}catch{return[]}}
function persist(){localStorage.setItem(KEY,JSON.stringify(notes));render()}
function escapeHtml(value){return String(value??'').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]))}
function render(){
 const query=$('search').value.trim().toLowerCase();
 const visible=notes.filter(note=>[note.title,note.body,note.location,...note.tags].join(' ').toLowerCase().includes(query));
 $('notes').innerHTML=visible.length?visible.map(note=>`<article class="note">${note.photo?`<img src="${note.photo}" alt="">`:''}<div class="note-body"><h2>${escapeHtml(note.title)}</h2><p>${escapeHtml(note.body)}</p><div class="meta">${note.tags.map(tag=>`<span class="chip">#${escapeHtml(tag)}</span>`).join('')}${note.location?`<span class="chip">${escapeHtml(note.location)}</span>`:''}</div><div class="note-foot"><time>${new Date(note.createdAt).toLocaleString()}</time><button type="button" data-delete="${note.id}">Delete</button></div></div></article>`).join(''):'<div class="empty">No matching notes yet.</div>';
 document.querySelectorAll('[data-delete]').forEach(button=>button.onclick=()=>{notes=notes.filter(note=>note.id!==button.dataset.delete);persist()});
}
$('photo').onchange=event=>{
 const file=event.target.files?.[0]; if(!file){photoData='';return}
 if(file.size>2_500_000){$('status').textContent='Choose a photo under 2.5 MB.';event.target.value='';return}
 const reader=new FileReader();reader.onload=()=>{photoData=String(reader.result);$('status').textContent='Photo ready.'};reader.readAsDataURL(file);
};
$('locate').onclick=()=>{
 if(!navigator.geolocation){$('status').textContent='Location is not supported here.';return}
 $('status').textContent='Requesting location permission…';
 navigator.geolocation.getCurrentPosition(position=>{
   $('location').value=`${position.coords.latitude.toFixed(5)}, ${position.coords.longitude.toFixed(5)}`;
   $('status').textContent='Location added.';
 },()=>{$('status').textContent='Location was not added.'},{enableHighAccuracy:false,timeout:8000,maximumAge:60000});
};
$('form').onsubmit=event=>{
 event.preventDefault();
 const title=$('title').value.trim(); if(!title)return;
 notes.unshift({id:crypto.randomUUID?.()||`${Date.now()}-${Math.random()}`,title,body:$('body').value.trim(),tags:$('tags').value.split(',').map(tag=>tag.trim()).filter(Boolean).slice(0,12),location:$('location').value.trim(),photo:photoData,createdAt:new Date().toISOString()});
 event.target.reset();photoData='';$('status').textContent='Saved locally.';persist();
};
$('search').oninput=render;
$('clear').onclick=()=>{if(notes.length&&confirm('Delete every local note?')){notes=[];persist()}};
$('export').onclick=()=>{
 const blob=new Blob([JSON.stringify({schema:'archie-field-notes-export/v1',exportedAt:new Date().toISOString(),notes},null,2)],{type:'application/json'});
 const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download='field-notes.json';link.click();setTimeout(()=>URL.revokeObjectURL(link.href),1000);
};
render();
</script>
</body>
</html>
