services:
  archie:
    build:
      context: .
      dockerfile: Dockerfile.archie
    image: archie-local/archied-hosted:0.2.0
    command: ["node", "scripts/archied-hosted.mjs"]
    init: true
    restart: unless-stopped
    env_file:
      - .env.archied
    environment:
      ARCHIE_HOME: /data
      ARCHIED_HOST: 0.0.0.0
      ARCHIED_PORT: 8787
    ports:
      - "${ARCHIED_BIND:-127.0.0.1}:${ARCHIED_PORT:-8787}:8787"
    volumes:
      - archie-data:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  archie-data:
