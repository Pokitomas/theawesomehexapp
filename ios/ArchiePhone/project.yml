name: ArchiePhone
options:
  bundleIdPrefix: com.pokitomas.archie
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
targets:
  ArchiePhone:
    type: application
    platform: iOS
    sources:
      - path: FinalSources
      - path: Sources/ModelLifecycle.swift
    resources:
      - path: Config/PrivacyInfo.xcprivacy
    info:
      path: Config/Info.plist
    entitlements:
      path: Config/ArchiePhone.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pokitomas.archie.phone
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    scheme:
      testTargets:
        - ArchiePhoneTests
  ArchiePhoneTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: ArchiePhone
    sources:
      - path: Tests
    dependencies:
      - target: ArchiePhone
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pokitomas.archie.phone.tests
