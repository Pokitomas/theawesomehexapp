[build]
  command = "python3 studio/manual/prepare-kernel.py && python3 studio/manual/apply.py"
  publish = "manual-app"
  functions = "netlify/functions"

# The existing workspace profile intentionally remains local. Public identity
# is account-owned and mutates only through /api/me/profile below.

[[redirects]]
  from = "/api/starter"
  to = "/.netlify/functions/starter"
  status = 200

[[redirects]]
  from = "/api/remote/state"
  to = "/.netlify/functions/remote?mode=state"
  status = 200

[[redirects]]
  from = "/api/remote"
  to = "/.netlify/functions/remote"
  status = 200

[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/social?route=/auth/:splat"
  status = 200

[[redirects]]
  from = "/api/me"
  to = "/.netlify/functions/social?route=/me"
  status = 200

[[redirects]]
  from = "/api/me/*"
  to = "/.netlify/functions/social?route=/me/:splat"
  status = 200

[[redirects]]
  from = "/api/users/*"
  to = "/.netlify/functions/social?route=/users/:splat"
  status = 200

[[redirects]]
  from = "/api/posts"
  to = "/.netlify/functions/social?route=/posts"
  status = 200

[[redirects]]
  from = "/api/posts/*"
  to = "/.netlify/functions/social?route=/posts/:splat"
  status = 200

[[redirects]]
  from = "/api/feed/*"
  to = "/.netlify/functions/social?route=/feed/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
